<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>排障意图分类体系 · 5 大类 / 19 小类</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
  :root {
    --bg: #0b0d12;
    --bg-soft: #141821;
    --fg: #e8ecf4;
    --muted: #8892a6;
    --line: #222735;
  }
  html, body { margin: 0; padding: 0; background:
     radial-gradient(ellipse at top, #161a24 0%, var(--bg) 60%);
    color: var(--fg); min-height: 100vh;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif; }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 28px 24px 40px; }
  h1 { font-size: 22px; font-weight: 600; margin: 0 0 6px; letter-spacing: 1.5px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 18px; }
  #chart { width: 100%; height: 760px; }
  .legend { display: flex; flex-wrap: wrap; gap: 14px 22px; justify-content: center;
            padding-top: 14px; border-top: 1px solid var(--line); margin-top: 6px; }
  .chip { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--fg); }
  .dot { width: 12px; height: 12px; border-radius: 3px; }
  .chip small { color: var(--muted); margin-left: 2px; }
  .hint { color: var(--muted); font-size: 12px; text-align: center; margin-top: 10px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Agent 排障意图分类体系</h1>
  <div class="sub">内圈 · 5 大认知阶段　|　外圈 · 19 个原子意图　|　扇区等分，悬停查看详情</div>
  <div id="chart"></div>
  <div class="legend" id="legend"></div>
  <div class="hint">hover 查看中文释义 · 点击扇区可下钻</div>
</div>

<script>
const STAGES = [
  {
    key: 'triage',
    nameEn: 'Triage',
    nameZh: '分诊定向',
    color: '#5B8DEF',
    children: [
      { en: 'latency_ranking',    zh: '全服务延迟排名' },
      { en: 'throughput_compare', zh: '全服务流量对比' },
      { en: 'error_rate_scan',    zh: '全服务错误率分布' },
      { en: 'error_log_overview', zh: '全局错误日志总览' },
      { en: 'metric_scan',        zh: '探索 / 浏览指标' },
    ],
  },
  {
    key: 'trace_investigate',
    nameEn: 'Trace Investigate',
    nameZh: '链路调查',
    color: '#2BB9A3',
    children: [
      { en: 'service_trace_scan', zh: '服务 trace 检查' },
      { en: 'trace_follow',       zh: '追踪单次请求' },
      { en: 'call_tree_build',    zh: '构建调用树' },
    ],
  },
  {
    key: 'log_investigate',
    nameEn: 'Log Investigate',
    nameZh: '日志调查',
    color: '#E8A33D',
    children: [
      { en: 'service_error_log',  zh: '服务错误日志' },
      { en: 'service_log_browse', zh: '浏览服务日志' },
      { en: 'keyword_search',     zh: '关键词搜索' },
      { en: 'error_timeline',     zh: '错误时间线' },
    ],
  },
  {
    key: 'metric_diagnose',
    nameEn: 'Metric Diagnose',
    nameZh: '指标诊断',
    color: '#E06C75',
    children: [
      { en: 'container_resource', zh: '容器 CPU/内存' },
      { en: 'jvm_state',          zh: 'JVM / GC / 连接池' },
      { en: 'network_layer',      zh: '网络层指标' },
      { en: 'k8s_state',          zh: 'K8s 状态' },
      { en: 'db_state',           zh: '数据库状态' },
    ],
  },
  {
    key: 'baseline',
    nameEn: 'Baseline',
    nameZh: '基线对比',
    color: '#9A7BE8',
    children: [
      { en: 'baseline_collect',  zh: '采集正常期数据' },
      { en: 'baseline_contrast', zh: '正常 vs 异常对比' },
    ],
  },
];

// ---- build sunburst data ----
const data = STAGES.map(s => ({
  name: s.nameEn,
  _zh: s.nameZh,
  value: s.children.length,
  itemStyle: {
    color: s.color,
    borderColor: '#0b0d12',
    borderWidth: 2,
    shadowBlur: 8,
    shadowColor: 'rgba(0,0,0,0.35)',
  },
  label: {
    color: '#ffffff',
    fontSize: 13,
    fontWeight: 700,
    lineHeight: 16,
    formatter: () => `{en|${s.nameEn}}\n{zh|${s.nameZh}}`,
    rich: {
      en: { color: '#ffffff', fontSize: 13, fontWeight: 700, lineHeight: 16 },
      zh: { color: 'rgba(255,255,255,0.85)', fontSize: 11, fontWeight: 400, lineHeight: 14 },
    },
  },
  children: s.children.map(c => ({
    name: c.en,
    _zh: c.zh,
    value: 1,
    itemStyle: {
      color: s.color,
      opacity: 0.55,
      borderColor: '#0b0d12',
      borderWidth: 2,
    },
    label: {
      color: '#f2f4f8',
      fontSize: 11,
      fontWeight: 500,
    },
  })),
}));

// ---- chart ----
const chart = echarts.init(document.getElementById('chart'), null, { renderer: 'canvas' });
chart.setOption({
  backgroundColor: 'transparent',
  tooltip: {
    backgroundColor: 'rgba(20,24,33,0.96)',
    borderColor: '#2a3040',
    borderWidth: 1,
    textStyle: { color: '#e8ecf4', fontSize: 13 },
    extraCssText: 'box-shadow: 0 6px 24px rgba(0,0,0,0.4); border-radius: 8px; padding: 10px 14px;',
    formatter: p => {
      const zh = p.data && p.data._zh ? p.data._zh : '';
      return `<div style="font-weight:600;letter-spacing:.3px">${p.name}</div>
              <div style="color:#8892a6;font-size:12px;margin-top:2px">${zh}</div>`;
    },
  },
  series: [{
    type: 'sunburst',
    data,
    radius: ['22%', '95%'],
    center: ['50%', '52%'],
    sort: null,
    nodeClick: 'rootToNode',
    emphasis: { focus: 'ancestor', itemStyle: { shadowBlur: 20, shadowColor: 'rgba(255,255,255,0.15)' } },
    levels: [
      {},
      {
        // inner ring — stages
        r0: '22%', r: '50%',
        label: {
          rotate: 0,
          align: 'center',
          verticalAlign: 'middle',
        },
        itemStyle: { borderWidth: 3 },
      },
      {
        // outer ring — intents
        r0: '50%', r: '95%',
        label: {
          rotate: 'radial',
          align: 'right',
          padding: [0, 6, 0, 0],
        },
      },
    ],
  }],
});
window.addEventListener('resize', () => chart.resize());

// ---- legend ----
const legend = document.getElementById('legend');
STAGES.forEach(s => {
  const el = document.createElement('div');
  el.className = 'chip';
  el.innerHTML = `<span class="dot" style="background:${s.color}"></span>
    <span>${s.nameEn} · ${s.nameZh} <small>(${s.children.length})</small></span>`;
  legend.appendChild(el);
});
</script>
</body>
</html>
