- SELECT service_name, span_name, attr_status_code, attr_http_response_status_code, COUNT(*) as count, AVG(duration) as avg_duration, MAX(duration) as max_duration FROM abnormal_traces WHERE span_name LIKE
  '%food%' OR span_name LIKE '%Food%' GROUP BY service_name, span_name, attr_status_code, attr_http_response_status_code ORDER BY count DESC
- SELECT service_name, level, message, COUNT(*) as count FROM abnormal_logs WHERE message LIKE '%food%' OR message LIKE '%Food%' OR service_name LIKE '%food%' GROUP BY service_name, level, message ORDER
  BY count DESC
- SELECT service_name, span_name, attr_status_code, COUNT(*) as count, AVG(duration) as avg_duration, MAX(duration) as max_duration FROM normal_traces WHERE span_name LIKE '%food%' OR span_name LIKE '%Food%'
  GROUP BY service_name, span_name, attr_status_code ORDER BY avg_duration DESC
- SELECT service_name, span_name, attr_status_code, COUNT(*) as count, AVG(duration) as avg_duration, MAX(duration) as max_duration FROM abnormal_traces WHERE service_name LIKE '%station-food%' OR service_name
  LIKE '%train-food%' GROUP BY service_name, span_name, attr_status_code ORDER BY avg_duration DESC
- SELECT service_name, span_name, attr_status_code, COUNT(*) as count, AVG(duration) as avg_duration, MAX(duration) as max_duration FROM normal_traces WHERE service_name LIKE '%station-food%' OR service_name
  LIKE '%train-food%' GROUP BY service_name, span_name, attr_status_code ORDER BY avg_duration DESC
- SELECT service_name, level, message, COUNT(*) as count FROM abnormal_logs WHERE level = 'ERROR' OR level = 'WARN' GROUP BY service_name, level, message ORDER BY count DESC LIMIT 30
- SELECT DISTINCT metric FROM abnormal_metrics ORDER BY metric
- SELECT service_name, metric, AVG(value) as avg_val, MAX(value) as max_val FROM abnormal_metrics WHERE (service_name LIKE '%train-food%' OR service_name LIKE '%station-food%' OR service_name LIKE '%food-service%')
  GROUP BY service_name, metric ORDER BY service_name, metric
- SELECT service_name, metric, attr_jvm_gc_name, COUNT(*) as count, AVG(sum/count) as avg_gc_time, MAX(max) as max_gc_time FROM abnormal_metrics_histogram GROUP BY service_name, metric, attr_jvm_gc_name
  ORDER BY avg_gc_time DESC LIMIT 20
- SELECT service_name, metric, AVG(value) as avg_val, MAX(value) as max_val FROM abnormal_metrics WHERE metric LIKE '%queue%' OR metric LIKE '%heap%' OR metric LIKE '%gc%' OR metric LIKE '%thread%' GROUP
  BY service_name, metric ORDER BY max_val DESC LIMIT 20
- SELECT service_name, metric, AVG(value) as avg_val, MAX(value) as max_val FROM normal_metrics WHERE metric = 'queueSize' GROUP BY service_name, metric ORDER BY max_val DESC LIMIT 20
- SELECT t1.trace_id, t1.span_id, t1.parent_span_id, t1.span_name, t1.service_name, t1.duration, t1.attr_status_code, t1.attr_http_response_status_code FROM abnormal_traces t1 WHERE t1.trace_id IN (SELECT
  DISTINCT trace_id FROM abnormal_traces WHERE span_name LIKE '%foodservice%' AND attr_http_response_status_code = 502) ORDER BY t1.time LIMIT 50
- SELECT trace_id, span_name, service_name, duration, attr_status_code, attr_http_response_status_code FROM abnormal_traces WHERE attr_http_response_status_code = 502 ORDER BY time LIMIT 10
- SELECT DISTINCT metric FROM abnormal_metrics_sum ORDER BY metric LIMIT 30
- SELECT service_name, metric, attr_destination, attr_source, AVG(value) as avg_val, MAX(value) as max_val, SUM(value) as total FROM abnormal_metrics_sum WHERE metric = 'hubble_drop_total' GROUP BY service_name,
  metric, attr_destination, attr_source ORDER BY total DESC LIMIT 20
- SELECT service_name, metric, attr_destination_workload, attr_source_workload, AVG(value) as avg_val, MAX(value) as max_val FROM abnormal_metrics_sum WHERE metric = 'db.client.connections.pending_requests'
  OR metric = 'db.client.connections.usage' GROUP BY service_name, metric, attr_destination_workload, attr_source_workload ORDER BY avg_val DESC LIMIT 20
- SELECT 'abnormal' as period, service_name, metric, AVG(value) as avg_val, MAX(value) as max_val FROM abnormal_metrics_sum WHERE service_name LIKE '%train-food%' GROUP BY service_name, metric UNION ALL
  SELECT 'normal' as period, service_name, metric, AVG(value) as avg_val, MAX(value) as max_val FROM normal_metrics_sum WHERE service_name LIKE '%train-food%' GROUP BY service_name, metric ORDER BY metric,
  period
- SELECT service_name, metric, AVG(value) as avg_val, MAX(value) as max_val FROM abnormal_metrics_sum WHERE (service_name LIKE '%train-food%' OR service_name LIKE '%station-food%' OR service_name LIKE '%food-service%')
  AND metric LIKE '%jvm%' GROUP BY service_name, metric ORDER BY service_name, metric
- SELECT 'abnormal' as period, service_name, level, COUNT(*) as count FROM abnormal_logs WHERE service_name LIKE '%train-food%' GROUP BY service_name, level UNION ALL SELECT 'normal' as period, service_name,
