raw_sql_list_sample:
- SELECT * FROM 'abnormal_logs.parquet' LIMIT 1;"
- SELECT * FROM 'abnormal_traces.parquet' LIMIT 1;"
- SELECT * FROM 'abnormal_metrics.parquet' LIMIT 1;"
- "SELECT \n    service_name,\n    level,\n    COUNT(*) as count\nFROM 'abnormal_logs.parquet'\nGROUP BY service_name, level\nORDER BY count DESC\nLIMIT 30;\n\""
- "SELECT \n    service_name,\n    attr.status_code,\n    COUNT(*) as count\nFROM 'abnormal_traces.parquet'\nGROUP BY service_name, attr.status_code\nORDER BY count DESC\nLIMIT 30;\n\""
- "SELECT \n    service_name,\n    COUNT(*) FILTER (WHERE attr.status_code = 'ERROR') as error_count,\n    COUNT(*) as total_count,\n    ROUND(COUNT(*) FILTER (WHERE attr.status_code = 'ERROR') * 100.0\
  \ / COUNT(*), 2) as error_rate\nFROM 'abnormal_traces.parquet'\nGROUP BY service_name\nORDER BY error_rate DESC\nLIMIT 20;\n\""
- SELECT * FROM 'abnormal_traces.parquet' LIMIT 1;"
- "SELECT \n    service_name,\n    COUNT(*) FILTER (WHERE attr_status_code = 'ERROR') as error_count,\n    COUNT(*) as total_count,\n    ROUND(COUNT(*) FILTER (WHERE attr_status_code = 'ERROR') * 100.0\
  \ / COUNT(*), 2) as error_rate\nFROM 'abnormal_traces.parquet'\nGROUP BY service_name\nHAVING COUNT(*) > 10\nORDER BY error_rate DESC\nLIMIT 20;\n\""
- "SELECT \n    service_name,\n    COUNT(*) FILTER (WHERE \\\"attr.status_code\\\" = 'ERROR') as error_count,\n    COUNT(*) as total_count,\n    ROUND(COUNT(*) FILTER (WHERE \\\"attr.status_code\\\" = 'ERROR')\
  \ * 100.0 / COUNT(*), 2) as error_rate\nFROM 'abnormal_traces.parquet'\nGROUP BY service_name\nHAVING COUNT(*) > 10\nORDER BY error_rate DESC\nLIMIT 20;\n\""
- "SELECT \n    service_name,\n    level,\n    COUNT(*) as count\nFROM 'abnormal_logs.parquet'\nWHERE level = 'ERROR'\nGROUP BY service_name, level\nORDER BY count DESC\nLIMIT 20;\n\""
- "SELECT \n    service_name,\n    \\\"attr.http.response.status_code\\\" as http_status,\n    COUNT(*) as count\nFROM 'abnormal_traces.parquet'\nGROUP BY service_name, \\\"attr.http.response.status_code\\\
  \"\nHAVING \\\"attr.http.response.status_code\\\" >= 400 OR \\\"attr.http.response.status_code\\\" < 200\nORDER BY count DESC\nLIMIT 20;\n\""
- "SELECT \n    service_name,\n    AVG(duration) as avg_duration_us,\n    MAX(duration) as max_duration_us,\n    COUNT(*) FILTER (WHERE duration > 1000000) as slow_spans_gt_1s\nFROM 'abnormal_traces.parquet'\n\
  GROUP BY service_name\nHAVING COUNT(*) > 10\nORDER BY avg_duration_us DESC\nLIMIT 20;\n\""
- "SELECT \n    service_name,\n    AVG(duration) as avg_duration_us,\n    MAX(duration) as max_duration_us,\n    COUNT(*) FILTER (WHERE duration > 1000000) as slow_spans_gt_1s\nFROM 'normal_traces.parquet'\n\
  GROUP BY service_name\nHAVING COUNT(*) > 10\nORDER BY avg_duration_us DESC\nLIMIT 20;\n\""
- "SELECT \n    time,\n    service_name,\n    level,\n    message\nFROM 'abnormal_logs.parquet'\nWHERE level = 'ERROR'\nORDER BY time ASC\nLIMIT 30;\n\""
- "SELECT \n    service_name,\n    COUNT(*) as count,\n    MIN(time) as first_error,\n    MAX(time) as last_error\nFROM 'abnormal_logs.parquet'\nWHERE level = 'ERROR'\nGROUP BY service_name\nORDER BY first_error\
  \ ASC;\n\""
- "SELECT DISTINCT\n    service_name,\n    span_name,\n    \\\"attr.http.request.method\\\",\n    \\\"attr.http.response.status_code\\\",\n    duration\nFROM 'abnormal_traces.parquet'\nWHERE service_name\
  \ = 'ts-food-service'\nAND \\\"attr.http.response.status_code\\\" >= 500\nORDER BY time ASC\nLIMIT 20;\n\""
- "SELECT \n    parent_service.service_name as caller,\n    child_service.service_name as callee,\n    COUNT(*) as call_count\nFROM 'abnormal_traces.parquet' parent_service\nJOIN 'abnormal_traces.parquet'\
  \ child_service \n  ON parent_service.trace_id = child_service.trace_id \n  AND parent_service.span_id = child_service.parent_span_id\nGROUP BY parent_service.service_name, child_service.service_name\n\
  ORDER BY call_count DESC\nLIMIT 30;\n\""
- "SELECT \n    trace_id,\n    service_name,\n    span_name,\n    \\\"attr.http.request.method\\\",\n    \\\"attr.http.response.status_code\\\",\n    duration,\n    \\\"attr.status_code\\\"\nFROM 'abnormal_traces.parquet'\n\
  WHERE span_name LIKE '%preserve%' OR span_name LIKE '%travelPlan%' OR span_name LIKE '%minStation%'\nORDER BY time ASC\nLIMIT 40;\n\""
- "SELECT \n    trace_id,\n    service_name,\n    span_name,\n    \\\"attr.http.response.status_code\\\",\n    duration\nFROM 'abnormal_traces.parquet'\nWHERE trace_id IN (\n    SELECT trace_id FROM 'abnormal_traces.parquet'\
  \ \n    WHERE span_name LIKE '%preserve%' \n    LIMIT 5\n)\nORDER BY trace_id, time ASC;\n\""
- "SELECT \n    metric,\n    service_name,\n    AVG(value) as avg_value,\n    MAX(value) as max_value,\n    COUNT(*) as count\nFROM 'abnormal_metrics.parquet'\nGROUP BY metric, service_name\nORDER BY max_value\
  \ DESC\nLIMIT 40;\n\""
