raw_sql_list_sample:
- SELECT span_name, service_name, attr_http_response_status_code, COUNT(*) as count FROM abnormal_traces WHERE span_name LIKE '%travelPlan%' OR span_name LIKE '%minStation%' OR span_name LIKE '%quickest%'
  GROUP BY span_name, service_name, attr_http_response_status_code ORDER BY count DESC LIMIT 20
- SELECT span_name, service_name, attr_http_response_status_code, COUNT(*) as count FROM abnormal_traces WHERE (span_name LIKE '%minStation%' OR span_name LIKE '%quickest%') AND attr_http_response_status_code
  >= 500 GROUP BY span_name, service_name, attr_http_response_status_code ORDER BY count DESC LIMIT 30
- SELECT attr_http_response_status_code, COUNT(*) as count FROM abnormal_traces WHERE attr_http_response_status_code >= 400 GROUP BY attr_http_response_status_code ORDER BY count DESC LIMIT 20
- SELECT level, service_name, COUNT(*) as count FROM abnormal_logs GROUP BY level, service_name ORDER BY count DESC LIMIT 30
- SELECT level, service_name, message, COUNT(*) as count FROM abnormal_logs WHERE level = 'ERROR' GROUP BY level, service_name, message ORDER BY count DESC LIMIT 30
- SELECT metric, service_name, AVG(value) as avg_value, MAX(value) as max_value, COUNT(*) as count FROM abnormal_metrics WHERE metric LIKE '%latency%' OR metric LIKE '%error%' OR metric LIKE '%http%' GROUP
  BY metric, service_name ORDER BY avg_value DESC LIMIT 40
- SELECT metric, service_name, value, time FROM abnormal_metrics WHERE value IS NOT NULL AND value > 0 ORDER BY value DESC LIMIT 30
- SELECT metric, service_name, min, max, sum, count FROM abnormal_metrics_histogram WHERE metric LIKE '%latency%' OR metric LIKE '%http%' OR metric LIKE '%duration%' ORDER BY max DESC NULLS LAST LIMIT 30
- SELECT service_name, span_name, duration, attr_status_code, attr_http_response_status_code FROM abnormal_traces WHERE service_name IN ('ts-travel-plan-service', 'ts-route-plan-service') ORDER BY duration
  DESC LIMIT 30
- SELECT trace_id, span_id, parent_span_id, service_name, span_name, duration, attr_status_code FROM abnormal_traces WHERE trace_id IN (SELECT trace_id FROM abnormal_traces WHERE span_name LIKE '%minStation%'
  AND duration > 4000000000 LIMIT 5) ORDER BY trace_id, duration DESC LIMIT 50
- SELECT service_name, level, message, time FROM abnormal_logs WHERE service_name IN ('ts-travel-plan-service', 'ts-route-plan-service', 'ts-travel2-service', 'ts-seat-service') AND level IN ('ERROR', 'WARN')
  ORDER BY time DESC LIMIT 40
- SELECT service_name, level, message, COUNT(*) as count FROM abnormal_logs WHERE message LIKE '%travel%' OR message LIKE '%minStation%' OR message LIKE '%quickest%' OR message LIKE '%route%' GROUP BY service_name,
  level, message ORDER BY count DESC LIMIT 30
- SELECT service_name, attr_status_code, COUNT(*) as count FROM abnormal_traces WHERE attr_status_code != 'Unset' AND attr_status_code != 'Ok' GROUP BY service_name, attr_status_code ORDER BY count DESC
  LIMIT 20
- SELECT trace_id, span_id, parent_span_id, service_name, span_name, duration, attr_status_code, attr_http_response_status_code FROM abnormal_traces WHERE attr_status_code = 'Error' ORDER BY time DESC LIMIT
  30
- SELECT service_name, span_name, AVG(duration) as avg_duration, MAX(duration) as max_duration, COUNT(*) as count FROM abnormal_traces WHERE span_name LIKE '%minStation%' OR span_name LIKE '%quickest%'
  OR span_name LIKE '%RoutePlan%' OR span_name LIKE '%TravelPlan%' GROUP BY service_name, span_name ORDER BY avg_duration DESC LIMIT 30
- SELECT trace_id, span_id, parent_span_id, service_name, span_name, duration FROM abnormal_traces WHERE trace_id IN (SELECT trace_id FROM abnormal_traces WHERE span_name = 'RoutePlanController.getMinStopStations'
