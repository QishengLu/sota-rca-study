    \ (vs 0.53 in normal → 1.75× increase)\n   - Individual request latency: avg **41ms** (3× normal 13ms), max **2.97s**\n\n2. **ts-config-service** (CONTRIBUTING ROOT CAUSE): Also experiencing **HIGH\
    \ GC PRESSURE**\n   - 1 GC event × **1.618s** (vs ~0.4s in normal)\n   - Max request latency: **1.642s** (vs ~10ms normally)\n   - Called by ts-seat-service → amplifies seat service slowness\n\n3. **Propagation\
    \ Chain**: ts-config-service → ts-seat-service → ts-travel-service/ts-travel2-service → ts-route-plan-service → ts-travel-plan-service → ts-ui-dashboard\n\n4. **Impact at ts-travel-plan-service**: ts-travel-plan-service\
    \ makes many sequential seat service calls. Each being slow accumulates to **10-130 second** total response times (normal: ~370ms avg). This causes the SLO violations with 500 errors and timeouts.\n\
    \n-"
