raw_sql_list_sample:
- "\nSELECT service_name, span_name, attr_http_response_status_code, attr_status_code,\n       COUNT(*) as total_spans,\n       AVG(duration) as avg_duration_ns,\n       MAX(duration) as max_duration_ns,\n\
  \       SUM(CASE WHEN attr_http_response_status_code >= 500 THEN 1 ELSE 0 END) as error_5xx,\n       SUM(CASE WHEN attr_status_code = 'ERROR' THEN 1 ELSE 0 END) as error_status\nFROM abnormal_traces\n\
  GROUP BY service_name, span_name, attr_http_response_status_code, attr_status_code\nORDER BY error_5xx DESC, error_status DESC\nLIMIT 30\n"
- '

  SELECT service_name, level, COUNT(*) as count

  FROM abnormal_logs

  GROUP BY service_name, level

  ORDER BY count DESC

  LIMIT 30

  '
- '

  SELECT time, service_name, level, message

  FROM abnormal_logs

  WHERE service_name = ''ts-food-service'' AND level = ''ERROR''

  ORDER BY time

  LIMIT 20

  '
- "\nSELECT DISTINCT span_name, service_name, attr_http_response_status_code, attr_status_code, \n       AVG(duration) as avg_dur, COUNT(*) as cnt\nFROM abnormal_traces\nWHERE service_name IN ('ts-food-service',\
  \ 'ts-preserve-service', 'ts-train-food-service')\nGROUP BY span_name, service_name, attr_http_response_status_code, attr_status_code\nORDER BY avg_dur DESC\nLIMIT 30\n"
- '

  SELECT time, service_name, level, message

  FROM abnormal_logs

  WHERE service_name = ''ts-preserve-service'' AND level IN (''ERROR'', ''WARN'')

  ORDER BY time

  LIMIT 20

  '
- "\n-- Find the 503 preserve trace and its full trace chain\nSELECT t1.trace_id, t1.span_id, t1.parent_span_id, t1.span_name, t1.service_name, \n       t1.duration, t1.attr_http_response_status_code, t1.attr_status_code\n\
  FROM abnormal_traces t1\nWHERE t1.trace_id IN (\n    SELECT trace_id FROM abnormal_traces\n    WHERE service_name = 'ts-preserve-service' AND attr_http_response_status_code = 503\n)\nORDER BY t1.time\n\
  LIMIT 50\n"
- "\n-- Find traces where ui-dashboard gets 503 for foodservice, and follow the chain\nSELECT t1.trace_id, t1.span_id, t1.parent_span_id, t1.span_name, t1.service_name, \n       t1.duration, t1.attr_http_response_status_code,\
  \ t1.attr_status_code\nFROM abnormal_traces t1\nWHERE t1.trace_id IN (\n    SELECT trace_id FROM abnormal_traces\n    WHERE service_name = 'ts-ui-dashboard' \n    AND span_name LIKE '%foodservice/foods%'\n\
  \    AND attr_http_response_status_code = 503\n    LIMIT 5\n)\nORDER BY t1.time\nLIMIT 30\n"
- '

  -- Check preserve service for rabbitmq errors

  SELECT time, service_name, level, message

  FROM abnormal_logs

  WHERE message LIKE ''%rabbitmq%'' OR message LIKE ''%RabbitMQ%'' OR message LIKE ''%amqp%'' OR message LIKE ''%AMQP%'' OR message LIKE ''%mq%''

  ORDER BY time

  LIMIT 30

  '
- "\n-- Find the preserve 503 trace and its chain\nSELECT trace_id, span_id, parent_span_id, span_name, service_name, \n       duration, attr_http_response_status_code, attr_status_code\nFROM abnormal_traces\n\
  WHERE trace_id IN (\n    SELECT trace_id FROM abnormal_traces\n    WHERE service_name = 'ts-preserve-service' AND attr_http_response_status_code = 503\n)\nORDER BY time\nLIMIT 25\n"
- '

  -- Check all error logs to find what''s failing

  SELECT service_name, level, message, COUNT(*) as cnt

  FROM abnormal_logs

  WHERE level = ''ERROR''

  GROUP BY service_name, level, message

  ORDER BY cnt DESC

  LIMIT 20

  '
- '

  -- Get the trace ID for preserve-service 503

  SELECT trace_id, span_id, service_name, span_name, duration, attr_http_response_status_code

  FROM abnormal_traces

  WHERE service_name = ''ts-preserve-service'' AND attr_http_response_status_code = 503

  LIMIT 5

  '
- '

  -- Check for pod-level issues with food service

  SELECT DISTINCT metric, attr_k8s_pod_name, attr_k8s_deployment_name

  FROM abnormal_metrics

  WHERE service_name = ''ts-food-service'' OR attr_k8s_deployment_name LIKE ''%food%''

  LIMIT 20

  '
- '

  -- Check deployment availability for food service and related services

  SELECT metric, attr_k8s_deployment_name, AVG(value) as avg_value, MIN(value) as min_value, MAX(value) as max_value

  FROM abnormal_metrics

  WHERE metric IN (''k8s.deployment.available'', ''k8s.deployment.desired'')

  AND attr_k8s_deployment_name IS NOT NULL

  GROUP BY metric, attr_k8s_deployment_name

  ORDER BY attr_k8s_deployment_name, metric

  LIMIT 50

  '
- "\n-- Look at the full preserve-service 503 trace\nSELECT span_id, parent_span_id, span_name, service_name, duration, \n       attr_http_response_status_code, attr_status_code\nFROM abnormal_traces\n\
  WHERE trace_id = '1ea5316e27681859df96bc981e1568c9'\nAND service_name = 'ts-preserve-service'\nORDER BY time\nLIMIT 20\n"
- '

  -- Check deployment availability for food service and rabbitmq

  SELECT metric, attr_k8s_deployment_name, value, time

  FROM abnormal_metrics

  WHERE metric IN (''k8s.deployment.available'', ''k8s.deployment.desired'')

  AND attr_k8s_deployment_name IN (''ts-food-service'', ''ts-train-food-service'', ''ts-station-food-service'', ''ts-food-delivery-service'', ''ts-rabbitmq'', ''ts-preserve-service'', ''ts-notification-service'',
  ''ts-delivery-service'')

  ORDER BY attr_k8s_deployment_name, time

  LIMIT 30

  '
- '

  -- Find what service the 503 POST from preserve service calls (look at child spans of de2af396e0afa8c1)

  SELECT span_id, parent_span_id, span_name, service_name, duration, attr_http_response_status_code

  FROM abnormal_traces

  WHERE trace_id = ''1ea5316e27681859df96bc981e1568c9''

  AND (parent_span_id = ''de2af396e0afa8c1'' OR span_id = ''de2af396e0afa8c1'')

  ORDER BY time

  LIMIT 15

  '
- '

  -- Check Hubble metrics for network issues with food service

  SELECT metric, attr_source_workload, attr_destination_workload, AVG(value) as avg_value, MAX(value) as max_value

  FROM abnormal_metrics

  WHERE metric LIKE ''%hubble%'' OR metric LIKE ''%http%''

  GROUP BY metric, attr_source_workload, attr_destination_workload

  ORDER BY avg_value DESC

  LIMIT 20

  '
- '

  -- Check metrics_sum for food service related HTTP errors

  SELECT DISTINCT metric, service_name

  FROM abnormal_metrics_sum

  WHERE service_name LIKE ''%food%'' OR service_name LIKE ''%preserve%'' OR service_name LIKE ''%notification%'' OR service_name LIKE ''%delivery%'' OR service_name LIKE ''%rabbitmq%''

  LIMIT 20

  '
- '

  -- Check for station-food-service errors and other related services

  SELECT service_name, level, message, COUNT(*) as cnt

  FROM abnormal_logs

  WHERE level IN (''ERROR'', ''WARN'') AND service_name IN (''ts-station-food-service'', ''ts-food-delivery-service'', ''ts-train-food-service'')

  GROUP BY service_name, level, message

  ORDER BY cnt DESC

  LIMIT 20

  '
- '

  -- Check hubble HTTP request totals for food-related services

  SELECT metric, service_name, attr_destination_workload, attr_source_workload, SUM(value) as total

  FROM abnormal_metrics_sum

  WHERE metric = ''hubble_http_requests_total''

  GROUP BY metric, service_name, attr_destination_workload, attr_source_workload

  ORDER BY total DESC

  LIMIT 20

  '
