    \ java.net.UnknownHostException: ts-rabbitmq: Name or service not known` — RabbitMQ hostname cannot be resolved (Kubernetes Service missing)\n   - `[getAllFood][reGetTrainFoodListResult][Get the Get\
    \ Food Request Failed!]` — food service failing to retrieve food data\n\n2. **ts-notification-service** (48 ERRORs): `Failed to check/redeclare auto-delete queue(s)` — continuous failed reconnection\
    \ attempts to `ts-rabbitmq:5672`\n\n3. **ts-delivery-service** (47 ERRORs): `Failed to check/redeclare auto-delete queue(s)` — same RabbitMQ reconnection loop\n\n4. **ts-ui-dashboard**: 503 errors with\
    \ ~3.5s Envoy timeout for `/api/v1/foodservice/foods/...` and `/api/v1/preserveservice/preserve`\n\n5. **ts-preserve-service**: One 503 span with 4.9s duration (calling ts-food-service to create food\
    \ order) — propagating"
