- idx: 84
  text: "Based on my comprehensive investigation, I can now produce the final Root Cause Analysis.\n\n## Summary of Findings\n\n### Root Cause\n**Worker2 node CPU overload** causing `ts-seat-service` to\
    \ experience HIGH system CPU load (`jvm.system.cpu.load_1m = 82` vs normal `7.57` — a **10.8x increase**). This is a node-level fault where all pods on worker2 see system load of ~82.\n\n### Propagation\
    \ Chain\n1. **ts-seat-service** (worker2): HIGH_CPU → slow seat availability checks (avg 41ms, max 2.5s GC pauses)\n2. **ts-travel-service / ts-travel2-service**: HIGH_LATENCY (1.7-2x slower: 281ms\
    \ vs 164ms avg)\n3. **ts-route-plan-service**: HIGH_LATENCY (1.3-2x slower: 439-637ms vs 322-337ms avg)\n4. **ts-travel-plan-service** (worker1): HIGH_GC_PRESSURE (8x more GC: sum 2.72s vs 0.338s),\
    \ HIGH_CPU (8.6x: 0.672 vs 0.078 cores), HIGH_LATENCY (1.5-2.2x)\n5. **ts-ui-dashboard**: HIGH_ERROR_RATE (14×503 on minStation, 4×503 on quickest, avg 3.5s latency before timeout)\n\n```json\n{\n \
    \ \"nodes\": [\n    {\n      \"component\": \"ts-seat-service\",\n      \"state\": [\"HIGH_CPU\"],\n      \"timestamp\": 1755150361\n    },\n    {\n      \"component\": \"ts-travel-service\",\n    \
    \  \"state\": [\"HIGH_LATENCY\"],\n      \"timestamp\": 1755150361\n   "
