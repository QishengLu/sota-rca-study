raw_sql_list_sample:
- "\nSELECT service_name, span_name, attr_status_code, attr_http_response_status_code,\n       COUNT(*) as total_spans,\n       AVG(duration) as avg_duration_ns,\n       MAX(duration) as max_duration_ns,\n\
  \       SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 400 THEN 1 ELSE 0 END) as error_count\nFROM abnormal_traces\nGROUP BY service_name, span_name, attr_status_code, attr_http_response_status_code\n\
  ORDER BY error_count DESC\nLIMIT 30\n"
- "\nSELECT service_name, span_name, attr_status_code, attr_http_response_status_code,\n       COUNT(*) as total_spans,\n       AVG(duration)/1e6 as avg_duration_ms,\n       MAX(duration)/1e6 as max_duration_ms\n\
  FROM abnormal_traces\nWHERE span_name LIKE '%travelPlan%' OR span_name LIKE '%travelplan%' OR span_name LIKE '%travel_plan%'\nGROUP BY service_name, span_name, attr_status_code, attr_http_response_status_code\n\
  ORDER BY total_spans DESC\nLIMIT 20\n"
- "\nSELECT trace_id, span_id, parent_span_id, service_name, span_name, \n       attr_status_code, attr_http_response_status_code,\n       duration/1e6 as duration_ms\nFROM abnormal_traces\nWHERE trace_id\
  \ IN (\n  SELECT DISTINCT trace_id FROM abnormal_traces\n  WHERE attr_http_response_status_code = 503\n)\nORDER BY trace_id, time\nLIMIT 50\n"
- "\nSELECT trace_id, service_name, span_name, \n       attr_status_code, attr_http_response_status_code,\n       duration/1e6 as duration_ms\nFROM abnormal_traces\nWHERE trace_id IN (\n  SELECT DISTINCT\
  \ trace_id FROM abnormal_traces\n  WHERE attr_http_response_status_code = 503\n)\nORDER BY trace_id, duration DESC\nLIMIT 20\n"
- "\n-- Find what services ts-travel-plan-service calls and their latencies\nSELECT service_name, span_name, \n       COUNT(*) as call_count,\n       AVG(duration)/1e6 as avg_ms,\n       MAX(duration)/1e6\
  \ as max_ms,\n       PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration)/1e6 as p99_ms,\n       SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 400 THEN 1 ELSE 0 END)\
  \ as errors\nFROM abnormal_traces\nWHERE trace_id IN (\n  SELECT DISTINCT trace_id FROM abnormal_traces\n  WHERE span_name LIKE '%travelPlan%' AND service_name = 'ts-travel-plan-service'\n)\nGROUP BY\
  \ service_name, span_name\nORDER BY avg_ms DESC\nLIMIT 20\n"
- "\nSELECT service_name, span_name,\n       COUNT(*) as call_count,\n       AVG(duration)/1e6 as avg_ms,\n       MAX(duration)/1e6 as max_ms,\n       PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration)/1e6\
  \ as p99_ms\nFROM normal_traces\nWHERE span_name LIKE '%travelPlan%' \n   OR span_name LIKE '%routePlan%'\n   OR span_name LIKE '%travelservice/trips%'\nGROUP BY service_name, span_name\nORDER BY avg_ms\
  \ DESC\nLIMIT 20\n"
- "\n-- Find all services in traces that contain travelPlan calls\nSELECT service_name, span_name,\n       COUNT(*) as call_count,\n       AVG(duration)/1e6 as avg_ms,\n       MAX(duration)/1e6 as max_ms,\n\
  \       PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration)/1e6 as p99_ms,\n       SUM(CASE WHEN attr_status_code = 'ERROR' THEN 1 ELSE 0 END) as errors\nFROM abnormal_traces\nWHERE trace_id IN (\n\
  \  SELECT DISTINCT trace_id FROM abnormal_traces\n  WHERE service_name = 'ts-travel-plan-service'\n    AND span_name LIKE '%travelPlan%'\n)\n  AND service_name NOT IN ('loadgenerator', 'ts-ui-dashboard',\
  \ 'ts-travel-plan-service', 'ts-route-plan-service')\n  AND attr_http_request_method IS NOT NULL\nGROUP BY service_name, span_name\nORDER BY avg_ms DESC\nLIMIT 20\n"
- "\n-- Compare same services in normal traces\nSELECT service_name, span_name,\n       COUNT(*) as call_count,\n       AVG(duration)/1e6 as avg_ms,\n       MAX(duration)/1e6 as max_ms,\n       PERCENTILE_CONT(0.99)\
  \ WITHIN GROUP (ORDER BY duration)/1e6 as p99_ms\nFROM normal_traces\nWHERE service_name NOT IN ('loadgenerator', 'ts-ui-dashboard', 'ts-travel-plan-service', 'ts-route-plan-service')\n  AND span_name\
  \ IN (\n    'POST /api/v1/travelservice/trips/left',\n    'POST /api/v1/travelservice/trip_detail',\n    'POST /api/v1/travel2service/trip_detail',\n    'POST /api/v1/travel2service/trips/left',\n   \
  \ 'POST /api/v1/basicservice/basic/travel',\n    'POST /api/v1/seatservice/seats/left_tickets'\n  )\nGROUP BY service_name, span_name\nORDER BY avg_ms DESC\nLIMIT 20\n"
- "\nSELECT service_name, metric, \n       AVG(value) as avg_val, \n       MAX(value) as max_val,\n       MIN(value) as min_val\nFROM abnormal_metrics\nWHERE service_name IN ('ts-travel-service', 'ts-travel2-service',\
  \ 'ts-basic-service', \n                        'ts-seat-service', 'ts-route-plan-service', 'ts-travel-plan-service')\n  AND metric LIKE '%cpu%' OR metric LIKE '%memory%' OR metric LIKE '%gc%'\nGROUP\
  \ BY service_name, metric\nORDER BY service_name, metric\nLIMIT 20\n"
- "\nSELECT \n    m.service_name,\n    m.metric,\n    AVG(CASE WHEN m.filename = 'abnormal_metrics' THEN m.value END) as abnormal_avg,\n    AVG(CASE WHEN m.filename = 'normal_metrics' THEN m.value END)\
  \ as normal_avg,\n    (AVG(CASE WHEN m.filename = 'abnormal_metrics' THEN m.value END) / \n     NULLIF(AVG(CASE WHEN m.filename = 'normal_metrics' THEN m.value END), 0)) as ratio\nFROM (\n    SELECT *,\
  \ 'abnormal_metrics' as filename FROM abnormal_metrics\n    UNION ALL\n    SELECT *, 'normal_metrics' as filename FROM normal_metrics\n) m\nWHERE m.service_name IN ('ts-travel-service', 'ts-travel2-service',\
  \ 'ts-basic-service', \n                          'ts-seat-service', 'ts-route-plan-service', 'ts-travel-plan-service')\n  AND (m.metric LIKE '%cpu%' OR m.metric LIKE '%memory%')\nGROUP BY m.service_name,\
  \ m.metric\nHAVING ABS(ratio - 1) > 0.2\nORDER BY ratio DESC\nLIMIT 20\n"
- "\nSELECT service_name, level, message, time\nFROM abnormal_logs\nWHERE service_name IN ('ts-seat-service', 'ts-travel-plan-service', 'ts-route-plan-service', 'ts-travel-service')\n  AND level IN ('ERROR',\
  \ 'WARN', 'error', 'warn', 'Error', 'Warning')\nORDER BY time\nLIMIT 15\n"
- '

  SELECT service_name, level, COUNT(*) as count

  FROM abnormal_logs

  GROUP BY service_name, level

  ORDER BY count DESC

  LIMIT 25

  '
- "\n-- Check GC metrics for ts-seat-service and ts-travel-plan-service\nSELECT service_name, metric, \n       AVG(sum) as avg_sum, \n       AVG(count) as avg_count,\n       MAX(max) as max_val,\n     \
  \  attr_jvm_gc_name\nFROM abnormal_metrics_histogram\nWHERE service_name IN ('ts-seat-service', 'ts-travel-plan-service', 'ts-route-plan-service', 'ts-travel-service')\n  AND metric LIKE '%jvm%'\nGROUP\
  \ BY service_name, metric, attr_jvm_gc_name\nORDER BY avg_sum DESC\nLIMIT 15\n"
- "\nSELECT h.service_name, h.metric, h.attr_jvm_gc_name,\n       AVG(CASE WHEN h.filename = 'abnormal_metrics_histogram' THEN h.sum END) as abnormal_avg_sum,\n       AVG(CASE WHEN h.filename = 'abnormal_metrics_histogram'\
  \ THEN h.count END) as abnormal_avg_count,\n       MAX(CASE WHEN h.filename = 'abnormal_metrics_histogram' THEN h.max END) as abnormal_max_duration,\n       AVG(CASE WHEN h.filename = 'normal_metrics_histogram'\
  \ THEN h.sum END) as normal_avg_sum,\n       AVG(CASE WHEN h.filename = 'normal_metrics_histogram' THEN h.count END) as normal_avg_count\nFROM (\n  SELECT *, 'abnormal_metrics_histogram' as filename FROM\
  \ abnormal_metrics_histogram\n  UNION ALL\n  SELECT *, 'normal_metrics_histogram' as filename FROM normal_metrics_histogram\n) h\nWHERE h.service_name IN ('ts-seat-service', 'ts-travel-plan-service',\
  \ 'ts-route-plan-service', 'ts-travel-service')\n  AND h.metric LIKE '%jvm.gc%'\nGROUP BY h.service_name, h.metric, h.attr_jvm_gc_name\nORDER BY abnormal_max_duration DESC NULLS LAST\nLIMIT 15\n"
- "\n-- Check all abnormal metrics for ts-travel-plan-service (biggest CPU anomaly)\nSELECT m.service_name, m.metric,\n       AVG(CASE WHEN m.filename = 'abnormal_metrics' THEN m.value END) as abnormal_avg,\n\
  \       AVG(CASE WHEN m.filename = 'normal_metrics' THEN m.value END) as normal_avg,\n       (AVG(CASE WHEN m.filename = 'abnormal_metrics' THEN m.value END) / \n        NULLIF(AVG(CASE WHEN m.filename\
  \ = 'normal_metrics' THEN m.value END), 0)) as ratio\nFROM (\n    SELECT *, 'abnormal_metrics' as filename FROM abnormal_metrics\n    UNION ALL\n    SELECT *, 'normal_metrics' as filename FROM normal_metrics\n\
  ) m\nWHERE m.service_name = 'ts-travel-plan-service'\nGROUP BY m.service_name, m.metric\nORDER BY ABS(ratio - 1) DESC NULLS LAST\nLIMIT 20\n"
- "\n-- Check all abnormal metrics for ts-seat-service (extreme system CPU load)\nSELECT m.service_name, m.metric,\n       AVG(CASE WHEN m.filename = 'abnormal_metrics' THEN m.value END) as abnormal_avg,\n\
  \       AVG(CASE WHEN m.filename = 'normal_metrics' THEN m.value END) as normal_avg,\n       (AVG(CASE WHEN m.filename = 'abnormal_metrics' THEN m.value END) / \n        NULLIF(AVG(CASE WHEN m.filename\
  \ = 'normal_metrics' THEN m.value END), 0)) as ratio\nFROM (\n    SELECT *, 'abnormal_metrics' as filename FROM abnormal_metrics\n    UNION ALL\n    SELECT *, 'normal_metrics' as filename FROM normal_metrics\n\
  ) m\nWHERE m.service_name = 'ts-seat-service'\nGROUP BY m.service_name, m.metric\nORDER BY ABS(ratio - 1) DESC NULLS LAST\nLIMIT 20\n"
- "\nSELECT t.service_name, t.span_name,\n       COUNT(CASE WHEN t.filename = 'abnormal_traces' THEN 1 END) as abnormal_count,\n       COUNT(CASE WHEN t.filename = 'normal_traces' THEN 1 END) as normal_count,\n\
  \       AVG(CASE WHEN t.filename = 'abnormal_traces' THEN t.duration END)/1e6 as abnormal_avg_ms,\n       AVG(CASE WHEN t.filename = 'normal_traces' THEN t.duration END)/1e6 as normal_avg_ms\nFROM (\n\
  \  SELECT *, 'abnormal_traces' as filename FROM abnormal_traces\n  WHERE service_name = 'ts-travel-plan-service'\n  UNION ALL\n  SELECT *, 'normal_traces' as filename FROM normal_traces\n  WHERE service_name\
  \ = 'ts-travel-plan-service'\n) t\nGROUP BY t.service_name, t.span_name\nORDER BY abnormal_count DESC\nLIMIT 15\n"
- '

  -- Check hubble metrics for all services to see which ones have NaN/null

  SELECT service_name, metric, COUNT(*) as cnt, AVG(value) as avg_val

  FROM abnormal_metrics

  WHERE metric LIKE ''%hubble%''

  GROUP BY service_name, metric

  ORDER BY service_name, metric

  LIMIT 20

  '
- "\n-- Look at metrics_sum for key services - often has request counts and latency\nSELECT service_name, metric, COUNT(*) as cnt, AVG(value) as avg_val, MAX(value) as max_val\nFROM abnormal_metrics_sum\n\
  WHERE service_name IN ('ts-travel-plan-service', 'ts-seat-service', 'ts-route-plan-service')\n  AND (metric LIKE '%duration%' OR metric LIKE '%request%' OR metric LIKE '%error%')\nGROUP BY service_name,\
  \ metric\nORDER BY service_name, metric\nLIMIT 20\n"
- "\n-- Compare request counts between normal and abnormal\nSELECT s.service_name, s.metric,\n       AVG(CASE WHEN s.filename = 'abnormal_metrics_sum' THEN s.value END) as abnormal_avg,\n       AVG(CASE\
  \ WHEN s.filename = 'normal_metrics_sum' THEN s.value END) as normal_avg,\n       MAX(CASE WHEN s.filename = 'abnormal_metrics_sum' THEN s.value END) as abnormal_max,\n       MAX(CASE WHEN s.filename\
  \ = 'normal_metrics_sum' THEN s.value END) as normal_max\nFROM (\n  SELECT *, 'abnormal_metrics_sum' as filename FROM abnormal_metrics_sum\n  WHERE service_name IN ('ts-travel-plan-service', 'ts-seat-service',\
  \ 'ts-route-plan-service', 'ts-travel-service')\n    AND metric = 'hubble_http_requests_total'\n  UNION ALL\n  SELECT *, 'normal_metrics_sum' as filename FROM normal_metrics_sum\n  WHERE service_name\
  \ IN ('ts-travel-plan-service', 'ts-seat-service', 'ts-route-plan-service', 'ts-travel-service')\n    AND metric = 'hubble_http_requests_total'\n) s\nGROUP BY s.service_name, s.metric\nORDER BY s.service_name\n\
  LIMIT 20\n"
