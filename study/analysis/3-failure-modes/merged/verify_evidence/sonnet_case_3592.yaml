- "\nSELECT metric, AVG(value) as avg_val, MAX(value) as max_val, MIN(value) as min_val\nFROM normal_metrics\nWHERE service_name = 'ts-travel-service'\n  AND metric IN ('container.cpu.usage', 'k8s.pod.cpu_limit_utilization',\
  \ 'k8s.pod.memory.usage', 'k8s.pod.memory_limit_utilization', 'jvm.cpu.recent_utilization', 'jvm.system.cpu.utilization')\nGROUP BY metric\nORDER BY metric\n"
- "\nSELECT service_name, span_name, attr_status_code, attr_http_response_status_code,\n       COUNT(*) as total_spans,\n       AVG(duration)/1000000.0 as avg_duration_ms\nFROM abnormal_traces\nWHERE service_name\
  \ = 'ts-route-plan-service'\nGROUP BY service_name, span_name, attr_status_code, attr_http_response_status_code\nORDER BY total_spans DESC\n"
- "\nSELECT metric, AVG(value) as avg_val, MAX(value) as max_val, MIN(value) as min_val\nFROM abnormal_metrics\nWHERE service_name = 'ts-travel-service'\n  AND metric LIKE '%network%'\nGROUP BY metric\n\
