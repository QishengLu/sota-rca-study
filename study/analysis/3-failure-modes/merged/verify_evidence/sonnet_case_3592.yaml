raw_sql_list_sample:
- "\nSELECT service_name, span_name, attr_status_code, attr_http_response_status_code,\n       COUNT(*) as total_spans,\n       SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code\
  \ >= 400 THEN 1 ELSE 0 END) as error_spans,\n       AVG(duration) as avg_duration_ns,\n       MAX(duration) as max_duration_ns\nFROM abnormal_traces\nWHERE span_name LIKE '%travelPlan%' OR service_name\
  \ LIKE '%travel%'\nGROUP BY service_name, span_name, attr_status_code, attr_http_response_status_code\nORDER BY error_spans DESC\n"
- '

  SELECT service_name, level, COUNT(*) as count

  FROM abnormal_logs

  GROUP BY service_name, level

  ORDER BY service_name, level

  '
- "\nSELECT service_name, span_name, attr_status_code,\n       COUNT(*) as total_spans,\n       SUM(CASE WHEN attr_status_code = 'ERROR' THEN 1 ELSE 0 END) as error_spans,\n       AVG(duration) as avg_duration_ns\n\
  FROM abnormal_traces\nWHERE span_name LIKE '%travelPlan%' OR service_name LIKE '%travel-plan%'\nGROUP BY service_name, span_name, attr_status_code\nORDER BY error_spans DESC\n"
- '

  SELECT time, service_name, level, message

  FROM abnormal_logs

  WHERE level IN (''ERROR'', ''SEVERE'') AND service_name IN (''ts-travel-plan-service'', ''ts-route-plan-service'', ''ts-ui-dashboard'')

  ORDER BY time

  '
- "\nSELECT time, service_name, level, message\nFROM abnormal_logs\nWHERE level IN ('ERROR', 'SEVERE')\n  AND service_name IN ('ts-travel-plan-service', 'ts-route-plan-service')\nORDER BY time\n"
- "\nSELECT service_name, span_name, attr_status_code,\n       COUNT(*) as total_spans,\n       AVG(duration)/1000000.0 as avg_duration_ms,\n       MAX(duration)/1000000.0 as max_duration_ms\nFROM abnormal_traces\n\
  WHERE service_name IN ('ts-travel-plan-service', 'ts-route-plan-service', 'ts-travel-service', 'ts-travel2-service', 'ts-route-service')\nGROUP BY service_name, span_name, attr_status_code\nORDER BY total_spans\
  \ DESC\n"
- "\nSELECT service_name, span_name, attr_status_code, attr_http_response_status_code,\n       COUNT(*) as total_spans,\n       AVG(duration)/1000000.0 as avg_duration_ms\nFROM abnormal_traces\nWHERE service_name\
  \ = 'ts-travel-service'\n  AND (attr_status_code = 'Error' OR attr_http_response_status_code >= 500)\nGROUP BY service_name, span_name, attr_status_code, attr_http_response_status_code\nORDER BY total_spans\
  \ DESC\n"
- '

