  FROM abnormal_logs

  WHERE level IN (''ERROR'', ''error'', ''WARN'', ''warn'')

  ORDER BY time ASC

  LIMIT 30

  '
- "\nSELECT service_name, span_name, attr_status_code, attr_http_response_status_code,\n       COUNT(*) as count, AVG(duration) as avg_dur\nFROM abnormal_traces\nWHERE service_name = 'ts-security-service'\n\
