- "\nSELECT metric, attr_k8s_pod_name, attr_k8s_deployment_name, \n       AVG(value) as avg_val, MAX(value) as max_val, MIN(value) as min_val\nFROM abnormal_metrics\nWHERE attr_k8s_pod_name LIKE '%order-other%'\
  \ \n   OR attr_k8s_deployment_name LIKE '%order-other%'\n   OR service_name LIKE '%order-other%'\nGROUP BY metric, attr_k8s_pod_name, attr_k8s_deployment_name\nORDER BY metric\nLIMIT 30\n"
- "\nSELECT 'abnormal' as period, metric, service_name, attr_k8s_pod_name,\n       AVG(value) as avg_val, MAX(value) as max_val\nFROM abnormal_metrics_sum\nWHERE service_name = 'ts-security-service'\n \
  \ AND metric IN ('k8s.pod.network.errors', 'k8s.pod.network.io', 'db.client.connections.usage', 'db.client.connections.pending_requests')\nGROUP BY metric, service_name, attr_k8s_pod_name\nUNION ALL\n\
  SELECT 'normal' as period, metric, service_name, attr_k8s_pod_name,\n       AVG(value) as avg_val, MAX(value) as max_val\nFROM normal_metrics_sum\nWHERE service_name = 'ts-security-service'\n  AND metric\
  \ IN ('k8s.pod.network.errors', 'k8s.pod.network.io', 'db.client.connections.usage', 'db.client.connections.pending_requests')\nGROUP BY metric, service_name, attr_k8s_pod_name\nORDER BY metric, period\n"
- "\nSELECT t1.span_id, t1.service_name as sec_service, t1.span_name as sec_span, \n       t1.attr_http_response_status_code as sec_http_code,\n       t2.span_id as child_span_id, t2.service_name as child_service,\
  \ t2.span_name as child_span,\n       t2.attr_http_response_status_code as child_http_code\nFROM abnormal_traces t1\nLEFT JOIN abnormal_traces t2 ON t1.span_id = t2.parent_span_id AND t1.trace_id = t2.trace_id\n\
  WHERE t1.service_name = 'ts-security-service' AND t1.span_name = 'GET'\n  AND t1.attr_http_response_status_code = 503\nLIMIT 10\n"
