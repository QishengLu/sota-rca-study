  \ attr_k8s_replicaset_name\nORDER BY metric\nLIMIT 30\n"
- "\nSELECT metric, attr_k8s_pod_name, attr_k8s_deployment_name, \n       AVG(value) as avg_val, MAX(value) as max_val\nFROM abnormal_metrics\nWHERE metric IN ('k8s.container.restarts', 'k8s.pod.phase',\
  \ 'k8s.replicaset.available', 'k8s.replicaset.desired')\nGROUP BY metric, attr_k8s_pod_name, attr_k8s_deployment_name\nORDER BY metric, avg_val DESC\nLIMIT 40\n"
- '

