raw_sql_list_sample:
- "\nSELECT service_name, span_name, attr_status_code, attr_http_response_status_code, \n       COUNT(*) as total, \n       AVG(duration) as avg_duration,\n       PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER\
  \ BY duration) as p99_duration,\n       SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 500 THEN 1 ELSE 0 END) as errors\nFROM abnormal_traces\nWHERE span_name LIKE '%preserve%'\
  \ OR span_name LIKE '%Preserve%'\nGROUP BY service_name, span_name, attr_status_code, attr_http_response_status_code\nORDER BY errors DESC, total DESC\nLIMIT 30\n"
- "\nSELECT service_name, \n       COUNT(*) as total_spans,\n       SUM(CASE WHEN attr_status_code = 'ERROR' THEN 1 ELSE 0 END) as error_spans,\n       SUM(CASE WHEN attr_http_response_status_code >= 500\
  \ THEN 1 ELSE 0 END) as http_5xx,\n       AVG(duration) as avg_duration_ns,\n       MAX(duration) as max_duration_ns\nFROM abnormal_traces\nGROUP BY service_name\nORDER BY error_spans DESC\nLIMIT 20\n"
- "\nSELECT service_name, span_name, attr_status_code, attr_http_response_status_code,\n       COUNT(*) as total,\n       AVG(duration) as avg_duration,\n       SUM(CASE WHEN attr_http_response_status_code\
  \ >= 400 THEN 1 ELSE 0 END) as http_4xx_5xx\nFROM abnormal_traces\nWHERE trace_id IN (\n    SELECT DISTINCT trace_id FROM abnormal_traces \n    WHERE span_name = 'POST /api/v1/preserveservice/preserve'\
  \ AND service_name = 'ts-preserve-service'\n    LIMIT 20\n)\nGROUP BY service_name, span_name, attr_status_code, attr_http_response_status_code\nORDER BY service_name, span_name\nLIMIT 50\n"
- "\nSELECT service_name, span_name, attr_status_code, attr_http_response_status_code,\n       COUNT(*) as count,\n       AVG(duration) as avg_dur\nFROM abnormal_traces\nWHERE service_name = 'ts-security-service'\n\
  GROUP BY service_name, span_name, attr_status_code, attr_http_response_status_code\nORDER BY count DESC\nLIMIT 20\n"
- "\nSELECT trace_id, span_id, parent_span_id, service_name, span_name, attr_status_code, \n       attr_http_response_status_code, duration, time\nFROM abnormal_traces\nWHERE trace_id = (\n    SELECT trace_id\
  \ FROM abnormal_traces \n    WHERE span_name = 'POST /api/v1/preserveservice/preserve' AND service_name = 'ts-preserve-service'\n    LIMIT 1\n)\nORDER BY time ASC\nLIMIT 50\n"
- "\nSELECT service_name, level, message, time\nFROM abnormal_logs\nWHERE service_name IN ('ts-preserve-service', 'ts-security-service')\n  AND level IN ('ERROR', 'WARN', 'error', 'warn')\nORDER BY time\
  \ ASC\nLIMIT 30\n"
- "\nSELECT trace_id, span_id, parent_span_id, service_name, span_name, attr_status_code, \n       attr_http_response_status_code, duration\nFROM normal_traces\nWHERE trace_id IN (\n    SELECT DISTINCT\
  \ trace_id FROM normal_traces \n    WHERE span_name LIKE '%securityservice%' OR span_name LIKE '%SecurityController%'\n    LIMIT 1\n)\nORDER BY time ASC\nLIMIT 30\n"
- '

