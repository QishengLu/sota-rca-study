- idx: 16
  text: 'I can see several error patterns:


    1. **ts-delivery-service** and **ts-notification-service**: "Failed to check/redeclare auto-delete queue(s)." - This suggests RabbitMQ connectivity issues

    2. **ts-food-service**: Multiple errors including "UnknownHostException: ts-rabbitmq: Name or service not known" - This indicates DNS resolution failure for the RabbitMQ service

    3. **ts-preserve-service** and **ts-order-service**: "Order already exist" errors - These seem to be application-level errors


    The key finding is the DNS error for `ts-rabbitmq` in ts-food-service. This suggests the root cause might be related to RabbitMQ connectivity or DNS resolution.


