raw_sql_list_sample:
- "SELECT \n    service_name,\n    attr_http_response_status_code,\n    DATE_TRUNC('minute', time) as minute,\n    COUNT(*) as request_count\nFROM abnormal_traces \nWHERE service_name IN ('travelplanservice',\
  \ 'travelservice', 'travel2service', 'preserveservice')\n    AND attr_http_response_status_code IS NOT NULL\nGROUP BY service_name, attr_http_response_status_code, DATE_TRUNC('minute', time)\nORDER BY\
  \ minute, service_name, attr_http_response_status_code\nLIMIT 100"
- SELECT DISTINCT service_name FROM abnormal_traces LIMIT 30
- "SELECT \n    service_name,\n    attr_http_response_status_code,\n    DATE_TRUNC('minute', time) as minute,\n    COUNT(*) as request_count\nFROM abnormal_traces \nWHERE service_name IN ('ts-travel-plan-service',\
  \ 'ts-travel-service', 'ts-travel2-service', 'ts-preserve-service')\n    AND attr_http_response_status_code IS NOT NULL\nGROUP BY service_name, attr_http_response_status_code, DATE_TRUNC('minute', time)\n\
  ORDER BY minute, service_name, attr_http_response_status_code\nLIMIT 100"
- "SELECT \n    service_name,\n    attr_http_response_status_code,\n    COUNT(*) as request_count\nFROM abnormal_traces \nWHERE attr_http_response_status_code >= 400\nGROUP BY service_name, attr_http_response_status_code\n\
  ORDER BY request_count DESC\nLIMIT 50"
- "SELECT \n    service_name,\n    level,\n    COUNT(*) as log_count\nFROM abnormal_logs \nGROUP BY service_name, level\nORDER BY log_count DESC\nLIMIT 50"
- "SELECT \n    service_name,\n    level,\n    message,\n    time\nFROM abnormal_logs \nWHERE level = 'ERROR'\nORDER BY time\nLIMIT 50"
- "SELECT \n    service_name,\n    metric,\n    value,\n    time\nFROM abnormal_metrics \nWHERE metric LIKE '%error%' OR metric LIKE '%Error%'\nORDER BY time\nLIMIT 50"
- SELECT DISTINCT metric FROM abnormal_metrics LIMIT 30
- "SELECT \n    service_name,\n    attr_status_code,\n    span_name,\n    duration,\n    time\nFROM abnormal_traces \nWHERE attr_status_code != 'OK' OR duration > 1000000\nORDER BY time\nLIMIT 50"
- "SELECT \n    trace_id,\n    span_id,\n    parent_span_id,\n    service_name,\n    span_name,\n    attr_status_code,\n    duration\nFROM abnormal_traces \nWHERE trace_id IN (\n    SELECT trace_id FROM\
  \ abnormal_traces \n    WHERE service_name = 'ts-food-service' \n    LIMIT 5\n)\nORDER BY trace_id, duration DESC\nLIMIT 50"
- "SELECT \n    trace_id,\n    span_id,\n    parent_span_id,\n    service_name,\n    span_name,\n    attr_status_code,\n    duration\nFROM abnormal_traces \nWHERE trace_id IN (\n    SELECT trace_id FROM\
  \ abnormal_traces \n    WHERE service_name = 'ts-preserve-service' \n    LIMIT 3\n)\nORDER BY trace_id, duration DESC\nLIMIT 50"
- "SELECT \n    service_name,\n    metric,\n    value,\n    time\nFROM abnormal_metrics \nWHERE metric = 'k8s.container.restarts' AND value > 0\nORDER BY time DESC\nLIMIT 30"
- "SELECT \n    attr_k8s_pod_name,\n    metric,\n    value,\n    time\nFROM abnormal_metrics \nWHERE metric = 'k8s.container.restarts' AND value > 0\nORDER BY time DESC\nLIMIT 10"
- "SELECT \n    service_name,\n    level,\n    message,\n    time\nFROM abnormal_logs \nWHERE service_name = 'ts-ticket-office-service'\nORDER BY time\nLIMIT 30"
- "SELECT \n    service_name,\n    level,\n    message,\n    time\nFROM abnormal_logs \nWHERE message LIKE '%DNS%' OR message LIKE '%UnknownHost%' OR message LIKE '%rabbitmq%' OR message LIKE '%Name or\
  \ service not known%'\nORDER BY time\nLIMIT 30"
- SELECT DISTINCT service_name FROM abnormal_metrics WHERE service_name LIKE '%rabbit%' OR service_name LIKE '%ticket%'
- "SELECT \n    service_name,\n    metric,\n    value,\n    time\nFROM abnormal_metrics \nWHERE service_name = 'rabbitmq'\nORDER BY time\nLIMIT 30"
- "SELECT \n    service_name,\n    metric,\n    value,\n    time\nFROM abnormal_metrics \nWHERE service_name = 'ts-ticket-office-service'\nORDER BY time\nLIMIT 30"
- "SELECT \n    service_name,\n    attr_http_response_status_code,\n    COUNT(*) as count\nFROM abnormal_traces \nWHERE attr_http_response_status_code IS NOT NULL\nGROUP BY service_name, attr_http_response_status_code\n\
  ORDER BY count DESC\nLIMIT 30"
- "SELECT \n    service_name,\n    level,\n    COUNT(*) as log_count\nFROM normal_logs \nGROUP BY service_name, level\nORDER BY log_count DESC\nLIMIT 30"
