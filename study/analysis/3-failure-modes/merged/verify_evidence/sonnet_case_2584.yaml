raw_sql_list_sample:
- "\nSELECT \n    service_name,\n    span_name,\n    attr_status_code,\n    attr_http_response_status_code,\n    COUNT(*) as span_count,\n    AVG(duration) as avg_duration_ns,\n    PERCENTILE_CONT(0.99)\
  \ WITHIN GROUP (ORDER BY duration) as p99_duration_ns,\n    SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 500 THEN 1 ELSE 0 END) as error_count\nFROM abnormal_traces\n\
  GROUP BY service_name, span_name, attr_status_code, attr_http_response_status_code\nORDER BY error_count DESC, avg_duration_ns DESC\nLIMIT 30\n"
- "\nSELECT \n    service_name,\n    level,\n    COUNT(*) as log_count\nFROM abnormal_logs\nGROUP BY service_name, level\nORDER BY service_name, level\n"
- "\nSELECT \n    trace_id,\n    span_id,\n    parent_span_id,\n    service_name,\n    span_name,\n    duration,\n    attr_status_code,\n    attr_http_response_status_code,\n    time\nFROM abnormal_traces\n\
  WHERE span_name LIKE '%preserve%' OR span_name LIKE '%Preserve%'\nORDER BY time, trace_id, duration DESC\nLIMIT 50\n"
- "\nSELECT \n    time,\n    service_name,\n    level,\n    message\nFROM abnormal_logs\nWHERE level IN ('ERROR', 'WARN')\nORDER BY time\nLIMIT 50\n"
- "\nSELECT \n    trace_id,\n    service_name,\n    span_name,\n    duration,\n    attr_status_code,\n    attr_http_response_status_code,\n    time\nFROM abnormal_traces\nWHERE span_name LIKE '%preserve%'\
  \ OR span_name LIKE '%Preserve%'\nORDER BY duration DESC\nLIMIT 20\n"
- "\nSELECT \n    time,\n    service_name,\n    level,\n    message\nFROM abnormal_logs\nWHERE service_name IN ('ts-delivery-service', 'ts-notification-service', 'ts-food-service')\n  AND level = 'ERROR'\n\
  ORDER BY time\nLIMIT 20\n"
- "\nSELECT \n    trace_id,\n    span_id,\n    parent_span_id,\n    service_name,\n    span_name,\n    duration,\n    attr_status_code,\n    attr_http_response_status_code,\n    time\nFROM abnormal_traces\n\
  WHERE trace_id = '4e7269709ad64fd15057f99d801ae8eb'\nORDER BY time, duration DESC\n"
- "\nSELECT \n    trace_id,\n    span_id,\n    parent_span_id,\n    service_name,\n    span_name,\n    duration,\n    attr_status_code,\n    attr_http_response_status_code,\n    time\nFROM abnormal_traces\n\
