- "\nSELECT \n    span_id,\n    parent_span_id,\n    service_name,\n    span_name,\n    duration,\n    attr_status_code,\n    attr_http_response_status_code,\n    time\nFROM abnormal_traces\nWHERE trace_id\
  \ = 'baef17fe3f550ed71fa9b3468ac3527b'\n  AND service_name = 'ts-preserve-service'\nORDER BY duration DESC\nLIMIT 20\n"
- "\n-- Compare ts-order-other-service spans in normal vs abnormal\nSELECT \n    'abnormal' as condition,\n    span_name,\n    AVG(duration) as avg_duration_ns,\n    MAX(duration) as max_duration_ns,\n\
  \    COUNT(*) as count\nFROM abnormal_traces\nWHERE service_name = 'ts-order-other-service'\nGROUP BY span_name\nORDER BY avg_duration_ns DESC\nLIMIT 15\n"
- '

  -- Find services that call ts-train-food-service and ts-food-service in abnormal

  SELECT DISTINCT service_name, span_name, attr_status_code, attr_http_response_status_code, AVG(duration) as avg_dur, COUNT(*) as cnt

  FROM abnormal_traces

  WHERE span_name LIKE ''%food%'' OR span_name LIKE ''%Food%''

  GROUP BY service_name, span_name, attr_status_code, attr_http_response_status_code

  ORDER BY avg_dur DESC

  LIMIT 20

  '
- '

  -- Get distinct metric names and service names in abnormal metrics

  SELECT DISTINCT metric, service_name

  FROM abnormal_metrics

  WHERE service_name IS NOT NULL AND service_name != ''''

  ORDER BY service_name, metric

  LIMIT 50

  '
- '

  -- Get all distinct services in the baef trace

  SELECT DISTINCT service_name, span_name

  FROM abnormal_traces

  WHERE trace_id = ''baef17fe3f550ed71fa9b3468ac3527b''

