- "\n-- Check CPU metrics for all services in abnormal vs normal\nSELECT \n    m.service_name,\n    m.metric,\n    AVG(m.value) as avg_abnormal,\n    n.avg_normal\nFROM abnormal_metrics m\nJOIN (\n    SELECT\
  \ service_name, metric, AVG(value) as avg_normal\n    FROM normal_metrics\n    GROUP BY service_name, metric\n) n ON m.service_name = n.service_name AND m.metric = n.metric\nWHERE m.metric IN ('k8s.pod.cpu.usage',\
  \ 'container.cpu.usage')\nGROUP BY m.service_name, m.metric, n.avg_normal\nORDER BY (AVG(m.value) / NULLIF(n.avg_normal, 0)) DESC\nLIMIT 20\n"
- "\n-- Get a normal successful preserve trace to understand the call chain\nSELECT trace_id, COUNT(*) as span_count\nFROM normal_traces\nWHERE trace_id IN (\n    SELECT DISTINCT trace_id \n    FROM normal_traces\n\
  \    WHERE span_name LIKE '%preserve%' OR span_name LIKE '%Preserve%'\n)\nGROUP BY trace_id\nORDER BY span_count DESC\nLIMIT 5\n"
- "\n-- Check CPU usage for all service pods in abnormal\nSELECT \n    service_name,\n    attr_k8s_pod_name,\n    metric,\n    AVG(value) as avg_value,\n    MAX(value) as max_value\nFROM abnormal_metrics\n\
  WHERE metric = 'k8s.pod.cpu.usage'\nGROUP BY service_name, attr_k8s_pod_name, metric\nORDER BY avg_value DESC\nLIMIT 20\n"
- '

