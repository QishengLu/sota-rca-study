- "SELECT DISTINCT metric \nFROM read_parquet('abnormal_metrics.parquet') \nLIMIT 30\""
- "SELECT service_name, metric, value, time\nFROM read_parquet('abnormal_metrics.parquet') \nWHERE value > 0\nORDER BY time ASC\nLIMIT 50\""
