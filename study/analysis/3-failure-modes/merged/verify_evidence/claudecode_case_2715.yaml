- "SELECT trace_id, service_name, span_name, duration, \\\"attr.status_code\\\", time\nFROM read_parquet('abnormal_traces.parquet') \nWHERE trace_id = '3974786f103be514742649288b6098c7'\nORDER BY time ASC\""
- "SELECT trace_id, service_name, span_name, duration, \\\"attr.status_code\\\", time\nFROM read_parquet('abnormal_traces.parquet') \nWHERE trace_id = 'd880adceec3786dda6411949d5c7672a'\nORDER BY time ASC\""
- "SELECT MIN(time) as first_error, service_name, message\nFROM read_parquet('abnormal_logs.parquet') \nWHERE level = 'ERROR'\nGROUP BY service_name, message\nORDER BY first_error ASC\""
- "SELECT service_name, metric, AVG(value) as avg_value, MAX(value) as max_value\nFROM read_parquet('abnormal_metrics.parquet') \nWHERE metric LIKE '%error%' OR metric LIKE '%connection%' OR metric LIKE\
