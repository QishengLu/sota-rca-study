- "\nSELECT \n  t.trace_id,\n  t.span_id,\n  t.parent_span_id,\n  t.service_name,\n  t.span_name,\n  t.duration/1e6 as duration_ms,\n  t.attr_status_code,\n  t.attr_http_response_status_code\nFROM abnormal_traces\
