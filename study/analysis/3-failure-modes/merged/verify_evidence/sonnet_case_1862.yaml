- "\nSELECT \n  service_name,\n  span_name,\n  COUNT(*) as total,\n  ROUND(AVG(duration)/1e6, 2) as avg_ms,\n  ROUND(PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration)/1e6, 2) as p99_ms\nFROM abnormal_traces\n\
