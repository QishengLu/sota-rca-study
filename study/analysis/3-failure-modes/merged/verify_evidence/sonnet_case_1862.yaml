    **`rabbitmq` (Kubernetes Service: `ts-rabbitmq`)** — The RabbitMQ message broker service became unreachable via DNS. The pod `rabbitmq-0` was running (0 restarts, normal CPU metrics), but its Kubernetes\
    \ Service DNS name `ts-rabbitmq` failed to resolve (`java.net.UnknownHostException: ts-rabbitmq: Name or service not known`).\n\n### Evidence Timeline\n- **03:03:32** — `ts-notification-service` and\
    \ `ts-delivery-service` begin continuously failing to connect to `ts-rabbitmq:5672` (\"Failed to check/redeclare auto-delete queue(s).\")\n- **03:04:19** — `ts-food-service` starts logging food request\
    \ failures (\"Get the Get Food Request Failed!\")\n- **03:04:28** — `ts-preserve-service` and `ts-order-service` start logging \"Order already exists\" errors (due to retry storms caused by lost AMQP\
    \ confirmations)\n- **03:04:29** — `ts-food-service` explicitly logs `AmqpIOException: java.net.UnknownHostException: ts-rabbitmq: Name or service not known`\n\n### Fault Propagation\n1. **rabbitmq**\
    \ DNS failure → all AMQP-dependent services lose connectivity\n2. → `ts-notification-service`, `ts-delivery-service`: Can't reconnect to message broker\n3. → `ts-food-service`: Can't send delivery messages,\
    \ food queries fail with HIGH_LATENCY\n4. → `ts-order-service`: Idempotency breaks (orders created but not confirmed via MQ → retries → \"Order already exists\" + DB lock contention → HIGH_LATENCY)\n\
    5. → `ts-preserve-service`: Order creation fails/times out, extreme HIGH_LATENCY (p99: 736ms→6913ms)\n6. → `ts-ui-dashboard`: SLO violations on both affected endpoints\n\n---\n\n```json\n{\n  \"nodes\"\
