raw_sql_list_sample:
- "\nSELECT \n  service_name,\n  COUNT(*) as total_spans,\n  SUM(CASE WHEN attr_status_code = 'ERROR' THEN 1 ELSE 0 END) as error_spans,\n  ROUND(100.0 * SUM(CASE WHEN attr_status_code = 'ERROR' THEN 1\
  \ ELSE 0 END) / COUNT(*), 2) as error_pct,\n  ROUND(AVG(duration)/1e6, 2) as avg_duration_ms,\n  ROUND(PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration)/1e6, 2) as p99_duration_ms\nFROM abnormal_traces\n\
  GROUP BY service_name\nORDER BY error_spans DESC\n"
- "\nSELECT \n  service_name,\n  span_name,\n  COUNT(*) as total_spans,\n  ROUND(AVG(duration)/1e6, 2) as avg_duration_ms,\n  ROUND(PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration)/1e6, 2) as p99_duration_ms,\n\
  \  MAX(duration)/1e6 as max_duration_ms\nFROM abnormal_traces\nWHERE service_name IN ('ts-food-service', 'ts-preserve-service', 'ts-ui-dashboard')\nGROUP BY service_name, span_name\nORDER BY service_name,\
  \ p99_duration_ms DESC\n"
- "\nSELECT \n  service_name,\n  span_name,\n  COUNT(*) as total_spans,\n  ROUND(AVG(duration)/1e6, 2) as avg_duration_ms,\n  ROUND(PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration)/1e6, 2) as p99_duration_ms\n\
  FROM normal_traces\nWHERE service_name IN ('ts-food-service', 'ts-preserve-service', 'ts-ui-dashboard')\nGROUP BY service_name, span_name\nORDER BY service_name, p99_duration_ms DESC\n"
- "\nSELECT \n  level,\n  service_name,\n  COUNT(*) as count,\n  MIN(time) as first_occurrence,\n  MAX(time) as last_occurrence\nFROM abnormal_logs\nWHERE level IN ('ERROR', 'WARN')\nGROUP BY level, service_name\n\
  ORDER BY level, count DESC\n"
- '

  SELECT time, service_name, level, message

  FROM abnormal_logs

  WHERE service_name IN (''ts-delivery-service'', ''ts-notification-service'')

  AND level = ''ERROR''

  ORDER BY time ASC

  '
- '

  SELECT time, service_name, level, message

  FROM abnormal_logs

  WHERE service_name IN (''ts-food-service'', ''ts-preserve-service'', ''ts-order-service'')

  AND level = ''ERROR''

