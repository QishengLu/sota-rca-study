    \ database connection pool exhaustion (HikariPool-1), causing JDBC connection timeouts after 30 seconds.\n\n**Evidence:**\n- Logs: \"HikariPool-1 - Connection is not available, request timed out after\
    \ 30000ms\"\n- Logs: \"Unable to acquire JDBC Connection\" errors\n- Traces: ~30 second timeouts at `TripRepository.findByRouteId` and `SELECT Trip` spans\n- HTTP 500 errors propagating through the\
