    \    {\"source\": \"ts-rabbitmq\", \"target\": \"ts-food-service\"},\n    {\"source\": \"ts-food-service\", \"target\": \"ts-ui-dashboard\"}\n  ],\n  \"root_causes\": [\n    {\"component\": \"ts-rabbitmq\"\
    , \"state\": [\"UNAVAILABLE\"], \"timestamp\": 1723284070000}\n  ],\n  \"component_to_service\": {}\n}\n```\n\n**Summary of Findings:**\n\n1. **Root Cause Service**: `ts-rabbitmq` - The RabbitMQ message\
    \ broker is unavailable due to DNS resolution failure.\n\n2. **Root Cause**: DNS resolution failure (`java.net.UnknownHostException: ts-rabbitmq`) preventing services from connecting to the message\
    \ queue.\n\n3. **Fault Propagation Path**:\n   - **ts-rabbitmq** (UNAVAILABLE - DNS resolution failure)\n   - → **ts-food-service** (HIGH_ERROR_RATE - Cannot send delivery info to MQ, \"Get the Get\
