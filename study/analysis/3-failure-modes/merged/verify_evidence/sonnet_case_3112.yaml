raw_sql_list_sample:
- "\nSELECT service_name, span_name, attr_status_code, attr_http_response_status_code, \n       COUNT(*) as span_count,\n       AVG(duration) as avg_duration_ns,\n       PERCENTILE_CONT(0.99) WITHIN GROUP\
  \ (ORDER BY duration) as p99_duration_ns,\n       SUM(CASE WHEN attr_status_code = 'STATUS_CODE_ERROR' THEN 1 ELSE 0 END) as error_count\nFROM abnormal_traces\nGROUP BY service_name, span_name, attr_status_code,\
  \ attr_http_response_status_code\nORDER BY error_count DESC, avg_duration_ns DESC\nLIMIT 30\n"
- '

  SELECT service_name, level, COUNT(*) as count

  FROM abnormal_logs

  GROUP BY service_name, level

  ORDER BY count DESC

  LIMIT 30

  '
- "\n-- Get trace IDs that involve the preserve endpoint\nSELECT DISTINCT trace_id \nFROM abnormal_traces \nWHERE span_name LIKE '%preserve%'\nLIMIT 10\n"
- "\nSELECT time, service_name, level, message \nFROM abnormal_logs \nWHERE level IN ('ERROR', 'WARN')\nORDER BY time ASC\nLIMIT 50\n"
- "\n-- Get the full trace for one preserve endpoint call\nSELECT trace_id, span_id, parent_span_id, span_name, service_name, \n       duration, attr_status_code, attr_http_response_status_code,\n     \
  \  time\nFROM abnormal_traces \nWHERE trace_id = '4eb55ef540bba2dbd42cb649b75bfaf5'\nORDER BY time ASC\n"
- "\nSELECT time, service_name, level, message \nFROM abnormal_logs \nWHERE service_name IN ('ts-notification-service', 'ts-preserve-service')\nAND level IN ('ERROR', 'WARN')\nORDER BY time ASC\nLIMIT 50\n"
- "\n-- Get the full trace for one preserve endpoint call - fewer columns\nSELECT trace_id, span_name, service_name, duration, attr_status_code, attr_http_response_status_code, time\nFROM abnormal_traces\
  \ \nWHERE trace_id = '4eb55ef540bba2dbd42cb649b75bfaf5'\nORDER BY time ASC\nLIMIT 25\n"
- "\nSELECT time, service_name, level, message \nFROM abnormal_logs \nWHERE service_name = 'ts-preserve-service'\nORDER BY time ASC\nLIMIT 30\n"
- "\n-- Get ALL spans for the preserve trace sorted by duration to find the bottleneck\nSELECT span_name, service_name, duration/1000000000.0 as duration_sec, \n       attr_status_code, attr_http_response_status_code\n\
  FROM abnormal_traces \nWHERE trace_id = '4eb55ef540bba2dbd42cb649b75bfaf5'\nORDER BY duration DESC\nLIMIT 25\n"
- "\n-- Find which spans from ts-preserve-service have the longest duration \nSELECT span_name, service_name, duration/1000000000.0 as duration_sec, \n       attr_status_code, attr_http_response_status_code,\
  \ time\nFROM abnormal_traces \nWHERE service_name = 'ts-preserve-service'\nORDER BY duration DESC\nLIMIT 20\n"
- "\n-- Look at normal preserve service logs to see the full happy path\nSELECT time, service_name, level, message \nFROM normal_logs \nWHERE service_name = 'ts-preserve-service'\nORDER BY time ASC\nLIMIT\
  \ 20\n"
- "\n-- Check what metrics are available for RabbitMQ or message queue services\nSELECT DISTINCT metric, service_name\nFROM abnormal_metrics\nWHERE service_name LIKE '%rabbit%' OR service_name LIKE '%mq%'\
  \ OR service_name LIKE '%queue%'\n   OR metric LIKE '%rabbit%' OR metric LIKE '%amqp%'\nLIMIT 20\n"
- '

  -- Compare RabbitMQ metrics between normal and abnormal

  SELECT ''abnormal'' as period, metric, AVG(value) as avg_value, MAX(value) as max_value

  FROM abnormal_metrics

  WHERE service_name = ''rabbitmq''

  GROUP BY metric

  UNION ALL

  SELECT ''normal'' as period, metric, AVG(value) as avg_value, MAX(value) as max_value

  FROM normal_metrics

  WHERE service_name = ''rabbitmq''

  GROUP BY metric

  ORDER BY metric, period

  LIMIT 40

  '
- '

  -- Check RabbitMQ memory and CPU during incident

  SELECT time, metric, value

  FROM abnormal_metrics

  WHERE service_name = ''rabbitmq''

  AND metric IN (''k8s.pod.memory_limit_utilization'', ''k8s.pod.cpu_limit_utilization'', ''container.memory.usage'', ''k8s.pod.cpu.usage'')

  ORDER BY time

  LIMIT 20

  '
- '

  -- Check RabbitMQ statefulset and network metrics

  SELECT time, metric, value

  FROM abnormal_metrics

  WHERE service_name = ''rabbitmq''

  AND metric IN (''k8s.statefulset.current_pods'', ''k8s.statefulset.ready_pods'', ''k8s.pod.network.errors'', ''k8s.pod.network.io'')

  ORDER BY time

  LIMIT 20

  '
- '

  -- Check ts-preserve-service metrics in sum to see HTTP errors

  SELECT time, metric, value, service_name

  FROM abnormal_metrics_sum

  WHERE service_name = ''ts-preserve-service''

  ORDER BY time

  LIMIT 20

  '
- '

  -- Check if food-service or notification-service have errors in normal period

  SELECT service_name, level, COUNT(*) as count

  FROM normal_logs

  WHERE service_name IN (''ts-food-service'', ''ts-notification-service'', ''ts-preserve-service'')

  AND level IN (''ERROR'', ''WARN'')

  GROUP BY service_name, level

  ORDER BY count DESC

  LIMIT 10

  '
- '

  -- Get all error-level logs from all services in abnormal period

  SELECT service_name, level, message, COUNT(*) as count

  FROM abnormal_logs

  WHERE level = ''ERROR''

  GROUP BY service_name, level, message

  ORDER BY count DESC

  LIMIT 20

  '
- '

  -- Check normal period errors from notification and preserve services

  SELECT service_name, level, message, COUNT(*) as count

  FROM normal_logs

  WHERE service_name IN (''ts-notification-service'', ''ts-preserve-service'', ''ts-delivery-service'', ''ts-food-service'')

  AND level = ''ERROR''

  GROUP BY service_name, level, message

  ORDER BY count DESC

  LIMIT 15

  '
- "\n-- Compare normal vs abnormal trace errors for preserve endpoint\nSELECT service_name, span_name, attr_status_code, \n       COUNT(*) as count,\n       AVG(duration)/1000000.0 as avg_duration_ms\n\
  FROM normal_traces\nWHERE span_name LIKE '%preserve%'\nGROUP BY service_name, span_name, attr_status_code\nORDER BY count DESC\nLIMIT 15\n"
