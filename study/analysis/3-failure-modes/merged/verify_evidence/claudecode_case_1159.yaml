- SELECT * FROM 'normal_logs.parquet' LIMIT 0;"
- SELECT * FROM 'abnormal_logs.parquet' LIMIT 0;"
- SELECT * FROM 'normal_traces.parquet' LIMIT 0;"
- SELECT * FROM 'abnormal_traces.parquet' LIMIT 0;"
- SELECT * FROM 'normal_metrics.parquet' LIMIT 0;"
- SELECT * FROM 'abnormal_metrics.parquet' LIMIT 0;"
- SELECT level, COUNT(*) as cnt FROM 'abnormal_logs.parquet' GROUP BY level ORDER BY cnt DESC;"
- SELECT level, COUNT(*) as cnt FROM 'normal_logs.parquet' GROUP BY level ORDER BY cnt DESC;"
- SELECT service_name, COUNT(*) as cnt FROM 'abnormal_logs.parquet' WHERE level = 'ERROR' GROUP BY service_name ORDER BY cnt DESC LIMIT 20;"
- SELECT service_name, message FROM 'abnormal_logs.parquet' WHERE level = 'ERROR' AND service_name = 'ts-food-service' ORDER BY time LIMIT 15;"
- SELECT service_name, message FROM 'abnormal_logs.parquet' WHERE level = 'ERROR' AND service_name = 'ts-notification-service' ORDER BY time LIMIT 15;"
- SELECT attr.status_code, COUNT(*) as cnt FROM 'abnormal_traces.parquet' GROUP BY attr.status_code ORDER BY cnt DESC;"
- SELECT \"attr.status_code\", COUNT(*) as cnt FROM 'abnormal_traces.parquet' GROUP BY \"attr.status_code\" ORDER BY cnt DESC;"
- SELECT service_name, message FROM 'abnormal_logs.parquet' WHERE level = 'ERROR' AND service_name = 'ts-delivery-service' ORDER BY time LIMIT 15;"
- SELECT DISTINCT service_name FROM 'abnormal_traces.parquet' ORDER BY service_name;"
- SELECT DISTINCT service_name FROM 'normal_traces.parquet' ORDER BY service_name;"
- SELECT * FROM 'abnormal_metrics_histogram.parquet' LIMIT 30;"
- "SELECT \n    parent_service,\n    child_service,\n    COUNT(*) as cnt\nFROM (\n    SELECT \n        p.service_name as parent_service,\n        c.service_name as child_service,\n        p.trace_id\n \
  \   FROM 'abnormal_traces.parquet' c\n    LEFT JOIN 'abnormal_traces.parquet' p \n        ON c.\\\"parent_span_id\\\" = p.\\\"span_id\\\" \n        AND c.trace_id = p.trace_id\n    WHERE c.\\\"parent_span_id\\\
  \" IS NOT NULL AND c.\\\"parent_span_id\\\" != ''\n)\nGROUP BY parent_service, child_service\nORDER BY cnt DESC\nLIMIT 30;\""
- "SELECT \n    c.service_name,\n    c.\\\"span_name\\\",\n    c.\\\"attr.status_code\\\",\n    c.duration,\n    c.trace_id\nFROM 'abnormal_traces.parquet' c\nWHERE c.\\\"attr.status_code\\\" = 'Error'\n\
  ORDER BY c.time\nLIMIT 20;\""
- "SELECT MIN(time) as first_error, service_name, message \nFROM 'abnormal_logs.parquet' \nWHERE level = 'ERROR' \nGROUP BY service_name, message \nORDER BY first_error \nLIMIT 20;\""
