- SELECT service_name, metric, AVG(value) as avg_value, COUNT(*) as count FROM abnormal_metrics WHERE service_name IN ('ts-ui-dashboard', 'preserveservice', 'travelplanservice', 'travel2service') GROUP
  BY service_name, metric ORDER BY service_name, metric LIMIT 50
- SELECT DISTINCT metric FROM abnormal_metrics WHERE metric LIKE '%http%' OR metric LIKE '%latency%' OR metric LIKE '%error%' OR metric LIKE '%p95%' OR metric LIKE '%p99%' LIMIT 30
- SELECT DISTINCT metric FROM abnormal_metrics LIMIT 50
- SELECT service_name, attr_http_response_status_code, COUNT(*) as count FROM abnormal_traces WHERE service_name IN ('ts-ui-dashboard', 'preserveservice', 'travelplanservice', 'travel2service') AND attr_http_response_status_code
  IS NOT NULL GROUP BY service_name, attr_http_response_status_code ORDER BY service_name, attr_http_response_status_code LIMIT 50
- SELECT service_name, attr_http_response_status_code, COUNT(*) as count FROM abnormal_traces WHERE attr_http_response_status_code IS NOT NULL GROUP BY service_name, attr_http_response_status_code ORDER
  BY count DESC LIMIT 50
- SELECT service_name, COUNT(*) as count, AVG(duration) as avg_duration, MAX(duration) as max_duration, APPROX_QUANTILE(duration, 0.95) as p95_duration, APPROX_QUANTILE(duration, 0.99) as p99_duration FROM
  abnormal_traces GROUP BY service_name ORDER BY avg_duration DESC LIMIT 30
- SELECT service_name, level, COUNT(*) as count FROM abnormal_logs WHERE service_name IN ('ts-ui-dashboard', 'preserveservice', 'travelplanservice', 'travel2service', 'ts-travel-plan-service', 'ts-preserve-service',
  'ts-travel2-service') GROUP BY service_name, level ORDER BY service_name, level LIMIT 30
- SELECT service_name, message, COUNT(*) as count FROM abnormal_logs WHERE level = 'ERROR' GROUP BY service_name, message ORDER BY count DESC LIMIT 20
- SELECT trace_id, service_name, span_name, duration, attr_status_code, parent_span_id FROM abnormal_traces WHERE duration > 1000000000 ORDER BY time LIMIT 20
