- SELECT service_name, level, COUNT(*) as count FROM abnormal_logs GROUP BY service_name, level ORDER BY count DESC LIMIT 30
- SELECT service_name, message, COUNT(*) as count FROM abnormal_logs WHERE level = 'WARN' AND service_name IN ('ts-order-service', 'ts-order-other-service') GROUP BY service_name, message ORDER BY count
