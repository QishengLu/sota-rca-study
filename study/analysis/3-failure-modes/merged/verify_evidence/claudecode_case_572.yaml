raw_sql_list_sample:
- SELECT DISTINCT file_name FROM (SELECT 'logs' as category FROM 'abnormal_logs.parquet' LIMIT 1 UNION ALL SELECT 'traces' FROM 'abnormal_traces.parquet' LIMIT 1 UNION ALL SELECT 'metrics' FROM 'abnormal_metrics.parquet'
  LIMIT 1)" 2>/dev/null || echo "Checking files..."
- SELECT * FROM read_parquet('abnormal_logs.parquet')"
- SELECT * FROM read_parquet('abnormal_traces.parquet')"
- SELECT * FROM read_parquet('abnormal_metrics.parquet')"
- SELECT service_name, level, COUNT(*) as count FROM read_parquet('abnormal_logs.parquet') GROUP BY service_name, level ORDER BY count DESC"
- SELECT service_name, COUNT(*) as total, SUM(CASE WHEN attr.status_code = 'ERROR' THEN 1 ELSE 0 END) as errors FROM read_parquet('abnormal_traces.parquet') GROUP BY service_name ORDER BY errors DESC"
- SELECT time, service_name, level, message FROM read_parquet('abnormal_logs.parquet') WHERE level IN ('ERROR', 'CRITICAL', 'FATAL') ORDER BY time ASC LIMIT 30"
- SELECT service_name, COUNT(*) as total, SUM(CASE WHEN \"attr.status_code\" = 'ERROR' THEN 1 ELSE 0 END) as errors FROM read_parquet('abnormal_traces.parquet') GROUP BY service_name ORDER BY errors DESC"
- SELECT time, service_name, level, message FROM read_parquet('abnormal_logs.parquet') WHERE level IN ('ERROR', 'CRITICAL', 'FATAL', 'SEVERE') ORDER BY time ASC LIMIT 50"
- SELECT time, service_name, level, message FROM read_parquet('abnormal_logs.parquet') WHERE message LIKE '%rabbitmq%' OR message LIKE '%Connection reset%' OR message LIKE '%UnknownHostException%' ORDER
  BY time ASC LIMIT 20"
- SELECT \"span_name\", service_name, \"attr.status_code\", COUNT(*) FROM read_parquet('abnormal_traces.parquet') GROUP BY \"span_name\", service_name, \"attr.status_code\" ORDER BY COUNT(*) DESC LIMIT
  30"
- SELECT MIN(time) as first_error, service_name, level FROM read_parquet('abnormal_logs.parquet') WHERE level IN ('ERROR', 'SEVERE', 'CRITICAL', 'FATAL') GROUP BY service_name, level ORDER BY first_error
  ASC LIMIT 20"
- "SELECT \n    parent_service.service_name as caller,\n    child_service.service_name as callee,\n    COUNT(*) as call_count\nFROM read_parquet('abnormal_traces.parquet') parent\nJOIN read_parquet('abnormal_traces.parquet')\
  \ child \n    ON parent.span_id = child.\\\"parent_span_id\\\"\n    AND parent.trace_id = child.trace_id\nGROUP BY parent.service_name, child.service_name\nORDER BY call_count DESC\nLIMIT 40\n\""
- SELECT service_name, metric, AVG(value) as avg_value, MAX(value) as max_value FROM read_parquet('abnormal_metrics.parquet') WHERE metric LIKE '%error%' OR metric LIKE '%latency%' GROUP BY service_name,
  metric ORDER BY avg_value DESC LIMIT 30"
- SELECT DISTINCT service_name FROM read_parquet('normal_logs.parquet') ORDER BY service_name"
- "SELECT \n    parent.service_name as caller,\n    child.service_name as callee,\n    COUNT(*) as call_count\nFROM read_parquet('abnormal_traces.parquet') parent\nJOIN read_parquet('abnormal_traces.parquet')\
  \ child \n    ON parent.span_id = child.\\\"parent_span_id\\\"\n    AND parent.trace_id = child.trace_id\nGROUP BY parent.service_name, child.service_name\nORDER BY call_count DESC\nLIMIT 40\n\""
- SELECT service_name, metric, AVG(value) as avg_value, MAX(value) as max_value FROM read_parquet('abnormal_metrics.parquet') WHERE metric LIKE '%error%' OR metric LIKE '%latency%' GROUP BY service_name,
  metric ORDER BY avg_value DESC LIMIT 30"
- SELECT DISTINCT metric FROM read_parquet('abnormal_metrics.parquet') LIMIT 20"
- SELECT service_name, COUNT(*) as error_count FROM read_parquet('abnormal_logs.parquet') WHERE level IN ('ERROR', 'SEVERE', 'CRITICAL') GROUP BY service_name ORDER BY error_count DESC"
- 'SELECT time, trace_id, service_name, \"span_name\", \"attr.status_code\", duration

  FROM read_parquet(''abnormal_traces.parquet'')

  WHERE service_name = ''ts-food-service'' OR service_name = ''ts-station-food-service''

  ORDER BY time ASC

  LIMIT 30

  "'
