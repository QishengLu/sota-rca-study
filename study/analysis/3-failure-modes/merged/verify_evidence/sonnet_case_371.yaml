raw_sql_list_sample:
- "\nSELECT \n    service_name,\n    span_name,\n    attr_status_code,\n    attr_http_response_status_code,\n    COUNT(*) as span_count,\n    AVG(duration)/1e6 as avg_duration_ms,\n    MAX(duration)/1e6\
  \ as max_duration_ms,\n    COUNT(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 400 THEN 1 END) as error_count\nFROM abnormal_traces\nWHERE service_name IN ('ts-travel-plan-service',\
  \ 'ts-travel2-service', 'ts-travelplan-service', 'travelplanservice', 'travel2service')\n   OR span_name LIKE '%travelPlan%' OR span_name LIKE '%travel2%' OR span_name LIKE '%trips%'\nGROUP BY service_name,\
  \ span_name, attr_status_code, attr_http_response_status_code\nORDER BY error_count DESC\nLIMIT 30\n"
- "\n-- Get all distinct services and error counts in abnormal traces\nSELECT \n    service_name,\n    COUNT(*) as total_spans,\n    COUNT(CASE WHEN attr_status_code = 'ERROR' OR attr_status_code = 'Error'\
  \ THEN 1 END) as error_spans,\n    COUNT(CASE WHEN attr_http_response_status_code >= 500 THEN 1 END) as server_error_count,\n    COUNT(CASE WHEN attr_http_response_status_code >= 400 AND attr_http_response_status_code\
  \ < 500 THEN 1 END) as client_error_count,\n    AVG(duration)/1e6 as avg_duration_ms,\n    MAX(duration)/1e6 as max_duration_ms,\n    ROUND(100.0 * COUNT(CASE WHEN attr_status_code = 'ERROR' OR attr_status_code\
  \ = 'Error' THEN 1 END) / COUNT(*), 2) as error_rate_pct\nFROM abnormal_traces\nGROUP BY service_name\nORDER BY error_spans DESC, server_error_count DESC\n"
- '

  SELECT time, level, service_name, message, attr_k8s_pod_name

  FROM abnormal_logs

  WHERE level IN (''ERROR'', ''WARN'', ''error'', ''warn'')

  ORDER BY time ASC

  LIMIT 50

  '
- "\n-- Get error traces details for ts-travel2-service\nSELECT \n    time,\n    trace_id,\n    span_id,\n    parent_span_id,\n    span_name,\n    service_name,\n    duration/1e6 as duration_ms,\n    attr_status_code,\n\
  \    attr_http_response_status_code,\n    attr_http_request_method\nFROM abnormal_traces\nWHERE attr_status_code = 'Error' OR attr_http_response_status_code >= 500\nORDER BY time ASC\nLIMIT 30\n"
- '

  SELECT time, level, service_name, message, attr_k8s_pod_name

  FROM abnormal_logs

  WHERE level IN (''ERROR'', ''WARN'', ''error'', ''warn'')

  ORDER BY time ASC

  LIMIT 30

  '
- "\n-- Get the full trace context for the error trace to understand the call chain\nSELECT \n    trace_id,\n    span_id,\n    parent_span_id,\n    span_name,\n    service_name,\n    duration/1e6 as duration_ms,\n\
  \    attr_status_code,\n    attr_http_response_status_code\nFROM abnormal_traces\nWHERE trace_id = '6e323f9341f43d177ad81e2ef6d47996'\nORDER BY time ASC\nLIMIT 30\n"
- "\n-- Get ERROR logs from ts-travel2-service\nSELECT time, level, service_name, message, attr_k8s_pod_name\nFROM abnormal_logs\nWHERE service_name = 'ts-travel2-service' \n   OR (level = 'ERROR' AND service_name\
  \ NOT IN ('ts-verification-code-service', 'ts-notification-service', 'ts-food-service', 'ts-order-other-service'))\nORDER BY time ASC\nLIMIT 30\n"
- "\n-- Check resource metrics for ts-basic-service  \nSELECT \n    metric,\n    service_name,\n    AVG(value) as avg_value,\n    MAX(value) as max_value,\n    MIN(value) as min_value\nFROM abnormal_metrics\n\
  WHERE service_name = 'ts-basic-service'\n   OR attr_k8s_deployment_name = 'ts-basic-service'\n   OR attr_destination_workload = 'ts-basic-service'\nGROUP BY metric, service_name\nORDER BY metric\n"
- '

  -- Get all SEVERE and ERROR logs

  SELECT time, level, service_name, message, attr_k8s_pod_name

  FROM abnormal_logs

  WHERE level IN (''SEVERE'', ''ERROR'', ''FATAL'')

  ORDER BY time ASC

  LIMIT 30

  '
- "\n-- Compare CPU and memory for key services between normal and abnormal\nSELECT \n    'ABNORMAL' as period,\n    service_name,\n    metric,\n    AVG(value) as avg_value,\n    MAX(value) as max_value\n\
  FROM abnormal_metrics\nWHERE (service_name IN ('ts-basic-service', 'ts-seat-service', 'ts-travel2-service', 'ts-travel-plan-service'))\n  AND metric IN ('container.cpu.usage', 'container.memory.usage',\
  \ 'container.memory.working_set')\nGROUP BY service_name, metric\nUNION ALL\nSELECT \n    'NORMAL' as period,\n    service_name,\n    metric,\n    AVG(value) as avg_value,\n    MAX(value) as max_value\n\
  FROM normal_metrics\nWHERE (service_name IN ('ts-basic-service', 'ts-seat-service', 'ts-travel2-service', 'ts-travel-plan-service'))\n  AND metric IN ('container.cpu.usage', 'container.memory.usage',\
  \ 'container.memory.working_set')\nGROUP BY service_name, metric\nORDER BY service_name, metric, period\n"
- '

  -- Check what metrics are available for ts-seat-service

  SELECT DISTINCT metric

  FROM abnormal_metrics

  WHERE service_name = ''ts-seat-service''

  ORDER BY metric

  '
- "\n-- Check deployment availability metrics (CRITICAL for detecting pod kills/restarts)\nSELECT \n    'ABNORMAL' as period,\n    service_name,\n    metric,\n    time,\n    value,\n    attr_k8s_deployment_name\n\
  FROM abnormal_metrics\nWHERE metric IN ('k8s.deployment.available', 'k8s.deployment.desired')\nORDER BY service_name, time\nLIMIT 30\n"
- "\n-- Check JVM metrics for pod issues\nSELECT \n    service_name,\n    metric,\n    AVG(value) as avg_value,\n    MAX(value) as max_value,\n    MIN(value) as min_value\nFROM abnormal_metrics\nWHERE metric\
  \ LIKE 'jvm%' AND service_name IN ('ts-basic-service', 'ts-seat-service', 'ts-travel2-service', 'ts-travel-plan-service', 'ts-route-plan-service')\nGROUP BY service_name, metric\nORDER BY service_name,\
  \ metric\n"
- "\n-- Compare jvm.system.cpu.load_1m between normal and abnormal for all services\nSELECT \n    'ABNORMAL' as period,\n    service_name,\n    AVG(value) as avg_load,\n    MAX(value) as max_load,\n   \
  \ MIN(value) as min_load\nFROM abnormal_metrics\nWHERE metric = 'jvm.system.cpu.load_1m'\nGROUP BY service_name\nUNION ALL\nSELECT \n    'NORMAL' as period,\n    service_name,\n    AVG(value) as avg_load,\n\
  \    MAX(value) as max_load,\n    MIN(value) as min_load\nFROM normal_metrics\nWHERE metric = 'jvm.system.cpu.load_1m'\nGROUP BY service_name\nORDER BY service_name, period\n"
- "\n-- Find which services are on the same node as ts-basic-service\nSELECT DISTINCT \n    service_name,\n    attr_k8s_node_name,\n    attr_k8s_pod_name\nFROM abnormal_metrics\nWHERE attr_k8s_node_name\
  \ IN (\n    SELECT DISTINCT attr_k8s_node_name \n    FROM abnormal_metrics \n    WHERE service_name = 'ts-basic-service' AND attr_k8s_node_name IS NOT NULL\n)\nAND attr_k8s_node_name IS NOT NULL\nORDER\
  \ BY attr_k8s_node_name, service_name\nLIMIT 20\n"
- "\n-- Find services with INCREASED CPU in abnormal vs normal (potential root cause)\nSELECT \n    a.service_name,\n    AVG(a.value) as abnormal_cpu,\n    AVG(n.value) as normal_cpu,\n    AVG(a.value)\
  \ - AVG(n.value) as cpu_increase,\n    a.attr_k8s_node_name\nFROM abnormal_metrics a\nJOIN normal_metrics n ON a.service_name = n.service_name AND a.metric = n.metric\nWHERE a.metric = 'container.cpu.usage'\n\
  \  AND a.attr_k8s_node_name = 'worker1'\nGROUP BY a.service_name, a.attr_k8s_node_name\nORDER BY cpu_increase DESC\n"
- "\n-- Check pod CPU usage on worker1 (k8s.pod.cpu.usage) \nSELECT \n    service_name,\n    attr_k8s_pod_name,\n    attr_k8s_node_name,\n    AVG(value) as avg_cpu,\n    MAX(value) as max_cpu\nFROM abnormal_metrics\n\
  WHERE metric = 'k8s.pod.cpu.usage' \n  AND attr_k8s_node_name = 'worker1'\nGROUP BY service_name, attr_k8s_pod_name, attr_k8s_node_name\nORDER BY avg_cpu DESC\n"
- "\n-- Find node assignments for all services to understand infrastructure layout\nSELECT DISTINCT \n    service_name,\n    attr_k8s_node_name,\n    attr_k8s_pod_name\nFROM abnormal_metrics\nWHERE attr_k8s_node_name\
  \ IS NOT NULL\n  AND service_name IN ('ts-travel2-service', 'ts-seat-service', 'ts-route-plan-service', 'ts-basic-service', 'ts-travel-plan-service', 'ts-travel-service')\nORDER BY attr_k8s_node_name,\
  \ service_name\n"
- "\n-- Check k8s.pod.cpu.node.utilization for worker1\nSELECT \n    service_name,\n    attr_k8s_pod_name,\n    attr_k8s_node_name,\n    AVG(value) as avg_node_cpu_util,\n    MAX(value) as max_node_cpu_util\n\
  FROM abnormal_metrics\nWHERE metric = 'k8s.pod.cpu.node.utilization'\nGROUP BY service_name, attr_k8s_pod_name, attr_k8s_node_name\nORDER BY avg_node_cpu_util DESC\nLIMIT 20\n"
- "\n-- Check JVM GC metrics for ts-basic-service\nSELECT \n    service_name,\n    metric,\n    attr_jvm_gc_name,\n    attr_jvm_gc_action,\n    SUM(count) as total_count,\n    SUM(sum) as total_time,\n\
  \    MAX(max) as max_duration\nFROM abnormal_metrics_histogram\nWHERE service_name IN ('ts-basic-service', 'ts-seat-service', 'ts-travel2-service', 'ts-travel-plan-service')\n  AND metric LIKE 'jvm%'\n\
  GROUP BY service_name, metric, attr_jvm_gc_name, attr_jvm_gc_action\nORDER BY service_name, total_time DESC\nLIMIT 20\n"
