raw_sql_list_sample:
- "\nSELECT service_name, span_name, attr_status_code, attr_http_response_status_code,\n       COUNT(*) as span_count,\n       AVG(duration) as avg_duration,\n       MAX(duration) as max_duration,\n   \
  \    SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 400 THEN 1 ELSE 0 END) as error_count\nFROM abnormal_traces\nWHERE span_name LIKE '%travelPlan%' OR span_name LIKE '%travelplan%'\
  \ OR service_name LIKE '%travel%'\nGROUP BY service_name, span_name, attr_status_code, attr_http_response_status_code\nORDER BY error_count DESC, span_count DESC\nLIMIT 50\n"
- "\nSELECT service_name, \n       COUNT(*) as total_spans,\n       SUM(CASE WHEN attr_status_code = 'ERROR' THEN 1 ELSE 0 END) as error_spans,\n       SUM(CASE WHEN attr_http_response_status_code >= 400\
  \ THEN 1 ELSE 0 END) as http_error_spans,\n       AVG(duration) as avg_duration_ns,\n       PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration) as p99_duration_ns\nFROM abnormal_traces\nGROUP BY service_name\n\
  ORDER BY error_spans DESC\nLIMIT 30\n"
- "\nSELECT service_name, span_name, attr_status_code, attr_http_response_status_code,\n       COUNT(*) as span_count,\n       AVG(duration) as avg_duration_ns,\n       MAX(duration) as max_duration_ns\n\
  FROM abnormal_traces\nWHERE service_name = 'ts-route-plan-service'\nGROUP BY service_name, span_name, attr_status_code, attr_http_response_status_code\nORDER BY span_count DESC\nLIMIT 30\n"
- "\n-- Find trace IDs with errors in ts-travel-plan-service to understand the call chain\nSELECT DISTINCT trace_id, span_name, attr_http_response_status_code, duration\nFROM abnormal_traces\nWHERE service_name\
  \ = 'ts-travel-plan-service' \n  AND (attr_status_code = 'Error' OR attr_http_response_status_code >= 400)\nLIMIT 20\n"
- "\n-- Look at all spans in a trace with errors to understand the call chain\nSELECT trace_id, span_id, parent_span_id, service_name, span_name, attr_status_code,\n       attr_http_response_status_code,\
  \ duration,\n       time\nFROM abnormal_traces\nWHERE trace_id = 'a5c6ba2cfdbfe3fe44f67448f6b7c101'\nORDER BY time\n"
- "\n-- Check what ts-route-plan-service is calling when it gets 502\nSELECT trace_id, span_id, parent_span_id, service_name, span_name, attr_status_code,\n       attr_http_response_status_code, duration\n\
  FROM abnormal_traces\nWHERE service_name = 'ts-route-plan-service' \n  AND (attr_http_response_status_code >= 400 OR attr_status_code = 'Error')\nORDER BY time\nLIMIT 30\n"
- "\n-- Get all spans in the trace with the failing quickest route to see full call chain\nSELECT span_id, parent_span_id, service_name, span_name, attr_status_code,\n       attr_http_response_status_code,\
  \ duration\nFROM abnormal_traces\nWHERE trace_id = 'a5c6ba2cfdbfe3fe44f67448f6b7c101'\nORDER BY time\n"
- "\n-- Check what spans are children of the GET 502 span in ts-route-plan-service\n-- span_id of the GET 502 in trace a5c6ba2cfdbfe3fe44f67448f6b7c101 is 20c79c34cc0bf3f8\n-- span_id of the GET 502 in\
  \ trace 8ac1bb9bf725a36b64d6c65c491f2674 is a45c08ebd4e4e53c\nSELECT trace_id, span_id, parent_span_id, service_name, span_name, attr_status_code,\n       attr_http_response_status_code, duration\nFROM\
  \ abnormal_traces\nWHERE parent_span_id IN ('20c79c34cc0bf3f8', 'a45c08ebd4e4e53c', '4d8185753b4085c2')\n   OR trace_id IN ('a5c6ba2cfdbfe3fe44f67448f6b7c101', '8ac1bb9bf725a36b64d6c65c491f2674')\nORDER\
  \ BY trace_id, time\nLIMIT 30\n"
- "\n-- Check logs for ts-route-plan-service to understand the 502 errors\nSELECT time, service_name, level, message\nFROM abnormal_logs\nWHERE service_name = 'ts-route-plan-service' \n  AND level IN ('ERROR',\
  \ 'WARN', 'error', 'warn', 'Error', 'Warn')\nORDER BY time\nLIMIT 30\n"
- "\n-- What does ts-route-plan-service GET call normally look like? Check normal traces\nSELECT span_name, attr_http_response_status_code, duration, trace_id\nFROM abnormal_traces\nWHERE service_name =\
  \ 'ts-route-plan-service'\n  AND span_name = 'GET'\n  AND attr_http_response_status_code >= 400\nORDER BY time\nLIMIT 20\n"
- "\n-- Check what ts-route-plan-service calls in normal traces (GET calls)\nSELECT span_name, attr_http_response_status_code, attr_http_request_method, \n       attr_span_kind, parent_span_id, span_id,\
  \ trace_id, duration\nFROM normal_traces\nWHERE service_name = 'ts-route-plan-service'\n  AND span_name LIKE 'GET%'\nLIMIT 10\n"
- '

  -- Check for unusual metrics - compare services for CPU/memory issues

  SELECT service_name, metric, AVG(value) as avg_val, MAX(value) as max_val, COUNT(*) as cnt

  FROM abnormal_metrics

  WHERE metric LIKE ''%cpu%'' OR metric LIKE ''%memory%'' OR metric LIKE ''%error%'' OR metric LIKE ''%restart%''

  GROUP BY service_name, metric

  ORDER BY max_val DESC

  LIMIT 30

  '
- "\n-- Find what service receives the GET requests from ts-route-plan-service in normal traces\n-- Look for the child/server span that corresponds to ts-route-plan-service GET client spans\nSELECT t2.service_name\
  \ as called_service, t2.span_name as called_span, \n       t1.span_id as client_span_id, t2.span_id as server_span_id,\n       t1.trace_id,\n       t2.attr_http_response_status_code\nFROM normal_traces\
  \ t1\nJOIN normal_traces t2 ON t1.trace_id = t2.trace_id AND t1.span_id = t2.parent_span_id\nWHERE t1.service_name = 'ts-route-plan-service' \n  AND t1.span_name = 'GET'\n  AND t1.attr_http_request_method\
  \ = 'GET'\nLIMIT 20\n"
- '

  -- Check if there are any spans from failing traces where parent is the GET 502 span

  SELECT trace_id, span_id, parent_span_id, service_name, span_name, attr_status_code, attr_http_response_status_code, duration

  FROM abnormal_traces

  WHERE parent_span_id IN (''20c79c34cc0bf3f8'', ''a45c08ebd4e4e53c'', ''4d8185753b4085c2'')

  LIMIT 20

  '
- '

  -- Check metrics for ts-route-service - CPU, memory, network, errors

  SELECT metric, AVG(value) as avg_val, MAX(value) as max_val, MIN(value) as min_val, COUNT(*) as cnt

  FROM abnormal_metrics

  WHERE service_name = ''ts-route-service''

  GROUP BY metric

  ORDER BY metric

  '
- "\n-- Check logs for any 502-related errors or service failures\nSELECT time, service_name, level, message\nFROM abnormal_logs\nWHERE message LIKE '%502%' \n   OR message LIKE '%Bad Gateway%'\n   OR message\
  \ LIKE '%route%service%'\n   OR level IN ('ERROR', 'error', 'Error')\nORDER BY time\nLIMIT 20\n"
- "\n-- Compare ts-route-service normal metrics\nSELECT metric, AVG(value) as avg_val, MAX(value) as max_val, MIN(value) as min_val\nFROM normal_metrics\nWHERE service_name = 'ts-route-service'\n  AND metric\
  \ IN ('jvm.system.cpu.load_1m', 'container.cpu.usage', 'queueSize', 'k8s.pod.memory_limit_utilization')\nGROUP BY metric\nORDER BY metric\n"
- "\n-- Check for network error metrics in abnormal sum data\nSELECT service_name, metric, AVG(value) as avg_val, MAX(value) as max_val\nFROM abnormal_metrics_sum\nWHERE metric LIKE '%network%error%' OR\
  \ metric LIKE '%http%error%' OR metric LIKE '%5xx%'\n   OR metric LIKE '%timeout%' OR metric LIKE '%drop%'\nGROUP BY service_name, metric\nORDER BY max_val DESC\nLIMIT 20\n"
- "\n-- Full trace for 9769bcc64ee98b625b173fa2a6e663c9 to understand the error pattern\nSELECT span_id, parent_span_id, service_name, span_name, attr_status_code, \n       attr_http_response_status_code,\
  \ duration\nFROM abnormal_traces\nWHERE trace_id = '9769bcc64ee98b625b173fa2a6e663c9'\nORDER BY time\nLIMIT 20\n"
- "\n-- Check if there are metrics showing failures between ts-route-plan-service and ts-route-service\nSELECT service_name, metric, attr_destination_workload, attr_source_workload, \n       SUM(value)\
  \ as total, AVG(value) as avg_val\nFROM abnormal_metrics_sum\nWHERE (attr_source_workload LIKE '%route-plan%' OR attr_destination_workload LIKE '%route-plan%')\n   OR (attr_source_workload LIKE '%route-service%'\
  \ OR attr_destination_workload LIKE '%route-service%')\nGROUP BY service_name, metric, attr_destination_workload, attr_source_workload\nORDER BY total DESC\nLIMIT 15\n"
