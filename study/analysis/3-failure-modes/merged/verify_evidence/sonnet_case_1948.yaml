raw_sql_list_sample:
- "\nSELECT service_name, span_name, attr_status_code, attr_http_response_status_code,\n       COUNT(*) as count,\n       AVG(duration) as avg_duration_ns,\n       PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER\
  \ BY duration) as p99_duration_ns,\n       SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 500 THEN 1 ELSE 0 END) as error_count\nFROM abnormal_traces\nWHERE span_name LIKE\
  \ '%preserve%' OR span_name LIKE '%Preserve%'\nGROUP BY service_name, span_name, attr_status_code, attr_http_response_status_code\nORDER BY count DESC\n"
- "\nSELECT service_name,\n       COUNT(*) as total_spans,\n       SUM(CASE WHEN attr_status_code = 'ERROR' THEN 1 ELSE 0 END) as error_count,\n       ROUND(100.0 * SUM(CASE WHEN attr_status_code = 'ERROR'\
  \ THEN 1 ELSE 0 END) / COUNT(*), 2) as error_rate_pct,\n       AVG(duration) as avg_duration_ns,\n       PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration) as p99_duration_ns\nFROM abnormal_traces\n\
  GROUP BY service_name\nORDER BY error_count DESC\n"
- '

  SELECT service_name, level, message, time

  FROM abnormal_logs

  WHERE level = ''ERROR'' OR level = ''WARN''

  ORDER BY time

  LIMIT 50

  '
- '

  SELECT service_name, level, COUNT(*) as count

  FROM abnormal_logs

  WHERE level IN (''ERROR'', ''WARN'')

  GROUP BY service_name, level

  ORDER BY count DESC

  '
- "\nSELECT t.trace_id, t.service_name, t.span_name, t.duration, t.attr_status_code, t.attr_http_response_status_code\nFROM abnormal_traces t\nWHERE t.trace_id IN (\n    SELECT trace_id FROM abnormal_traces\
  \ \n    WHERE span_name LIKE '%preserve%' AND attr_status_code = 'Error'\n)\nORDER BY t.trace_id, t.time\nLIMIT 20\n"
- "\nSELECT service_name, message, level, time\nFROM abnormal_logs\nWHERE service_name IN ('ts-food-service', 'ts-preserve-service', 'ts-order-service')\n  AND level = 'ERROR'\nLIMIT 20\n"
- "\nSELECT service_name, span_name, COUNT(*) as count, AVG(duration) as avg_dur, \n       MAX(duration) as max_dur,\n       SUM(CASE WHEN attr_http_response_status_code >= 500 THEN 1 ELSE 0 END) as http5xx_count\n\
  FROM abnormal_traces\nWHERE service_name IN ('ts-preserve-service', 'ts-food-service')\nGROUP BY service_name, span_name\nORDER BY service_name, count DESC\n"
- '

  SELECT service_name, message, level, time

  FROM abnormal_logs

  WHERE service_name = ''ts-ui-dashboard'' AND level = ''ERROR''

  ORDER BY time

  LIMIT 15

  '
- '

  SELECT service_name, message, level, time

  FROM abnormal_logs

  WHERE service_name IN (''ts-delivery-service'', ''ts-notification-service'') AND level = ''ERROR''

  ORDER BY time

  LIMIT 15

  '
- '

  SELECT service_name, message, level, time

  FROM abnormal_logs

  WHERE service_name = ''ts-ui-dashboard'' AND level = ''ERROR''

  ORDER BY time

  LIMIT 7

  '
- '

  SELECT DISTINCT message

  FROM abnormal_logs

  WHERE message LIKE ''%rabbitmq%'' OR message LIKE ''%RabbitMQ%'' OR message LIKE ''%AMQP%'' OR message LIKE ''%amqp%''

  ORDER BY message

  LIMIT 10

  '
- '

  SELECT DISTINCT message

  FROM abnormal_logs

  WHERE service_name = ''ts-preserve-service''

  AND level = ''ERROR''

  ORDER BY message

  LIMIT 10

  '
- '

  SELECT t.service_name, t.metric, AVG(t.value) as avg_val

  FROM abnormal_metrics t

  WHERE t.service_name = ''ts-preserve-service''

  GROUP BY t.service_name, t.metric

  ORDER BY t.metric

  LIMIT 15

  '
- '

  SELECT service_name, level, COUNT(*) as count

  FROM normal_logs

  WHERE level IN (''ERROR'', ''WARN'')

  GROUP BY service_name, level

  ORDER BY count DESC

  LIMIT 15

  '
- '

  SELECT service_name, metric, AVG(value) as avg_val, MAX(value) as max_val

  FROM abnormal_metrics

  WHERE service_name = ''ts-preserve-service''

  AND metric LIKE ''%network%'' OR metric LIKE ''%error%'' OR metric LIKE ''%cpu%''

  GROUP BY service_name, metric

  ORDER BY metric

  LIMIT 15

  '
- "\nSELECT 'abnormal' as period, service_name, \n       COUNT(*) as spans,\n       AVG(duration) as avg_ns,\n       PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration) as p99_ns\nFROM abnormal_traces\n\
  WHERE span_name = 'POST /api/v1/preserveservice/preserve'\nGROUP BY service_name\nUNION ALL\nSELECT 'normal' as period, service_name,\n       COUNT(*) as spans,\n       AVG(duration) as avg_ns,\n    \
  \   PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration) as p99_ns\nFROM normal_traces\nWHERE span_name = 'POST /api/v1/preserveservice/preserve'\nGROUP BY service_name\nORDER BY service_name, period\n"
- '

  SELECT metric, service_name, COUNT(*) as count, AVG(value) as avg_val, MAX(value) as max_val

  FROM abnormal_metrics_sum

  WHERE service_name = ''ts-preserve-service''

  GROUP BY metric, service_name

  ORDER BY metric

  LIMIT 20

  '
- "\nSELECT t2.service_name, t2.span_name, \n       COUNT(*) as count,\n       AVG(t2.duration) as avg_dur,\n       PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY t2.duration) as p99_dur,\n       MAX(t2.duration)\
  \ as max_dur\nFROM abnormal_traces t1\nJOIN abnormal_traces t2 ON t1.trace_id = t2.trace_id\nWHERE t1.service_name = 'ts-preserve-service'\nAND t1.span_name = 'PreserveController.preserve'\nAND t2.service_name\
  \ != 'ts-preserve-service'\nAND t2.service_name != 'ts-ui-dashboard'\nAND t2.service_name != 'loadgenerator'\nGROUP BY t2.service_name, t2.span_name\nORDER BY avg_dur DESC\nLIMIT 25\n"
- "\nSELECT 'abnormal' as period, service_name, span_name,\n       COUNT(*) as count, AVG(duration) as avg_ns,\n       PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration) as p99_ns,\n       MAX(duration)\
  \ as max_ns\nFROM abnormal_traces\nWHERE service_name = 'ts-travel-service'\nAND span_name = 'POST /api/v1/travelservice/trip_detail'\nGROUP BY service_name, span_name\nUNION ALL\nSELECT 'normal' as period,\
  \ service_name, span_name,\n       COUNT(*) as count, AVG(duration) as avg_ns,\n       PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration) as p99_ns,\n       MAX(duration) as max_ns\nFROM normal_traces\n\
  WHERE service_name = 'ts-travel-service'\nAND span_name = 'POST /api/v1/travelservice/trip_detail'\nGROUP BY service_name, span_name\nORDER BY period\n"
- '

  SELECT service_name, metric, AVG(value) as avg_val, MAX(value) as max_val

  FROM abnormal_metrics

  WHERE service_name = ''ts-travel-service''

  GROUP BY service_name, metric

  ORDER BY metric

  LIMIT 15

  '
