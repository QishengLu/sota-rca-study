- "\n-- Compare CPU/memory for ts-travel-service and ts-travel2-service in abnormal vs normal\nSELECT \n    'abnormal' as condition,\n    service_name,\n    metric,\n    AVG(value) as avg_value,\n    MAX(value)\
  \ as max_value\nFROM abnormal_metrics\nWHERE service_name IN ('ts-travel-service', 'ts-travel2-service') \n  AND metric IN ('container.cpu.usage', 'container.memory.usage', 'k8s.pod.memory_limit_utilization',\
  \ 'k8s.pod.cpu_limit_utilization', 'jvm.cpu.recent_utilization')\nGROUP BY service_name, metric\n\nUNION ALL\n\nSELECT \n    'normal' as condition,\n    service_name,\n    metric,\n    AVG(value) as avg_value,\n\
  \    MAX(value) as max_value\nFROM normal_metrics\nWHERE service_name IN ('ts-travel-service', 'ts-travel2-service') \n  AND metric IN ('container.cpu.usage', 'container.memory.usage', 'k8s.pod.memory_limit_utilization',\
  \ 'k8s.pod.cpu_limit_utilization', 'jvm.cpu.recent_utilization')\nGROUP BY service_name, metric\n\nORDER BY service_name, metric, condition\n"
- "\n-- Check deployment availability for travel-service and travel2-service\nSELECT 'abnormal' as condition, service_name, metric, value, time\nFROM abnormal_metrics\nWHERE service_name IN ('ts-travel-service',\
  \ 'ts-travel2-service')\n  AND metric IN ('k8s.deployment.available', 'k8s.deployment.desired', 'queueSize')\nUNION ALL\nSELECT 'normal' as condition, service_name, metric, value, time\nFROM normal_metrics\n\
  WHERE service_name IN ('ts-travel-service', 'ts-travel2-service')\n  AND metric IN ('k8s.deployment.available', 'k8s.deployment.desired', 'queueSize')\nORDER BY service_name, condition, metric, time\n"
- "\n-- Compare hubble HTTP latency for ts-travel-service and ts-travel2-service\nSELECT \n    'abnormal' as condition,\n    service_name,\n    metric,\n    AVG(value) as avg_value,\n    MAX(value) as max_value\n\
  FROM abnormal_metrics\nWHERE service_name IN ('ts-travel-service', 'ts-travel2-service')\n  AND metric LIKE 'hubble%'\nGROUP BY service_name, metric\n\nUNION ALL\n\nSELECT \n    'normal' as condition,\n\
  \    service_name,\n    metric,\n    AVG(value) as avg_value,\n    MAX(value) as max_value\nFROM normal_metrics\nWHERE service_name IN ('ts-travel-service', 'ts-travel2-service')\n  AND metric LIKE 'hubble%'\n\
  GROUP BY service_name, metric\n\nORDER BY service_name, metric, condition\n"
- '

  -- Find all distinct metrics in abnormal_metrics_sum related to network or travel services

  SELECT DISTINCT metric, service_name

  FROM abnormal_metrics_sum

  WHERE service_name IN (''ts-travel-service'', ''ts-travel2-service'', ''ts-route-plan-service'')

