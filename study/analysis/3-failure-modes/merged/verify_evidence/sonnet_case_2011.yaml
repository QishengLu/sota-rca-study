- "\n-- Compare network errors for ts-travel-service and ts-travel2-service\nSELECT DISTINCT metric, service_name\nFROM abnormal_metrics_sum\nWHERE service_name IN ('ts-travel-service', 'ts-travel2-service')\n\
  \  AND (metric LIKE '%network%' OR metric LIKE '%hubble%')\n"
- "\n-- Compare network errors for travel services - abnormal vs normal\nSELECT \n    'abnormal' as condition,\n    service_name,\n    metric,\n    SUM(value) as total_errors,\n    AVG(value) as avg_value,\n\
  \    MAX(value) as max_value\nFROM abnormal_metrics_sum\nWHERE service_name IN ('ts-travel-service', 'ts-travel2-service', 'ts-route-plan-service')\n  AND metric IN ('k8s.pod.network.errors', 'hubble_http_requests_total')\n\
  GROUP BY service_name, metric\n\nUNION ALL\n\nSELECT \n    'normal' as condition,\n    service_name,\n    metric,\n    SUM(value) as total_errors,\n    AVG(value) as avg_value,\n    MAX(value) as max_value\n\
  FROM normal_metrics_sum\nWHERE service_name IN ('ts-travel-service', 'ts-travel2-service', 'ts-route-plan-service')\n  AND metric IN ('k8s.pod.network.errors', 'hubble_http_requests_total')\nGROUP BY\
  \ service_name, metric\n\nORDER BY service_name, metric, condition\n"
- "\n-- Look at JVM GC histogram data for travel-service and travel2-service\nSELECT \n    'abnormal' as condition,\n    service_name,\n    metric,\n    attr_jvm_gc_name,\n    AVG(sum) as avg_gc_duration,\n\
  \    AVG(count) as avg_gc_count,\n    MAX(max) as max_gc_duration\nFROM abnormal_metrics_histogram\nWHERE service_name IN ('ts-travel-service', 'ts-travel2-service')\n  AND metric = 'jvm.gc.duration'\n\
  GROUP BY service_name, metric, attr_jvm_gc_name\n\nUNION ALL\n\nSELECT \n    'normal' as condition,\n    service_name,\n    metric,\n    attr_jvm_gc_name,\n    AVG(sum) as avg_gc_duration,\n    AVG(count)\
  \ as avg_gc_count,\n    MAX(max) as max_gc_duration\nFROM normal_metrics_histogram\nWHERE service_name IN ('ts-travel-service', 'ts-travel2-service')\n  AND metric = 'jvm.gc.duration'\nGROUP BY service_name,\
  \ metric, attr_jvm_gc_name\n\nORDER BY service_name, condition, attr_jvm_gc_name\n"
