raw_sql_list_sample:
- "\nSELECT service_name, span_name, \n       COUNT(*) as total_spans,\n       SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 500 THEN 1 ELSE 0 END) as error_count,\n    \
  \   AVG(duration) as avg_duration_ns,\n       MAX(duration) as max_duration_ns,\n       PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration) as p99_duration_ns\nFROM abnormal_traces\nWHERE service_name\
  \ LIKE '%travel%' OR service_name LIKE '%plan%'\nGROUP BY service_name, span_name\nORDER BY error_count DESC, avg_duration_ns DESC\n"
- "\nSELECT service_name, span_name, \n       COUNT(*) as total_spans,\n       SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 500 THEN 1 ELSE 0 END) as error_count,\n    \
  \   AVG(duration) as avg_duration_ns,\n       MAX(duration) as max_duration_ns\nFROM abnormal_traces\nGROUP BY service_name, span_name\nORDER BY error_count DESC\nLIMIT 30\n"
- "\n-- Get a sample of error trace_ids from travelplanservice minStation\nSELECT trace_id, span_id, parent_span_id, span_name, service_name, duration, attr_status_code, attr_http_response_status_code\n\
  FROM abnormal_traces\nWHERE span_name = 'POST /api/v1/travelplanservice/travelPlan/minStation'\n  AND (attr_status_code = 'ERROR' OR attr_http_response_status_code >= 500)\nORDER BY time\nLIMIT 5\n"
