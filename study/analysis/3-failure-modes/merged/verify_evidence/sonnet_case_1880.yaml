raw_sql_list_sample:
- "\nSELECT \n    service_name,\n    COUNT(*) as total_spans,\n    SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 500 THEN 1 ELSE 0 END) as error_spans,\n    ROUND(100.0 *\
  \ SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 500 THEN 1 ELSE 0 END) / COUNT(*), 2) as error_rate_pct,\n    AVG(duration) as avg_duration_ns,\n    MAX(duration) as max_duration_ns,\n\
  \    PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration) as p99_duration_ns\nFROM abnormal_traces\nGROUP BY service_name\nORDER BY error_rate_pct DESC\n"
- "\nSELECT \n    service_name,\n    level,\n    COUNT(*) as count\nFROM abnormal_logs\nGROUP BY service_name, level\nORDER BY service_name, level\n"
- '

  SELECT time, level, message, attr_k8s_pod_name

  FROM abnormal_logs

  WHERE service_name = ''ts-food-service'' AND level IN (''ERROR'', ''SEVERE'')

  ORDER BY time ASC

  LIMIT 20

  '
- "\nSELECT \n    span_name,\n    attr_http_request_method,\n    attr_http_response_status_code,\n    attr_status_code,\n    duration,\n    time,\n    trace_id,\n    span_id,\n    parent_span_id\nFROM abnormal_traces\n\
  WHERE service_name = 'ts-food-service' \n  AND (attr_status_code = 'ERROR' OR attr_http_response_status_code >= 500)\nORDER BY time ASC\nLIMIT 20\n"
- '

  SELECT time, level, SUBSTRING(message, 1, 200) as msg, attr_k8s_pod_name

  FROM abnormal_logs

  WHERE service_name = ''ts-food-service'' AND level IN (''ERROR'', ''SEVERE'')

  ORDER BY time ASC

  LIMIT 10

  '
- "\n-- Find the parent spans of ts-food-service errors to understand caller chain\nSELECT t.span_name, t.service_name, t.duration, t.attr_status_code, t.attr_http_response_status_code\nFROM abnormal_traces\
  \ t\nWHERE t.span_id IN (\n    SELECT DISTINCT parent_span_id \n    FROM abnormal_traces \n    WHERE service_name = 'ts-food-service' \n      AND attr_status_code = 'Error'\n    LIMIT 5\n)\nLIMIT 10\n"
- "\n-- Look at ts-train-food-service spans in detail\nSELECT \n    span_name,\n    attr_http_request_method,\n    attr_http_response_status_code,\n    attr_status_code,\n    duration,\n    time,\n    span_id,\n\
  \    parent_span_id\nFROM abnormal_traces\nWHERE service_name = 'ts-train-food-service'\nORDER BY duration DESC\nLIMIT 10\n"
- '

  -- Get full message for food service SEVERE logs

  SELECT time, level, message, attr_k8s_pod_name

  FROM abnormal_logs

  WHERE service_name = ''ts-food-service'' AND level = ''SEVERE''

  ORDER BY time ASC

  LIMIT 5

  '
- '

  -- Check ts-route-service logs for abnormalities

  SELECT time, level, SUBSTRING(message, 1, 300) as msg, attr_k8s_pod_name

  FROM abnormal_logs

  WHERE service_name = ''ts-route-service''

  ORDER BY time ASC

  LIMIT 10

  '
- "\n-- Check ts-route-service traces for anomalies\nSELECT \n    span_name,\n    attr_http_response_status_code,\n    attr_status_code,\n    duration,\n    attr_http_response_content_length,\n    time\n\
  FROM abnormal_traces\nWHERE service_name = 'ts-route-service'\nORDER BY duration DESC\nLIMIT 10\n"
- "\n-- Full trace chain for one of the failing food service traces\n-- Trace: 566301b9f24680e09f434d9f7f51071e\nSELECT \n    span_id,\n    parent_span_id,\n    service_name,\n    span_name,\n    attr_http_response_status_code,\n\
  \    attr_status_code,\n    duration,\n    time\nFROM abnormal_traces\nWHERE trace_id = '566301b9f24680e09f434d9f7f51071e'\nORDER BY time ASC\nLIMIT 20\n"
- "\n-- What are all spans called by ts-food-service?\nSELECT \n    span_name,\n    service_name,\n    attr_http_response_status_code,\n    attr_status_code,\n    AVG(duration) as avg_dur,\n    COUNT(*)\
  \ as cnt\nFROM abnormal_traces\nWHERE parent_span_id IN (\n    SELECT span_id FROM abnormal_traces WHERE service_name = 'ts-food-service' AND attr_status_code = 'Error'\n    LIMIT 100\n)\nGROUP BY span_name,\
  \ service_name, attr_http_response_status_code, attr_status_code\nORDER BY cnt DESC\nLIMIT 15\n"
- "\n-- Get all unique span names from ts-food-service outgoing calls (CLIENT spans)\nSELECT \n    span_name,\n    attr_span_kind,\n    attr_http_response_status_code,\n    attr_status_code,\n    COUNT(*)\
  \ as cnt,\n    AVG(duration) as avg_dur\nFROM abnormal_traces\nWHERE service_name = 'ts-food-service'\n  AND attr_span_kind = 'Client'\nGROUP BY span_name, attr_span_kind, attr_http_response_status_code,\
  \ attr_status_code\nORDER BY cnt DESC\nLIMIT 15\n"
- "\n-- Check metrics for resource issues in key services\nSELECT \n    service_name,\n    metric,\n    AVG(value) as avg_val,\n    MAX(value) as max_val,\n    MIN(value) as min_val\nFROM abnormal_metrics\n\
  WHERE metric LIKE '%cpu%' OR metric LIKE '%memory%' OR metric LIKE '%network%'\nGROUP BY service_name, metric\nORDER BY service_name, metric\nLIMIT 15\n"
- "\n-- Check all metrics for ts-route-service\nSELECT \n    metric,\n    AVG(value) as avg_val,\n    MAX(value) as max_val,\n    MIN(value) as min_val,\n    COUNT(*) as cnt\nFROM abnormal_metrics\nWHERE\
  \ service_name = 'ts-route-service' OR attr_k8s_deployment_name = 'ts-route-service'\nGROUP BY metric\nORDER BY metric\nLIMIT 20\n"
- "\n-- Compare ts-food-service error rates: normal vs abnormal\nSELECT \n    t.filename,\n    t.service_name,\n    COUNT(*) as total_spans,\n    SUM(CASE WHEN t.attr_status_code = 'Error' THEN 1 ELSE 0\
  \ END) as error_spans,\n    AVG(t.duration) as avg_duration_ns\nFROM (\n    SELECT *, 'abnormal' as filename FROM abnormal_traces WHERE service_name = 'ts-food-service'\n    UNION ALL\n    SELECT *, 'normal'\
  \ as filename FROM normal_traces WHERE service_name = 'ts-food-service'\n) t\nGROUP BY t.filename, t.service_name\nLIMIT 10\n"
- "\n-- Check all SLO-related endpoints latency in abnormal traces\nSELECT \n    span_name,\n    service_name,\n    COUNT(*) as cnt,\n    AVG(duration) as avg_dur_ns,\n    MAX(duration) as max_dur_ns,\n\
  \    PERCENTILE_CONT(0.95) WITHIN GROUP (ORDER BY duration) as p95_dur_ns,\n    SUM(CASE WHEN attr_status_code = 'Error' OR attr_http_response_status_code >= 500 THEN 1 ELSE 0 END) as errors\nFROM abnormal_traces\n\
  WHERE span_name LIKE '%preserve%' \n   OR span_name LIKE '%food%'\n   OR span_name LIKE '%inside_pay%'\n   OR span_name LIKE '%cancel%'\n   OR span_name LIKE '%consign%'\n   OR span_name LIKE '%train%'\
  \ \n   OR span_name LIKE '%assurance%'\n   AND attr_span_kind = 'Server'\nGROUP BY span_name, service_name\nORDER BY errors DESC, avg_dur_ns DESC\nLIMIT 15\n"
- "\n-- Check network metrics for ts-route-service\nSELECT \n    metric,\n    attr_k8s_pod_name,\n    AVG(value) as avg_val,\n    MAX(value) as max_val\nFROM abnormal_metrics\nWHERE (service_name = 'ts-route-service'\
  \ OR attr_k8s_deployment_name = 'ts-route-service')\n  AND metric LIKE '%network%'\nGROUP BY metric, attr_k8s_pod_name\nORDER BY metric\nLIMIT 10\n"
- "\n-- Find all spans called in context of ts-food-service errors (full call chain)\n-- Look for ts-food-service -> any route-service calls\nSELECT \n    t2.service_name as called_service,\n    t2.span_name\
  \ as called_span,\n    t2.attr_http_response_status_code,\n    t2.attr_status_code,\n    COUNT(*) as cnt\nFROM abnormal_traces t1\nJOIN abnormal_traces t2 ON t1.trace_id = t2.trace_id\nWHERE t1.service_name\
  \ = 'ts-food-service'\n  AND t1.attr_status_code = 'Error'\n  AND t2.service_name NOT IN ('ts-food-service', 'ts-train-food-service', 'ts-travel-service', 'ts-ui-dashboard', 'loadgenerator')\nGROUP BY\
  \ t2.service_name, t2.span_name, t2.attr_http_response_status_code, t2.attr_status_code\nORDER BY cnt DESC\nLIMIT 15\n"
- "\n-- Look for network error metrics in all services\nSELECT \n    service_name,\n    metric,\n    AVG(value) as avg_val,\n    MAX(value) as max_val,\n    COUNT(*) as cnt\nFROM abnormal_metrics\nWHERE\
  \ metric LIKE '%error%' OR metric LIKE '%drop%' OR metric LIKE '%loss%' OR metric LIKE '%fail%'\nGROUP BY service_name, metric\nORDER BY avg_val DESC\nLIMIT 15\n"
