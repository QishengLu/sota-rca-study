- "\nSELECT DISTINCT\n    service_name,\n    span_name\nFROM abnormal_traces\nWHERE service_name = 'ts-route-plan-service' AND span_name NOT LIKE 'RoutePlan%' AND attr_span_kind = 'SPAN_KIND_CLIENT'\nORDER\
