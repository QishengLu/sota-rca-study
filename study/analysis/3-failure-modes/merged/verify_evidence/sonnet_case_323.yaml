  \ DESC\n"
- "\nSELECT \n    service_name,\n    span_name,\n    duration/1e6 as duration_ms,\n    attr_status_code,\n    attr_http_response_status_code,\n    time\nFROM abnormal_traces\nWHERE trace_id = (\n    SELECT\
