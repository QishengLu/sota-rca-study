- "\nSELECT \n    service_name,\n    metric,\n    AVG(value) as avg_value,\n    MAX(value) as max_value,\n    COUNT(*) as sample_count\nFROM abnormal_metrics\nWHERE service_name = 'ts-config-service'\n\
  GROUP BY service_name, metric\nORDER BY metric\n"
- "\nSELECT \n    service_name,\n    metric,\n    AVG(value) as avg_value,\n    MAX(value) as max_value,\n    COUNT(*) as sample_count\nFROM normal_metrics\nWHERE service_name = 'ts-config-service'\nGROUP\
