raw_sql_list_sample:
- "\nSELECT \n    service_name,\n    span_name,\n    COUNT(*) as total_spans,\n    SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 400 THEN 1 ELSE 0 END) as error_count,\n\
  \    AVG(duration)/1e6 as avg_duration_ms,\n    MAX(duration)/1e6 as max_duration_ms,\n    PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration)/1e6 as p99_duration_ms\nFROM abnormal_traces\nWHERE span_name\
  \ LIKE '%travelPlan%' OR span_name LIKE '%travelplan%' OR service_name LIKE '%travelplan%'\nGROUP BY service_name, span_name\nORDER BY error_count DESC, avg_duration_ms DESC\n"
- "\nSELECT \n    service_name,\n    level,\n    COUNT(*) as log_count,\n    MIN(time) as first_time,\n    MAX(time) as last_time\nFROM abnormal_logs\nGROUP BY service_name, level\nORDER BY service_name,\
  \ level\n"
- "\nSELECT \n    service_name,\n    span_name,\n    COUNT(*) as total_spans,\n    AVG(duration)/1e6 as avg_duration_ms,\n    MAX(duration)/1e6 as max_duration_ms,\n    PERCENTILE_CONT(0.99) WITHIN GROUP\
  \ (ORDER BY duration)/1e6 as p99_duration_ms\nFROM normal_traces\nWHERE span_name LIKE '%travelPlan%' OR span_name LIKE '%travelplan%' OR service_name LIKE '%travelplan%' OR service_name LIKE '%travel-plan%'\n\
  GROUP BY service_name, span_name\nORDER BY avg_duration_ms DESC\n"
- "\nSELECT \n    service_name,\n    span_name,\n    COUNT(*) as total_spans,\n    AVG(duration)/1e6 as avg_duration_ms,\n    MAX(duration)/1e6 as max_duration_ms,\n    SUM(CASE WHEN attr_status_code =\
  \ 'ERROR' OR attr_http_response_status_code >= 400 THEN 1 ELSE 0 END) as error_count\nFROM abnormal_traces\nGROUP BY service_name, span_name\nORDER BY avg_duration_ms DESC\n"
- "\nSELECT \n    trace_id,\n    span_id,\n    parent_span_id,\n    span_name,\n    service_name,\n    duration/1e6 as duration_ms,\n    attr_status_code,\n    attr_http_response_status_code,\n    time\n\
  FROM abnormal_traces\nWHERE trace_id IN (\n    SELECT trace_id FROM abnormal_traces \n    WHERE span_name LIKE '%travelPlan/quickest%' \n    ORDER BY duration DESC LIMIT 1\n)\nORDER BY time ASC\n"
- "\nSELECT \n    service_name,\n    span_name,\n    COUNT(*) as total_spans,\n    AVG(duration)/1e6 as avg_duration_ms,\n    MAX(duration)/1e6 as max_duration_ms\nFROM normal_traces\nWHERE service_name\
  \ LIKE '%route-plan%' OR service_name LIKE '%route-service%' OR service_name LIKE '%travel-service%' OR service_name LIKE '%travel2%'\nGROUP BY service_name, span_name\nORDER BY avg_duration_ms DESC\n"
- "\nSELECT \n    span_name,\n    parent_span_id,\n    span_id,\n    service_name,\n    duration/1e6 as duration_ms,\n    attr_status_code,\n    attr_http_response_status_code,\n    time\nFROM abnormal_traces\n\
  WHERE trace_id IN (\n    SELECT trace_id FROM abnormal_traces \n    WHERE span_name LIKE '%travelPlan/quickest%' \n    ORDER BY duration DESC LIMIT 1\n)\nORDER BY time ASC\nLIMIT 25\n"
- "\nSELECT \n    service_name,\n    span_name,\n    COUNT(*) as total_spans,\n    AVG(duration)/1e6 as avg_duration_ms,\n    MAX(duration)/1e6 as max_duration_ms\nFROM abnormal_traces\nWHERE service_name\
