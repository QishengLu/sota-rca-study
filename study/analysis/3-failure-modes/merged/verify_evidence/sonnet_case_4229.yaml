raw_sql_list_sample:
- "\nSELECT service_name, \n       span_name,\n       COUNT(*) as total_spans,\n       SUM(CASE WHEN attr_status_code = 'ERROR' THEN 1 ELSE 0 END) as error_spans,\n       AVG(duration) as avg_duration_ns,\n\
  \       MAX(duration) as max_duration_ns,\n       ROUND(100.0 * SUM(CASE WHEN attr_status_code = 'ERROR' THEN 1 ELSE 0 END) / COUNT(*), 2) as error_rate_pct\nFROM abnormal_traces\nGROUP BY service_name,\
  \ span_name\nORDER BY error_spans DESC\nLIMIT 30\n"
- "\n-- Focus on travelplan related spans and high duration spans\nSELECT service_name, \n       span_name,\n       COUNT(*) as total_spans,\n       AVG(duration)/1e9 as avg_duration_sec,\n       MAX(duration)/1e9\
  \ as max_duration_sec,\n       PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration)/1e9 as p99_duration_sec\nFROM abnormal_traces\nWHERE span_name ILIKE '%travelplan%' OR span_name ILIKE '%travel%plan%'\
  \ OR service_name ILIKE '%travelplan%'\nGROUP BY service_name, span_name\nORDER BY avg_duration_sec DESC\nLIMIT 20\n"
- "\n-- Compare travelplanservice spans normal vs abnormal\nSELECT \n    'abnormal' as period,\n    service_name,\n    span_name,\n    COUNT(*) as total_spans,\n    AVG(duration)/1e6 as avg_duration_ms,\n\
  \    MAX(duration)/1e6 as max_duration_ms,\n    PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration)/1e6 as p99_duration_ms\nFROM abnormal_traces\nWHERE service_name = 'ts-travel-plan-service'\nGROUP\
  \ BY service_name, span_name\n\nUNION ALL\n\nSELECT \n    'normal' as period,\n    service_name,\n    span_name,\n    COUNT(*) as total_spans,\n    AVG(duration)/1e6 as avg_duration_ms,\n    MAX(duration)/1e6\
  \ as max_duration_ms,\n    PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration)/1e6 as p99_duration_ms\nFROM normal_traces\nWHERE service_name = 'ts-travel-plan-service'\nGROUP BY service_name, span_name\n\
  ORDER BY period, avg_duration_ms DESC\n"
- "\n-- Find the call chain from travelplanservice - what services does it call?\n-- First get the trace IDs for the travelPlan/minStation or quickest calls\nWITH travelplan_traces AS (\n  SELECT DISTINCT\
  \ trace_id\n  FROM abnormal_traces\n  WHERE span_name ILIKE '%travelPlan/minStation%' OR span_name ILIKE '%travelPlan/quickest%'\n  AND service_name = 'ts-travel-plan-service'\n)\nSELECT t.service_name,\
  \ t.span_name, t.duration/1e6 as duration_ms, t.attr_status_code,\n       t.attr_http_response_status_code, t.trace_id, t.span_id, t.parent_span_id\nFROM abnormal_traces t\nJOIN travelplan_traces tp ON\
  \ t.trace_id = tp.trace_id\nORDER BY t.trace_id, t.duration DESC\nLIMIT 30\n"
- '

  -- Find the trace_id with the highest duration for minStation

  SELECT trace_id, duration/1e6 as duration_ms

  FROM abnormal_traces

  WHERE span_name ILIKE ''%travelPlan/minStation%'' AND service_name = ''ts-travel-plan-service''

  ORDER BY duration DESC

  LIMIT 5

  '
- "\n-- Analyze the slowest trace\nSELECT service_name, span_name, duration/1e6 as duration_ms, attr_status_code, \n       attr_http_response_status_code, span_id, parent_span_id\nFROM abnormal_traces\n\
  WHERE trace_id = '057cf618d307a922716fe1ac823e3147'\nORDER BY duration DESC\nLIMIT 40\n"
- "\n-- Compare key service latencies between normal and abnormal periods\nSELECT \n    'abnormal' as period,\n    service_name,\n    COUNT(*) as total_spans,\n    AVG(duration)/1e6 as avg_duration_ms,\n\
  \    MAX(duration)/1e6 as max_duration_ms,\n    PERCENTILE_CONT(0.95) WITHIN GROUP (ORDER BY duration)/1e6 as p95_duration_ms\nFROM abnormal_traces\nWHERE service_name IN ('ts-seat-service', 'ts-basic-service',\
  \ 'ts-price-service', \n                        'ts-route-plan-service', 'ts-travel2-service', 'ts-travel-service',\n                        'ts-travel-plan-service', 'ts-config-service')\nGROUP BY service_name\n\
  \nUNION ALL\n\nSELECT \n    'normal' as period,\n    service_name,\n    COUNT(*) as total_spans,\n    AVG(duration)/1e6 as avg_duration_ms,\n    MAX(duration)/1e6 as max_duration_ms,\n    PERCENTILE_CONT(0.95)\
  \ WITHIN GROUP (ORDER BY duration)/1e6 as p95_duration_ms\nFROM normal_traces\nWHERE service_name IN ('ts-seat-service', 'ts-basic-service', 'ts-price-service', \n                        'ts-route-plan-service',\
  \ 'ts-travel2-service', 'ts-travel-service',\n                        'ts-travel-plan-service', 'ts-config-service')\nGROUP BY service_name\nORDER BY service_name, period\n"
- '

  -- Check error/warning logs in abnormal period by service

  SELECT service_name, level, COUNT(*) as count

  FROM abnormal_logs

  WHERE level IN (''ERROR'', ''WARN'', ''WARNING'')

  GROUP BY service_name, level

  ORDER BY count DESC

  LIMIT 20

  '
- "\n-- Check specific log messages for services in the travel plan call chain\nSELECT service_name, level, message, time\nFROM abnormal_logs\nWHERE service_name IN ('ts-travel-plan-service', 'ts-route-plan-service',\
  \ 'ts-travel-service', \n                        'ts-travel2-service', 'ts-basic-service', 'ts-seat-service', 'ts-price-service')\nAND level IN ('ERROR', 'WARN', 'WARNING')\nORDER BY time\nLIMIT 20\n"
- '

  -- Check what metrics are available and look for anomalies by service

  SELECT DISTINCT metric FROM abnormal_metrics

  ORDER BY metric

  LIMIT 30

  '
- "\n-- Compare CPU and memory metrics for key services between normal and abnormal periods\nSELECT \n    'abnormal' as period,\n    service_name,\n    metric,\n    AVG(value) as avg_value,\n    MAX(value)\
  \ as max_value\nFROM abnormal_metrics\nWHERE metric IN ('jvm.cpu.recent_utilization', 'jvm.system.cpu.utilization', 'container.cpu.usage', 'container.memory.usage')\nAND service_name IN ('ts-seat-service',\
  \ 'ts-basic-service', 'ts-price-service', 'ts-route-plan-service', \n                      'ts-travel2-service', 'ts-travel-service', 'ts-travel-plan-service')\nGROUP BY service_name, metric\n\nUNION\
  \ ALL\n\nSELECT \n    'normal' as period,\n    service_name,\n    metric,\n    AVG(value) as avg_value,\n    MAX(value) as max_value\nFROM normal_metrics\nWHERE metric IN ('jvm.cpu.recent_utilization',\
  \ 'jvm.system.cpu.utilization', 'container.cpu.usage', 'container.memory.usage')\nAND service_name IN ('ts-seat-service', 'ts-basic-service', 'ts-price-service', 'ts-route-plan-service', \n          \
  \            'ts-travel2-service', 'ts-travel-service', 'ts-travel-plan-service')\nGROUP BY service_name, metric\nORDER BY service_name, metric, period\n"
- "\n-- Check CPU for remaining services\nSELECT \n    'abnormal' as period,\n    service_name,\n    metric,\n    AVG(value) as avg_value,\n    MAX(value) as max_value\nFROM abnormal_metrics\nWHERE metric\
  \ = 'container.cpu.usage'\nAND service_name IN ('ts-seat-service', 'ts-travel2-service', 'ts-travel-service', 'ts-travel-plan-service',\n                      'ts-config-service')\nGROUP BY service_name,\
  \ metric\n\nUNION ALL\n\nSELECT \n    'normal' as period,\n    service_name,\n    metric,\n    AVG(value) as avg_value,\n    MAX(value) as max_value\nFROM normal_metrics\nWHERE metric = 'container.cpu.usage'\n\
  AND service_name IN ('ts-seat-service', 'ts-travel2-service', 'ts-travel-service', 'ts-travel-plan-service',\n                      'ts-config-service')\nGROUP BY service_name, metric\nORDER BY service_name,\
  \ period\n"
- "\n-- Check GC metrics in abnormal vs normal\nSELECT \n    'abnormal' as period,\n    service_name,\n    metric,\n    attr_jvm_gc_name,\n    attr_jvm_gc_action,\n    COUNT(*) as sample_count,\n    AVG(sum/count)\
  \ as avg_gc_duration_ms,\n    MAX(max) as max_gc_duration_ms,\n    SUM(count) as total_gc_events\nFROM abnormal_metrics_histogram\nWHERE metric ILIKE '%gc%' OR metric ILIKE '%jvm%'\nGROUP BY service_name,\
  \ metric, attr_jvm_gc_name, attr_jvm_gc_action\n\nUNION ALL\n\nSELECT \n    'normal' as period,\n    service_name,\n    metric,\n    attr_jvm_gc_name,\n    attr_jvm_gc_action,\n    COUNT(*) as sample_count,\n\
  \    AVG(sum/count) as avg_gc_duration_ms,\n    MAX(max) as max_gc_duration_ms,\n    SUM(count) as total_gc_events\nFROM normal_metrics_histogram\nWHERE metric ILIKE '%gc%' OR metric ILIKE '%jvm%'\nGROUP\
  \ BY service_name, metric, attr_jvm_gc_name, attr_jvm_gc_action\nORDER BY service_name, period, metric\nLIMIT 30\n"
- '

  -- Check what network/HTTP metrics are available in metrics_sum

  SELECT DISTINCT metric FROM abnormal_metrics_sum

  WHERE metric ILIKE ''%http%'' OR metric ILIKE ''%request%'' OR metric ILIKE ''%error%'' OR metric ILIKE ''%network%''

  ORDER BY metric

  LIMIT 20

  '
- "\n-- Check HTTP requests total by service - compare normal vs abnormal\nSELECT \n    'abnormal' as period,\n    service_name,\n    attr_destination_workload,\n    attr_source_workload,\n    SUM(value)\
  \ as total_requests\nFROM abnormal_metrics_sum\nWHERE metric = 'hubble_http_requests_total'\nGROUP BY service_name, attr_destination_workload, attr_source_workload\n\nUNION ALL\n\nSELECT \n    'normal'\
  \ as period,\n    service_name,\n    attr_destination_workload,\n    attr_source_workload,\n    SUM(value) as total_requests\nFROM normal_metrics_sum\nWHERE metric = 'hubble_http_requests_total'\nGROUP\
  \ BY service_name, attr_destination_workload, attr_source_workload\nORDER BY total_requests DESC\nLIMIT 30\n"
- "\n-- Check hubble HTTP duration metrics to see which service has high latency\nSELECT \n    'abnormal' as period,\n    service_name,\n    metric,\n    attr_destination_workload,\n    AVG(value) as avg_value,\n\
  \    MAX(value) as max_value\nFROM abnormal_metrics\nWHERE metric ILIKE '%hubble%http%duration%'\nGROUP BY service_name, metric, attr_destination_workload\nORDER BY avg_value DESC\n\nUNION ALL\n\nSELECT\
  \ \n    'normal' as period,\n    service_name,\n    metric,\n    attr_destination_workload,\n    AVG(value) as avg_value,\n    MAX(value) as max_value\nFROM normal_metrics\nWHERE metric ILIKE '%hubble%http%duration%'\n\
  GROUP BY service_name, metric, attr_destination_workload\nORDER BY avg_value DESC\nLIMIT 30\n"
- "\n-- Check hubble HTTP duration metrics - abnormal and normal together\nSELECT \n    'abnormal' as period,\n    service_name,\n    metric,\n    attr_destination_workload,\n    AVG(value) as avg_value,\n\
  \    MAX(value) as max_value\nFROM abnormal_metrics\nWHERE metric ILIKE '%hubble%http%duration%'\nGROUP BY service_name, metric, attr_destination_workload\nORDER BY avg_value DESC\nLIMIT 30\n"
- "\n-- Analyze the second slowest trace (1605ms)\nSELECT service_name, span_name, duration/1e6 as duration_ms, attr_status_code, \n       attr_http_response_status_code, span_id, parent_span_id\nFROM abnormal_traces\n\
  WHERE trace_id = 'd01a7c3cb6c4400f060b5696e1fe1e87'\nORDER BY duration DESC\nLIMIT 30\n"
- "\n-- Check k8s container restarts and pod network errors\nSELECT \n    'abnormal' as period,\n    service_name,\n    metric,\n    attr_k8s_pod_name,\n    MAX(value) as max_value,\n    AVG(value) as avg_value\n\
  FROM abnormal_metrics\nWHERE metric IN ('k8s.container.restarts', 'k8s.pod.network.errors')\nGROUP BY service_name, metric, attr_k8s_pod_name\nORDER BY max_value DESC\nLIMIT 20\n"
- "\n-- Check node-level CPU usage and which nodes have the most pods\nSELECT \n    'abnormal' as period,\n    attr_k8s_node_name,\n    metric,\n    AVG(value) as avg_value,\n    MAX(value) as max_value,\n\
  \    COUNT(DISTINCT attr_k8s_pod_name) as pod_count\nFROM abnormal_metrics\nWHERE metric = 'k8s.pod.cpu.usage'\nGROUP BY attr_k8s_node_name, metric\nORDER BY avg_value DESC\nLIMIT 20\n"
