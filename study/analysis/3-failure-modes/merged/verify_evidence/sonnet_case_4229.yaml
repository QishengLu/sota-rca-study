    \ CPU** across all Kubernetes pods, starting at `2025-08-08T16:46:39 UTC`. CPU usage increased **10–30×** compared to the normal period, from <0.1 cores per pod to 2–3+ cores per pod.\n\n### Key Evidence\n\
    \n| Service | Normal CPU (avg) | Abnormal CPU (avg) | Ratio |\n|---------|------------------|--------------------|-------|\n| ts-seat-service pod | 0.31 cores | 2.43 cores | 7.8× |\n| ts-travel2-service\
    \ pod | 0.16 cores | 3.05 cores | 19× |\n| ts-route-plan-service | 0.047 cores | 1.41 cores | 30× |\n| ts-travel-plan-service | 0.097 cores | 1.57 cores | 16× |\n\n**Trace Analysis (slowest trace —\
    \ 5,013 ms)**:\n```\nloadgenerator (5021ms)\n  → ts-ui-dashboard (5019ms)\n    → ts-travel-plan-service (5013ms)\n      → ts-route-plan-service (3802ms)\n        → ts-travel2-service (2862ms)\n    \
    \      → ts-seat-service (777ms) ← DEEPEST BOTTLENECK\n            → ts-order-other-service (21ms) — fast\n            → (CPU-intensive seat calc: ~575ms CPU-bound)\n```\n\n`ts-seat-service` performs\
    \ CPU-intensive seat availability calculations (checking booked tickets + computing availability). With HIGH CPU pressure, these calculations spike from ~18ms (normal) to 777ms–1326ms.\n\n### Fault\
    \ Propagation\n\n1. **ts-seat-service** → HIGH CPU → HIGH_LATENCY in seat calculations\n2. **ts-travel2-service** → waits for ts-seat-service + own HIGH_CPU → HIGH_LATENCY\n3. **ts-travel-service**\
    \ → own HIGH_CPU → HIGH_LATENCY\n4. **ts-route-plan-service** → waits for multiple concurrent ts-travel2-service + ts-travel-service calls → HIGH_LATENCY\n5. **ts-travel-plan-service** → waits for ts-route-plan-service\
    \ → HIGH_LATENCY → **SLO VIOLATION**\n6. **ts-ui-dashboard** → propagated HIGH_LATENCY to external callers\n\n---\n\n```json\n{\n  \"nodes\": [\n    {\n      \"component\": \"ts-seat-service\",\n  \
    \    \"state\": [\"HIGH_CPU\", \"HIGH_LATENCY\"],\n      \"timestam"
