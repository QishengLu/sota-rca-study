raw_sql_list_sample:
- "\nSELECT \n    service_name,\n    COUNT(*) as total_spans,\n    SUM(CASE WHEN attr_status_code = 'ERROR' THEN 1 ELSE 0 END) as error_spans,\n    ROUND(AVG(duration)/1e6, 2) as avg_duration_ms,\n    ROUND(MAX(duration)/1e6,\
  \ 2) as max_duration_ms,\n    SUM(CASE WHEN attr_http_response_status_code >= 500 THEN 1 ELSE 0 END) as http_5xx,\n    SUM(CASE WHEN attr_http_response_status_code >= 400 AND attr_http_response_status_code\
  \ < 500 THEN 1 ELSE 0 END) as http_4xx\nFROM abnormal_traces\nGROUP BY service_name\nORDER BY error_spans DESC\n"
- "\nSELECT \n    service_name,\n    level,\n    COUNT(*) as log_count\nFROM abnormal_logs\nGROUP BY service_name, level\nORDER BY service_name, level\n"
- "\nSELECT \n    service_name,\n    level,\n    COUNT(*) as log_count\nFROM abnormal_logs\nGROUP BY service_name, level\nORDER BY service_name, level\n"
- "\nSELECT \n    time,\n    service_name,\n    level,\n    message\nFROM abnormal_logs\nWHERE level IN ('ERROR', 'SEVERE', 'FATAL')\nORDER BY time\n"
- "\nSELECT \n    service_name,\n    COUNT(*) as total_spans,\n    ROUND(AVG(duration)/1e6, 2) as avg_duration_ms,\n    ROUND(MAX(duration)/1e6, 2) as max_duration_ms,\n    SUM(CASE WHEN attr_http_response_status_code\
  \ >= 500 THEN 1 ELSE 0 END) as http_5xx\nFROM normal_traces\nGROUP BY service_name\nORDER BY avg_duration_ms DESC\n"
- '

  SELECT span_name, service_name, attr_status_code, attr_http_response_status_code, duration/1e6 as duration_ms

  FROM abnormal_traces

  WHERE service_name IN (''ts-travel-plan-service'', ''ts-route-plan-service'', ''ts-cancel-service'')

  ORDER BY service_name, duration DESC

  '
- '

  SELECT DISTINCT metric

  FROM abnormal_metrics

  ORDER BY metric

  '
- "\nSELECT \n    attr_k8s_pod_name,\n    service_name,\n    metric,\n    AVG(value) as avg_value,\n    MAX(value) as max_value\nFROM abnormal_metrics\nWHERE metric IN ('k8s.pod.phase', 'k8s.container.restarts',\
  \ 'k8s.deployment.available', 'k8s.replicaset.available')\nGROUP BY attr_k8s_pod_name, service_name, metric\nORDER BY metric, avg_value\n"
- "\nSELECT \n    attr_k8s_pod_name,\n    service_name,\n    metric,\n    AVG(value) as avg_value,\n    MAX(value) as max_value\nFROM abnormal_metrics\nWHERE metric IN ('k8s.pod.phase', 'k8s.container.restarts',\
  \ 'k8s.deployment.available', 'k8s.replicaset.available')\nAND (\n    attr_k8s_pod_name LIKE '%cancel%' \n    OR service_name LIKE '%cancel%'\n    OR attr_k8s_pod_name LIKE '%route-plan%'\n    OR service_name\
  \ LIKE '%route-plan%'\n)\nGROUP BY attr_k8s_pod_name, service_name, metric\n"
- "\nSELECT \n    attr_k8s_pod_name,\n    service_name,\n    metric,\n    AVG(value) as avg_value,\n    MAX(value) as max_value\nFROM abnormal_metrics\nWHERE metric IN ('container.cpu.usage', 'container.memory.usage')\n\
  AND (attr_k8s_pod_name LIKE '%cancel%' OR attr_k8s_pod_name LIKE '%route-plan%')\nGROUP BY attr_k8s_pod_name, service_name, metric\n"
- "\nSELECT \n    service_name,\n    attr_destination_workload,\n    attr_source_workload,\n    metric,\n    AVG(value) as avg_value,\n    MAX(value) as max_value\nFROM abnormal_metrics\nWHERE metric LIKE\
  \ 'hubble%'\nGROUP BY service_name, attr_destination_workload, attr_source_workload, metric\nORDER BY avg_value DESC\n"
- "\nSELECT \n    service_name,\n    metric,\n    AVG(value) as avg_value,\n    MAX(value) as max_value\nFROM abnormal_metrics_sum\nWHERE metric LIKE 'hubble%' OR metric LIKE 'http%' OR metric LIKE 'jvm%'\n\
  GROUP BY service_name, metric\nORDER BY avg_value DESC\n"
- '

  SELECT DISTINCT metric FROM abnormal_metrics_sum ORDER BY metric

  '
- "\nSELECT \n    service_name,\n    attr_source_workload,\n    attr_destination_workload,\n    metric,\n    SUM(value) as total_value\nFROM abnormal_metrics_sum\nWHERE metric = 'hubble_drop_total'\nGROUP\
  \ BY service_name, attr_source_workload, attr_destination_workload, metric\nORDER BY total_value DESC\n"
- "\nSELECT \n    service_name,\n    metric,\n    AVG(value) as avg_value,\n    MAX(value) as max_value\nFROM abnormal_metrics_sum\nWHERE metric IN ('k8s.pod.network.errors')\nGROUP BY service_name, metric\n\
  ORDER BY avg_value DESC\n"
- "\nSELECT \n    'abnormal' as period,\n    service_name,\n    metric,\n    AVG(value) as avg_value,\n    MAX(value) as max_value\nFROM abnormal_metrics_sum\nWHERE metric IN ('jvm.thread.count', 'jvm.memory.used',\
  \ 'jvm.cpu.time')\nAND service_name IN ('ts-route-plan-service', 'ts-seat-service', 'ts-travel-service', 'ts-cancel-service', 'ts-travel-plan-service')\nGROUP BY service_name, metric\nUNION ALL\nSELECT\
  \ \n    'normal' as period,\n    service_name,\n    metric,\n    AVG(value) as avg_value,\n    MAX(value) as max_value\nFROM normal_metrics_sum\nWHERE metric IN ('jvm.thread.count', 'jvm.memory.used',\
  \ 'jvm.cpu.time')\nAND service_name IN ('ts-route-plan-service', 'ts-seat-service', 'ts-travel-service', 'ts-cancel-service', 'ts-travel-plan-service')\nGROUP BY service_name, metric\nORDER BY service_name,\
  \ metric, period\n"
- "\nSELECT \n    'abnormal' as period,\n    attr_k8s_pod_name,\n    metric,\n    AVG(value) as avg_value,\n    MAX(value) as max_value\nFROM abnormal_metrics\nWHERE metric IN ('container.cpu.usage', 'container.memory.usage',\
  \ 'jvm.cpu.recent_utilization', 'jvm.system.cpu.utilization')\nAND (attr_k8s_pod_name LIKE '%route-plan%' OR attr_k8s_pod_name LIKE '%seat%' OR attr_k8s_pod_name LIKE '%cancel%')\nGROUP BY attr_k8s_pod_name,\
  \ metric\nUNION ALL\nSELECT \n    'normal' as period,\n    attr_k8s_pod_name,\n    metric,\n    AVG(value) as avg_value,\n    MAX(value) as max_value\nFROM normal_metrics\nWHERE metric IN ('container.cpu.usage',\
  \ 'container.memory.usage', 'jvm.cpu.recent_utilization', 'jvm.system.cpu.utilization')\nAND (attr_k8s_pod_name LIKE '%route-plan%' OR attr_k8s_pod_name LIKE '%seat%' OR attr_k8s_pod_name LIKE '%cancel%')\n\
  GROUP BY attr_k8s_pod_name, metric\nORDER BY attr_k8s_pod_name, metric, period\n"
- "\nSELECT \n    attr_k8s_pod_name,\n    attr_k8s_node_name,\n    metric,\n    AVG(value) as avg_value\nFROM abnormal_metrics\nWHERE metric = 'jvm.system.cpu.utilization'\nGROUP BY attr_k8s_pod_name, attr_k8s_node_name,\
  \ metric\nORDER BY avg_value DESC\n"
- "\nSELECT \n    attr_k8s_pod_name,\n    attr_k8s_node_name,\n    metric,\n    AVG(value) as avg_value\nFROM abnormal_metrics\nWHERE attr_k8s_pod_name LIKE '%cancel%' OR attr_k8s_pod_name LIKE '%station-food%'\n\
  GROUP BY attr_k8s_pod_name, attr_k8s_node_name, metric\nORDER BY attr_k8s_pod_name, metric\n"
- "\nSELECT \n    attr_k8s_node_name,\n    AVG(value) as avg_system_cpu\nFROM normal_metrics\nWHERE metric = 'jvm.system.cpu.utilization'\nGROUP BY attr_k8s_node_name\nORDER BY avg_system_cpu DESC\n"
