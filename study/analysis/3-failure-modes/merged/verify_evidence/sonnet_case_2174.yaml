raw_sql_list_sample:
- "\nSELECT \n  service_name,\n  span_name,\n  COUNT(*) as total_spans,\n  SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 400 THEN 1 ELSE 0 END) as error_count,\n  AVG(duration)\
  \ as avg_duration_ns,\n  MAX(duration) as max_duration_ns,\n  ROUND(SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 400 THEN 1 ELSE 0 END) * 100.0 / COUNT(*), 2) as error_rate_pct\n\
  FROM abnormal_traces\nWHERE span_name LIKE '%travelPlan%' OR span_name LIKE '%travelplan%' OR service_name LIKE '%travelplan%' OR service_name LIKE '%travel-plan%'\nGROUP BY service_name, span_name\n\
  ORDER BY error_count DESC\n"
- "\nSELECT \n  service_name,\n  span_name,\n  COUNT(*) as total_spans,\n  SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 400 THEN 1 ELSE 0 END) as error_count,\n  AVG(duration)\
  \ as avg_duration_ns,\n  ROUND(SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 400 THEN 1 ELSE 0 END) * 100.0 / COUNT(*), 2) as error_rate_pct\nFROM abnormal_traces\nGROUP\
  \ BY service_name, span_name\nORDER BY error_count DESC\nLIMIT 30\n"
- "\n-- What HTTP status codes are returned by ts-travel-plan-service\nSELECT \n  span_name,\n  attr_http_response_status_code,\n  attr_status_code,\n  COUNT(*) as count,\n  AVG(duration) as avg_duration_ns\n\
  FROM abnormal_traces\nWHERE service_name = 'ts-travel-plan-service'\nGROUP BY span_name, attr_http_response_status_code, attr_status_code\nORDER BY count DESC\nLIMIT 30\n"
- "\n-- What downstream calls does ts-travel-plan-service make to other services?\n-- Find all spans within traces that include travelplanservice\nSELECT \n  service_name,\n  span_name,\n  COUNT(*) as count,\n\
  \  AVG(duration) as avg_duration_ns,\n  SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 400 THEN 1 ELSE 0 END) as error_count\nFROM abnormal_traces\nWHERE trace_id IN (\n\
  \  SELECT DISTINCT trace_id \n  FROM abnormal_traces \n  WHERE service_name = 'ts-travel-plan-service' \n    AND (span_name LIKE '%travelPlan%' OR span_name LIKE '%ByCheapest%' OR span_name LIKE '%ByQuickest%'\
  \ OR span_name LIKE '%ByMinStation%')\n)\nAND service_name != 'ts-travel-plan-service'\nAND service_name != 'ts-ui-dashboard'\nAND service_name != 'loadgenerator'\nGROUP BY service_name, span_name\nORDER\
  \ BY count DESC\nLIMIT 30\n"
- "\nSELECT \n  time,\n  level,\n  service_name,\n  message\nFROM abnormal_logs\nWHERE service_name = 'ts-travel-plan-service'\n  AND level IN ('ERROR', 'WARN')\nORDER BY time\nLIMIT 30\n"
- "\nSELECT \n  DISTINCT service_name,\n  level,\n  COUNT(*) as count\nFROM abnormal_logs\nGROUP BY service_name, level\nORDER BY service_name, level\nLIMIT 50\n"
- "\nSELECT \n  time,\n  level,\n  service_name,\n  message\nFROM abnormal_logs\nWHERE service_name = 'ts-travel-plan-service'\n  AND level = 'SEVERE'\nORDER BY time\nLIMIT 20\n"
- "\n-- Check what ts-travel-plan-service's INFO messages say - they might give more context\nSELECT \n  time,\n  level,\n  service_name,\n  message\nFROM abnormal_logs\nWHERE service_name = 'ts-travel-plan-service'\n\
  \  AND level = 'INFO'\nORDER BY time\nLIMIT 20\n"
- "\n-- Find child spans of ts-travel-plan-service controller spans\n-- Get spans called directly by travelplanservice controller\nSELECT \n  child.service_name,\n  child.span_name,\n  child.attr_http_response_status_code,\n\
  \  child.attr_status_code,\n  COUNT(*) as count,\n  AVG(child.duration) as avg_duration_ns\nFROM abnormal_traces parent\nJOIN abnormal_traces child ON parent.span_id = child.parent_span_id\nWHERE parent.service_name\
  \ = 'ts-travel-plan-service'\n  AND parent.span_name IN ('TravelPlanController.getByCheapest', 'TravelPlanController.getByQuickest', 'TravelPlanController.getByMinStation')\nGROUP BY child.service_name,\
  \ child.span_name, child.attr_http_response_status_code, child.attr_status_code\nORDER BY count DESC\nLIMIT 30\n"
- "\n-- Let's look at the full chain: what does the \"POST\" span from travel-plan-service call?\nSELECT \n  child.service_name,\n  child.span_name,\n  child.attr_http_response_status_code,\n  child.attr_status_code,\n\
  \  COUNT(*) as count,\n  AVG(child.duration) as avg_duration_ns\nFROM abnormal_traces parent\nJOIN abnormal_traces child ON parent.span_id = child.parent_span_id\nWHERE parent.service_name = 'ts-travel-plan-service'\n\
  \  AND parent.span_name = 'POST'\nGROUP BY child.service_name, child.span_name, child.attr_http_response_status_code, child.attr_status_code\nORDER BY count DESC\nLIMIT 30\n"
- "\nSELECT \n  time,\n  level,\n  service_name,\n  message\nFROM abnormal_logs\nWHERE service_name = 'ts-route-plan-service'\nORDER BY time\nLIMIT 30\n"
- "\n-- Find what ts-route-plan-service calls and its response patterns\nSELECT \n  child.service_name,\n  child.span_name,\n  child.attr_http_response_status_code,\n  child.attr_status_code,\n  COUNT(*)\
  \ as count,\n  AVG(child.duration) as avg_duration_ns\nFROM abnormal_traces parent\nJOIN abnormal_traces child ON parent.span_id = child.parent_span_id\nWHERE parent.service_name = 'ts-route-plan-service'\n\
  GROUP BY child.service_name, child.span_name, child.attr_http_response_status_code, child.attr_status_code\nORDER BY count DESC\nLIMIT 30\n"
- "\n-- Compare with normal traces - what do these endpoints look like normally?\nSELECT \n  service_name,\n  span_name,\n  COUNT(*) as total_spans,\n  SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code\
  \ >= 400 THEN 1 ELSE 0 END) as error_count,\n  AVG(duration) as avg_duration_ns\nFROM normal_traces\nWHERE span_name LIKE '%travelPlan%' OR service_name LIKE '%travel-plan%' OR service_name = 'ts-travel-plan-service'\n\
  GROUP BY service_name, span_name\nORDER BY total_spans DESC\nLIMIT 20\n"
- "\n-- Check what ts-basic-service logs show (it has 9326 INFO logs which is very high)\nSELECT \n  time,\n  level,\n  service_name,\n  message\nFROM abnormal_logs\nWHERE service_name = 'ts-basic-service'\n\
  ORDER BY time\nLIMIT 20\n"
- "\n-- Check route-plan-service logs for any errors or null results\nSELECT \n  message,\n  COUNT(*) as count\nFROM abnormal_logs\nWHERE service_name = 'ts-route-plan-service'\nGROUP BY message\nORDER\
  \ BY count DESC\nLIMIT 20\n"
- "\n-- Check price-service logs\nSELECT \n  time,\n  level,\n  service_name,\n  message\nFROM abnormal_logs\nWHERE service_name = 'ts-price-service'\nORDER BY time\nLIMIT 15\n"
- "\n-- Check metrics for ts-travel-plan-service\nSELECT \n  metric,\n  AVG(value) as avg_value,\n  MAX(value) as max_value,\n  COUNT(*) as count\nFROM abnormal_metrics\nWHERE service_name = 'ts-travel-plan-service'\
  \ OR attr_k8s_deployment_name LIKE '%travel-plan%'\nGROUP BY metric\nORDER BY metric\nLIMIT 30\n"
- "\n-- Check normal metrics for comparison\nSELECT \n  metric,\n  AVG(value) as avg_value,\n  MAX(value) as max_value,\n  COUNT(*) as count\nFROM normal_metrics\nWHERE service_name = 'ts-travel-plan-service'\
  \ OR attr_k8s_deployment_name LIKE '%travel-plan%'\nGROUP BY metric\nORDER BY metric\nLIMIT 30\n"
- "\n-- Find services with highest system CPU load anomalies (comparing tables)\nSELECT \n  service_name,\n  metric,\n  AVG(value) as avg_value,\n  MAX(value) as max_value\nFROM abnormal_metrics\nWHERE\
  \ metric = 'jvm.system.cpu.load_1m'\nGROUP BY service_name, metric\nORDER BY avg_value DESC\nLIMIT 20\n"
- "\n-- Compare metrics for ts-route-plan-service in abnormal\nSELECT \n  metric,\n  AVG(value) as avg_value,\n  MAX(value) as max_value,\n  COUNT(*) as count\nFROM abnormal_metrics\nWHERE service_name\
  \ = 'ts-route-plan-service' OR attr_k8s_deployment_name LIKE '%route-plan%'\nGROUP BY metric\nORDER BY metric\nLIMIT 20\n"
