raw_sql_list_sample:
- "\nSELECT \n    service_name,\n    COUNT(*) as total_spans,\n    SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 400 THEN 1 ELSE 0 END) as error_spans,\n    ROUND(100.0 *\
  \ SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 400 THEN 1 ELSE 0 END) / COUNT(*), 2) as error_rate_pct,\n    ROUND(AVG(duration)/1e6, 2) as avg_duration_ms,\n    ROUND(MAX(duration)/1e6,\
  \ 2) as max_duration_ms\nFROM abnormal_traces\nGROUP BY service_name\nORDER BY error_rate_pct DESC\n"
- "\n-- Look at the cancel service specifically, which is mentioned in the incident\nSELECT \n    service_name,\n    span_name,\n    COUNT(*) as total_spans,\n    SUM(CASE WHEN attr_status_code = 'ERROR'\
  \ OR attr_http_response_status_code >= 400 THEN 1 ELSE 0 END) as error_spans,\n    ROUND(AVG(duration)/1e6, 2) as avg_duration_ms,\n    ROUND(MAX(duration)/1e6, 2) as max_duration_ms\nFROM abnormal_traces\n\
  WHERE service_name LIKE '%cancel%' \n   OR service_name LIKE '%travel%'\n   OR span_name LIKE '%cancel%'\n   OR span_name LIKE '%refound%'\nGROUP BY service_name, span_name\nORDER BY error_spans DESC\n\
  LIMIT 30\n"
- "\n-- Check what's happening with ts-travel-service trips/left - 100% error rate\n-- Look at a sample of those failing spans\nSELECT \n    trace_id,\n    span_id,\n    parent_span_id,\n    span_name,\n\
  \    service_name,\n    duration/1e6 as duration_ms,\n    attr_status_code,\n    attr_http_response_status_code,\n    attr_http_request_method,\n    time\nFROM abnormal_traces\nWHERE span_name = 'POST\
  \ /api/v1/travelservice/trips/left'\n   AND (attr_status_code = 'ERROR' OR attr_http_response_status_code >= 400)\nORDER BY time ASC\nLIMIT 10\n"
- '

  -- Find all distinct services in abnormal traces, including cancel service

  SELECT DISTINCT service_name FROM abnormal_traces ORDER BY service_name

  '
- "\n-- Find what spans exist in the trace chain of a failing trips/left call\n-- Take a specific trace_id and find all spans in it\nSELECT \n    t2.trace_id, t2.span_id, t2.parent_span_id, t2.span_name,\
  \ t2.service_name,\n    t2.duration/1e6 as duration_ms, t2.attr_status_code, t2.attr_http_response_status_code, t2.time\nFROM abnormal_traces t2\nWHERE t2.trace_id = '836de4457c8392fb05d66cb7aff3178b'\n\
  ORDER BY t2.time ASC\n"
- "\n-- Find what ts-travel-service is calling internally when queryInfo fails\n-- The span 0b0fad5ea481310e was the error POST span. Let's find its children\nSELECT \n    trace_id, span_id, parent_span_id,\
  \ span_name, service_name,\n    duration/1e6 as duration_ms, attr_status_code, attr_http_response_status_code, time\nFROM abnormal_traces\nWHERE parent_span_id = '0b0fad5ea481310e'\nORDER BY time ASC\n"
- "\n-- Check for error logs in travel service and cancel service\nSELECT \n    time, service_name, level, message\nFROM abnormal_logs\nWHERE level IN ('ERROR', 'WARN')\n  AND service_name LIKE '%travel%'\
  \ OR service_name LIKE '%cancel%'\nORDER BY time ASC\nLIMIT 20\n"
- "\n-- Check for error logs in any service\nSELECT \n    time, service_name, level, message\nFROM abnormal_logs\nWHERE level IN ('ERROR', 'WARN')\nORDER BY time ASC\nLIMIT 20\n"
- "\n-- Look at all span_names in ts-travel-service to see what it calls when handling queryInfo\nSELECT DISTINCT span_name, attr_status_code, \n    COUNT(*) as count,\n    SUM(CASE WHEN attr_status_code\
  \ = 'ERROR' THEN 1 ELSE 0 END) as errors\nFROM abnormal_traces\nWHERE service_name = 'ts-travel-service'\nGROUP BY span_name, attr_status_code\nORDER BY errors DESC\nLIMIT 30\n"
- "\n-- Check error logs for travel service specifically\nSELECT \n    time, service_name, level, message\nFROM abnormal_logs\nWHERE service_name = 'ts-travel-service'\n  AND level IN ('ERROR', 'WARN')\n\
  ORDER BY time ASC\nLIMIT 20\n"
- "\n-- What does TravelController.queryInfo call when it fails?\n-- Look at child spans of TravelController.queryInfo in an error trace\nSELECT \n    t.trace_id, t.span_id, t.parent_span_id, t.span_name,\
  \ t.service_name,\n    t.duration/1e6 as duration_ms, t.attr_status_code, t.attr_http_response_status_code, t.time\nFROM abnormal_traces t\nWHERE t.trace_id IN (\n    SELECT DISTINCT trace_id FROM abnormal_traces\
  \ \n    WHERE span_name = 'TravelController.queryInfo' AND attr_status_code = 'Error'\n    LIMIT 3\n)\nORDER BY t.time ASC\nLIMIT 50\n"
- "\n-- Find what ts-travel-service calls when handling trips/left in normal operation\n-- Look at a successful trips/left trace\nSELECT \n    span_id, parent_span_id, span_name, service_name,\n    duration/1e6\
  \ as duration_ms, attr_status_code, attr_http_response_status_code\nFROM normal_traces\nWHERE trace_id IN (\n    SELECT trace_id FROM normal_traces \n    WHERE span_name = 'POST /api/v1/travelservice/trips/left'\n\
  \    LIMIT 1\n)\nORDER BY time ASC\nLIMIT 40\n"
- "\n-- Check ERROR logs in abnormal_logs grouped by service\nSELECT \n    service_name, level, COUNT(*) as count\nFROM abnormal_logs\nWHERE level = 'ERROR'\nGROUP BY service_name, level\nORDER BY count\
  \ DESC\nLIMIT 20\n"
- "\n-- Check error messages for ts-ui-dashboard\nSELECT time, service_name, level, message\nFROM abnormal_logs\nWHERE service_name = 'ts-ui-dashboard'\n  AND level = 'ERROR'\nORDER BY time ASC\nLIMIT 15\n"
- "\n-- Check what cancel service looks like in normal traces\nSELECT DISTINCT service_name, span_name \nFROM normal_traces \nWHERE span_name LIKE '%cancel%'\nORDER BY service_name\nLIMIT 20\n"
- "\n-- Check error messages for ts-ui-dashboard\nSELECT time, service_name, level, message\nFROM abnormal_logs\nWHERE service_name = 'ts-ui-dashboard'\n  AND level = 'ERROR'\nORDER BY time ASC\nLIMIT 7\n"
- "\n-- Check cancel service spans in abnormal traces\nSELECT DISTINCT span_name, service_name, COUNT(*) as cnt,\n    SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 400 THEN\
  \ 1 ELSE 0 END) as errors\nFROM abnormal_traces\nWHERE span_name LIKE '%cancel%'\nGROUP BY span_name, service_name\nORDER BY errors DESC\nLIMIT 20\n"
- '

  -- Check distinct metrics available

  SELECT DISTINCT metric FROM abnormal_metrics ORDER BY metric LIMIT 30

  '
- "\n-- Check for cancel service related errors in logs\nSELECT time, service_name, level, message\nFROM abnormal_logs\nWHERE message LIKE '%cancel%'\n   OR message LIKE '%Cancel%'\nLIMIT 10\n"
- '

  -- Check more metrics

  SELECT DISTINCT metric FROM abnormal_metrics ORDER BY metric LIMIT 30 OFFSET 20

  '
