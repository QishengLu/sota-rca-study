    2. **ts-delivery-service** and **ts-notification-service** have errors about "Failed to check/redeclare auto-delete queue(s)" - likely related to RabbitMQ

    3. **ts-ui-dashboard** has 502 errors with "connection reset by peer"


    The ts-rabbitmq DNS error is significant. Let me check the trace data to understand the service call chains and see where errors originate.


    '
