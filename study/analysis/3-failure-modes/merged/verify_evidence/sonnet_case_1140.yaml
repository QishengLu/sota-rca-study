raw_sql_list_sample:
- SELECT service_name, span_name, attr_http_request_method, attr_http_response_status_code, attr_status_code, COUNT(*) as count, AVG(duration) as avg_duration_ns, MAX(duration) as max_duration_ns FROM abnormal_traces
  WHERE span_name LIKE '%preserve%' OR service_name LIKE '%preserve%' GROUP BY service_name, span_name, attr_http_request_method, attr_http_response_status_code, attr_status_code ORDER BY count DESC
- SELECT service_name, level, COUNT(*) as count FROM abnormal_logs GROUP BY service_name, level ORDER BY level DESC, count DESC
- SELECT service_name, span_name, attr_http_request_method, attr_http_response_status_code, attr_status_code, COUNT(*) as count, AVG(duration) as avg_duration_ns, MAX(duration) as max_duration_ns FROM abnormal_traces
  WHERE trace_id IN (SELECT DISTINCT trace_id FROM abnormal_traces WHERE span_name = 'HTTP POST http://ts-ui-dashboard:8080/api/v1/preserveservice/preserve') GROUP BY service_name, span_name, attr_http_request_method,
  attr_http_response_status_code, attr_status_code ORDER BY avg_duration_ns DESC
- SELECT service_name, level, message, COUNT(*) as count FROM abnormal_logs WHERE level IN ('ERROR', 'SEVERE') GROUP BY service_name, level, message ORDER BY count DESC LIMIT 50
- SELECT service_name, span_name, attr_http_request_method, attr_http_response_status_code, attr_status_code, COUNT(*) as count, AVG(duration) as avg_duration_ns, MAX(duration) as max_duration_ns FROM normal_traces
  WHERE trace_id IN (SELECT DISTINCT trace_id FROM normal_traces WHERE span_name = 'HTTP POST http://ts-ui-dashboard:8080/api/v1/preserveservice/preserve') GROUP BY service_name, span_name, attr_http_request_method,
  attr_http_response_status_code, attr_status_code ORDER BY avg_duration_ns DESC
- SELECT service_name, level, message, time FROM abnormal_logs WHERE service_name = 'ts-consign-service' ORDER BY time LIMIT 20
- SELECT service_name, level, message, COUNT(*) as count FROM abnormal_logs WHERE level = 'WARN' GROUP BY service_name, level, message ORDER BY count DESC LIMIT 20
- SELECT service_name, span_name, attr_http_response_status_code, attr_status_code, COUNT(*) as count, AVG(duration) as avg_duration_ns FROM abnormal_traces WHERE service_name = 'ts-order-service' GROUP
  BY service_name, span_name, attr_http_response_status_code, attr_status_code ORDER BY avg_duration_ns DESC
- SELECT service_name, span_name, attr_http_response_status_code, attr_status_code, COUNT(*) as count, AVG(duration) as avg_duration_ns FROM abnormal_traces WHERE service_name = 'ts-travel-service' GROUP
  BY service_name, span_name, attr_http_response_status_code, attr_status_code ORDER BY avg_duration_ns DESC LIMIT 20
- SELECT DISTINCT metric FROM abnormal_metrics WHERE metric LIKE '%cpu%' OR metric LIKE '%memory%' OR metric LIKE '%gc%' OR metric LIKE '%network%' ORDER BY metric
- SELECT m.service_name, m.metric, AVG(m.value) as abnormal_avg, n.normal_avg, (AVG(m.value) - n.normal_avg) / NULLIF(n.normal_avg, 0) * 100 as pct_change FROM abnormal_metrics m JOIN (SELECT service_name,
  metric, AVG(value) as normal_avg FROM normal_metrics GROUP BY service_name, metric) n ON m.service_name = n.service_name AND m.metric = n.metric WHERE m.metric = 'jvm.cpu.recent_utilization' GROUP BY
  m.service_name, m.metric, n.normal_avg ORDER BY pct_change DESC LIMIT 20
- SELECT service_name, metric, attr_jvm_gc_name, AVG(sum/NULLIF(count,0)) as avg_gc_time_ms, MAX(max) as max_gc_ms, SUM(count) as total_gc_count FROM abnormal_metrics_histogram WHERE metric LIKE '%gc%'
  GROUP BY service_name, metric, attr_jvm_gc_name ORDER BY avg_gc_time_ms DESC LIMIT 20
- SELECT service_name, span_name, attr_http_response_status_code, attr_status_code, COUNT(*) as count, AVG(duration) as avg_duration_ns FROM abnormal_traces WHERE service_name = 'ts-seat-service' GROUP
  BY service_name, span_name, attr_http_response_status_code, attr_status_code ORDER BY avg_duration_ns DESC LIMIT 20
- SELECT DISTINCT metric FROM abnormal_metrics_sum ORDER BY metric LIMIT 40
- SELECT a.service_name, a.attr_k8s_pod_name, a.metric, SUM(a.value) as abnormal_total, SUM(n.value) as normal_total FROM abnormal_metrics_sum a JOIN normal_metrics_sum n ON a.service_name = n.service_name
  AND a.metric = n.metric AND a.attr_k8s_pod_name = n.attr_k8s_pod_name WHERE a.metric = 'hubble_drop_total' GROUP BY a.service_name, a.attr_k8s_pod_name, a.metric ORDER BY abnormal_total DESC LIMIT 20
- SELECT a.service_name, a.metric, AVG(a.value) as abnormal_avg, AVG(n.value) as normal_avg, (AVG(a.value) - AVG(n.value)) / NULLIF(AVG(n.value), 0) * 100 as pct_change FROM abnormal_metrics_sum a JOIN
  normal_metrics_sum n ON a.service_name = n.service_name AND a.metric = n.metric WHERE a.metric IN ('db.client.connections.pending_requests', 'db.client.connections.usage') GROUP BY a.service_name, a.metric
  ORDER BY pct_change DESC LIMIT 20
- SELECT MIN(time) as start_time, MAX(time) as end_time FROM abnormal_traces WHERE span_name = 'HTTP POST http://ts-ui-dashboard:8080/api/v1/preserveservice/preserve'
- SELECT trace_id, service_name, span_name, duration, time FROM abnormal_traces WHERE trace_id IN (SELECT trace_id FROM abnormal_traces WHERE span_name = 'HTTP POST http://ts-ui-dashboard:8080/api/v1/preserveservice/preserve'
  ORDER BY duration DESC LIMIT 3) ORDER BY trace_id, time LIMIT 100
- SELECT trace_id, service_name, span_name, span_id, parent_span_id, duration, time FROM abnormal_traces WHERE trace_id = '2497174838963455f2a1b28685d53cec' ORDER BY time ASC
