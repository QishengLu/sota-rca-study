raw_sql_list_sample:
- "\nSELECT \n    service_name,\n    COUNT(*) as total_spans,\n    SUM(CASE WHEN attr_status_code = 'STATUS_CODE_ERROR' OR attr_http_response_status_code >= 400 THEN 1 ELSE 0 END) as error_spans,\n    ROUND(100.0\
  \ * SUM(CASE WHEN attr_status_code = 'STATUS_CODE_ERROR' OR attr_http_response_status_code >= 400 THEN 1 ELSE 0 END) / COUNT(*), 2) as error_rate_pct,\n    ROUND(AVG(duration)/1e6, 2) as avg_duration_ms,\n\
  \    ROUND(PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration)/1e6, 2) as p99_duration_ms\nFROM abnormal_traces\nGROUP BY service_name\nORDER BY error_rate_pct DESC\n"
- "\nSELECT \n    span_name,\n    service_name,\n    COUNT(*) as total_spans,\n    SUM(CASE WHEN attr_status_code = 'STATUS_CODE_ERROR' OR attr_http_response_status_code >= 400 THEN 1 ELSE 0 END) as error_spans,\n\
  \    ROUND(AVG(duration)/1e6, 2) as avg_duration_ms,\n    ROUND(PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration)/1e6, 2) as p99_duration_ms\nFROM abnormal_traces\nWHERE span_name LIKE '%orderOther%'\
  \ OR span_name LIKE '%travelPlan%' OR span_name LIKE '%preserve%' OR span_name LIKE '%trips%'\nGROUP BY span_name, service_name\nORDER BY error_spans DESC\n"
- "\nSELECT \n    span_name,\n    service_name,\n    attr_http_response_status_code,\n    attr_status_code,\n    COUNT(*) as count,\n    ROUND(AVG(duration)/1e6, 2) as avg_duration_ms\nFROM abnormal_traces\n\
  WHERE span_name LIKE '%orderOther/refresh%'\nGROUP BY span_name, service_name, attr_http_response_status_code, attr_status_code\nORDER BY count DESC\n"
- "\nSELECT \n    time,\n    service_name,\n    level,\n    message\nFROM abnormal_logs\nWHERE service_name = 'ts-order-other-service'\n    AND level IN ('ERROR', 'WARN')\nORDER BY time\nLIMIT 20\n"
- "\nSELECT \n    time,\n    service_name,\n    level,\n    message\nFROM abnormal_logs\nWHERE service_name = 'ts-order-other-service'\n    AND level = 'ERROR'\nORDER BY time\nLIMIT 20\n"
- "\nSELECT \n    time,\n    service_name,\n    level,\n    message\nFROM abnormal_logs\nWHERE (message LIKE '%refresh%' OR message LIKE '%orderOther%')\nORDER BY time\nLIMIT 20\n"
- "\nSELECT \n    time,\n    service_name,\n    level,\n    SUBSTRING(message, 1, 100) as msg\nFROM abnormal_logs\nWHERE (message LIKE '%refresh%' OR message LIKE '%Refresh%')\nORDER BY time\nLIMIT 7\n"
- "\n-- Find the traces for failed refresh requests and see what downstream calls were made\nSELECT \n    t2.span_name,\n    t2.service_name,\n    t2.attr_http_response_status_code,\n    t2.attr_status_code,\n\
  \    ROUND(t2.duration/1e6, 2) as duration_ms\nFROM abnormal_traces t1\nJOIN abnormal_traces t2 ON t1.trace_id = t2.trace_id\nWHERE t1.span_name = 'POST /api/v1/orderOtherService/orderOther/refresh'\n\
  \    AND t1.service_name = 'ts-order-other-service'\n    AND t1.attr_status_code = 'Error'\n    AND t1.trace_id = t2.trace_id\nLIMIT 10\n"
- "\n-- Find what services are called in a normal successful refresh\nSELECT DISTINCT\n    t2.span_name,\n    t2.service_name,\n    ROUND(t2.duration/1e6, 2) as duration_ms\nFROM normal_traces t1\nJOIN\
  \ normal_traces t2 ON t1.trace_id = t2.trace_id\nWHERE t1.span_name = 'POST /api/v1/orderOtherService/orderOther/refresh'\n    AND t1.service_name = 'ts-order-other-service'\nLIMIT 15\n"
- "\n-- Find all spans in the abnormal travel-plan-service traces to understand what's called\nSELECT DISTINCT\n    t2.span_name,\n    t2.service_name,\n    ROUND(AVG(t2.duration)/1e6, 2) as avg_duration_ms,\n\
  \    COUNT(*) as count\nFROM abnormal_traces t1\nJOIN abnormal_traces t2 ON t1.trace_id = t2.trace_id\nWHERE t1.span_name = 'POST /api/v1/travelplanservice/travelPlan/cheapest'\n    AND t1.service_name\
  \ = 'ts-travel-plan-service'\nGROUP BY t2.span_name, t2.service_name\nORDER BY avg_duration_ms DESC\nLIMIT 20\n"
- "\n-- Compare normal vs abnormal for the same services showing latency\nSELECT \n    t.span_name,\n    t.service_name,\n    ROUND(AVG(t.duration)/1e6, 2) as avg_duration_ms,\n    COUNT(*) as count\nFROM\
  \ normal_traces t\nWHERE t.span_name IN (\n    'POST /api/v1/travelplanservice/travelPlan/cheapest',\n    'POST /api/v1/travelservice/trips/left',\n    'POST /api/v1/routeplanservice/routePlan/cheapestRoute',\n\
  \    'POST /api/v1/basicservice/basic/travels',\n    'POST /api/v1/seatservice/seats/left_tickets'\n)\nGROUP BY t.span_name, t.service_name\nORDER BY avg_duration_ms DESC\n"
- '

  SELECT DISTINCT metric

  FROM abnormal_metrics

  ORDER BY metric

  '
- "\n-- Check CPU usage anomalies across all services\nSELECT \n    attr_k8s_pod_name,\n    service_name,\n    attr_k8s_container_name,\n    ROUND(AVG(value), 4) as avg_cpu,\n    ROUND(MAX(value), 4) as\
  \ max_cpu\nFROM abnormal_metrics\nWHERE metric = 'k8s.pod.cpu.usage'\nGROUP BY attr_k8s_pod_name, service_name, attr_k8s_container_name\nORDER BY avg_cpu DESC\n"
- "\n-- Check memory usage anomalies across all services\nSELECT \n    attr_k8s_pod_name,\n    service_name,\n    ROUND(AVG(value)/1e9, 2) as avg_memory_gb,\n    ROUND(MAX(value)/1e9, 2) as max_memory_gb\n\
  FROM abnormal_metrics\nWHERE metric = 'k8s.pod.memory.usage'\nGROUP BY attr_k8s_pod_name, service_name\nORDER BY avg_memory_gb DESC\n"
- "\n-- Check memory for ts-seat-service in NORMAL period\nSELECT \n    attr_k8s_pod_name,\n    service_name,\n    ROUND(AVG(value)/1e9, 2) as avg_memory_gb,\n    ROUND(MAX(value)/1e9, 2) as max_memory_gb\n\
  FROM normal_metrics\nWHERE metric = 'k8s.pod.memory.usage'\nGROUP BY attr_k8s_pod_name, service_name\nORDER BY avg_memory_gb DESC\n"
- "\nSELECT \n    service_name,\n    attr_k8s_pod_name,\n    metric,\n    ROUND(AVG(sum/count), 2) as avg_duration_ms,\n    ROUND(MAX(max), 2) as max_duration_ms,\n    SUM(count) as total_count\nFROM abnormal_metrics_histogram\n\
  WHERE metric LIKE '%gc%' OR metric LIKE '%GC%'\nGROUP BY service_name, attr_k8s_pod_name, metric\nORDER BY avg_duration_ms DESC\n"
- "\n-- Check memory limit utilization for ts-seat-service specifically\nSELECT \n    metric,\n    attr_k8s_pod_name,\n    service_name,\n    ROUND(AVG(value), 4) as avg_val,\n    ROUND(MAX(value), 4) as\
  \ max_val\nFROM abnormal_metrics\nWHERE service_name = 'ts-seat-service'\n    AND metric IN ('k8s.pod.memory_limit_utilization', 'k8s.pod.cpu_limit_utilization', 'jvm.cpu.recent_utilization', 'jvm.system.cpu.utilization')\n\
  GROUP BY metric, attr_k8s_pod_name, service_name\nORDER BY avg_val DESC\n"
- "\n-- Check memory limit utilization for ts-seat-service in NORMAL period\nSELECT \n    metric,\n    attr_k8s_pod_name,\n    service_name,\n    ROUND(AVG(value), 4) as avg_val,\n    ROUND(MAX(value),\
  \ 4) as max_val\nFROM normal_metrics\nWHERE service_name = 'ts-seat-service'\n    AND metric IN ('k8s.pod.memory_limit_utilization', 'k8s.pod.cpu_limit_utilization', 'jvm.cpu.recent_utilization', 'jvm.system.cpu.utilization')\n\
  GROUP BY metric, attr_k8s_pod_name, service_name\nORDER BY avg_val DESC\n"
- "\nSELECT \n    service_name,\n    attr_k8s_pod_name,\n    metric,\n    ROUND(AVG(sum/count), 2) as avg_duration_ms,\n    ROUND(MAX(max), 2) as max_duration_ms,\n    SUM(count) as total_count\nFROM normal_metrics_histogram\n\
  WHERE service_name = 'ts-seat-service'\nGROUP BY service_name, attr_k8s_pod_name, metric\n"
- "\nSELECT \n    service_name,\n    attr_k8s_pod_name,\n    metric,\n    ROUND(AVG(sum/count), 2) as avg_duration_ms,\n    ROUND(MAX(max), 2) as max_duration_ms,\n    SUM(count) as total_count\nFROM abnormal_metrics_histogram\n\
  WHERE service_name = 'ts-seat-service'\nGROUP BY service_name, attr_k8s_pod_name, metric\n"
