raw_sql_list_sample:
- SELECT span_name, service_name, attr_http_response_status_code, attr_status_code, COUNT(*) as count, MIN(time) as first_seen, MAX(time) as last_seen FROM abnormal_traces WHERE span_name LIKE '%travelplanservice/travelPlan/minStation%'
  OR span_name LIKE '%travel2service/trips/left%' GROUP BY span_name, service_name, attr_http_response_status_code, attr_status_code ORDER BY count DESC LIMIT 50
- SELECT trace_id, span_name, service_name, attr_http_response_status_code, attr_status_code, duration, parent_span_id, time FROM abnormal_traces WHERE (span_name LIKE '%travelplanservice/travelPlan/minStation%'
  OR span_name LIKE '%travel2service/trips/left%') AND (attr_http_response_status_code >= 400 OR attr_status_code = 'Error') ORDER BY time ASC LIMIT 30
- SELECT trace_id, span_name, service_name, attr_http_response_status_code, attr_status_code, duration, parent_span_id, span_id, time FROM abnormal_traces WHERE trace_id = 'a5da0514b541201c9cc58c5fb17b4623'
  ORDER BY time ASC LIMIT 50
- SELECT trace_id, span_name, service_name, attr_http_response_status_code, attr_status_code, duration, parent_span_id, span_id FROM abnormal_traces WHERE trace_id = 'a5da0514b541201c9cc58c5fb17b4623' ORDER
  BY duration DESC LIMIT 30
- SELECT service_name, level, message, time FROM abnormal_logs WHERE service_name = 'ts-route-plan-service' AND level IN ('ERROR', 'WARN') ORDER BY time ASC LIMIT 30
- SELECT DISTINCT level FROM abnormal_logs
- SELECT service_name, level, message, time FROM abnormal_logs WHERE service_name = 'ts-route-plan-service' ORDER BY time ASC LIMIT 30
- SELECT span_name, service_name, attr_http_response_status_code, attr_status_code, COUNT(*) as cnt FROM abnormal_traces WHERE service_name = 'ts-route-plan-service' AND span_name LIKE 'POST%' GROUP BY
  span_name, service_name, attr_http_response_status_code, attr_status_code ORDER BY cnt DESC LIMIT 30
- SELECT DISTINCT service_name FROM abnormal_traces ORDER BY service_name
- SELECT span_id, span_name, service_name, attr_http_response_status_code, attr_status_code FROM abnormal_traces WHERE trace_id = 'a5da0514b541201c9cc58c5fb17b4623' AND service_name = 'ts-route-plan-service'
  AND attr_status_code = 'Error' AND attr_http_response_status_code = 503 LIMIT 10
- SELECT parent_span_id, span_name, service_name, attr_http_response_status_code, attr_status_code, duration FROM abnormal_traces WHERE trace_id = 'a5da0514b541201c9cc58c5fb17b4623' AND parent_span_id IN
  ('f167988c64a0d9ef', '9aca32b9b42f213e', '123f20946d2f639e', 'b76116f58f0ba056', 'dc6789a2a878c613', 'df3ac44746de0881', 'e2a314c9c9be2c68', '46ccd67fd3a0d9b1', '22aa0f6ba802140d', '87eb3c6b103ffaa7')
  ORDER BY duration DESC LIMIT 20
- SELECT service_name, metric, value, time FROM abnormal_metrics WHERE metric LIKE '%error%' AND value > 0 ORDER BY time ASC LIMIT 30
- SELECT DISTINCT metric FROM abnormal_metrics LIMIT 30
- SELECT service_name, message, time FROM abnormal_logs WHERE message LIKE '%Connection refused%' OR message LIKE '%upstream%' OR message LIKE '%503%' ORDER BY time ASC LIMIT 30
- SELECT service_name, COUNT(*) as cnt FROM abnormal_logs WHERE message LIKE '%Connection refused%' GROUP BY service_name ORDER BY cnt DESC LIMIT 20
- SELECT span_name, service_name, COUNT(*) as cnt FROM abnormal_traces WHERE parent_span_id IN (SELECT span_id FROM abnormal_traces WHERE service_name = 'ts-route-plan-service') GROUP BY span_name, service_name
  ORDER BY cnt DESC LIMIT 30
- SELECT span_name, service_name, attr_http_response_status_code, attr_status_code, COUNT(*) as cnt FROM abnormal_traces WHERE service_name IN ('ts-travel-service', 'ts-travel2-service', 'ts-route-service')
  AND attr_status_code = 'Error' GROUP BY span_name, service_name, attr_http_response_status_code, attr_status_code ORDER BY cnt DESC LIMIT 30
- SELECT service_name, message FROM abnormal_logs WHERE service_name = 'ts-route-plan-service' AND message LIKE '%Connection refused%' LIMIT 5
- SELECT t1.span_id as parent_span, t1.service_name as parent_service, t2.span_name, t2.service_name as child_service, t2.attr_http_response_status_code, t2.attr_status_code FROM abnormal_traces t1 JOIN
  abnormal_traces t2 ON t1.span_id = t2.parent_span_id WHERE t1.service_name = 'ts-route-plan-service' AND t2.attr_status_code = 'Error' LIMIT 30
- SELECT service_name, metric, value, time FROM abnormal_metrics WHERE metric = 'k8s.pod.phase' AND value != 1 ORDER BY time ASC LIMIT 30
