raw_sql_list_sample:
- "\nSELECT \n    service_name,\n    span_name,\n    attr_http_response_status_code,\n    COUNT(*) as total_spans,\n    COUNT(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 400\
  \ THEN 1 END) as error_spans,\n    AVG(duration) / 1e6 as avg_duration_ms,\n    MAX(duration) / 1e6 as max_duration_ms,\n    ROUND(100.0 * COUNT(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code\
  \ >= 400 THEN 1 END) / COUNT(*), 2) as error_rate_pct\nFROM abnormal_traces\nGROUP BY service_name, span_name, attr_http_response_status_code\nHAVING error_spans > 0\nORDER BY error_spans DESC\n"
- "\nSELECT \n    service_name,\n    level,\n    COUNT(*) as count,\n    MIN(time) as first_occurrence,\n    MAX(time) as last_occurrence\nFROM abnormal_logs\nWHERE level IN ('ERROR', 'WARN', 'error', 'warn',\
  \ 'WARNING')\nGROUP BY service_name, level\nORDER BY count DESC\n"
- "\nSELECT \n    service_name,\n    span_name,\n    COUNT(*) as total_spans,\n    COUNT(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 400 THEN 1 END) as error_spans,\n    AVG(duration)\
  \ / 1e6 as avg_duration_ms,\n    PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration) / 1e6 as p99_duration_ms\nFROM abnormal_traces\nWHERE service_name IN ('ts-travelplanservice', 'ts-travelservice',\
  \ 'ts-travel2service', 'ts-preserveservice', 'ts-preserve-service', 'ts-consign-service')\nGROUP BY service_name, span_name\nORDER BY service_name, error_spans DESC\n"
- "\nSELECT \n    time,\n    service_name,\n    level,\n    message\nFROM abnormal_logs\nWHERE service_name IN ('ts-consign-service', 'ts-preserve-service')\n  AND level IN ('ERROR', 'WARN')\nORDER BY time\n\
  LIMIT 20\n"
- "\nSELECT \n    service_name,\n    span_name,\n    COUNT(*) as total_spans,\n    AVG(duration) / 1e6 as avg_duration_ms,\n    PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration) / 1e6 as p99_duration_ms\n\
  FROM normal_traces\nWHERE service_name IN ('ts-travelplanservice', 'ts-travelservice', 'ts-travel2service', 'ts-preserveservice', 'ts-preserve-service', 'ts-consign-service')\nGROUP BY service_name, span_name\n\
  ORDER BY service_name, avg_duration_ms DESC\n"
- "\nSELECT \n    service_name,\n    span_name,\n    COUNT(*) as total_spans,\n    COUNT(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 400 THEN 1 END) as error_spans,\n    AVG(duration)\
  \ / 1e6 as avg_duration_ms,\n    PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration) / 1e6 as p99_duration_ms\nFROM abnormal_traces\nWHERE span_name LIKE '%travelplan%' OR span_name LIKE '%travel2%'\
  \ OR span_name LIKE '%travelservice%'\n   OR service_name LIKE '%travelplan%' OR service_name LIKE '%travel2%'\nGROUP BY service_name, span_name\nORDER BY avg_duration_ms DESC\n"
- "\nSELECT \n    service_name,\n    span_name,\n    COUNT(*) as total_spans,\n    AVG(duration) / 1e6 as avg_duration_ms,\n    PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration) / 1e6 as p99_duration_ms\n\
  FROM normal_traces\nWHERE span_name LIKE '%travelplan%' OR span_name LIKE '%travel2%' OR span_name LIKE '%travelservice%'\n   OR service_name LIKE '%travel-plan%' OR service_name LIKE '%travel2%' OR service_name\
  \ LIKE '%travel-service%'\nGROUP BY service_name, span_name\nORDER BY avg_duration_ms DESC\n"
- '

  SELECT DISTINCT metric

  FROM abnormal_metrics

  ORDER BY metric

  '
- "\n-- Find a complete trace for the travel plan service to see call chains\nSELECT \n    trace_id,\n    span_id,\n    parent_span_id,\n    service_name,\n    span_name,\n    duration / 1e6 as duration_ms,\n\
  \    attr_status_code,\n    attr_http_response_status_code\nFROM abnormal_traces\nWHERE trace_id IN (\n    SELECT trace_id \n    FROM abnormal_traces \n    WHERE span_name LIKE '%travelplanservice%travelPlan%cheapest%'\n\
  \    LIMIT 3\n)\nORDER BY trace_id, time\n"
- "\nSELECT \n    service_name,\n    metric,\n    AVG(value) as avg_value,\n    MAX(value) as max_value\nFROM abnormal_metrics\nWHERE metric IN ('jvm.cpu.recent_utilization', 'jvm.system.cpu.utilization',\
  \ 'container.cpu.usage', 'container.memory.usage')\n  AND service_name IS NOT NULL\nGROUP BY service_name, metric\nORDER BY service_name, metric\n"
- "\nSELECT \n    service_name,\n    metric,\n    AVG(value) as avg_value,\n    MAX(value) as max_value\nFROM normal_metrics\nWHERE metric IN ('jvm.cpu.recent_utilization', 'jvm.system.cpu.utilization',\
  \ 'container.cpu.usage', 'container.memory.usage')\n  AND service_name IS NOT NULL\nGROUP BY service_name, metric\nORDER BY service_name, metric\n"
- "\n-- Find the services that are slow and what they're calling\nSELECT \n    service_name,\n    span_name,\n    COUNT(*) as count,\n    AVG(duration) / 1e6 as avg_duration_ms,\n    PERCENTILE_CONT(0.99)\
  \ WITHIN GROUP (ORDER BY duration) / 1e6 as p99_duration_ms\nFROM abnormal_traces\nWHERE service_name IN ('ts-route-plan-service', 'ts-basic-service', 'ts-seat-service', 'ts-price-service', 'ts-station-service',\
  \ 'ts-route-service')\nGROUP BY service_name, span_name\nORDER BY avg_duration_ms DESC\n"
- "\nSELECT \n    service_name,\n    span_name,\n    COUNT(*) as count,\n    AVG(duration) / 1e6 as avg_duration_ms,\n    PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration) / 1e6 as p99_duration_ms\n\
  FROM normal_traces\nWHERE service_name IN ('ts-route-plan-service', 'ts-basic-service', 'ts-seat-service', 'ts-price-service', 'ts-station-service', 'ts-route-service', 'ts-config-service')\nGROUP BY\
  \ service_name, span_name\nORDER BY avg_duration_ms DESC\n"
- "\nSELECT \n    service_name,\n    metric,\n    AVG(value) as avg_value,\n    MAX(value) as max_value\nFROM abnormal_metrics\nWHERE metric IN ('jvm.cpu.recent_utilization', 'jvm.system.cpu.utilization',\
  \ 'container.cpu.usage')\n  AND service_name IN ('ts-config-service', 'ts-seat-service', 'ts-basic-service', 'ts-route-plan-service', 'ts-travel-plan-service', 'ts-travel-service', 'ts-travel2-service',\
  \ 'ts-preserve-service')\nGROUP BY service_name, metric\nORDER BY service_name, metric\n"
- "\nSELECT \n    service_name,\n    span_name,\n    COUNT(*) as count,\n    AVG(duration) / 1e6 as avg_duration_ms,\n    PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration) / 1e6 as p99_duration_ms\n\
  FROM abnormal_traces\nWHERE service_name = 'ts-config-service' OR service_name = 'ts-seat-service'\nGROUP BY service_name, span_name\nORDER BY service_name, avg_duration_ms DESC\n"
- "\n-- Compare ts-seat-service and ts-config-service metrics between normal and abnormal\nSELECT \n    service_name,\n    metric,\n    AVG(value) as avg_value,\n    MAX(value) as max_value\nFROM abnormal_metrics\n\
  WHERE service_name IN ('ts-seat-service', 'ts-config-service')\nGROUP BY service_name, metric\nORDER BY service_name, metric\n"
- "\nSELECT \n    attr_source_workload,\n    attr_destination_workload,\n    metric,\n    AVG(value) as avg_value,\n    MAX(value) as max_value\nFROM abnormal_metrics\nWHERE metric IN ('hubble_http_request_duration_p50_seconds',\
  \ 'hubble_http_request_duration_p99_seconds')\n  AND attr_destination_workload IN ('ts-config-service', 'ts-seat-service', 'ts-travel-service', 'ts-travel2-service', 'ts-route-plan-service', 'ts-basic-service',\
  \ 'ts-preserve-service')\nGROUP BY attr_source_workload, attr_destination_workload, metric\nORDER BY attr_destination_workload, metric\n"
- "\nSELECT \n    attr_source_workload,\n    attr_destination_workload,\n    metric,\n    AVG(value) as avg_value,\n    MAX(value) as max_value\nFROM normal_metrics\nWHERE metric IN ('hubble_http_request_duration_p50_seconds',\
  \ 'hubble_http_request_duration_p99_seconds')\n  AND attr_destination_workload IN ('ts-config-service', 'ts-seat-service', 'ts-travel-service', 'ts-travel2-service', 'ts-route-plan-service', 'ts-basic-service',\
  \ 'ts-preserve-service')\nGROUP BY attr_source_workload, attr_destination_workload, metric\nORDER BY attr_destination_workload, metric\n"
- "\n-- Check which node each service is running on \nSELECT DISTINCT\n    service_name,\n    attr_k8s_node_name,\n    attr_k8s_pod_name\nFROM abnormal_metrics\nWHERE service_name IN ('ts-config-service',\
  \ 'ts-seat-service', 'ts-basic-service', 'ts-travel-service', 'ts-travel2-service', 'ts-travel-plan-service', 'ts-route-plan-service', 'ts-preserve-service')\n  AND attr_k8s_node_name IS NOT NULL\nORDER\
  \ BY attr_k8s_node_name, service_name\n"
