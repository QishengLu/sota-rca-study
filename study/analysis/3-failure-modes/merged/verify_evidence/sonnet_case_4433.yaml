raw_sql_list_sample:
- "\nSELECT service_name, span_name, \n       COUNT(*) as total_spans,\n       SUM(CASE WHEN attr_status_code = 'STATUS_CODE_ERROR' OR attr_http_response_status_code >= 500 THEN 1 ELSE 0 END) as error_count,\n\
  \       ROUND(AVG(duration)/1000000.0, 2) as avg_duration_ms,\n       ROUND(MAX(duration)/1000000.0, 2) as max_duration_ms\nFROM abnormal_traces\nGROUP BY service_name, span_name\nORDER BY error_count\
  \ DESC\nLIMIT 30\n"
- "\nSELECT service_name, span_name, \n       COUNT(*) as total_spans,\n       SUM(CASE WHEN attr_status_code = 'STATUS_CODE_ERROR' OR attr_http_response_status_code >= 500 THEN 1 ELSE 0 END) as error_count,\n\
  \       ROUND(AVG(duration)/1000000.0, 2) as avg_duration_ms,\n       ROUND(MAX(duration)/1000000.0, 2) as max_duration_ms\nFROM abnormal_traces\nGROUP BY service_name, span_name\nORDER BY error_count\
  \ DESC\nLIMIT 30\nOFFSET 10\n"
- '

  SELECT span_name, service_name, trace_id, span_id, parent_span_id, duration, attr_status_code, attr_http_response_status_code

  FROM abnormal_traces

  WHERE span_name LIKE ''%preserve%''

  ORDER BY time

  LIMIT 20

  '
- '

  -- Explore the full call chain for a preserve trace

  SELECT span_name, service_name, span_id, parent_span_id, duration, attr_status_code, attr_http_response_status_code

  FROM abnormal_traces

  WHERE trace_id = ''9ffd175494a88363310e7f91a5f99737''

  ORDER BY time

  '
- "\n-- Look at the travelPlan/minStation call chain\nSELECT span_name, service_name, span_id, parent_span_id, duration, attr_status_code, attr_http_response_status_code\nFROM abnormal_traces\nWHERE trace_id\
  \ = (\n  SELECT trace_id FROM abnormal_traces \n  WHERE span_name LIKE '%travelPlan/minStation%' AND service_name = 'loadgenerator'\n  LIMIT 1\n)\nORDER BY time\n"
- '

  SELECT time, level, service_name, message

  FROM abnormal_logs

  WHERE service_name = ''ts-basic-service'' AND level IN (''ERROR'', ''WARN'')

  ORDER BY time

  LIMIT 30

  '
- '

  SELECT time, level, service_name, message

  FROM abnormal_logs

  WHERE service_name = ''ts-basic-service''

  ORDER BY time

  LIMIT 20

  '
- '

  SELECT DISTINCT service_name, level, COUNT(*) as cnt

  FROM abnormal_logs

  WHERE level IN (''ERROR'', ''WARN'')

  GROUP BY service_name, level

  ORDER BY cnt DESC

  LIMIT 30

  '
- '

  SELECT time, level, service_name, message

  FROM abnormal_logs

  WHERE service_name = ''ts-food-service'' AND level = ''ERROR''

  ORDER BY time

  LIMIT 15

  '
- '

  -- Check error logs for ts-ui-dashboard to understand what errors it''s logging

  SELECT time, level, service_name, message

  FROM abnormal_logs

  WHERE service_name = ''ts-ui-dashboard'' AND level = ''ERROR''

  ORDER BY time

  LIMIT 15

  '
- '

  SELECT time, level, service_name, SUBSTRING(message, 1, 100) as message_short

  FROM abnormal_logs

  WHERE service_name = ''ts-ui-dashboard'' AND level = ''ERROR''

  ORDER BY time

  LIMIT 10

  '
- "\n-- Compare normal vs abnormal error rates for ts-basic-service\nSELECT service_name, span_name,\n       COUNT(*) as total_spans,\n       SUM(CASE WHEN attr_status_code = 'STATUS_CODE_ERROR' OR attr_http_response_status_code\
  \ >= 500 THEN 1 ELSE 0 END) as error_count\nFROM normal_traces\nWHERE span_name LIKE '%basicservice/basic/travel%'\nGROUP BY service_name, span_name\nORDER BY error_count DESC\nLIMIT 10\n"
- '

  -- Find what ts-basic-service GET span is calling (the ones that error)

  SELECT span_name, service_name, span_id, parent_span_id, duration, attr_status_code, attr_http_response_status_code

  FROM abnormal_traces

  WHERE service_name = ''ts-basic-service'' AND attr_status_code = ''Error''

  LIMIT 10

  '
- "\n-- Look at what ts-basic-service POST spans call and what errors\nSELECT span_name, service_name, span_id, parent_span_id, duration, attr_status_code, attr_http_response_status_code\nFROM abnormal_traces\n\
  WHERE span_id IN (\n  SELECT span_id FROM abnormal_traces\n  WHERE service_name = 'ts-basic-service' AND span_name = 'POST' AND attr_status_code = 'Error'\n  LIMIT 3\n)\nOR parent_span_id IN (\n  SELECT\
  \ span_id FROM abnormal_traces\n  WHERE service_name = 'ts-basic-service' AND span_name = 'POST' AND attr_status_code = 'Error'\n  LIMIT 3\n)\nLIMIT 20\n"
- '

  -- Find children of the errored POST spans

  SELECT span_name, service_name, span_id, parent_span_id, duration, attr_status_code, attr_http_response_status_code

  FROM abnormal_traces

  WHERE parent_span_id IN (''4f3e9864d5f853db'', ''95efae1926a93b0f'', ''b0930f1e99f10dd6'')

  LIMIT 20

  '
- '

  -- Check metrics for ts-basic-service

  SELECT DISTINCT metric, attr_k8s_container_name, attr_k8s_pod_name

  FROM abnormal_metrics

  WHERE service_name IS NOT NULL AND (attr_k8s_deployment_name LIKE ''%basic%'' OR attr_k8s_pod_name LIKE ''%basic%'' OR service_name LIKE ''%basic%'')

  LIMIT 20

  '
- "\n-- Check CPU, memory metrics for ts-basic-service pod\nSELECT metric, time, value, attr_k8s_pod_name, attr_k8s_container_name\nFROM abnormal_metrics\nWHERE attr_k8s_pod_name LIKE '%basic-service%'\
  \ \n  AND metric IN ('k8s.pod.cpu_limit_utilization', 'k8s.pod.memory.available', 'container.cpu.utilization', 'container.memory.usage')\nORDER BY time\nLIMIT 20\n"
- '

  -- Check GC/JVM metrics for ts-basic-service (histogram data)

  SELECT DISTINCT service_name, metric, attr_k8s_pod_name, attr_jvm_gc_name, attr_jvm_gc_action

  FROM abnormal_metrics_histogram

  WHERE service_name LIKE ''%basic%'' OR attr_k8s_pod_name LIKE ''%basic%''

  LIMIT 20

  '
- "\n-- Compare http.server.request.duration for ts-basic-service abnormal vs normal\nSELECT source_file, time, metric, service_name, count, sum, min, max,\n       ROUND(sum/count, 4) as avg_duration_s\n\
  FROM (\n  SELECT 'abnormal' as source_file, time, metric, service_name, count, sum, min, max\n  FROM abnormal_metrics_histogram\n  WHERE service_name = 'ts-basic-service' AND metric = 'http.server.request.duration'\n\
  \  UNION ALL\n  SELECT 'normal' as source_file, time, metric, service_name, count, sum, min, max\n  FROM normal_metrics_histogram\n  WHERE service_name = 'ts-basic-service' AND metric = 'http.server.request.duration'\n\
  )\nORDER BY source_file, time\nLIMIT 20\n"
- "\n-- Look at the full error chain for a basic-service failing trace - what does it call?\nSELECT span_name, service_name, span_id, parent_span_id, duration, attr_status_code, attr_http_response_status_code\n\
  FROM abnormal_traces\nWHERE trace_id = (\n  SELECT trace_id FROM abnormal_traces \n  WHERE span_name = 'BasicController.queryForTravel' AND attr_status_code = 'Error'\n  LIMIT 1\n)\nORDER BY time\nLIMIT\
  \ 50\n"
