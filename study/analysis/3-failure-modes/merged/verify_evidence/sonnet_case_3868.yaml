raw_sql_list_sample:
- "\nSELECT service_name, \n       COUNT(*) as total_spans,\n       SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 500 THEN 1 ELSE 0 END) as error_spans,\n       AVG(duration)\
  \ as avg_duration_ns,\n       MAX(duration) as max_duration_ns,\n       ROUND(100.0 * SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 500 THEN 1 ELSE 0 END) / COUNT(*), 2)\
  \ as error_rate_pct\nFROM abnormal_traces\nGROUP BY service_name\nORDER BY error_spans DESC\nLIMIT 30\n"
- "\nSELECT service_name, \n       COUNT(*) as total_spans,\n       SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 500 THEN 1 ELSE 0 END) as error_spans,\n       AVG(duration)\
  \ as avg_duration_ns,\n       MAX(duration) as max_duration_ns,\n       ROUND(100.0 * SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 500 THEN 1 ELSE 0 END) / COUNT(*), 2)\
  \ as error_rate_pct\nFROM abnormal_traces\nGROUP BY service_name\nORDER BY error_spans DESC\nLIMIT 30\n"
- '

  SELECT span_name, attr_http_response_status_code, attr_status_code, COUNT(*) as cnt, AVG(duration) as avg_dur

  FROM abnormal_traces

  WHERE service_name = ''ts-consign-service''

  GROUP BY span_name, attr_http_response_status_code, attr_status_code

  ORDER BY cnt DESC

  LIMIT 20

  '
- "\nSELECT service_name, \n       COUNT(*) as total_spans,\n       SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 500 THEN 1 ELSE 0 END) as error_spans,\n       AVG(duration)\
  \ as avg_duration_ns,\n       ROUND(100.0 * SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 500 THEN 1 ELSE 0 END) / COUNT(*), 2) as error_rate_pct\nFROM normal_traces\n\
  GROUP BY service_name\nORDER BY error_spans DESC\nLIMIT 20\n"
- "\n-- Find which services call ts-consign-service by looking at parent spans\nSELECT t1.service_name as caller_service, \n       t2.service_name as callee_service,\n       t1.span_name as caller_span,\n\
  \       t2.span_name as callee_span,\n       t2.attr_http_response_status_code,\n       t2.attr_status_code,\n       COUNT(*) as cnt\nFROM abnormal_traces t2\nJOIN abnormal_traces t1 ON t2.parent_span_id\
  \ = t1.span_id AND t2.trace_id = t1.trace_id\nWHERE t2.service_name = 'ts-consign-service' \n  AND t2.span_name LIKE 'GET /api/v1/consignservice%'\nGROUP BY t1.service_name, t2.service_name, t1.span_name,\
  \ t2.span_name, t2.attr_http_response_status_code, t2.attr_status_code\nORDER BY cnt DESC\nLIMIT 20\n"
- "\n-- Look at error logs from ts-consign-service to understand the root cause\nSELECT time, level, service_name, message\nFROM abnormal_logs\nWHERE service_name = 'ts-consign-service'\n  AND level IN\
  \ ('ERROR', 'WARN')\nORDER BY time ASC\nLIMIT 20\n"
- "\n-- Find spans related to the affected endpoints (travelplan and preserve)\nSELECT span_name, service_name, attr_http_response_status_code, attr_status_code, \n       COUNT(*) as cnt, AVG(duration)/1e6\
  \ as avg_duration_ms, MAX(duration)/1e6 as max_duration_ms\nFROM abnormal_traces\nWHERE span_name LIKE '%travelPlan%' OR span_name LIKE '%travel_plan%' OR span_name LIKE '%preserve%'\n   OR span_name\
  \ LIKE '%/cheapest%' OR span_name LIKE '%/quickest%' OR span_name LIKE '%/minStation%'\nGROUP BY span_name, service_name, attr_http_response_status_code, attr_status_code\nORDER BY cnt DESC\nLIMIT 20\n"
- "\n-- Look at ts-travel-plan-service span details with durations\nSELECT span_name, attr_http_response_status_code, attr_status_code, \n       COUNT(*) as cnt, AVG(duration)/1e6 as avg_duration_ms, MAX(duration)/1e6\
  \ as max_duration_ms\nFROM abnormal_traces\nWHERE service_name = 'ts-travel-plan-service'\nGROUP BY span_name, attr_http_response_status_code, attr_status_code\nORDER BY avg_duration_ms DESC\nLIMIT 20\n"
- "\n-- Find what services ts-travel-plan-service and ts-preserve-service call\nSELECT t1.service_name as caller_service, t2.service_name as callee_service, \n       t2.span_name as callee_span, t2.attr_http_response_status_code,\n\
  \       COUNT(*) as cnt, AVG(t2.duration)/1e6 as avg_dur_ms, MAX(t2.duration)/1e6 as max_dur_ms\nFROM abnormal_traces t1\nJOIN abnormal_traces t2 ON t2.parent_span_id = t1.span_id AND t2.trace_id = t1.trace_id\n\
  WHERE t1.service_name IN ('ts-travel-plan-service', 'ts-preserve-service')\n  AND t1.service_name != t2.service_name\nGROUP BY t1.service_name, t2.service_name, t2.span_name, t2.attr_http_response_status_code\n\
  ORDER BY avg_dur_ms DESC\nLIMIT 30\n"
- "\n-- Compare normal durations for affected services\nSELECT service_name, span_name, \n       COUNT(*) as cnt, AVG(duration)/1e6 as avg_dur_ms, MAX(duration)/1e6 as max_dur_ms\nFROM normal_traces\nWHERE\
  \ service_name IN ('ts-travel-plan-service', 'ts-preserve-service', 'ts-route-plan-service')\n  AND span_name NOT IN ('POST', 'GET')\nGROUP BY service_name, span_name\nORDER BY avg_dur_ms DESC\nLIMIT\
  \ 20\n"
- "\n-- What does ts-route-plan-service call?\nSELECT t1.service_name as caller_service, t2.service_name as callee_service, \n       t2.span_name as callee_span, t2.attr_http_response_status_code,\n   \
  \    COUNT(*) as cnt, AVG(t2.duration)/1e6 as avg_dur_ms, MAX(t2.duration)/1e6 as max_dur_ms\nFROM abnormal_traces t1\nJOIN abnormal_traces t2 ON t2.parent_span_id = t1.span_id AND t2.trace_id = t1.trace_id\n\
  WHERE t1.service_name = 'ts-route-plan-service'\n  AND t1.service_name != t2.service_name\nGROUP BY t1.service_name, t2.service_name, t2.span_name, t2.attr_http_response_status_code\nORDER BY avg_dur_ms\
  \ DESC\nLIMIT 20\n"
- "\n-- What does ts-route-plan-service call in normal?\nSELECT t1.service_name as caller_service, t2.service_name as callee_service, \n       t2.span_name as callee_span, t2.attr_http_response_status_code,\n\
  \       COUNT(*) as cnt, AVG(t2.duration)/1e6 as avg_dur_ms, MAX(t2.duration)/1e6 as max_dur_ms\nFROM normal_traces t1\nJOIN normal_traces t2 ON t2.parent_span_id = t1.span_id AND t2.trace_id = t1.trace_id\n\
  WHERE t1.service_name = 'ts-route-plan-service'\n  AND t1.service_name != t2.service_name\nGROUP BY t1.service_name, t2.service_name, t2.span_name, t2.attr_http_response_status_code\nORDER BY avg_dur_ms\
  \ DESC\nLIMIT 20\n"
- "\n-- What does ts-travel-service call in abnormal? \nSELECT t1.service_name as caller_service, t2.service_name as callee_service, \n       t2.span_name as callee_span, t2.attr_http_response_status_code,\n\
  \       COUNT(*) as cnt, AVG(t2.duration)/1e6 as avg_dur_ms, MAX(t2.duration)/1e6 as max_dur_ms\nFROM abnormal_traces t1\nJOIN abnormal_traces t2 ON t2.parent_span_id = t1.span_id AND t2.trace_id = t1.trace_id\n\
  WHERE t1.service_name = 'ts-travel-service'\n  AND t1.service_name != t2.service_name\nGROUP BY t1.service_name, t2.service_name, t2.span_name, t2.attr_http_response_status_code\nORDER BY avg_dur_ms DESC\n\
  LIMIT 20\n"
- "\n-- What does ts-travel-service call in normal?\nSELECT t1.service_name as caller_service, t2.service_name as callee_service, \n       t2.span_name as callee_span, t2.attr_http_response_status_code,\n\
  \       COUNT(*) as cnt, AVG(t2.duration)/1e6 as avg_dur_ms, MAX(t2.duration)/1e6 as max_dur_ms\nFROM normal_traces t1\nJOIN normal_traces t2 ON t2.parent_span_id = t1.span_id AND t2.trace_id = t1.trace_id\n\
  WHERE t1.service_name = 'ts-travel-service'\n  AND t1.service_name != t2.service_name\nGROUP BY t1.service_name, t2.service_name, t2.span_name, t2.attr_http_response_status_code\nORDER BY avg_dur_ms DESC\n\
  LIMIT 20\n"
- "\n-- What does ts-basic-service call in abnormal?\nSELECT t1.service_name as caller_service, t2.service_name as callee_service, \n       t2.span_name as callee_span, t2.attr_http_response_status_code,\n\
  \       COUNT(*) as cnt, AVG(t2.duration)/1e6 as avg_dur_ms, MAX(t2.duration)/1e6 as max_dur_ms\nFROM abnormal_traces t1\nJOIN abnormal_traces t2 ON t2.parent_span_id = t1.span_id AND t2.trace_id = t1.trace_id\n\
  WHERE t1.service_name = 'ts-basic-service'\n  AND t1.service_name != t2.service_name\nGROUP BY t1.service_name, t2.service_name, t2.span_name, t2.attr_http_response_status_code\nORDER BY avg_dur_ms DESC\n\
  LIMIT 20\n"
- '

  -- Check resource metrics for ts-basic-service and ts-travel-service

  SELECT metric, service_name, AVG(value) as avg_val, MAX(value) as max_val

  FROM abnormal_metrics

  WHERE service_name IN (''ts-basic-service'', ''ts-travel-service'', ''ts-route-plan-service'', ''ts-travel-plan-service'')

  GROUP BY metric, service_name

  ORDER BY service_name, metric

  LIMIT 40

  '
- "\n-- Compare JVM and CPU metrics for ts-basic-service and related services\nSELECT filename, metric, service_name, \n       AVG(value) as avg_val, MAX(value) as max_val\nFROM (\n  SELECT 'normal' as\
  \ filename, metric, service_name, value FROM normal_metrics\n  UNION ALL\n  SELECT 'abnormal' as filename, metric, service_name, value FROM abnormal_metrics\n) \nWHERE metric IN ('jvm.system.cpu.load_1m',\
  \ 'jvm.memory.used', 'jvm.gc.duration', 'k8s.pod.cpu.usage')\n  AND service_name IN ('ts-basic-service', 'ts-travel-service', 'ts-route-plan-service')\nGROUP BY filename, metric, service_name\nORDER BY\
  \ service_name, metric, filename\n"
- "\n-- Check GC metrics from histogram\nSELECT service_name, metric, attr_jvm_gc_name, attr_jvm_gc_action,\n       COUNT(*) as cnt, AVG(sum/count) as avg_gc_dur_ms, MAX(max) as max_gc_dur_ms\nFROM abnormal_metrics_histogram\n\
  WHERE metric LIKE '%gc%' OR metric LIKE '%jvm%'\nGROUP BY service_name, metric, attr_jvm_gc_name, attr_jvm_gc_action\nORDER BY avg_gc_dur_ms DESC\nLIMIT 20\n"
- "\n-- Check logs for ts-basic-service errors \nSELECT time, level, service_name, message\nFROM abnormal_logs\nWHERE service_name = 'ts-basic-service'\n  AND level IN ('ERROR', 'WARN')\nORDER BY time ASC\n\
  LIMIT 20\n"
- "\n-- Check HTTP error rate metrics from metrics_sum\nSELECT metric, service_name, attr_destination_workload, attr_source_workload,\n       COUNT(*) as data_points, AVG(value) as avg_val, MAX(value) as\
  \ max_val\nFROM abnormal_metrics_sum\nWHERE metric LIKE '%error%' OR metric LIKE '%http%5%' OR metric LIKE '%request%'\nGROUP BY metric, service_name, attr_destination_workload, attr_source_workload\n\
  ORDER BY avg_val DESC\nLIMIT 20\n"
