raw_sql_list_sample:
- SELECT * FROM 'abnormal_logs.parquet'"
- SELECT * FROM 'abnormal_traces.parquet'"
- SELECT * FROM 'abnormal_metrics.parquet'"
- SELECT * FROM 'abnormal_metrics_histogram.parquet'" && duckdb -c "DESCRIBE SELECT * FROM 'abnormal_metrics_sum.parquet'"
- SELECT DISTINCT service_name FROM 'abnormal_logs.parquet' ORDER BY service_name"
- SELECT DISTINCT service_name FROM 'abnormal_traces.parquet' ORDER BY service_name"
- 'SELECT service_name, level, COUNT(*) as cnt

  FROM ''abnormal_logs.parquet''

  GROUP BY service_name, level

  ORDER BY cnt DESC

  LIMIT 30

  "'
- 'SELECT service_name, COUNT(*) as error_count

  FROM ''abnormal_logs.parquet''

  WHERE level IN (''ERROR'', ''CRITICAL'', ''FATAL'', ''SEVERE'')

  GROUP BY service_name

  ORDER BY error_count DESC

  LIMIT 20

  "'
- 'SELECT service_name, COUNT(*) as error_count

  FROM ''normal_logs.parquet''

  WHERE level IN (''ERROR'', ''CRITICAL'', ''FATAL'', ''SEVERE'')

  GROUP BY service_name

  ORDER BY error_count DESC

  LIMIT 20

  "'
- 'SELECT service_name, message

  FROM ''abnormal_logs.parquet''

  WHERE level IN (''ERROR'', ''CRITICAL'', ''FATAL'', ''SEVERE'')

  ORDER BY time ASC

  LIMIT 50

  "'
- "SELECT \n    service_name,\n    attr.status_code,\n    COUNT(*) as cnt,\n    AVG(duration) as avg_duration,\n    MAX(duration) as max_duration\nFROM 'abnormal_traces.parquet'\nGROUP BY service_name,\
  \ attr.status_code\nORDER BY cnt DESC\nLIMIT 30\n\""
- 'SELECT service_name, message

  FROM ''abnormal_logs.parquet''

  WHERE level IN (''ERROR'', ''CRITICAL'', ''FATAL'', ''SEVERE'')

  AND service_name = ''ts-seat-service''

  ORDER BY time ASC

  LIMIT 20

  "'
- "SELECT \n    service_name,\n    \\\"attr.status_code\\\" as status_code,\n    COUNT(*) as cnt,\n    AVG(duration) as avg_duration,\n    MAX(duration) as max_duration\nFROM 'abnormal_traces.parquet'\n\
  GROUP BY service_name, \\\"attr.status_code\\\"\nORDER BY cnt DESC\nLIMIT 30\n\""
- "SELECT \n    span_name,\n    service_name,\n    \\\"attr.status_code\\\" as status_code,\n    COUNT(*) as cnt,\n    AVG(duration) as avg_duration\nFROM 'abnormal_traces.parquet'\nWHERE \\\"attr.status_code\\\
  \" = 'Error'\nGROUP BY span_name, service_name, \\\"attr.status_code\\\"\nORDER BY cnt DESC\nLIMIT 30\n\""
- "SELECT \n    service_name,\n    \\\"attr.k8s.service.name\\\" as k8s_service,\n    COUNT(*) as cnt\nFROM 'abnormal_traces.parquet'\nWHERE \\\"attr.status_code\\\" = 'Error'\nGROUP BY service_name, \\\
  \"attr.k8s.service.name\\\"\nORDER BY cnt DESC\nLIMIT 20\n\""
- "SELECT \n    span_name,\n    service_name,\n    \\\"parent_span_id\\\" as parent_span,\n    duration,\n    \\\"attr.status_code\\\" as status_code\nFROM 'abnormal_traces.parquet'\nWHERE \\\"attr.status_code\\\
  \" = 'Error'\nAND service_name = 'ts-seat-service'\nORDER BY time ASC\nLIMIT 20\n\""
- 'SELECT DISTINCT span_name FROM ''abnormal_traces.parquet''

  WHERE span_name LIKE ''%seat%'' OR span_name LIKE ''%Seat%''

  ORDER BY span_name

  "'
- "SELECT \n    trace_id,\n    service_name,\n    span_name,\n    \\\"attr.status_code\\\" as status_code,\n    duration\nFROM 'abnormal_traces.parquet'\nWHERE trace_id IN (\n    SELECT trace_id FROM 'abnormal_traces.parquet'\
  \ \n    WHERE service_name = 'ts-seat-service' AND \\\"attr.status_code\\\" = 'Error'\n    LIMIT 10\n)\nORDER BY trace_id, time\nLIMIT 50\n\""
- "SELECT \n    trace_id,\n    service_name,\n    span_name,\n    \\\"attr.status_code\\\" as status_code,\n    duration,\n    \\\"parent_span_id\\\" as parent_span\nFROM 'abnormal_traces.parquet'\nWHERE\
  \ trace_id IN (\n    SELECT trace_id FROM 'abnormal_traces.parquet' \n    WHERE service_name = 'ts-seat-service' AND \\\"attr.status_code\\\" = 'Error'\n    LIMIT 3\n)\nORDER BY trace_id, time\n\" | head\
  \ -100"
- "SELECT \n    span_name,\n    service_name,\n    COUNT(*) as cnt\nFROM 'abnormal_traces.parquet'\nWHERE service_name = 'ts-seat-service'\nGROUP BY span_name, service_name\nORDER BY cnt DESC\nLIMIT 30\n\
  \""
