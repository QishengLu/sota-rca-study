- "\nSELECT \n    service_name,\n    COUNT(*) as total_spans,\n    SUM(CASE WHEN attr_http_response_status_code >= 400 THEN 1 ELSE 0 END) as error_spans,\n    ROUND(100.0 * SUM(CASE WHEN attr_http_response_status_code\
