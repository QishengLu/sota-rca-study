  ORDER BY error_spans DESC\n"
- "\nSELECT \n    span_name,\n    service_name,\n    COUNT(*) as total_spans,\n    SUM(CASE WHEN attr_http_response_status_code >= 400 THEN 1 ELSE 0 END) as error_spans,\n    ROUND(100.0 * SUM(CASE WHEN\
  \ attr_http_response_status_code >= 400 THEN 1 ELSE 0 END) / COUNT(*), 2) as error_rate_pct,\n    ROUND(AVG(duration)/1e6, 2) as avg_duration_ms\nFROM abnormal_traces\nWHERE service_name = 'ts-consign-service'\n\
  GROUP BY span_name, service_name\nORDER BY error_spans DESC\nLIMIT 20\n"
- "\nSELECT \n    span_name,\n    service_name,\n    attr_http_response_status_code,\n    attr_status_code,\n    COUNT(*) as count,\n    ROUND(AVG(duration)/1e6, 2) as avg_duration_ms\nFROM abnormal_traces\n\
  WHERE attr_http_response_status_code >= 400\nGROUP BY span_name, service_name, attr_http_response_status_code, attr_status_code\nORDER BY count DESC\nLIMIT 30\n"
- "\nSELECT \n    service_name,\n    level,\n    COUNT(*) as count\nFROM abnormal_logs\nGROUP BY service_name, level\nORDER BY service_name, level\n"
- "\nSELECT \n    span_name,\n    service_name,\n    COUNT(*) as total_spans,\n    ROUND(AVG(duration)/1e6, 2) as avg_duration_ms,\n    ROUND(PERCENTILE_CONT(0.95) WITHIN GROUP (ORDER BY duration)/1e6,\
  \ 2) as p95_duration_ms,\n    ROUND(PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration)/1e6, 2) as p99_duration_ms,\n    ROUND(MAX(duration)/1e6, 2) as max_duration_ms\nFROM abnormal_traces\nWHERE\
  \ span_name IN (\n    'POST /api/v1/preserveservice/preserve',\n    'POST /api/v1/travelplanservice/travelPlan/minStation',\n    'POST /api/v1/travelservice/trips/left',\n    'GET /api/v1/cancelservice/cancel/{orderId}/{loginId}',\n\
  \    'GET /api/v1/consignservice/consigns/order/{id}'\n)\nGROUP BY span_name, service_name\nORDER BY avg_duration_ms DESC\n"
- '

  SELECT time, service_name, level, message

  FROM abnormal_logs

  WHERE level IN (''SEVERE'', ''ERROR'')

  ORDER BY time

  LIMIT 50

  '
- "\nSELECT \n    span_name,\n    service_name,\n    COUNT(*) as total_spans,\n    ROUND(AVG(duration)/1e6, 2) as avg_duration_ms,\n    ROUND(PERCENTILE_CONT(0.95) WITHIN GROUP (ORDER BY duration)/1e6,\
  \ 2) as p95_duration_ms,\n    ROUND(PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration)/1e6, 2) as p99_duration_ms\nFROM normal_traces\nWHERE span_name IN (\n    'POST /api/v1/preserveservice/preserve',\n\
  \    'POST /api/v1/travelplanservice/travelPlan/minStation',\n    'POST /api/v1/travelservice/trips/left',\n    'GET /api/v1/cancelservice/cancel/{orderId}/{loginId}',\n    'GET /api/v1/consignservice/consigns/order/{id}'\n\
  )\nGROUP BY span_name, service_name\nORDER BY avg_duration_ms DESC\n"
- '

  SELECT time, service_name, level, message

  FROM abnormal_logs

  WHERE service_name = ''ts-consign-service'' AND level IN (''SEVERE'', ''WARN'', ''ERROR'')

  ORDER BY time

  LIMIT 20

  '
- "\nSELECT \n    span_name,\n    service_name,\n    COUNT(*) as total_spans,\n    ROUND(AVG(duration)/1e6, 2) as avg_duration_ms,\n    ROUND(MAX(duration)/1e6, 2) as max_duration_ms\nFROM abnormal_traces\n\
  WHERE service_name IN ('ts-cancel-service', 'ts-order-service', 'ts-order-other-service')\nGROUP BY span_name, service_name\nORDER BY avg_duration_ms DESC\nLIMIT 30\n"
- "\n-- Look at what services are called by the high-latency services\nSELECT \n    a.service_name as parent_service,\n    b.service_name as child_service,\n    b.span_name,\n    COUNT(*) as call_count,\n\
  \    ROUND(AVG(b.duration)/1e6, 2) as avg_duration_ms,\n    ROUND(MAX(b.duration)/1e6, 2) as max_duration_ms\nFROM abnormal_traces a\nJOIN abnormal_traces b ON a.span_id = b.parent_span_id\nWHERE a.service_name\
  \ IN ('ts-preserve-service', 'ts-travel-plan-service', 'ts-travel-service', 'ts-cancel-service')\n  AND b.attr_span_kind = 'INTERNAL'\n  AND b.duration > 100000000  -- spans > 100ms\nGROUP BY a.service_name,\
  \ b.service_name, b.span_name\nORDER BY avg_duration_ms DESC\nLIMIT 30\n"
- '

  SELECT DISTINCT metric, service_name

  FROM abnormal_metrics

  WHERE service_name IN (''ts-travel-service'', ''ts-preserve-service'', ''ts-travel-plan-service'', ''ts-cancel-service'', ''ts-consign-service'')

  ORDER BY service_name, metric

  LIMIT 50

  '
- "\n-- Find child spans of the high-latency affected services to identify slow dependencies\nSELECT \n    b.service_name as called_service,\n    b.span_name as called_span,\n    COUNT(*) as call_count,\n\
  \    ROUND(AVG(b.duration)/1e6, 2) as avg_duration_ms,\n    ROUND(MAX(b.duration)/1e6, 2) as max_duration_ms\nFROM abnormal_traces a\nJOIN abnormal_traces b ON a.trace_id = b.trace_id AND a.span_id =\
  \ b.parent_span_id\nWHERE a.service_name IN ('ts-preserve-service', 'ts-travel-plan-service', 'ts-travel-service', 'ts-cancel-service')\n  AND a.service_name != b.service_name\nGROUP BY b.service_name,\
  \ b.span_name\nORDER BY avg_duration_ms DESC\nLIMIT 30\n"
- "\n-- Compare normal latency for route-plan-service \nSELECT \n    span_name,\n    service_name,\n    COUNT(*) as total_spans,\n    ROUND(AVG(duration)/1e6, 2) as avg_duration_ms,\n    ROUND(PERCENTILE_CONT(0.95)\
  \ WITHIN GROUP (ORDER BY duration)/1e6, 2) as p95_duration_ms,\n    ROUND(PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration)/1e6, 2) as p99_duration_ms,\n    ROUND(MAX(duration)/1e6, 2) as max_duration_ms\n\
  FROM normal_traces\nWHERE service_name = 'ts-route-plan-service'\nGROUP BY span_name, service_name\nORDER BY avg_duration_ms DESC\nLIMIT 20\n"
- "\n-- Find what ts-route-plan-service calls (its downstream dependencies)\nSELECT \n    b.service_name as called_service,\n    b.span_name as called_span,\n    COUNT(*) as call_count,\n    ROUND(AVG(b.duration)/1e6,\
  \ 2) as avg_duration_ms,\n    ROUND(MAX(b.duration)/1e6, 2) as max_duration_ms\nFROM abnormal_traces a\nJOIN abnormal_traces b ON a.trace_id = b.trace_id AND a.span_id = b.parent_span_id\nWHERE a.service_name\
  \ = 'ts-route-plan-service'\n  AND a.service_name != b.service_name\nGROUP BY b.service_name, b.span_name\nORDER BY avg_duration_ms DESC\nLIMIT 20\n"
- "\n-- Check what ts-travel-service calls and how slow those calls are\nSELECT \n    b.service_name as called_service,\n    b.span_name as called_span,\n    COUNT(*) as call_count,\n    ROUND(AVG(b.duration)/1e6,\
  \ 2) as avg_duration_ms,\n    ROUND(MAX(b.duration)/1e6, 2) as max_duration_ms\nFROM abnormal_traces a\nJOIN abnormal_traces b ON a.trace_id = b.trace_id AND a.span_id = b.parent_span_id\nWHERE a.service_name\
  \ = 'ts-travel-service'\n  AND a.span_name = 'POST /api/v1/travelservice/trips/left'\n  AND a.service_name != b.service_name\nGROUP BY b.service_name, b.span_name\nORDER BY avg_duration_ms DESC\nLIMIT\
  \ 20\n"
- "\n-- Check CPU/memory metrics for affected services\nSELECT \n    service_name,\n    metric,\n    ROUND(AVG(value), 4) as avg_value,\n    ROUND(MAX(value), 4) as max_value\nFROM abnormal_metrics\nWHERE\
  \ metric IN ('k8s.pod.cpu_limit_utilization', 'k8s.pod.memory.rss', 'jvm.cpu.recent_utilization', 'container.cpu.usage', 'jvm.system.cpu.utilization')\n  AND service_name IN ('ts-seat-service', 'ts-basic-service',\
  \ 'ts-travel-service', 'ts-route-plan-service', 'ts-travel2-service', 'ts-consign-service')\nGROUP BY service_name, metric\nORDER BY service_name, metric\n"
- "\n-- Check hubble latency metrics for services in abnormal scenario \nSELECT \n    service_name,\n    metric,\n    ROUND(AVG(value), 4) as avg_value,\n    ROUND(MAX(value), 4) as max_value\nFROM abnormal_metrics\n\
  WHERE metric IN ('hubble_http_request_duration_p50_seconds', 'hubble_http_request_duration_p99_seconds', 'hubble_http_request_duration_p95_seconds')\nGROUP BY service_name, metric\nORDER BY service_name,\
  \ metric\nLIMIT 60\n"
- "\n-- Check hubble latency metrics for services in normal scenario\nSELECT \n    service_name,\n    metric,\n    ROUND(AVG(value), 4) as avg_value,\n    ROUND(MAX(value), 4) as max_value\nFROM normal_metrics\n\
  WHERE metric IN ('hubble_http_request_duration_p50_seconds', 'hubble_http_request_duration_p99_seconds', 'hubble_http_request_duration_p95_seconds')\nGROUP BY service_name, metric\nORDER BY service_name,\
  \ metric\nLIMIT 60\n"
- "\n-- Compare p99 latency for key services between normal and abnormal\nSELECT \n    service_name,\n    metric,\n    ROUND(AVG(value), 4) as avg_value,\n    ROUND(MAX(value), 4) as max_value\nFROM abnormal_metrics\n\
  WHERE metric = 'hubble_http_request_duration_p99_seconds'\n  AND service_name NOT LIKE 'ts-admin%'\nGROUP BY service_name, metric\nORDER BY max_value DESC\n"
- "\nSELECT \n    service_name,\n    metric,\n    ROUND(AVG(value), 4) as avg_value,\n    ROUND(MAX(value), 4) as max_value\nFROM normal_metrics\nWHERE metric = 'hubble_http_request_duration_p99_seconds'\n\
  \  AND service_name NOT LIKE 'ts-admin%'\n  AND value IS NOT NULL\nGROUP BY service_name, metric\nORDER BY max_value DESC\n"
