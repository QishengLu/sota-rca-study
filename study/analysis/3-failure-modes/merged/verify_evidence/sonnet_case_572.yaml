- idx: 91
  text: '## Root Cause Analysis — Final Report


    ### Summary of Findings


    After systematically analyzing all telemetry data, I identified **two distinct root causes** driving the five SLO violations:


    ---


    ### Root Cause 1: `ts-order-service` — HIGH GC PRESSURE (Primary)


    **Evidence:**

    - **JVM GC Duration** (abnormal): max single pause = **8.54s** vs normal max = 2.89s (**3× worse**)

    - **Trace evidence**: `OrderRepository.findByAccountId` shows max 8,544ms — exactly correlating with GC stop-the-world events

    - **Hubble p99 metric**: Normal max 4.425s → Abnormal max **9.875s** (+123%)


    **Cascade chain:**

    1. ts-order-service GC pauses cause ts-seat-service calls to stall → ts-seat-service accumulates blocked-request memory → triggers secondary GC in ts-seat-service

    2. Slow ts-seat-service delays ts-travel-service

    3. Slow ts-travel-service delays ts-route-plan-service and ts-preserve-service

    4. Slow ts-route-plan-service delays ts-travel-plan-service

    5. ts-cancel-service directly calls ts-order-service → delayed by GC


    ---


    ### Root Cause 2: `ts-consign-service` — HIGH ERROR RATE (Independent)


    **Evidence:**

    - **95.31% error rate** on `GET /api/v1/consignservice/consigns/order/{id}`

    - **122 SEVE'
