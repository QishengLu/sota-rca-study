raw_sql_list_sample:
- "\nSELECT service_name, \n       COUNT(*) as total_spans,\n       SUM(CASE WHEN attr_http_response_status_code >= 400 OR attr_status_code = 'ERROR' THEN 1 ELSE 0 END) as error_spans,\n       ROUND(100.0\
  \ * SUM(CASE WHEN attr_http_response_status_code >= 400 OR attr_status_code = 'ERROR' THEN 1 ELSE 0 END) / COUNT(*), 2) as error_pct,\n       AVG(duration) as avg_duration_ns,\n       MAX(duration) as\
  \ max_duration_ns\nFROM abnormal_traces\nGROUP BY service_name\nORDER BY error_pct DESC, error_spans DESC\n"
- '

  SELECT service_name, level, COUNT(*) as count

  FROM abnormal_logs

  GROUP BY service_name, level

  ORDER BY service_name, level

  '
- '

  SELECT time, service_name, level, message

  FROM abnormal_logs

  WHERE level IN (''ERROR'', ''SEVERE'', ''WARN'')

  ORDER BY time

  LIMIT 50

  '
- "\nSELECT service_name, \n       COUNT(*) as total_spans,\n       AVG(duration) as avg_duration_ns,\n       MAX(duration) as max_duration_ns\nFROM normal_traces\nGROUP BY service_name\nORDER BY avg_duration_ns\
  \ DESC\n"
- '

  SELECT time, service_name, level, message

  FROM abnormal_logs

  WHERE service_name IN (''ts-notification-service'', ''ts-delivery-service'', ''ts-food-service'')

  AND level = ''ERROR''

  ORDER BY time

  LIMIT 30

  '
- '

  SELECT span_name, service_name, parent_span_id, trace_id, span_id, duration, attr_status_code, attr_http_response_status_code

  FROM abnormal_traces

  WHERE service_name = ''ts-preserve-service''

  AND duration > 1000000000

  ORDER BY duration DESC

  LIMIT 20

  '
- '

  SELECT span_name, service_name, span_id, parent_span_id, duration, attr_status_code, attr_http_response_status_code

  FROM abnormal_traces

  WHERE trace_id = ''48d7befe3c5b4245081577b39e513c2b''

  ORDER BY duration DESC

  '
- '

  SELECT DISTINCT metric FROM abnormal_metrics ORDER BY metric

  '
- '

  SELECT span_name, service_name, span_id, parent_span_id, duration, attr_status_code

  FROM abnormal_traces

  WHERE span_name LIKE ''%SELECT%'' OR span_name LIKE ''%PriceConfig%''

  ORDER BY duration DESC

  LIMIT 20

  '
- '

  SELECT service_name, metric, AVG(value) as avg_val, MAX(value) as max_val

  FROM abnormal_metrics

  WHERE metric IN (''container.cpu.usage'', ''container.memory.usage'', ''jvm.cpu.recent_utilization'')

  GROUP BY service_name, metric

  ORDER BY service_name, metric

  '
- '

  SELECT ''abnormal'' as period, service_name, metric, AVG(value) as avg_val, MAX(value) as max_val

  FROM abnormal_metrics

  WHERE service_name = ''mysql''

  GROUP BY service_name, metric

  UNION ALL

  SELECT ''normal'' as period, service_name, metric, AVG(value) as avg_val, MAX(value) as max_val

  FROM normal_metrics

  WHERE service_name = ''mysql''

  GROUP BY service_name, metric

  ORDER BY metric, period

  '
- '

  SELECT DISTINCT metric FROM abnormal_metrics_sum ORDER BY metric

  '
- '

  SELECT ''abnormal'' as period, service_name, metric, AVG(value) as avg_val, MAX(value) as max_val

  FROM abnormal_metrics_sum

  WHERE metric IN (''hubble_drop_total'', ''k8s.pod.network.errors'', ''db.client.connections.pending_requests'', ''db.client.connections.usage'', ''db.client.connections.max'')

  GROUP BY service_name, metric

  UNION ALL

  SELECT ''normal'' as period, service_name, metric, AVG(value) as avg_val, MAX(value) as max_val

  FROM normal_metrics_sum

  WHERE metric IN (''hubble_drop_total'', ''k8s.pod.network.errors'', ''db.client.connections.pending_requests'', ''db.client.connections.usage'', ''db.client.connections.max'')

  GROUP BY service_name, metric

  ORDER BY metric, period, service_name

  '
- '

  SELECT service_name, metric, attr_destination, attr_source, AVG(value) as avg_val, MAX(value) as max_val

  FROM abnormal_metrics_sum

  WHERE metric = ''hubble_drop_total''

  GROUP BY service_name, metric, attr_destination, attr_source

  ORDER BY avg_val DESC

  '
- '

  SELECT ''abnormal'' as period, service_name, metric, AVG(value) as avg_val, MAX(value) as max_val

  FROM abnormal_metrics_sum

  WHERE metric IN (''db.client.connections.pending_requests'', ''db.client.connections.usage'', ''k8s.pod.network.errors'')

  GROUP BY service_name, metric

  UNION ALL

  SELECT ''normal'' as period, service_name, metric, AVG(value) as avg_val, MAX(value) as max_val

  FROM normal_metrics_sum

  WHERE metric IN (''db.client.connections.pending_requests'', ''db.client.connections.usage'', ''k8s.pod.network.errors'')

  GROUP BY service_name, metric

  ORDER BY metric, service_name, period

  '
- '

  SELECT service_name, metric, attr_k8s_pod_name, AVG(value) as avg_val, MAX(value) as max_val

  FROM abnormal_metrics_sum

  WHERE metric = ''k8s.pod.network.errors''

  GROUP BY service_name, metric, attr_k8s_pod_name

