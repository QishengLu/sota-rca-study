- "\nSELECT 'abnormal' as period, service_name,\n       COUNT(*) as total,\n       AVG(duration) as avg_ns,\n       MAX(duration) as max_ns,\n       PERCENTILE_CONT(0.95) WITHIN GROUP (ORDER BY duration)\
  \ as p95_ns\nFROM abnormal_traces\nWHERE service_name = 'ts-price-service'\nAND span_name LIKE '%PriceConfig%'\nGROUP BY service_name\nUNION ALL\nSELECT 'normal' as period, service_name,\n       COUNT(*)\
  \ as total,\n       AVG(duration) as avg_ns,\n       MAX(duration) as max_ns,\n       PERCENTILE_CONT(0.95) WITHIN GROUP (ORDER BY duration) as p95_ns\nFROM normal_traces\nWHERE service_name = 'ts-price-service'\n\
  AND span_name LIKE '%PriceConfig%'\nGROUP BY service_name\n"
- "\nSELECT service_name, metric, attr_jvm_gc_name, attr_jvm_gc_action, \n       AVG(count) as avg_count, AVG(sum) as avg_sum, MAX(max) as max_val\nFROM abnormal_metrics_histogram\nWHERE metric LIKE '%jvm.gc%'\n\
  GROUP BY service_name, metric, attr_jvm_gc_name, attr_jvm_gc_action\nORDER BY avg_sum DESC\nLIMIT 20\n"
- "\nSELECT 'abnormal' as period, service_name, attr_jvm_gc_name, attr_jvm_gc_action,\n       AVG(count) as avg_count, AVG(sum) as avg_sum_s, MAX(max) as max_s\nFROM abnormal_metrics_histogram\nWHERE metric\
  \ LIKE '%jvm.gc%'\nGROUP BY service_name, attr_jvm_gc_name, attr_jvm_gc_action\nUNION ALL\nSELECT 'normal' as period, service_name, attr_jvm_gc_name, attr_jvm_gc_action,\n       AVG(count) as avg_count,\
  \ AVG(sum) as avg_sum_s, MAX(max) as max_s\nFROM normal_metrics_histogram\nWHERE metric LIKE '%jvm.gc%'\nGROUP BY service_name, attr_jvm_gc_name, attr_jvm_gc_action\nORDER BY service_name, attr_jvm_gc_name,\
  \ period\n"
- "\nSELECT 'abnormal' as period, service_name, metric, attr_k8s_node_name,\n       AVG(value) as avg_val, MAX(value) as max_val\nFROM abnormal_metrics_sum\nWHERE metric IN ('jvm.memory.used', 'jvm.memory.limit',\
  \ 'jvm.memory.committed')\nAND service_name IN ('ts-price-service', 'ts-config-service', 'ts-train-service', 'ts-route-service', 'ts-preserve-service', 'ts-order-service')\nGROUP BY service_name, metric,\
  \ attr_k8s_node_name\nUNION ALL\nSELECT 'normal' as period, service_name, metric, attr_k8s_node_name,\n       AVG(value) as avg_val, MAX(value) as max_val\nFROM normal_metrics_sum\nWHERE metric IN ('jvm.memory.used',\
  \ 'jvm.memory.limit', 'jvm.memory.committed')\nAND service_name IN ('ts-price-service', 'ts-config-service', 'ts-train-service', 'ts-route-service', 'ts-preserve-service', 'ts-order-service')\nGROUP BY\
  \ service_name, metric, attr_k8s_node_name\nORDER BY service_name, metric, period\n"
