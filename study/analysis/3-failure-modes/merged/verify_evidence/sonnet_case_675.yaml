raw_sql_list_sample:
- "\nSELECT service_name, span_name, attr_status_code, attr_http_response_status_code, \n       COUNT(*) as span_count,\n       AVG(duration) as avg_duration_ns,\n       MAX(duration) as max_duration_ns,\n\
  \       SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 500 THEN 1 ELSE 0 END) as error_count\nFROM abnormal_traces\nGROUP BY service_name, span_name, attr_status_code, attr_http_response_status_code\n\
  ORDER BY error_count DESC, avg_duration_ns DESC\nLIMIT 30\n"
- "\nSELECT service_name, span_name, attr_status_code, attr_http_response_status_code,\n       COUNT(*) as span_count,\n       AVG(duration) as avg_duration_ns\nFROM abnormal_traces\nWHERE span_name LIKE\
  \ '%travelPlan%' OR span_name LIKE '%routePlan%'\n   OR service_name LIKE '%travel-plan%' OR service_name LIKE '%route-plan%'\nGROUP BY service_name, span_name, attr_status_code, attr_http_response_status_code\n\
  ORDER BY span_count DESC\nLIMIT 30\n"
- "\n-- Find a sample trace that shows the full chain for minStation errors\nSELECT trace_id, service_name, span_name, span_id, parent_span_id, \n       duration, attr_status_code, attr_http_response_status_code,\
  \ time\nFROM abnormal_traces\nWHERE trace_id IN (\n    SELECT DISTINCT trace_id FROM abnormal_traces\n    WHERE span_name = 'POST /api/v1/travelplanservice/travelPlan/minStation'\n    AND attr_status_code\
  \ = 'Error'\n    LIMIT 3\n)\nORDER BY trace_id, time\nLIMIT 50\n"
- "\n-- Look at the GET span in ts-route-plan-service - what service is it calling?\n-- Also look for what happens in ts-route-plan-service beyond the GET\nSELECT trace_id, service_name, span_name, span_id,\
  \ parent_span_id,\n       duration, attr_status_code, attr_http_response_status_code, time\nFROM abnormal_traces\nWHERE trace_id = '7106814042b838efd0dac9153707e706'\nORDER BY time\nLIMIT 50\n"
- '

  SELECT time, service_name, level, message

  FROM abnormal_logs

  WHERE service_name = ''ts-route-plan-service''

  ORDER BY time

  LIMIT 30

  '
- '

  SELECT time, service_name, level, message

  FROM abnormal_logs

  WHERE service_name = ''ts-route-plan-service'' AND level IN (''SEVERE'', ''ERROR'', ''WARN'')

  ORDER BY time

  LIMIT 30

  '
- '

  SELECT service_name, level, COUNT(*) as count

  FROM abnormal_logs

  GROUP BY service_name, level

  ORDER BY service_name, level

  LIMIT 50

  '
- "\n-- Check ts-travel-service errors in the abnormal period\nSELECT service_name, span_name, attr_status_code, attr_http_response_status_code,\n       COUNT(*) as count, AVG(duration) as avg_duration\n\
  FROM abnormal_traces\nWHERE service_name IN ('ts-travel-service', 'ts-travel2-service')\nGROUP BY service_name, span_name, attr_status_code, attr_http_response_status_code\nORDER BY count DESC\nLIMIT\
  \ 30\n"
- '

  SELECT service_name, level, COUNT(*) as count

  FROM abnormal_logs

  WHERE service_name IN (''ts-travel-service'', ''ts-travel2-service'', ''ts-route-plan-service'')

  GROUP BY service_name, level

  ORDER BY service_name, level

  LIMIT 30

  '
- '

  -- Find distinct services with severe/error logs

  SELECT service_name, level, message, time

  FROM abnormal_logs

  WHERE level IN (''SEVERE'', ''ERROR'') AND service_name NOT IN (''ts-route-plan-service'')

  ORDER BY time

  LIMIT 30

  '
- '

  SELECT DISTINCT metric, service_name

  FROM abnormal_metrics

  WHERE service_name LIKE ''%travel%''

  ORDER BY service_name, metric

  LIMIT 30

  '
- "\n-- Count SEVERE errors per time window for route-plan-service to see when they spike\nSELECT \n    DATE_TRUNC('minute', time) as minute,\n    COUNT(*) as severe_count\nFROM abnormal_logs\nWHERE service_name\
  \ = 'ts-route-plan-service' AND level = 'SEVERE'\nGROUP BY DATE_TRUNC('minute', time)\nORDER BY minute\nLIMIT 30\n"
- '

  SELECT DISTINCT metric

  FROM abnormal_metrics

  WHERE service_name = ''ts-travel-service''

  LIMIT 30

  '
- '

  -- Compare CPU/memory for ts-travel-service between normal and abnormal

  SELECT metric, service_name, AVG(value) as avg_value, MAX(value) as max_value

  FROM abnormal_metrics

  WHERE service_name IN (''ts-travel-service'', ''ts-travel2-service'')

  AND metric IN (''container.cpu.usage'', ''container.memory.usage'', ''container.memory.working_set'')

  GROUP BY metric, service_name

  ORDER BY metric, service_name

  LIMIT 30

  '
- '

  SELECT metric, service_name, AVG(value) as avg_value, MAX(value) as max_value

  FROM normal_metrics

  WHERE service_name IN (''ts-travel-service'', ''ts-travel2-service'')

  AND metric IN (''container.cpu.usage'', ''container.memory.usage'', ''container.memory.working_set'')

  GROUP BY metric, service_name

  ORDER BY metric, service_name

  LIMIT 30

  '
- '

  -- Check JVM metrics for ts-travel-service

  SELECT metric, service_name, AVG(value) as avg_value, MAX(value) as max_value

  FROM abnormal_metrics

  WHERE service_name = ''ts-travel-service''

  AND metric LIKE ''%jvm%''

  GROUP BY metric, service_name

  ORDER BY metric

  LIMIT 20

  '
- "\n-- Check hubble network metrics for travel service\nSELECT metric, service_name, attr_destination_workload, attr_source_workload, \n       AVG(value) as avg_value, MAX(value) as max_value, COUNT(*)\
  \ as count\nFROM abnormal_metrics\nWHERE metric LIKE '%hubble%'\nAND (attr_destination_workload LIKE '%travel%' OR attr_source_workload LIKE '%travel%')\nGROUP BY metric, service_name, attr_destination_workload,\
  \ attr_source_workload\nORDER BY metric, avg_value DESC\nLIMIT 30\n"
- '

  -- Compare hubble metrics for travel service normal vs abnormal

  SELECT DISTINCT metric

  FROM abnormal_metrics

