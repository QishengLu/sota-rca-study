raw_sql_list_sample:
- "\nSELECT \n    service_name,\n    span_name,\n    attr_status_code,\n    COUNT(*) as total_spans,\n    SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 500 THEN 1 ELSE 0\
  \ END) as error_spans,\n    AVG(duration) as avg_duration_ns,\n    MAX(duration) as max_duration_ns\nFROM abnormal_traces\nGROUP BY service_name, span_name, attr_status_code\nORDER BY error_spans DESC\n\
  LIMIT 30\n"
- "\nSELECT \n    service_name,\n    level,\n    COUNT(*) as log_count\nFROM abnormal_logs\nGROUP BY service_name, level\nORDER BY service_name, level\n"
- "\nSELECT \n    time,\n    service_name,\n    level,\n    message\nFROM abnormal_logs\nWHERE level IN ('ERROR', 'SEVERE') \n  AND service_name IN ('ts-travel2-service', 'ts-route-plan-service', 'ts-travel-plan-service',\
  \ 'ts-travel-service')\nORDER BY time\nLIMIT 50\n"
- "\nSELECT \n    t1.trace_id,\n    t1.span_id,\n    t1.service_name as parent_service,\n    t1.span_name as parent_span,\n    t2.service_name as child_service,\n    t2.span_name as child_span,\n    t2.attr_status_code\
  \ as child_status,\n    t2.duration as child_duration_ns\nFROM abnormal_traces t1\nJOIN abnormal_traces t2 ON t1.span_id = t2.parent_span_id\nWHERE t2.attr_status_code = 'Error'\n  AND t1.service_name\
  \ IN ('ts-travel2-service', 'ts-route-plan-service', 'ts-travel-plan-service', 'ts-travel-service', 'ts-ui-dashboard')\nORDER BY t2.duration DESC\nLIMIT 30\n"
- "\n-- Find what ts-travel2-service calls (its children spans) to understand the full call chain\nSELECT \n    t1.service_name as parent_service,\n    t1.span_name as parent_span,\n    t2.service_name\
  \ as child_service,\n    t2.span_name as child_span,\n    t2.attr_status_code as child_status,\n    t2.attr_http_response_status_code as child_http_status,\n    COUNT(*) as count,\n    AVG(t2.duration)\
  \ as avg_dur\nFROM abnormal_traces t1\nJOIN abnormal_traces t2 ON t1.span_id = t2.parent_span_id\nWHERE t1.service_name = 'ts-travel2-service'\nGROUP BY t1.service_name, t1.span_name, t2.service_name,\
  \ t2.span_name, t2.attr_status_code, t2.attr_http_response_status_code\nORDER BY count DESC\nLIMIT 20\n"
- "\n-- Look at ts-seat-service logs for any errors\nSELECT \n    time,\n    service_name,\n    level,\n    message\nFROM abnormal_logs\nWHERE service_name = 'ts-seat-service'\n  AND level != 'INFO'\nORDER\
  \ BY time\nLIMIT 20\n"
- "\n-- Find the full call tree for ts-travel2-service errors - look at who travel2 calls\nSELECT \n    t2.service_name as child_service,\n    t2.span_name as child_span,\n    t2.attr_status_code as child_status,\n\
  \    t2.attr_http_response_status_code as child_http_status,\n    COUNT(*) as count,\n    AVG(t2.duration) as avg_dur\nFROM abnormal_traces t1\nJOIN abnormal_traces t2 ON t1.span_id = t2.parent_span_id\n\
  WHERE t1.span_name LIKE '%seat%' OR t2.span_name LIKE '%seat%'\n   OR t1.service_name = 'ts-seat-service' OR t2.service_name = 'ts-seat-service'\nGROUP BY t2.service_name, t2.span_name, t2.attr_status_code,\
  \ t2.attr_http_response_status_code\nORDER BY count DESC\nLIMIT 20\n"
- "\n-- Look at ts-seat-service spans in detail\nSELECT \n    span_name,\n    attr_status_code,\n    attr_http_response_status_code,\n    COUNT(*) as count,\n    AVG(duration) as avg_dur,\n    MAX(duration)\
  \ as max_dur\nFROM abnormal_traces\nWHERE service_name = 'ts-seat-service'\nGROUP BY span_name, attr_status_code, attr_http_response_status_code\nORDER BY count DESC\nLIMIT 20\n"
- "\n-- Check metrics for ts-seat-service to find resource issues\nSELECT \n    metric,\n    service_name,\n    AVG(value) as avg_val,\n    MAX(value) as max_val,\n    MIN(value) as min_val,\n    COUNT(*)\
  \ as count\nFROM abnormal_metrics\nWHERE service_name = 'ts-seat-service'\nGROUP BY metric, service_name\nORDER BY metric\nLIMIT 30\n"
- "\n-- Compare normal vs abnormal seat service metrics\nSELECT \n    a.metric,\n    AVG(n.value) as normal_avg,\n    AVG(a.value) as abnormal_avg,\n    MAX(a.value) as abnormal_max\nFROM abnormal_metrics\
  \ a\nJOIN normal_metrics n ON a.metric = n.metric AND a.service_name = n.service_name\nWHERE a.service_name = 'ts-seat-service'\nGROUP BY a.metric\nORDER BY a.metric\nLIMIT 30\n"
- "\n-- Who calls ts-seat-service and what are the results\nSELECT \n    t1.service_name as caller,\n    t1.span_name as caller_span,\n    t2.span_name as seat_span,\n    t2.attr_status_code as status,\n\
  \    t2.attr_http_response_status_code as http_status,\n    COUNT(*) as count,\n    AVG(t2.duration) as avg_dur_ns,\n    MAX(t2.duration) as max_dur_ns\nFROM abnormal_traces t1\nJOIN abnormal_traces t2\
  \ ON t1.span_id = t2.parent_span_id\nWHERE t2.service_name = 'ts-seat-service'\nGROUP BY t1.service_name, t1.span_name, t2.span_name, t2.attr_status_code, t2.attr_http_response_status_code\nORDER BY count\
  \ DESC\nLIMIT 20\n"
- "\n-- Check network metrics for ts-seat-service pod  \nSELECT DISTINCT metric, service_name\nFROM abnormal_metrics\nWHERE service_name = 'ts-seat-service'\nLIMIT 30\n"
- "\n-- Check ALL metrics for ts-seat-service including network metrics\nSELECT DISTINCT metric\nFROM abnormal_metrics\nWHERE service_name = 'ts-seat-service'\n   OR attr_k8s_pod_name LIKE '%seat%'\n  \
  \ OR attr_destination_workload LIKE '%seat%'\n   OR attr_source_workload LIKE '%seat%'\nORDER BY metric\nLIMIT 30\n"
- "\n-- Check metrics sum for seat service - look for HTTP request metrics\nSELECT \n    metric,\n    service_name,\n    attr_destination_workload,\n    attr_source_workload,\n    AVG(value) as avg_val,\n\
  \    MAX(value) as max_val,\n    SUM(value) as total_val,\n    COUNT(*) as count\nFROM abnormal_metrics_sum\nWHERE service_name = 'ts-seat-service'\n   OR attr_destination_workload LIKE '%seat%'\n   OR\
  \ attr_source_workload LIKE '%seat%'\nGROUP BY metric, service_name, attr_destination_workload, attr_source_workload\nORDER BY metric, total_val DESC\nLIMIT 30\n"
- '

  -- Check all available metrics with k8s.pod prefix for network issues

  SELECT DISTINCT metric

  FROM abnormal_metrics

  WHERE metric LIKE ''%network%'' OR metric LIKE ''%http%'' OR metric LIKE ''%error%''

  ORDER BY metric

  LIMIT 30

  '
- '

  -- Check what metrics are available for travel2 service

  SELECT DISTINCT metric

  FROM abnormal_metrics_sum

  WHERE service_name = ''ts-travel2-service''

  ORDER BY metric

  LIMIT 30

  '
- '

  -- Check all unique k8s pod metrics

  SELECT DISTINCT metric

  FROM abnormal_metrics

  WHERE metric LIKE ''k8s.pod%''

  ORDER BY metric

  LIMIT 30

  '
- "\n-- Check k8s pod metrics for seat and travel2 services\nSELECT \n    metric,\n    service_name,\n    attr_k8s_pod_name,\n    AVG(value) as avg_val,\n    MAX(value) as max_val\nFROM abnormal_metrics\n\
  WHERE (service_name LIKE '%seat%' OR service_name LIKE '%travel2%')\n  AND metric LIKE 'k8s.pod%'\nGROUP BY metric, service_name, attr_k8s_pod_name\nORDER BY metric, service_name\nLIMIT 30\n"
- "\n-- Compare ts-travel2-service to ts-seat-service in normal traces\nSELECT \n    t1.service_name as caller,\n    t2.service_name as called,\n    t2.span_name as called_span,\n    t2.attr_status_code\
  \ as status,\n    COUNT(*) as count,\n    AVG(t2.duration) as avg_dur\nFROM normal_traces t1\nJOIN normal_traces t2 ON t1.span_id = t2.parent_span_id\nWHERE t1.service_name = 'ts-travel2-service' \n \
  \ AND t2.service_name = 'ts-seat-service'\nGROUP BY t1.service_name, t2.service_name, t2.span_name, t2.attr_status_code\nORDER BY count DESC\nLIMIT 10\n"
- "\n-- Get more error details - see all unique error messages  \nSELECT DISTINCT message\nFROM abnormal_logs\nWHERE service_name IN ('ts-travel2-service', 'ts-route-plan-service', 'ts-travel-plan-service')\n\
  \  AND level IN ('SEVERE', 'ERROR')\nORDER BY message\nLIMIT 20\n"
