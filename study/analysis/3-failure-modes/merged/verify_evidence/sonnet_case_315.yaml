raw_sql_list_sample:
- "\nSELECT \n    service_name,\n    COUNT(*) as total_spans,\n    SUM(CASE WHEN attr_status_code = 'STATUS_CODE_ERROR' OR attr_http_response_status_code >= 400 THEN 1 ELSE 0 END) as error_spans,\n    AVG(duration)\
  \ as avg_duration_ns,\n    MAX(duration) as max_duration_ns,\n    ROUND(100.0 * SUM(CASE WHEN attr_status_code = 'STATUS_CODE_ERROR' OR attr_http_response_status_code >= 400 THEN 1 ELSE 0 END) / COUNT(*),\
  \ 2) as error_rate_pct\nFROM abnormal_traces\nGROUP BY service_name\nORDER BY error_spans DESC\n"
- "\nSELECT \n    service_name,\n    level,\n    COUNT(*) as count\nFROM abnormal_logs\nGROUP BY service_name, level\nORDER BY service_name, level\n"
- "\nSELECT \n    time,\n    service_name,\n    level,\n    message\nFROM abnormal_logs\nWHERE level IN ('ERROR', 'SEVERE', 'WARN')\nORDER BY time\nLIMIT 30\n"
- "\nSELECT \n    service_name,\n    span_name,\n    duration,\n    attr_status_code,\n    attr_http_response_status_code,\n    attr_http_request_method,\n    time\nFROM abnormal_traces\nWHERE duration\
  \ > 5000000000\nORDER BY duration DESC\nLIMIT 20\n"
- "\nSELECT \n    service_name,\n    span_name,\n    duration,\n    attr_status_code,\n    attr_http_response_status_code,\n    attr_http_request_method,\n    time\nFROM abnormal_traces\nWHERE service_name\
  \ = 'ts-seat-service'\nORDER BY duration DESC\nLIMIT 20\n"
- '

  SELECT DISTINCT metric, service_name

  FROM abnormal_metrics

  ORDER BY service_name, metric

  LIMIT 50

  '
- "\n-- Find trace IDs where ts-seat-service had errors to understand what it was calling\nSELECT \n    t1.trace_id,\n    t1.service_name as caller,\n    t1.span_name as caller_span,\n    t2.service_name\
  \ as callee,\n    t2.span_name as callee_span,\n    t1.duration,\n    t1.attr_http_response_status_code\nFROM abnormal_traces t1\nJOIN abnormal_traces t2 ON t1.trace_id = t2.trace_id\nWHERE t1.service_name\
  \ = 'ts-seat-service'\n  AND t1.span_name = 'POST'\n  AND t1.attr_http_response_status_code = 504\n  AND t2.service_name != 'ts-seat-service'\nORDER BY t1.duration DESC\nLIMIT 20\n"
- "\n-- Find what ts-seat-service calls in normal operation\nSELECT DISTINCT \n    service_name,\n    span_name\nFROM normal_traces\nWHERE span_name LIKE '%seat%' OR service_name = 'ts-seat-service'\nORDER\
  \ BY service_name, span_name\nLIMIT 20\n"
- "\nSELECT \n    time,\n    metric,\n    value,\n    attr_k8s_pod_name,\n    attr_k8s_container_name,\n    attr_k8s_deployment_name\nFROM abnormal_metrics\nWHERE attr_k8s_deployment_name LIKE '%order%'\
  \ OR attr_k8s_pod_name LIKE '%order%'\nORDER BY time\nLIMIT 40\n"
- "\n-- Check the cancel and assurance service traces for errors\nSELECT \n    service_name,\n    span_name,\n    duration,\n    attr_status_code,\n    attr_http_response_status_code,\n    time\nFROM abnormal_traces\n\
  WHERE service_name IN ('ts-cancel-service', 'ts-assurance-service')\nORDER BY duration DESC\nLIMIT 20\n"
- "\n-- Look for ts-order-service specific pod\nSELECT DISTINCT\n    metric,\n    attr_k8s_pod_name,\n    attr_k8s_deployment_name\nFROM abnormal_metrics\nWHERE attr_k8s_pod_name LIKE 'ts-order-service%'\n\
  ORDER BY metric\nLIMIT 30\n"
- "\n-- Look for route-plan-service traces\nSELECT \n    service_name,\n    span_name,\n    duration,\n    attr_status_code,\n    attr_http_response_status_code,\n    time\nFROM abnormal_traces\nWHERE service_name\
  \ = 'ts-route-plan-service'\nORDER BY duration DESC\nLIMIT 15\n"
- "\nSELECT \n    time,\n    metric,\n    value,\n    attr_k8s_pod_name\nFROM abnormal_metrics\nWHERE attr_k8s_pod_name = 'ts-order-service-56b9db98d8-wxvvn'\n  AND metric IN ('container.cpu.usage', 'container.memory.usage',\
  \ 'container.memory.working_set', \n                 'jvm.cpu.recent_utilization', 'jvm.system.cpu.utilization', 'jvm.system.cpu.load_1m',\n                 'k8s.container.restarts', 'k8s.pod.phase')\n\
  ORDER BY time, metric\nLIMIT 30\n"
- "\n-- Check for any database pods or ts-order related pods\nSELECT DISTINCT attr_k8s_pod_name, attr_k8s_deployment_name\nFROM abnormal_metrics\nWHERE attr_k8s_pod_name LIKE '%mongo%' \n   OR attr_k8s_pod_name\
  \ LIKE '%mysql%'\n   OR attr_k8s_pod_name LIKE '%redis%'\n   OR attr_k8s_pod_name LIKE '%db%'\nORDER BY attr_k8s_pod_name\nLIMIT 20\n"
- "\n-- Check MySQL pod metrics\nSELECT \n    time,\n    metric,\n    value,\n    attr_k8s_pod_name\nFROM abnormal_metrics\nWHERE attr_k8s_pod_name = 'mysql-0'\nORDER BY time, metric\nLIMIT 30\n"
- "\n-- Check normal CPU usage for ts-order-service \nSELECT \n    time,\n    metric,\n    value,\n    attr_k8s_pod_name\nFROM normal_metrics\nWHERE attr_k8s_pod_name LIKE 'ts-order-service%'\n  AND metric\
  \ = 'container.cpu.usage'\nORDER BY time\nLIMIT 20\n"
- "\n-- Check JVM GC metrics for ts-order-service\nSELECT \n    time,\n    metric,\n    count,\n    sum,\n    min,\n    max,\n    attr_k8s_pod_name,\n    attr_jvm_gc_action,\n    attr_jvm_gc_name\nFROM\
  \ abnormal_metrics_histogram\nWHERE attr_k8s_pod_name LIKE 'ts-order-service%'\nORDER BY time\nLIMIT 20\n"
- "\n-- Check all CPU values over time for ts-order-service during the incident  \nSELECT \n    time,\n    metric,\n    value\nFROM abnormal_metrics\nWHERE attr_k8s_pod_name = 'ts-order-service-56b9db98d8-wxvvn'\n\
  \  AND metric = 'container.cpu.usage'\nORDER BY time\n"
- "\n-- Check order service error logs for more detail\nSELECT \n    time,\n    service_name,\n    level,\n    message\nFROM abnormal_logs\nWHERE service_name = 'ts-order-service'\n  AND level IN ('ERROR',\
  \ 'WARN', 'SEVERE')\nORDER BY time\nLIMIT 10\n"
