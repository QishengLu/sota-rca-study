raw_sql_list_sample:
- SELECT service_name, span_name, attr_status_code, attr_http_response_status_code, COUNT(*) as count, AVG(duration) as avg_duration, MAX(duration) as max_duration FROM abnormal_traces WHERE span_name LIKE
  '%travelPlan%' OR span_name LIKE '%travelplan%' OR service_name LIKE '%travel%' GROUP BY service_name, span_name, attr_status_code, attr_http_response_status_code ORDER BY count DESC
- SELECT service_name, COUNT(*) as total_spans, SUM(CASE WHEN attr_status_code = 'STATUS_CODE_ERROR' OR attr_http_response_status_code >= 500 THEN 1 ELSE 0 END) as error_count, AVG(duration) as avg_duration
  FROM abnormal_traces GROUP BY service_name ORDER BY error_count DESC
- SELECT t1.trace_id, t1.service_name, t1.span_name, t1.duration, t1.attr_status_code, t1.attr_http_response_status_code FROM abnormal_traces t1 WHERE t1.trace_id IN ( SELECT DISTINCT trace_id FROM abnormal_traces
  WHERE span_name LIKE '%travelPlan%' AND service_name = 'ts-travel-plan-service' ) ORDER BY t1.trace_id, t1.time LIMIT 50
- SELECT service_name, span_name, COUNT(*) as count, AVG(duration) as avg_duration FROM normal_traces WHERE span_name LIKE '%travelPlan%' OR service_name LIKE '%travel-plan%' GROUP BY service_name, span_name
  ORDER BY count DESC
- SELECT time, service_name, level, message FROM abnormal_logs WHERE level IN ('ERROR', 'WARN') ORDER BY time ASC LIMIT 30
- SELECT service_name, span_name, COUNT(*) as count, AVG(duration) as avg_duration_ns, MAX(duration) as max_duration_ns FROM abnormal_traces WHERE service_name IN ('ts-travel2-service', 'ts-travel-service',
  'ts-travel-plan-service') GROUP BY service_name, span_name ORDER BY avg_duration_ns DESC LIMIT 20
- SELECT DISTINCT metric, service_name FROM abnormal_metrics WHERE service_name LIKE '%travel%' ORDER BY service_name, metric
- SELECT time, service_name, level, message FROM abnormal_logs WHERE service_name LIKE '%travel%' ORDER BY time ASC LIMIT 20
- SELECT metric, service_name, AVG(value) as avg_value, MAX(value) as max_value, MIN(value) as min_value FROM abnormal_metrics WHERE service_name IN ('ts-travel-plan-service', 'ts-travel2-service') AND
  metric IN ('jvm.cpu.recent_utilization', 'jvm.system.cpu.utilization', 'container.cpu.usage', 'k8s.pod.cpu.usage', 'container.memory.usage', 'k8s.pod.memory.usage') GROUP BY metric, service_name ORDER
  BY service_name, metric
- SELECT metric, service_name, AVG(value) as avg_value, MAX(value) as max_value, MIN(value) as min_value FROM normal_metrics WHERE service_name IN ('ts-travel-plan-service', 'ts-travel2-service') AND metric
  IN ('jvm.cpu.recent_utilization', 'jvm.system.cpu.utilization', 'container.cpu.usage', 'k8s.pod.cpu.usage', 'container.memory.usage', 'k8s.pod.memory.usage') GROUP BY metric, service_name ORDER BY service_name,
  metric
- SELECT metric, service_name, time, value FROM abnormal_metrics WHERE service_name = 'ts-travel-plan-service' AND metric IN ('k8s.deployment.available', 'k8s.deployment.desired', 'k8s.pod.network.errors',
  'k8s.pod.network.io') ORDER BY metric, time
- SELECT DISTINCT metric, service_name FROM abnormal_metrics_sum WHERE service_name LIKE '%travel%' ORDER BY service_name, metric
- SELECT metric, service_name, AVG(value) as avg_value, MAX(value) as max_value FROM abnormal_metrics_sum WHERE service_name IN ('ts-travel-plan-service', 'ts-travel2-service') AND metric IN ('jvm.thread.count',
  'k8s.pod.network.errors', 'k8s.pod.network.io', 'jvm.memory.used', 'jvm.memory.limit') GROUP BY metric, service_name ORDER BY service_name, metric
- SELECT metric, service_name, AVG(value) as avg_value, MAX(value) as max_value FROM normal_metrics_sum WHERE service_name IN ('ts-travel-plan-service', 'ts-travel2-service') AND metric IN ('jvm.thread.count',
  'k8s.pod.network.errors', 'k8s.pod.network.io', 'jvm.memory.used', 'jvm.memory.limit') GROUP BY metric, service_name ORDER BY service_name, metric
- SELECT service_name, span_name, COUNT(*) as count, AVG(duration) as avg_duration, MAX(duration) as max_duration FROM normal_traces WHERE service_name IN ('ts-travel2-service', 'ts-travel-service') AND
  span_name LIKE '%trips/left%' GROUP BY service_name, span_name ORDER BY count DESC
- SELECT metric, service_name, AVG(sum/count) as avg_value, MAX(max) as max_value, AVG(count) as avg_count FROM abnormal_metrics_histogram WHERE service_name LIKE '%travel%' GROUP BY metric, service_name
  ORDER BY service_name, metric
- SELECT metric, service_name, AVG(sum/count) as avg_value, MAX(max) as max_value, AVG(count) as avg_count FROM normal_metrics_histogram WHERE service_name LIKE '%travel%' GROUP BY metric, service_name
  ORDER BY service_name, metric
- SELECT metric, service_name, attr_destination_workload, attr_source_workload, AVG(value) as avg_value, MAX(value) as max_value FROM abnormal_metrics WHERE metric LIKE '%http%' AND (attr_destination_workload
  LIKE '%travel%' OR attr_source_workload LIKE '%travel%') GROUP BY metric, service_name, attr_destination_workload, attr_source_workload ORDER BY metric, service_name LIMIT 20
- SELECT t1.trace_id, t1.service_name, t1.span_name, t1.duration, t1.attr_status_code FROM normal_traces t1 WHERE t1.trace_id IN ( SELECT DISTINCT trace_id FROM normal_traces WHERE span_name LIKE '%travelPlan/quickest%'
  AND service_name = 'ts-travel-plan-service' LIMIT 1 ) ORDER BY t1.time LIMIT 30
- SELECT trace_id, service_name, span_name, duration, attr_http_response_status_code FROM abnormal_traces WHERE service_name = 'ts-travel2-service' AND span_name = 'POST /api/v1/travel2service/trips/left'
  ORDER BY duration DESC LIMIT 10
