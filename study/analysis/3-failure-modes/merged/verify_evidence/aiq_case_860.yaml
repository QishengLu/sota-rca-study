- SELECT service_name, attr_http_response_status_code, COUNT(*) as count FROM abnormal_traces WHERE service_name IN ('travelplanservice', 'preserveservice', 'travelservice', 'consignservice', 'cancelservice')
  AND attr_http_response_status_code IS NOT NULL GROUP BY service_name, attr_http_response_status_code ORDER BY service_name, attr_http_response_status_code
- SELECT DISTINCT service_name FROM abnormal_traces LIMIT 30
- SELECT service_name, attr_http_response_status_code, COUNT(*) as count FROM abnormal_traces WHERE service_name IN ('ts-travel-plan-service', 'ts-preserve-service', 'ts-travel-service', 'ts-consign-service',
  'ts-order-service') AND attr_http_response_status_code IS NOT NULL GROUP BY service_name, attr_http_response_status_code ORDER BY service_name, attr_http_response_status_code
- "SELECT service_name, \n       SUM(CASE WHEN attr_http_response_status_code >= 500 THEN 1 ELSE 0 END) as error_count,\n       COUNT(*) as total_count,\n       CAST(SUM(CASE WHEN attr_http_response_status_code\
  \ >= 500 THEN 1 ELSE 0 END) AS DOUBLE) / COUNT(*) as error_rate\nFROM abnormal_traces \nWHERE service_name IN ('ts-travel-plan-service', 'ts-preserve-service', 'ts-travel-service', 'ts-consign-service',\
  \ 'ts-order-service')\nGROUP BY service_name \nORDER BY error_rate DESC"
- SELECT service_name, level, COUNT(*) as count FROM abnormal_logs WHERE service_name IN ('ts-travel-plan-service', 'ts-preserve-service', 'ts-travel-service', 'ts-consign-service', 'ts-order-service')
