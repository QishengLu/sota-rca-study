raw_sql_list_sample:
- "\nSELECT service_name, span_name, attr_http_response_status_code, COUNT(*) as count, \n       AVG(duration) as avg_duration, MAX(duration) as max_duration,\n       SUM(CASE WHEN attr_status_code = 'ERROR'\
  \ OR attr_http_response_status_code >= 400 THEN 1 ELSE 0 END) as error_count\nFROM abnormal_traces\nWHERE service_name LIKE '%travelplan%' OR span_name LIKE '%travelPlan%' OR span_name LIKE '%travel%'\n\
  GROUP BY service_name, span_name, attr_http_response_status_code\nORDER BY count DESC\nLIMIT 30\n"
- "\nSELECT service_name, COUNT(*) as total_spans, \n       SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 400 THEN 1 ELSE 0 END) as error_count,\n       AVG(duration) as\
  \ avg_duration,\n       PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration) as p99_duration\nFROM abnormal_traces\nGROUP BY service_name\nORDER BY error_count DESC\nLIMIT 20\n"
- "\n-- Find traces related to travelplan with errors and trace the call chain\nSELECT t1.service_name, t1.span_name, t1.duration, t1.attr_http_response_status_code, t1.attr_status_code,\n       t1.trace_id,\
  \ t1.span_id, t1.parent_span_id\nFROM abnormal_traces t1\nWHERE t1.span_name LIKE '%travelPlan%'\nORDER BY t1.time DESC\nLIMIT 20\n"
- "\n-- Find a trace_id with 502 error from travelplan to trace the full call chain\nSELECT trace_id, service_name, span_name, span_id, parent_span_id, \n       attr_http_response_status_code, attr_status_code,\
  \ duration\nFROM abnormal_traces\nWHERE trace_id IN (\n    SELECT DISTINCT trace_id\n    FROM abnormal_traces\n    WHERE span_name LIKE '%travelPlan%' AND attr_http_response_status_code = 502\n    LIMIT\
  \ 3\n)\nORDER BY trace_id, duration DESC\nLIMIT 50\n"
- "\n-- Get full call chain for a successful travelplan/cheapest request\nSELECT trace_id, service_name, span_name, span_id, parent_span_id, \n       attr_http_response_status_code, attr_status_code, duration\n\
  FROM abnormal_traces\nWHERE trace_id IN (\n    SELECT DISTINCT trace_id\n    FROM abnormal_traces\n    WHERE service_name = 'ts-travel-plan-service' AND span_name LIKE '%cheapest%'\n    LIMIT 2\n)\nORDER\
  \ BY trace_id, duration DESC\nLIMIT 30\n"
- "\n-- Compare durations for services in abnormal vs normal - particularly ts-route-plan-service and ts-basic-service\nSELECT service_name, span_name, COUNT(*) as count,\n       AVG(duration) as avg_duration,\n\
  \       PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration) as p99_duration\nFROM abnormal_traces\nWHERE service_name IN ('ts-route-plan-service', 'ts-basic-service', 'ts-travel-plan-service', \n \
  \                       'ts-travel-service', 'ts-travel2-service')\nGROUP BY service_name, span_name\nORDER BY avg_duration DESC\nLIMIT 20\n"
- "\n-- Compare normal durations for same services\nSELECT service_name, span_name, COUNT(*) as count,\n       AVG(duration) as avg_duration,\n       PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration)\
  \ as p99_duration\nFROM normal_traces\nWHERE service_name IN ('ts-route-plan-service', 'ts-basic-service', 'ts-travel-plan-service', \n                        'ts-travel-service', 'ts-travel2-service')\n\
  GROUP BY service_name, span_name\nORDER BY avg_duration DESC\nLIMIT 20\n"
- '

  SELECT service_name, level, message, time

  FROM abnormal_logs

  WHERE level IN (''ERROR'', ''WARN'', ''error'', ''warn'')

  GROUP BY service_name, level, message, time

  ORDER BY time

  LIMIT 30

  '
- '

  SELECT service_name, level, COUNT(*) as count

  FROM abnormal_logs

  WHERE level IN (''ERROR'', ''WARN'', ''error'', ''warn'')

  GROUP BY service_name, level

  ORDER BY count DESC

  LIMIT 20

  '
- '

  SELECT DISTINCT metric FROM abnormal_metrics

  WHERE service_name LIKE ''%travel-plan%'' OR attr_k8s_deployment_name LIKE ''%travel-plan%''

  LIMIT 30

  '
- '

  SELECT service_name, message, time

  FROM abnormal_logs

  WHERE service_name LIKE ''%travel-plan%''

  ORDER BY time

  LIMIT 30

  '
- "\n-- Check CPU and memory metrics for ts-travel-plan-service\nSELECT metric, time, value, attr_k8s_pod_name\nFROM abnormal_metrics\nWHERE (attr_k8s_deployment_name LIKE '%travel-plan%' OR attr_k8s_pod_name\
  \ LIKE '%travel-plan%')\n  AND metric IN ('k8s.pod.cpu.usage', 'k8s.pod.memory.usage', 'container.cpu.usage', 'container.memory.usage', 'k8s.pod.cpu_limit_utilization', 'k8s.pod.memory_limit_utilization',\
  \ 'k8s.deployment.available', 'k8s.deployment.desired')\nORDER BY time\nLIMIT 30\n"
- "\n-- Check deployment availability metrics for services related to travelplan\nSELECT metric, time, value, attr_k8s_deployment_name, service_name\nFROM abnormal_metrics\nWHERE metric IN ('k8s.deployment.available',\
  \ 'k8s.deployment.desired')\n  AND attr_k8s_deployment_name LIKE '%travel%'\nORDER BY time\nLIMIT 20\n"
- '

  -- Check JVM GC metrics for ts-travel-plan-service

  SELECT service_name, metric, time, count, sum, min, max, attr_jvm_gc_name, attr_jvm_gc_action, attr_k8s_pod_name

  FROM abnormal_metrics_histogram

  WHERE service_name = ''ts-travel-plan-service'' OR attr_k8s_pod_name LIKE ''%travel-plan%''

  ORDER BY time

  LIMIT 20

  '
- "\n-- Check metrics_sum for ts-travel-plan-service  \nSELECT metric, time, value, attr_k8s_pod_name, attr_k8s_deployment_name\nFROM abnormal_metrics_sum\nWHERE attr_k8s_deployment_name LIKE '%travel-plan%'\
  \ OR attr_k8s_pod_name LIKE '%travel-plan%'\nORDER BY time\nLIMIT 20\n"
- '

  -- Find the earliest and latest timestamps in abnormal metrics

  SELECT MIN(time) as min_time, MAX(time) as max_time FROM abnormal_metrics

  '
- '

  -- Find the earliest and latest timestamps in normal metrics

  SELECT MIN(time) as min_time, MAX(time) as max_time FROM normal_metrics

  '
- "\n-- Check CPU and memory for ts-travel-plan-service in normal (pre-crash) period, especially near 10:49:39\nSELECT metric, time, value, attr_k8s_pod_name\nFROM normal_metrics\nWHERE (attr_k8s_deployment_name\
  \ LIKE '%travel-plan%' OR attr_k8s_pod_name LIKE '%travel-plan%')\n  AND metric IN ('k8s.pod.cpu.usage', 'k8s.pod.memory.usage', 'container.cpu.usage', 'container.memory.usage', \n                 'k8s.pod.cpu_limit_utilization',\
  \ 'k8s.pod.memory_limit_utilization',\n                 'jvm.system.cpu.utilization', 'jvm.cpu.recent_utilization')\nORDER BY time DESC\nLIMIT 30\n"
- '

  -- Check JVM GC for ts-travel-plan-service in normal period

  SELECT service_name, metric, time, count, sum, min, max, attr_jvm_gc_name

  FROM normal_metrics_histogram

  WHERE service_name = ''ts-travel-plan-service''

  ORDER BY time DESC

  LIMIT 15

  '
- '

  -- Check all services'' JVM GC metrics to find abnormally long GC pauses

  SELECT service_name, metric, time, count, sum, min, max, attr_jvm_gc_name

  FROM normal_metrics_histogram

  WHERE metric = ''jvm.gc.duration''

  ORDER BY max DESC

  LIMIT 20

  '
