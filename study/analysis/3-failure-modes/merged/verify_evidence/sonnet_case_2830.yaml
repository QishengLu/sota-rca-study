raw_sql_list_sample:
- "\nSELECT \n    service_name,\n    COUNT(*) as total_spans,\n    SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 400 THEN 1 ELSE 0 END) as error_spans,\n    ROUND(100.0 *\
  \ SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 400 THEN 1 ELSE 0 END) / COUNT(*), 2) as error_rate_pct,\n    ROUND(AVG(duration)/1e6, 2) as avg_duration_ms,\n    ROUND(PERCENTILE_CONT(0.99)\
  \ WITHIN GROUP (ORDER BY duration)/1e6, 2) as p99_duration_ms\nFROM abnormal_traces\nGROUP BY service_name\nORDER BY error_spans DESC\nLIMIT 30\n"
- "\nSELECT \n    span_name,\n    service_name,\n    COUNT(*) as total,\n    SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 400 THEN 1 ELSE 0 END) as errors,\n    ROUND(AVG(duration)/1e6,\
  \ 2) as avg_ms,\n    ROUND(PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration)/1e6, 2) as p99_ms\nFROM abnormal_traces\nWHERE span_name LIKE '%travelPlan%' OR span_name LIKE '%travel2%' OR span_name\
  \ LIKE '%trips%'\nGROUP BY span_name, service_name\nORDER BY errors DESC\nLIMIT 30\n"
- "\n-- Find one trace_id with travelplan errors, then look at full call chain\nSELECT trace_id, span_name, service_name, duration, attr_status_code, attr_http_response_status_code\nFROM abnormal_traces\n\
  WHERE trace_id IN (\n    SELECT trace_id FROM abnormal_traces \n    WHERE span_name LIKE '%travelPlan/cheapest%' AND (attr_status_code = 'ERROR' OR attr_http_response_status_code >= 400)\n    LIMIT 3\n\
  )\nORDER BY trace_id, time\nLIMIT 100\n"
- '

  -- Look at all spans in the cheapest route trace

  SELECT trace_id, span_id, parent_span_id, span_name, service_name, duration, attr_status_code, attr_http_response_status_code

  FROM abnormal_traces

  WHERE trace_id = ''810da0faf5a4c0f75bd1eaf71ff71b1e''

  ORDER BY time

  LIMIT 100

  '
- "\n-- Look at route-plan-service spans in error traces to see what it calls\nSELECT \n    span_name,\n    service_name,\n    COUNT(*) as total,\n    SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code\
  \ >= 400 THEN 1 ELSE 0 END) as errors,\n    ROUND(AVG(duration)/1e6, 2) as avg_ms\nFROM abnormal_traces\nWHERE service_name = 'ts-route-plan-service'\nGROUP BY span_name, service_name\nORDER BY errors\
  \ DESC\nLIMIT 30\n"
- '

  -- See all spans in the cheapest error trace to understand call chain

  SELECT span_id, parent_span_id, span_name, service_name, ROUND(duration/1e6, 2) as duration_ms, attr_status_code, attr_http_response_status_code

  FROM abnormal_traces

  WHERE trace_id = ''810da0faf5a4c0f75bd1eaf71ff71b1e''

  ORDER BY time

  LIMIT 36

  '
- "\n-- Look at what services ts-route-plan-service calls (via POST span_name pattern)\nSELECT span_name, service_name, \n    COUNT(*) as total,\n    SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code\
  \ >= 400 THEN 1 ELSE 0 END) as errors,\n    ROUND(AVG(duration)/1e6, 2) as avg_ms\nFROM abnormal_traces\nWHERE service_name IN ('ts-route-plan-service', 'ts-travel-plan-service')\nAND span_name NOT LIKE\
  \ '%Controller%' AND span_name NOT LIKE '%Repository%'\nGROUP BY span_name, service_name\nORDER BY errors DESC\nLIMIT 20\n"
- '

  -- Find traces containing BOTH route-plan-service AND travel2-service

  SELECT t1.trace_id

  FROM abnormal_traces t1

  JOIN abnormal_traces t2 ON t1.trace_id = t2.trace_id

  WHERE t1.service_name = ''ts-route-plan-service''

  AND t2.service_name = ''ts-travel2-service''

  GROUP BY t1.trace_id

  LIMIT 5

  '
- "\n-- Check travel2service trips/left error - what's the direct caller (parent span)?\nSELECT \n    t1.trace_id,\n    t1.span_id,\n    t1.parent_span_id,\n    t1.span_name as travel2_span,\n    t1.service_name\
  \ as travel2_service,\n    t1.attr_status_code,\n    t1.attr_http_response_status_code,\n    t2.span_name as parent_span,\n    t2.service_name as parent_service\nFROM abnormal_traces t1\nLEFT JOIN abnormal_traces\
  \ t2 ON t1.parent_span_id = t2.span_id AND t1.trace_id = t2.trace_id\nWHERE t1.service_name = 'ts-travel2-service' \nAND t1.span_name = 'POST /api/v1/travel2service/trips/left'\nAND (t1.attr_status_code\
  \ = 'ERROR' OR t1.attr_http_response_status_code >= 400)\nLIMIT 10\n"
- '

  -- Look at complete trace with route-plan + travel2 service to understand the full chain

  SELECT span_id, parent_span_id, span_name, service_name, ROUND(duration/1e6,2) as dur_ms, attr_status_code, attr_http_response_status_code

  FROM abnormal_traces

  WHERE trace_id = ''3063a9a36c38318a2779626dd0d8c62b''

  ORDER BY time

  LIMIT 30

