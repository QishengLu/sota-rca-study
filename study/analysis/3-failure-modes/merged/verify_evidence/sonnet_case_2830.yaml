  '
- '

  -- Find what service ts-travel2-service is calling that fails

  SELECT span_id, parent_span_id, span_name, service_name, ROUND(duration/1e6,2) as dur_ms, attr_status_code, attr_http_response_status_code

  FROM abnormal_traces

  WHERE trace_id = ''7c60a5916ffe53be1fe8a033d7aa3514''

  AND parent_span_id IN (''d800b5c3f328a6a5'', ''09a4fe1177f5f352'', ''efa84614881f293b'')

  LIMIT 10

  '
- "\n-- Find all spans in traces that contain travel2-service errors, to see what it's calling\nSELECT DISTINCT t2.span_name, t2.service_name, COUNT(*) as cnt,\n    SUM(CASE WHEN t2.attr_status_code = 'ERROR'\
  \ OR t2.attr_http_response_status_code >= 400 THEN 1 ELSE 0 END) as errors\nFROM abnormal_traces t1\nJOIN abnormal_traces t2 ON t1.trace_id = t2.trace_id AND t1.parent_span_id = t1.span_id\nWHERE t1.service_name\
  \ = 'ts-travel2-service'\nAND t1.span_name = 'POST'\nAND (t1.attr_status_code = 'ERROR' OR t1.attr_status_code = 'Error')\nAND t2.service_name != 'ts-travel2-service'\nGROUP BY t2.span_name, t2.service_name\n\
  LIMIT 15\n"
- "\n-- Look at what ts-travel2-service calls in NORMAL conditions during trips/left\nSELECT t1.span_id, t1.span_name as travel2_span, t1.service_name,\n       t2.span_name as child_span, t2.service_name\
  \ as child_service, \n       t2.attr_http_response_status_code as child_http_code,\n       ROUND(t2.duration/1e6, 2) as child_dur_ms\nFROM normal_traces t1\nJOIN normal_traces t2 ON t1.trace_id = t2.trace_id\
  \ AND t2.parent_span_id = t1.span_id\nWHERE t1.service_name = 'ts-travel2-service'\nAND t1.span_name IN ('POST', 'Travel2Controller.queryInfo')\nLIMIT 15\n"
- "\n-- In abnormal traces, what services are called FROM ts-travel2-service POST spans (successful case)\nSELECT t1.span_id, t1.span_name as travel2_span, t1.service_name,\n       t2.span_name as child_span,\
  \ t2.service_name as child_service, \n       t2.attr_http_response_status_code as child_http_code,\n       ROUND(t2.duration/1e6, 2) as child_dur_ms\nFROM abnormal_traces t1\nJOIN abnormal_traces t2 ON\
  \ t1.trace_id = t2.trace_id AND t2.parent_span_id = t1.span_id\nWHERE t1.service_name = 'ts-travel2-service'\nAND t1.span_name = 'POST'\nAND t1.attr_http_response_status_code = 200\nLIMIT 15\n"
- "\n-- Compare average metric values for services involved in the incident\nSELECT \n    service_name,\n    metric,\n    ROUND(AVG(value), 4) as avg_value,\n    ROUND(MAX(value), 4) as max_value\nFROM\
  \ abnormal_metrics\nWHERE service_name IN ('ts-travel2-service', 'ts-basic-service', 'ts-seat-service', 'ts-route-plan-service', 'ts-travel-plan-service', 'ts-travel-service')\nGROUP BY service_name,\
  \ metric\nORDER BY service_name, metric\nLIMIT 40\n"
