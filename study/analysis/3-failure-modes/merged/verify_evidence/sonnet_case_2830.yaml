- '

  -- Check error logs from all services

  SELECT service_name, level, COUNT(*) as cnt

  FROM abnormal_logs

  WHERE level IN (''ERROR'', ''WARN'', ''error'', ''warn'')

  GROUP BY service_name, level

  ORDER BY cnt DESC

