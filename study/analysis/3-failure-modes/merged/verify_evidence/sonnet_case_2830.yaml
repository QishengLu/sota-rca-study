- "\n-- All unique span names in ts-travel2-service in abnormal traces\nSELECT \n    span_name,\n    service_name,\n    COUNT(*) as total,\n    SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code\
  \ >= 400 THEN 1 ELSE 0 END) as errors,\n    ROUND(AVG(duration)/1e6, 2) as avg_ms\nFROM abnormal_traces\nWHERE service_name = 'ts-travel2-service'\nGROUP BY span_name, service_name\nORDER BY errors DESC\n\
  LIMIT 20\n"
- "\n-- Find a trace where travel2-service fails and look at full span chain \nSELECT span_id, parent_span_id, span_name, service_name, ROUND(duration/1e6,2) as dur_ms, attr_status_code, attr_http_response_status_code\n\
  FROM abnormal_traces\nWHERE trace_id = '7c60a5916ffe53be1fe8a033d7aa3514'\nORDER BY time\nLIMIT 30\n"
- '

  -- Check error logs for ts-travel2-service

  SELECT time, level, service_name, message

  FROM abnormal_logs

  WHERE service_name = ''ts-travel2-service'' AND level IN (''ERROR'', ''WARN'')

