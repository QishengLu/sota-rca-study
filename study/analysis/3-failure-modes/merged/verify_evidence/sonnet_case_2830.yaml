  text: "## Root Cause Analysis Summary\n\n### Investigation Findings\n\n**1. Service Error Rates in Abnormal Period:**\n| Service | Error Rate | Key Details |\n|---------|-----------|-------------|\n|\
    \ `ts-travel-plan-service` | 30.38% | All 3 travelPlan endpoints affected |\n| `ts-route-plan-service` | 25.38% | All routePlan endpoints affected |\n| `ts-travel2-service` | 8.05% (80% on trips/left)\
    \ | Direct endpoint + trip_detail |\n| `ts-ui-dashboard` | 4.66% | Propagated errors |\n\n**2. Fault Propagation Chain (from trace analysis):**\n- `ts-route-plan-service` calls both `ts-travel-service`\
    \ (✅ 200 OK) AND `ts-travel2-service` (❌ 500 Error)\n- `ts-travel2-service` makes **CLIENT-side POST calls** that fail with `attr_http_response_status_code = null` (no HTTP response at all, ~1-8ms duration)\
    \ → **connection-level failure**\n- These are calls to `ts-basic-service` (confirmed from normal trace patterns showing `Travel2Controller.queryInfo → POST /api/v1/basicservice/basic/travels`)\n\n**3.\
    \ Root Cause Evidence — `ts-basic-service`:**\n- **queueSize**: 9 (normal) → **38.75 avg, max 173** (abnormal) = **+331% increase** — highest relative increase of any service\n- **jvm.system.cpu.load_1m**:\
    \ 89 → 120 avg, peak **298** on a 128-core system (+34%)\n- **container.cpu.usage**: +31% increase\n\nThe `ts-basic-service` thread pool queue saturation (max 173!) causes new connection attempts from\
    \ `ts-travel2-service` to be rejected immediately (connection refused/reset), explaining the 1-8ms failures with no HTTP response.\n\n---\n\n## Final CausalGraph\n\n```json\n{\n  \"nodes\": [\n    {\n\
