- "SELECT \n    trace_id, \n    STRING_AGG(service_name || ':' || span_name, ' -> ' ORDER BY time) as call_chain\nFROM 'abnormal_traces.parquet' \nWHERE trace_id = 'e150f445dcc100ad333157bdb3a5bbba'\nGROUP\
