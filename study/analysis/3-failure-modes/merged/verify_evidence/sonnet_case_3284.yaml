raw_sql_list_sample:
- "\nSELECT service_name, span_name, attr_status_code, attr_http_response_status_code, \n       COUNT(*) as count, AVG(duration) as avg_duration, MAX(duration) as max_duration,\n       SUM(CASE WHEN attr_status_code\
  \ = 'ERROR' OR attr_http_response_status_code >= 500 THEN 1 ELSE 0 END) as error_count\nFROM abnormal_traces\nGROUP BY service_name, span_name, attr_status_code, attr_http_response_status_code\nORDER\
  \ BY error_count DESC, count DESC\nLIMIT 30\n"
- "\nSELECT service_name, span_name, AVG(duration)/1e9 as avg_duration_sec, MAX(duration)/1e9 as max_duration_sec, \n       COUNT(*) as count, \n       PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration)/1e9\
  \ as p99_sec\nFROM abnormal_traces\nWHERE span_name LIKE '%travel%' OR span_name LIKE '%travelPlan%' OR span_name LIKE '%quickest%' OR span_name LIKE '%minStation%' OR span_name LIKE '%cheapest%'\n  \
  \ OR service_name LIKE '%travel%'\nGROUP BY service_name, span_name\nORDER BY avg_duration_sec DESC\nLIMIT 30\n"
- "\nSELECT service_name, span_name, AVG(duration)/1e9 as avg_duration_sec, MAX(duration)/1e9 as max_duration_sec, \n       COUNT(*) as count, \n       PERCENTILE_CONT(0.95) WITHIN GROUP (ORDER BY duration)/1e9\
  \ as p95_sec,\n       PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration)/1e9 as p99_sec\nFROM abnormal_traces\nGROUP BY service_name, span_name\nORDER BY avg_duration_sec DESC\nLIMIT 30\n"
- "\n-- Find the trace chain for travelplanservice - what does it call?\nSELECT t1.trace_id, t1.span_id, t1.service_name, t1.span_name, t1.duration/1e9 as dur_sec,\n       t2.service_name as parent_service,\
  \ t2.span_name as parent_span\nFROM abnormal_traces t1\nLEFT JOIN abnormal_traces t2 ON t1.parent_span_id = t2.span_id AND t1.trace_id = t2.trace_id\nWHERE t1.service_name = 'ts-travel-plan-service'\n\
  \  AND t1.span_name NOT LIKE 'POST %'\n  AND t1.span_name NOT LIKE 'GET %'\n  AND t1.span_name NOT LIKE 'TravelPlanController%'\nORDER BY t1.duration DESC\nLIMIT 20\n"
- "\n-- Let me take a specific high-latency trace and follow the full call chain\nWITH slow_traces AS (\n  SELECT DISTINCT trace_id \n  FROM abnormal_traces\n  WHERE span_name = 'POST /api/v1/travelplanservice/travelPlan/minStation'\n\
  \    AND duration > 10000000000\n  LIMIT 3\n)\nSELECT t.trace_id, t.span_id, t.parent_span_id, t.service_name, t.span_name, \n       t.duration/1e9 as dur_sec, t.attr_status_code, t.attr_http_response_status_code\n\
  FROM abnormal_traces t\nJOIN slow_traces st ON t.trace_id = st.trace_id\nORDER BY t.trace_id, t.time\nLIMIT 100\n"
- "\n-- Get all spans in a slow travelPlan trace to see the full call chain  \n-- Let me count spans in trace 577ac5a578fdf439770dfc8d3765605d and look for the slow part\nSELECT t.service_name, t.span_name,\
  \ t.duration/1e9 as dur_sec, t.attr_status_code\nFROM abnormal_traces t\nWHERE t.trace_id = '577ac5a578fdf439770dfc8d3765605d'\nORDER BY t.duration DESC\nLIMIT 50\n"
- "\n-- Find the child spans of the slow POST spans from ts-travel-plan-service\nWITH tpservice_post AS (\n  SELECT span_id, trace_id, duration/1e9 as dur_sec\n  FROM abnormal_traces\n  WHERE service_name\
  \ = 'ts-travel-plan-service' \n    AND span_name = 'POST'\n    AND duration > 1000000000  -- > 1 second\n)\nSELECT t.trace_id, t.service_name, t.span_name, t.parent_span_id, \n       t.duration/1e9 as\
  \ dur_sec, t.attr_http_response_status_code,\n       tp.dur_sec as parent_dur_sec\nFROM abnormal_traces t\nJOIN tpservice_post tp ON t.parent_span_id = tp.span_id AND t.trace_id = tp.trace_id\nORDER BY\
  \ tp.dur_sec DESC\nLIMIT 50\n"
- "\n-- Find what the slow POST spans from ts-travel-plan-service are calling\nWITH tpservice_post AS (\n  SELECT span_id, trace_id, duration/1e9 as dur_sec\n  FROM abnormal_traces\n  WHERE service_name\
  \ = 'ts-travel-plan-service' \n    AND span_name = 'POST'\n    AND duration > 1000000000\n)\nSELECT t.service_name, t.span_name, AVG(t.duration)/1e9 as avg_dur_sec, \n       COUNT(*) as count, MAX(t.duration)/1e9\
  \ as max_dur_sec\nFROM abnormal_traces t\nJOIN tpservice_post tp ON t.parent_span_id = tp.span_id AND t.trace_id = tp.trace_id\nGROUP BY t.service_name, t.span_name\nORDER BY avg_dur_sec DESC\nLIMIT 20\n"
- "\n-- Find which span is parent of the slow seat service calls\nWITH slow_seat AS (\n  SELECT span_id, parent_span_id, trace_id, duration/1e9 as dur_sec\n  FROM abnormal_traces\n  WHERE service_name =\
  \ 'ts-seat-service' \n    AND span_name = 'POST /api/v1/seatservice/seats/left_tickets'\n    AND duration > 5000000000  -- > 5 seconds\n)\nSELECT t.service_name, t.span_name, t.duration/1e9 as dur_sec,\
  \ ss.dur_sec as child_dur\nFROM abnormal_traces t\nJOIN slow_seat ss ON t.span_id = ss.parent_span_id AND t.trace_id = ss.trace_id\nORDER BY child_dur DESC\nLIMIT 20\n"
- "\n-- Find traces with slow seat service calls to understand context\nSELECT t.trace_id, t.span_name, t.service_name, t.duration/1e9 as dur_sec, \n       t.parent_span_id, t.attr_status_code, t.attr_http_response_status_code\n\
  FROM abnormal_traces t\nWHERE t.service_name = 'ts-seat-service' \n  AND t.duration > 10000000000\nORDER BY t.duration DESC\nLIMIT 20\n"
- "\n-- Check what durations exist in seat service spans\nSELECT span_name, duration/1e9 as dur_sec, attr_status_code, attr_http_response_status_code,\n       time, trace_id\nFROM abnormal_traces\nWHERE\
  \ service_name = 'ts-seat-service'\nORDER BY duration DESC\nLIMIT 20\n"
- "\n-- Examine slow trace f15a37f8cb2df664a736399309855aec (the one with 3.27s seat service call)\n-- Let's see the FULL trace chain for this\nSELECT t.service_name, t.span_name, t.duration/1e9 as dur_sec,\
  \ \n       t.parent_span_id, t.span_id, t.attr_status_code\nFROM abnormal_traces t\nWHERE t.trace_id = 'f15a37f8cb2df664a736399309855aec'\nORDER BY t.duration DESC\nLIMIT 30\n"
- "\n-- Compare config service latency in normal vs abnormal traces\nSELECT 'normal' as period, service_name, span_name, \n       AVG(duration)/1e6 as avg_dur_ms, MAX(duration)/1e6 as max_dur_ms,\n    \
  \   PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration)/1e6 as p99_ms,\n       COUNT(*) as count\nFROM normal_traces\nWHERE service_name = 'ts-config-service'\nGROUP BY service_name, span_name\n\n\
  UNION ALL\n\nSELECT 'abnormal' as period, service_name, span_name,\n       AVG(duration)/1e6 as avg_dur_ms, MAX(duration)/1e6 as max_dur_ms,\n       PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration)/1e6\
  \ as p99_ms,\n       COUNT(*) as count\nFROM abnormal_traces\nWHERE service_name = 'ts-config-service'\nGROUP BY service_name, span_name\n\nORDER BY period, avg_dur_ms DESC\n"
- "\nSELECT service_name, metric, attr_jvm_gc_name, attr_jvm_gc_action,\n       AVG(sum/count) as avg_gc_dur_ms, MAX(max) as max_gc_dur_ms, SUM(count) as total_count\nFROM abnormal_metrics_histogram\nWHERE\
  \ metric LIKE '%gc%' OR metric LIKE '%jvm%'\nGROUP BY service_name, metric, attr_jvm_gc_name, attr_jvm_gc_action\nORDER BY avg_gc_dur_ms DESC\nLIMIT 20\n"
- "\n-- Check CPU, memory, and network metrics for ts-config-service and ts-seat-service\nSELECT service_name, metric, AVG(value) as avg_val, MAX(value) as max_val, COUNT(*) as count\nFROM abnormal_metrics\n\
  WHERE (service_name = 'ts-config-service' OR service_name = 'ts-seat-service')\n  AND (metric LIKE '%cpu%' OR metric LIKE '%memory%' OR metric LIKE '%network%' \n       OR metric LIKE '%jvm%' OR metric\
  \ LIKE '%thread%' OR metric LIKE '%heap%')\nGROUP BY service_name, metric\nORDER BY service_name, metric\nLIMIT 20\n"
- "\n-- Check system cpu load for ts-config-service in normal vs abnormal\nSELECT 'normal' as period, service_name, metric, AVG(value) as avg_val, MAX(value) as max_val\nFROM normal_metrics\nWHERE service_name\
  \ = 'ts-config-service'\n  AND (metric LIKE '%cpu%' OR metric LIKE '%network%')\nGROUP BY service_name, metric\n\nUNION ALL\n\nSELECT 'abnormal' as period, service_name, metric, AVG(value) as avg_val,\
  \ MAX(value) as max_val\nFROM abnormal_metrics\nWHERE service_name = 'ts-config-service'\n  AND (metric LIKE '%cpu%' OR metric LIKE '%network%')\nGROUP BY service_name, metric\n\nORDER BY metric, period\n"
- "\n-- Check network errors for ts-config-service and ts-seat-service\nSELECT 'normal' as period, service_name, metric, AVG(value) as avg_val, MAX(value) as max_val, COUNT(*) as cnt\nFROM normal_metrics_sum\n\
  WHERE (service_name IN ('ts-config-service', 'ts-seat-service'))\n  AND (metric LIKE '%error%' OR metric LIKE '%network%' OR metric LIKE '%latency%' OR metric LIKE '%request%')\nGROUP BY service_name,\
  \ metric\n\nUNION ALL\n\nSELECT 'abnormal' as period, service_name, metric, AVG(value) as avg_val, MAX(value) as max_val, COUNT(*) as cnt\nFROM abnormal_metrics_sum\nWHERE (service_name IN ('ts-config-service',\
  \ 'ts-seat-service'))\n  AND (metric LIKE '%error%' OR metric LIKE '%network%' OR metric LIKE '%latency%' OR metric LIKE '%request%')\nGROUP BY service_name, metric\n\nORDER BY service_name, metric, period\n"
- "\n-- Check error logs for ts-config-service and ts-seat-service\nSELECT service_name, level, message, time\nFROM abnormal_logs\nWHERE (service_name IN ('ts-config-service', 'ts-seat-service', 'ts-travel-plan-service'))\n\
  \  AND level IN ('ERROR', 'WARN')\nORDER BY time\nLIMIT 20\n"
- '

