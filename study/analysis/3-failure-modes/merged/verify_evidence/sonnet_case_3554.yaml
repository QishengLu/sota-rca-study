raw_sql_list_sample:
- "\nSELECT \n    service_name,\n    COUNT(*) as total_spans,\n    COUNT(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 500 THEN 1 END) as error_count,\n    ROUND(COUNT(CASE WHEN\
  \ attr_status_code = 'ERROR' OR attr_http_response_status_code >= 500 THEN 1 END) * 100.0 / COUNT(*), 2) as error_rate_pct,\n    ROUND(AVG(duration)/1000000.0, 2) as avg_duration_ms,\n    ROUND(MAX(duration)/1000000.0,\
  \ 2) as max_duration_ms\nFROM abnormal_traces\nGROUP BY service_name\nORDER BY error_rate_pct DESC\n"
- "\nSELECT \n    service_name,\n    level,\n    COUNT(*) as count\nFROM abnormal_logs\nWHERE level IN ('ERROR', 'WARN', 'error', 'warn')\nGROUP BY service_name, level\nORDER BY count DESC\n"
- "\nSELECT \n    service_name,\n    message,\n    COUNT(*) as count\nFROM abnormal_logs\nWHERE level IN ('ERROR', 'error')\nGROUP BY service_name, message\nORDER BY count DESC\nLIMIT 30\n"
- "\nSELECT \n    service_name,\n    span_name,\n    attr_http_response_status_code,\n    COUNT(*) as count,\n    ROUND(AVG(duration)/1000000.0, 2) as avg_duration_ms\nFROM abnormal_traces\nWHERE attr_status_code\
  \ = 'ERROR' OR attr_http_response_status_code >= 500\nGROUP BY service_name, span_name, attr_http_response_status_code\nORDER BY count DESC\nLIMIT 30\n"
- "\n-- Find the full trace call chains for failed ts-travel-service spans\nSELECT \n    a.trace_id,\n    a.service_name as parent_service,\n    a.span_name as parent_span,\n    a.attr_http_response_status_code\
  \ as parent_status,\n    b.service_name as child_service,\n    b.span_name as child_span,\n    b.attr_http_response_status_code as child_status,\n    b.attr_status_code as child_error_code,\n    ROUND(b.duration/1000000.0,\
  \ 2) as child_duration_ms\nFROM abnormal_traces a\nJOIN abnormal_traces b ON a.trace_id = b.trace_id AND a.span_id = b.parent_span_id\nWHERE a.service_name = 'ts-travel-service' \n  AND (a.attr_status_code\
  \ = 'ERROR' OR a.attr_http_response_status_code >= 500)\nLIMIT 30\n"
- '

  SELECT message, COUNT(*) as count

  FROM abnormal_logs

  WHERE service_name = ''ts-verification-code-service'' AND level = ''WARN''

  GROUP BY message

  ORDER BY count DESC

  LIMIT 10

  '
- "\n-- Find full trace hierarchy for a failed travel-service trace\nWITH error_traces AS (\n    SELECT DISTINCT trace_id \n    FROM abnormal_traces \n    WHERE service_name = 'ts-travel-service' \n   \
  \   AND attr_status_code = 'ERROR'\n    LIMIT 5\n)\nSELECT \n    t.trace_id,\n    t.span_id,\n    t.parent_span_id,\n    t.service_name,\n    t.span_name,\n    t.attr_status_code,\n    t.attr_http_response_status_code,\n\
  \    ROUND(t.duration/1000000.0, 2) as duration_ms\nFROM abnormal_traces t\nJOIN error_traces e ON t.trace_id = e.trace_id\nORDER BY t.trace_id, t.time\nLIMIT 50\n"
- "\n-- Get error logs from travel-service\nSELECT time, service_name, level, message\nFROM abnormal_logs\nWHERE service_name IN ('ts-travel-service', 'ts-route-service', 'ts-travel2-service', 'ts-route-plan-service',\
  \ 'ts-travel-plan-service')\n  AND level IN ('ERROR', 'WARN', 'error', 'warn')\nORDER BY time\nLIMIT 30\n"
- '

  SELECT DISTINCT service_name FROM abnormal_logs ORDER BY service_name

  '
- "\n-- Get full trace for a specific failed travel-service trace\nSELECT \n    trace_id, span_id, parent_span_id, service_name, span_name,\n    attr_status_code, attr_http_response_status_code,\n    ROUND(duration/1000000.0,\
  \ 2) as duration_ms\nFROM abnormal_traces\nWHERE trace_id = '50b3710d4ab34d07293d75c3457b6ced'\nORDER BY time\n"
- "\n-- Check children of the ERROR POST span in ts-travel-service\nSELECT \n    span_id, parent_span_id, service_name, span_name,\n    attr_status_code, attr_http_response_status_code,\n    ROUND(duration/1000000.0,\
  \ 2) as duration_ms\nFROM abnormal_traces\nWHERE parent_span_id = '21d761be872cf8e4'\n"
- "\n-- Compare normal traces: look at ts-travel-service call chain for trips/left\nWITH normal_travel AS (\n    SELECT DISTINCT trace_id \n    FROM normal_traces \n    WHERE service_name = 'ts-travel-service'\
  \ \n      AND span_name = 'TravelController.queryInfo'\n    LIMIT 2\n)\nSELECT \n    t.trace_id, t.span_id, t.parent_span_id,\n    t.service_name, t.span_name,\n    t.attr_status_code, t.attr_http_response_status_code,\n\
  \    ROUND(t.duration/1000000.0, 2) as duration_ms\nFROM normal_traces t\nJOIN normal_travel n ON t.trace_id = n.trace_id\nORDER BY t.trace_id, t.time\n"
- "\nSELECT \n    service_name,\n    metric,\n    ROUND(AVG(value), 4) as avg_value,\n    ROUND(MAX(value), 4) as max_value,\n    ROUND(MIN(value), 4) as min_value\nFROM abnormal_metrics\nWHERE metric LIKE\
  \ '%cpu%' OR metric LIKE '%memory%' OR metric LIKE '%network%'\nGROUP BY service_name, metric\nORDER BY avg_value DESC\nLIMIT 30\n"
- "\n-- What does ts-basic-service call in abnormal period?\nSELECT \n    parent.service_name as caller,\n    child.service_name as callee,\n    COUNT(*) as call_count,\n    COUNT(CASE WHEN child.attr_status_code\
  \ = 'ERROR' THEN 1 END) as error_count\nFROM abnormal_traces parent\nJOIN abnormal_traces child ON parent.trace_id = child.trace_id AND parent.span_id = child.parent_span_id\nWHERE parent.service_name\
  \ = 'ts-basic-service'\nGROUP BY caller, callee\nORDER BY call_count DESC\n"
- '

  SELECT DISTINCT metric FROM abnormal_metrics ORDER BY metric

  '
- "\n-- What does ts-travel-service call in error traces? Find all spans with parent TravelController.queryInfo\nSELECT DISTINCT\n    t.service_name, t.span_name, t.attr_status_code, \n    t.attr_http_response_status_code\n\
  FROM abnormal_traces t\nWHERE t.trace_id IN (\n    SELECT trace_id FROM abnormal_traces \n    WHERE service_name = 'ts-travel-service' AND attr_status_code = 'ERROR'\n    AND span_name = 'TravelController.queryInfo'\n\
  )\nAND t.service_name != 'ts-travel-service'\nLIMIT 20\n"
- '

  SELECT DISTINCT metric FROM abnormal_metrics ORDER BY metric LIMIT 30 OFFSET 30

  '
- "\n-- Compare ts-travel-service span counts: errors vs total in abnormal\nSELECT \n    span_name,\n    COUNT(*) as total,\n    COUNT(CASE WHEN attr_status_code = 'ERROR' THEN 1 END) as errors,\n    ROUND(AVG(duration)/1000000.0,\
  \ 2) as avg_ms,\n    ROUND(MAX(duration)/1000000.0, 2) as max_ms\nFROM abnormal_traces\nWHERE service_name = 'ts-travel-service'\nGROUP BY span_name\nORDER BY errors DESC\nLIMIT 20\n"
- "\n-- Compare CPU utilization between abnormal and normal periods by service\nSELECT \n    t.period,\n    t.service_name,\n    t.metric,\n    ROUND(AVG(t.value), 6) as avg_value,\n    ROUND(MAX(t.value),\
  \ 6) as max_value\nFROM (\n    SELECT 'abnormal' as period, service_name, metric, value FROM abnormal_metrics\n    WHERE metric IN ('jvm.cpu.recent_utilization', 'jvm.system.cpu.utilization', 'k8s.pod.cpu_limit_utilization',\
  \ 'container.cpu.usage')\n    AND service_name IS NOT NULL AND service_name != ''\n    UNION ALL\n    SELECT 'normal' as period, service_name, metric, value FROM normal_metrics\n    WHERE metric IN ('jvm.cpu.recent_utilization',\
  \ 'jvm.system.cpu.utilization', 'k8s.pod.cpu_limit_utilization', 'container.cpu.usage')\n    AND service_name IS NOT NULL AND service_name != ''\n) t\nGROUP BY t.period, t.service_name, t.metric\nHAVING\
  \ AVG(t.value) > 0\nORDER BY t.metric, t.service_name, t.period\nLIMIT 50\n"
- "\n-- Compare CPU utilization for specific services of interest\nSELECT \n    t.period,\n    t.service_name,\n    ROUND(AVG(t.value), 6) as avg_cpu,\n    ROUND(MAX(t.value), 6) as max_cpu\nFROM (\n  \
  \  SELECT 'abnormal' as period, service_name, value FROM abnormal_metrics\n    WHERE metric = 'container.cpu.usage'\n    AND service_name IN ('ts-route-service', 'ts-travel-service', 'ts-basic-service',\
  \ 'ts-travel-plan-service', 'ts-route-plan-service', 'ts-travel2-service', 'ts-preserve-service', 'ts-cancel-service', 'ts-station-service', 'ts-train-service')\n    UNION ALL\n    SELECT 'normal' as\
  \ period, service_name, value FROM normal_metrics\n    WHERE metric = 'container.cpu.usage'\n    AND service_name IN ('ts-route-service', 'ts-travel-service', 'ts-basic-service', 'ts-travel-plan-service',\
  \ 'ts-route-plan-service', 'ts-travel2-service', 'ts-preserve-service', 'ts-cancel-service', 'ts-station-service', 'ts-train-service')\n) t\nGROUP BY t.period, t.service_name\nORDER BY t.service_name,\
  \ t.period\n"
