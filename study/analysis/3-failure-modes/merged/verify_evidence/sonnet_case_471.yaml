raw_sql_list_sample:
- SELECT DISTINCT service_name, span_name, attr_span_kind, attr_status_code, attr_http_response_status_code, COUNT(*) as cnt, AVG(duration) as avg_duration, MAX(duration) as max_duration FROM abnormal_traces
  WHERE span_name LIKE '%preserve%' OR span_name LIKE '%assurance%' GROUP BY service_name, span_name, attr_span_kind, attr_status_code, attr_http_response_status_code ORDER BY cnt DESC
- SELECT DISTINCT service_name, span_name, attr_span_kind, attr_status_code, attr_http_response_status_code, COUNT(*) as cnt, AVG(duration) as avg_duration, MAX(duration) as max_duration FROM abnormal_traces
  WHERE span_name LIKE '%preserve%' GROUP BY service_name, span_name, attr_span_kind, attr_status_code, attr_http_response_status_code ORDER BY cnt DESC
- SELECT DISTINCT service_name, span_name, attr_span_kind, attr_status_code, attr_http_response_status_code, COUNT(*) as cnt, AVG(duration)/1e9 as avg_duration_sec, MAX(duration)/1e9 as max_duration_sec
  FROM abnormal_traces GROUP BY service_name, span_name, attr_span_kind, attr_status_code, attr_http_response_status_code HAVING attr_status_code = 'Error' OR attr_http_response_status_code >= 500 ORDER
  BY cnt DESC
- SELECT service_name, span_name, attr_span_kind, attr_status_code, COUNT(*) as cnt, AVG(duration)/1e6 as avg_duration_ms, MAX(duration)/1e6 as max_duration_ms FROM abnormal_traces WHERE trace_id IN (SELECT
  trace_id FROM abnormal_traces WHERE (span_name LIKE '%preserve%' OR span_name LIKE '%preserveservice%') AND duration > 1000000000) GROUP BY service_name, span_name, attr_span_kind, attr_status_code ORDER
  BY avg_duration_ms DESC LIMIT 50
- SELECT service_name, span_name, COUNT(*) as cnt, AVG(duration)/1e6 as avg_duration_ms, MAX(duration)/1e6 as max_duration_ms FROM normal_traces WHERE service_name IN ('ts-travel-service', 'ts-seat-service',
  'ts-security-service', 'ts-basic-service', 'ts-station-service', 'ts-preserve-service', 'ts-assurance-service') AND attr_span_kind = 'Server' GROUP BY service_name, span_name ORDER BY avg_duration_ms
  DESC LIMIT 30
- SELECT trace_id, service_name, span_name, duration/1e6 as duration_ms, attr_status_code, attr_http_response_status_code FROM abnormal_traces WHERE trace_id IN (SELECT trace_id FROM abnormal_traces WHERE
  span_name LIKE '%assuranceservice%' AND attr_status_code = 'Error') ORDER BY trace_id, duration DESC LIMIT 50
- SELECT time, service_name, level, message FROM abnormal_logs WHERE service_name = 'ts-assurance-service' AND level IN ('ERROR', 'WARN') ORDER BY time LIMIT 50
- SELECT service_name, level, COUNT(*) as cnt FROM abnormal_logs GROUP BY service_name, level ORDER BY service_name, level
- SELECT time, service_name, level, message FROM abnormal_logs WHERE service_name = 'ts-preserve-service' AND level = 'ERROR' ORDER BY time LIMIT 20
- SELECT time, service_name, level, message FROM abnormal_logs WHERE service_name IN ('ts-food-service', 'ts-delivery-service', 'ts-notification-service') AND level = 'ERROR' ORDER BY time LIMIT 20
- SELECT time, service_name, level, message FROM abnormal_logs WHERE service_name = 'ts-order-service' AND level IN ('ERROR', 'WARN') ORDER BY time LIMIT 20
- SELECT time, service_name, level, message FROM abnormal_logs WHERE service_name = 'ts-order-other-service' AND level IN ('ERROR', 'WARN') ORDER BY time LIMIT 20
- SELECT DISTINCT metric FROM abnormal_metrics ORDER BY metric LIMIT 50
- SELECT DISTINCT metric FROM abnormal_metrics_sum ORDER BY metric LIMIT 50
- SELECT service_name, attr_k8s_pod_name, AVG(value) as avg_drops, MAX(value) as max_drops FROM abnormal_metrics_sum WHERE metric = 'hubble_drop_total' AND value > 0 GROUP BY service_name, attr_k8s_pod_name
  ORDER BY avg_drops DESC LIMIT 20
- SELECT service_name, attr_k8s_pod_name, AVG(value) as avg_restarts, MAX(value) as max_restarts FROM abnormal_metrics WHERE metric = 'k8s.container.restarts' AND value > 0 GROUP BY service_name, attr_k8s_pod_name
  ORDER BY max_restarts DESC LIMIT 20
- SELECT time, service_name, metric, value, attr_k8s_pod_name, attr_k8s_container_name FROM abnormal_metrics WHERE attr_k8s_pod_name LIKE '%ts-assurance%' ORDER BY time LIMIT 30
- SELECT service_name, attr_k8s_pod_name, metric, AVG(value) as avg_val, MAX(value) as max_val FROM abnormal_metrics WHERE metric IN ('k8s.pod.cpu_limit_utilization', 'k8s.pod.cpu.usage', 'container.cpu.usage')
  AND service_name IN ('ts-seat-service', 'ts-travel-service', 'ts-security-service', 'ts-basic-service', 'ts-assurance-service') GROUP BY service_name, attr_k8s_pod_name, metric ORDER BY avg_val DESC LIMIT
  30
- SELECT service_name, attr_k8s_pod_name, attr_jvm_gc_name, AVG(sum/count) as avg_gc_duration_ms, MAX(max) as max_gc_ms, COUNT(*) as samples FROM abnormal_metrics_histogram WHERE metric LIKE '%jvm.gc%'
  GROUP BY service_name, attr_k8s_pod_name, attr_jvm_gc_name ORDER BY avg_gc_duration_ms DESC LIMIT 20
- SELECT DISTINCT metric FROM abnormal_metrics_histogram ORDER BY metric
