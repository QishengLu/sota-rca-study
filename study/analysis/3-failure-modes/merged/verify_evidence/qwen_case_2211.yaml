  text: "Based on my comprehensive analysis of the telemetry data, I can now provide the Root Cause Analysis.\n\n## Summary of Findings\n\n**Root Cause Service**: `ts-route-plan-service`\n\n**Evidence**:\n\
    1. **First to fail**: ts-route-plan-service shows SEVERE errors starting at 22:15:22, before other services\n2. **Most error spans**: 132 Error status spans (vs 15 for ts-ui-dashboard, 6 for ts-travel-plan-service)\n\
    3. **Critical error message**: \"503 Service Unavailable: upstream connect error or disconnect/reset before headers... Connection refused\"\n4. **Trace analysis**: In failing traces, errors originate\
    \ at ts-route-plan-service with no downstream spans to ts-travel-service or ts-travel2-service, indicating connection failures\n\n**Fault Propagation Path**:\n```\nts-route-plan-service (ROOT CAUSE)\n\
    \    ↓ (cannot connect to ts-travel-service/ts-travel2-service)\nts-travel-plan-service \n    ↓ (returns errors to caller)\nts-ui-dashboard \n    ↓ (returns 503 to client)\nloadgenerator / API clients\n\
    ```\n\n```json\n{\n  \"nodes\": [\n    {\"component\": \"ts-route-plan-service\", \"state\": [\"HIGH_ERROR_RATE\"], \"timestamp\": 1754691322},\n    {\"component\": \"ts-travel-plan-service\", \"state\"\
    : [\"HIGH_ERROR_RATE\"], \"timestamp\""
