raw_sql_list_sample:
- "\nSELECT \n    service_name,\n    span_name,\n    COUNT(*) as total_spans,\n    COUNT(CASE WHEN attr_status_code = 'STATUS_CODE_ERROR' OR attr_http_response_status_code >= 400 THEN 1 END) as error_spans,\n\
  \    AVG(duration) / 1e6 as avg_duration_ms,\n    PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration) / 1e6 as p99_duration_ms\nFROM abnormal_traces\nWHERE span_name LIKE '%travelPlan%' OR span_name\
  \ LIKE '%travelplan%'\nGROUP BY service_name, span_name\nORDER BY error_spans DESC\n"
- "\nSELECT \n    service_name,\n    COUNT(*) as total_spans,\n    COUNT(CASE WHEN attr_status_code = 'STATUS_CODE_ERROR' THEN 1 END) as status_errors,\n    COUNT(CASE WHEN attr_http_response_status_code\
  \ >= 400 THEN 1 END) as http_errors,\n    AVG(duration) / 1e6 as avg_duration_ms,\n    PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration) / 1e6 as p99_duration_ms\nFROM abnormal_traces\nGROUP BY service_name\n\
  ORDER BY http_errors DESC\nLIMIT 20\n"
- "\nSELECT \n    span_name,\n    COUNT(*) as total_spans,\n    COUNT(CASE WHEN attr_http_response_status_code >= 400 THEN 1 END) as http_errors,\n    AVG(duration) / 1e6 as avg_duration_ms,\n    PERCENTILE_CONT(0.99)\
  \ WITHIN GROUP (ORDER BY duration) / 1e6 as p99_duration_ms,\n    MIN(attr_http_response_status_code) as min_status,\n    MAX(attr_http_response_status_code) as max_status\nFROM abnormal_traces\nWHERE\
  \ service_name = 'ts-route-plan-service'\nGROUP BY span_name\nORDER BY http_errors DESC\nLIMIT 20\n"
- "\nSELECT \n    span_name,\n    COUNT(*) as total_spans,\n    COUNT(CASE WHEN attr_http_response_status_code >= 400 THEN 1 END) as http_errors,\n    AVG(duration) / 1e6 as avg_duration_ms,\n    PERCENTILE_CONT(0.99)\
  \ WITHIN GROUP (ORDER BY duration) / 1e6 as p99_duration_ms\nFROM abnormal_traces\nWHERE service_name = 'ts-travel-plan-service'\nGROUP BY span_name\nORDER BY http_errors DESC\nLIMIT 20\n"
- "\nSELECT \n    service_name,\n    level,\n    COUNT(*) as count,\n    MIN(time) as first_seen,\n    MAX(time) as last_seen\nFROM abnormal_logs\nWHERE service_name IN ('ts-route-plan-service', 'ts-travel-plan-service')\n\
  GROUP BY service_name, level\nORDER BY service_name, count DESC\n"
- "\n-- What does ts-route-plan-service call internally?\nSELECT DISTINCT\n    t2.service_name as called_service,\n    t2.span_name,\n    COUNT(*) as total_calls,\n    COUNT(CASE WHEN t2.attr_http_response_status_code\
  \ >= 400 THEN 1 END) as errors\nFROM abnormal_traces t1\nJOIN abnormal_traces t2 ON t1.span_id = t2.parent_span_id\nWHERE t1.service_name = 'ts-route-plan-service'\nGROUP BY t2.service_name, t2.span_name\n\
  ORDER BY errors DESC\nLIMIT 30\n"
- "\nSELECT \n    time,\n    level,\n    message\nFROM abnormal_logs\nWHERE service_name = 'ts-route-plan-service' AND level = 'SEVERE'\nORDER BY time\nLIMIT 20\n"
- "\nSELECT \n    service_name,\n    COUNT(*) as total_spans,\n    COUNT(CASE WHEN attr_http_response_status_code >= 400 THEN 1 END) as http_errors,\n    AVG(duration) / 1e6 as avg_duration_ms\nFROM normal_traces\n\
  WHERE service_name IN ('ts-route-plan-service', 'ts-travel-plan-service')\nGROUP BY service_name\nORDER BY http_errors DESC\n"
- "\nSELECT \n    time,\n    level,\n    SUBSTRING(message, 1, 200) as message_short\nFROM abnormal_logs\nWHERE service_name = 'ts-route-plan-service' AND level = 'SEVERE'\nORDER BY time\nLIMIT 10\n"
- "\nSELECT \n    time,\n    level,\n    SUBSTRING(message, 1, 500) as message_500\nFROM abnormal_logs\nWHERE service_name = 'ts-route-plan-service' AND level = 'SEVERE'\nORDER BY time\nLIMIT 5\n"
- "\nSELECT DISTINCT\n    SUBSTRING(message, 1, 300) as message_excerpt\nFROM abnormal_logs\nWHERE service_name = 'ts-route-plan-service' AND level = 'SEVERE'\nLIMIT 5\n"
- "\nSELECT \n    service_name,\n    level,\n    COUNT(*) as count\nFROM abnormal_logs\nWHERE service_name IN ('ts-travel-service', 'ts-travel2-service', 'ts-route-service')\nGROUP BY service_name, level\n\
  ORDER BY service_name, level\n"
- "\nSELECT \n    service_name,\n    span_name,\n    COUNT(*) as total,\n    COUNT(CASE WHEN attr_http_response_status_code >= 400 THEN 1 END) as errors,\n    AVG(duration) / 1e6 as avg_ms,\n    PERCENTILE_CONT(0.99)\
  \ WITHIN GROUP (ORDER BY duration) / 1e6 as p99_ms\nFROM abnormal_traces\nWHERE service_name IN ('ts-travel-service', 'ts-travel2-service', 'ts-route-service')\nGROUP BY service_name, span_name\nORDER\
  \ BY errors DESC, avg_ms DESC\nLIMIT 20\n"
- '

  SELECT DISTINCT metric

  FROM abnormal_metrics

  ORDER BY metric

  LIMIT 50

  '
- "\nSELECT \n    service_name,\n    metric,\n    AVG(value) as avg_value,\n    MAX(value) as max_value\nFROM abnormal_metrics\nWHERE service_name IN ('ts-travel-service', 'ts-travel2-service', 'ts-route-plan-service',\
  \ 'ts-route-service')\nGROUP BY service_name, metric\nORDER BY service_name, metric\nLIMIT 50\n"
- "\nSELECT \n    service_name,\n    metric,\n    AVG(value) as avg_value,\n    MAX(value) as max_value,\n    MIN(value) as min_value\nFROM abnormal_metrics\nWHERE metric IN ('k8s.container.restarts', 'k8s.pod.phase',\
  \ 'k8s.deployment.available', 'k8s.deployment.desired')\nAND service_name IN ('ts-travel-service', 'ts-travel2-service', 'ts-route-plan-service', 'ts-route-service')\nGROUP BY service_name, metric\nORDER\
  \ BY service_name, metric\n"
- "\nSELECT \n    service_name,\n    metric,\n    AVG(value) as avg_value,\n    MAX(value) as max_value\nFROM abnormal_metrics\nWHERE metric IN ('jvm.system.cpu.load_1m', 'jvm.system.cpu.utilization', 'jvm.cpu.recent_utilization',\
  \ 'container.cpu.usage')\nAND service_name IN ('ts-travel-service', 'ts-travel2-service', 'ts-route-plan-service', 'ts-route-service', 'ts-travel-plan-service')\nGROUP BY service_name, metric\nORDER BY\
  \ avg_value DESC\n"
- '

  SELECT DISTINCT metric

  FROM abnormal_metrics_sum

  ORDER BY metric

  LIMIT 50

  '
- "\n-- Get full context of JSON parse error\nSELECT \n    time,\n    SUBSTRING(message, 1, 600) as message_long\nFROM abnormal_logs\nWHERE service_name = 'ts-route-plan-service' \n  AND level = 'SEVERE'\n\
  \  AND message LIKE '%nvpwzt%'\nLIMIT 3\n"
- "\nSELECT \n    service_name,\n    metric,\n    SUM(value) as total_value,\n    AVG(value) as avg_value,\n    MAX(value) as max_value\nFROM abnormal_metrics_sum\nWHERE metric IN ('hubble_drop_total',\
  \ 'k8s.pod.network.errors', 'hubble_tcp_flags_total')\n  AND service_name IN ('ts-travel-service', 'ts-travel2-service', 'ts-route-plan-service', 'ts-route-service', 'ts-travel-plan-service')\nGROUP BY\
  \ service_name, metric\nORDER BY total_value DESC\n"
