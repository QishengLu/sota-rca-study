- SELECT * FROM 'normal_metrics.parquet' LIMIT 0;"
- SELECT service_name, level, COUNT(*) as count FROM 'abnormal_logs.parquet' GROUP BY service_name, level ORDER BY count DESC LIMIT 20;"
- SELECT service_name, level, COUNT(*) as count FROM 'normal_logs.parquet' GROUP BY service_name, level ORDER BY count DESC LIMIT 20;"
- SELECT service_name, attr.status_code, COUNT(*) as count FROM 'abnormal_traces.parquet' GROUP BY service_name, attr.status_code ORDER BY count DESC LIMIT 20;"
- SELECT service_name, \"attr.status_code\", COUNT(*) as count FROM 'abnormal_traces.parquet' GROUP BY service_name, \"attr.status_code\" ORDER BY count DESC LIMIT 20;"
- SELECT service_name, level, COUNT(*) as count FROM 'abnormal_logs.parquet' WHERE level IN ('ERROR', 'WARN') GROUP BY service_name, level ORDER BY count DESC;"
- SELECT time, service_name, level, message FROM 'abnormal_logs.parquet' WHERE level = 'ERROR' ORDER BY time ASC LIMIT 30;"
- SELECT service_name, COUNT(*) as total, SUM(CASE WHEN \"attr.status_code\" = 'Error' THEN 1 ELSE 0 END) as errors FROM 'abnormal_traces.parquet' GROUP BY service_name HAVING errors > 0 ORDER BY errors
  DESC;"
- SELECT DISTINCT service_name FROM 'abnormal_traces.parquet' ORDER BY service_name;"
- SELECT span_name, service_name, \"parent_span_id\", \"attr.status_code\", duration FROM 'abnormal_traces.parquet' WHERE \"attr.status_code\" = 'Error' OR \"attr.status_code\" != 'Ok' LIMIT 50;"
- SELECT DISTINCT span_name FROM 'abnormal_traces.parquet' WHERE span_name LIKE '%travelPlan%' OR span_name LIKE '%travelplan%' OR span_name LIKE '%travel%' ORDER BY span_name;"
- SELECT service_name, AVG(duration) as avg_duration, MAX(duration) as max_duration, COUNT(*) as count FROM 'abnormal_traces.parquet' GROUP BY service_name ORDER BY avg_duration DESC LIMIT 15;"
- "SELECT \n    span_name, \n    service_name, \n    \\\"parent_span_id\\\",\n    duration\nFROM 'abnormal_traces.parquet' \nWHERE span_name LIKE '%travelPlan/cheapest%' \n   OR span_name LIKE '%travelPlan/quickest%'\n\
  \   OR span_name LIKE '%travelPlan/minStation%'\nORDER BY time\nLIMIT 30;\n\""
- "WITH trace_samples AS (\n    SELECT DISTINCT trace_id \n    FROM 'abnormal_traces.parquet' \n    WHERE span_name LIKE '%travelPlan/cheapest%' \n       OR span_name LIKE '%travelPlan/quickest%'\n    \
  \   OR span_name LIKE '%travelPlan/minStation%'\n    LIMIT 3\n)\nSELECT t.service_name, t.span_name, t.duration, t.\\\"parent_span_id\\\"\nFROM 'abnormal_traces.parquet' t\nJOIN trace_samples ts ON t.trace_id\
  \ = ts.trace_id\nORDER BY t.time\nLIMIT 50;\n\""
- "WITH trace_samples AS (\n    SELECT DISTINCT trace_id \n    FROM 'abnormal_traces.parquet' \n    WHERE span_name LIKE '%travelPlan/cheapest%' \n    LIMIT 2\n)\nSELECT t.service_name, t.span_name, t.duration,\
  \ t.\\\"attr.status_code\\\"\nFROM 'abnormal_traces.parquet' t\nJOIN trace_samples ts ON t.trace_id = ts.trace_id\nWHERE t.service_name IN ('ts-route-plan-service', 'ts-travel-plan-service')\nORDER BY\
  \ t.time\nLIMIT 30;\n\""
- 'SELECT service_name, metric, AVG(value) as avg_value, MAX(value) as max_value

  FROM ''abnormal_metrics.parquet''

  WHERE service_name IN (''ts-route-plan-service'', ''ts-travel-plan-service'', ''ts-ui-dashboard'')

  GROUP BY service_name, metric

  ORDER BY service_name, avg_value DESC

  LIMIT 30;

  "'
- "SELECT metric, \n       AVG(CASE WHEN service_name = 'ts-route-plan-service' THEN value END) as route_plan,\n       AVG(CASE WHEN service_name = 'ts-travel-plan-service' THEN value END) as travel_plan\n\
  FROM 'abnormal_metrics.parquet'\nWHERE metric LIKE '%latency%' OR metric LIKE '%http%' OR metric LIKE '%error%'\nGROUP BY metric\nHAVING route_plan IS NOT NULL OR travel_plan IS NOT NULL\nORDER BY metric\n\
  LIMIT 30;\n\""
- 'SELECT service_name, metric, value, time

  FROM ''abnormal_metrics.parquet''

  WHERE metric LIKE ''%error%''

  ORDER BY time DESC

  LIMIT 20;

  "'
