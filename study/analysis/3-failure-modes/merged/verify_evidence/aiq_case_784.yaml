    | ts-food-service | 191 | 63 | 4.73% |\n| ts-station-food-service | 9 | 27 | 2.42% |\n| ts-ui-dashboard | 0 | 0 | 0.0% |\n\nts-food-service has **21x more error logs** and **2.3x more error traces**\
