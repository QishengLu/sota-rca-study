raw_sql_list_sample:
- "\nSELECT \n    service_name,\n    COUNT(*) as total_spans,\n    SUM(CASE WHEN attr_status_code = 'ERROR' THEN 1 ELSE 0 END) as error_spans,\n    ROUND(100.0 * SUM(CASE WHEN attr_status_code = 'ERROR'\
  \ THEN 1 ELSE 0 END) / COUNT(*), 2) as error_rate_pct,\n    AVG(duration) as avg_duration_ns,\n    MAX(duration) as max_duration_ns,\n    PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration) as p99_duration_ns\n\
  FROM abnormal_traces\nGROUP BY service_name\nORDER BY error_rate_pct DESC, error_spans DESC\n"
- "\nSELECT \n    service_name,\n    level,\n    COUNT(*) as count\nFROM abnormal_logs\nGROUP BY service_name, level\nORDER BY service_name, level\n"
- "\nSELECT \n    time, service_name, level, message\nFROM abnormal_logs\nWHERE level IN ('ERROR', 'WARN', 'SEVERE')\nORDER BY time ASC\n"
- "\nSELECT \n    service_name,\n    COUNT(*) as total_spans,\n    AVG(duration) as avg_duration_ns,\n    MAX(duration) as max_duration_ns,\n    PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration) as\
  \ p99_duration_ns\nFROM normal_traces\nGROUP BY service_name\nORDER BY avg_duration_ns DESC\n"
- "\nSELECT \n    time, service_name, level, message\nFROM abnormal_logs\nWHERE level IN ('ERROR', 'WARN', 'SEVERE')\nORDER BY time ASC\nLIMIT 40\n"
- "\nSELECT DISTINCT span_name, service_name, \n    COUNT(*) as count,\n    AVG(duration) as avg_duration_ns,\n    attr_http_response_status_code\nFROM abnormal_traces\nWHERE service_name IN ('ts-travel-service',\
  \ 'ts-travel-plan-service', 'ts-route-plan-service', 'ts-cancel-service', 'ts-consign-service')\nGROUP BY span_name, service_name, attr_http_response_status_code\nORDER BY avg_duration_ns DESC\nLIMIT\
  \ 30\n"
- "\nSELECT \n    time, service_name, level, message\nFROM abnormal_logs\nWHERE level IN ('ERROR', 'SEVERE')\n    AND service_name NOT IN ('ts-verification-code-service')\nORDER BY time ASC\nLIMIT 40\n"
- "\nSELECT \n    span_name,\n    service_name, \n    COUNT(*) as count,\n    AVG(duration)/1e6 as avg_duration_ms,\n    MAX(duration)/1e6 as max_duration_ms,\n    SUM(CASE WHEN attr_http_response_status_code\
  \ >= 500 THEN 1 ELSE 0 END) as server_errors,\n    SUM(CASE WHEN attr_http_response_status_code >= 400 THEN 1 ELSE 0 END) as client_errors\nFROM abnormal_traces\nWHERE service_name IN ('ts-travel-service',\
  \ 'ts-route-plan-service', 'ts-route-service', 'ts-basic-service')\nGROUP BY span_name, service_name\nORDER BY avg_duration_ms DESC\nLIMIT 25\n"
- "\nSELECT \n    span_name,\n    service_name, \n    COUNT(*) as count,\n    AVG(duration)/1e6 as avg_duration_ms,\n    MAX(duration)/1e6 as max_duration_ms,\n    SUM(CASE WHEN attr_http_response_status_code\
  \ >= 500 THEN 1 ELSE 0 END) as server_errors,\n    SUM(CASE WHEN attr_http_response_status_code >= 400 THEN 1 ELSE 0 END) as all_errors\nFROM abnormal_traces\nWHERE service_name IN ('ts-seat-service',\
  \ 'ts-cancel-service', 'ts-consign-service')\nGROUP BY span_name, service_name\nORDER BY server_errors DESC, avg_duration_ms DESC\nLIMIT 25\n"
- "\nSELECT DISTINCT metric\nFROM abnormal_metrics\nWHERE metric LIKE '%cpu%' OR metric LIKE '%memory%' OR metric LIKE '%restart%' \n   OR metric LIKE '%error%' OR metric LIKE '%network%'\nORDER BY metric\n\
  LIMIT 30\n"
- "\nSELECT \n    service_name,\n    metric,\n    AVG(value) as avg_value,\n    MAX(value) as max_value,\n    MIN(value) as min_value\nFROM abnormal_metrics\nWHERE metric IN ('container.cpu.usage', 'container.memory.usage',\
  \ 'jvm.cpu.recent_utilization', 'jvm.system.cpu.utilization')\n    AND service_name IN ('ts-seat-service', 'ts-travel-service', 'ts-route-plan-service', 'ts-travel-plan-service', 'ts-cancel-service')\n\
  GROUP BY service_name, metric\nORDER BY service_name, metric\n"
- "\nSELECT \n    service_name,\n    metric,\n    AVG(value) as avg_value,\n    MAX(value) as max_value,\n    MIN(value) as min_value\nFROM normal_metrics\nWHERE metric IN ('container.cpu.usage', 'container.memory.usage',\
  \ 'jvm.cpu.recent_utilization', 'jvm.system.cpu.utilization')\n    AND service_name IN ('ts-seat-service', 'ts-travel-service', 'ts-route-plan-service', 'ts-travel-plan-service', 'ts-cancel-service')\n\
  GROUP BY service_name, metric\nORDER BY service_name, metric\n"
- '

  SELECT DISTINCT metric

  FROM abnormal_metrics_sum

  ORDER BY metric

  LIMIT 30

  '
- "\nSELECT \n    time, service_name, level, message\nFROM abnormal_logs\nWHERE level IN ('ERROR', 'SEVERE')\n    AND service_name IN ('ts-travel-service', 'ts-seat-service', 'ts-order-service', 'ts-preserve-service',\
  \ 'ts-route-plan-service')\nORDER BY time ASC\nLIMIT 30\n"
- "\nSELECT \n    service_name,\n    metric,\n    SUM(value) as total,\n    AVG(value) as avg_value,\n    MAX(value) as max_value,\n    attr_destination,\n    attr_source\nFROM abnormal_metrics_sum\nWHERE\
  \ metric = 'hubble_drop_total'\nGROUP BY service_name, metric, attr_destination, attr_source\nORDER BY total DESC\nLIMIT 30\n"
- "\nSELECT \n    service_name,\n    metric,\n    SUM(value) as total,\n    AVG(value) as avg_value,\n    MAX(value) as max_value,\n    attr_destination,\n    attr_source\nFROM normal_metrics_sum\nWHERE\
  \ metric = 'hubble_drop_total'\nGROUP BY service_name, metric, attr_destination, attr_source\nORDER BY total DESC\nLIMIT 20\n"
- "\nSELECT \n    attr_source,\n    attr_destination,\n    metric,\n    SUM(value) as total_value,\n    COUNT(*) as data_points\nFROM abnormal_metrics_sum\nWHERE metric IN ('hubble_tcp_flags_total', 'hubble_drop_total')\n\
  \    AND (attr_source LIKE '%ts-seat%' OR attr_destination LIKE '%ts-seat%'\n         OR attr_source LIKE '%ts-travel-service%' OR attr_destination LIKE '%ts-travel-service%')\nGROUP BY attr_source, attr_destination,\
  \ metric\nORDER BY total_value DESC\nLIMIT 25\n"
- "\nSELECT \n    service_name,\n    metric,\n    time,\n    value\nFROM abnormal_metrics\nWHERE metric = 'container.cpu.usage'\n    AND service_name = 'ts-seat-service'\nORDER BY time ASC\nLIMIT 30\n"
- "\nSELECT \n    span_name,\n    service_name,\n    parent_span_id,\n    COUNT(*) as count,\n    AVG(duration)/1e6 as avg_duration_ms\nFROM normal_traces\nWHERE service_name = 'ts-cancel-service'\n   OR\
  \ span_name LIKE '%cancel%'\nGROUP BY span_name, service_name, parent_span_id\nORDER BY count DESC\nLIMIT 20\n"
- "\nSELECT \n    span_name,\n    service_name,\n    COUNT(*) as count,\n    AVG(duration)/1e6 as avg_duration_ms,\n    SUM(CASE WHEN attr_http_response_status_code >= 400 THEN 1 ELSE 0 END) as errors\n\
  FROM abnormal_traces\nWHERE span_name LIKE '%cancel%' OR span_name LIKE '%consign%'\nGROUP BY span_name, service_name\nORDER BY count DESC\nLIMIT 20\n"
