raw_sql_list_sample:
- SELECT * FROM 'normal_logs.parquet' LIMIT 0;"
- SELECT * FROM 'normal_traces.parquet' LIMIT 0;"
- SELECT * FROM 'normal_metrics.parquet' LIMIT 0;"
- SELECT * FROM 'normal_metrics_histogram.parquet' LIMIT 0;"
- SELECT * FROM 'normal_metrics_sum.parquet' LIMIT 0;"
- SELECT service_name, level, COUNT(*) as cnt FROM 'abnormal_logs.parquet' GROUP BY service_name, level ORDER BY cnt DESC LIMIT 30;"
- SELECT service_name, COUNT(*) as total_errors FROM 'abnormal_logs.parquet' WHERE level IN ('ERROR', 'CRITICAL', 'FATAL') GROUP BY service_name ORDER BY total_errors DESC LIMIT 20;"
- SELECT level, COUNT(*) as cnt FROM 'normal_logs.parquet' GROUP BY level ORDER BY cnt DESC;"
- SELECT service_name, message, COUNT(*) as cnt FROM 'abnormal_logs.parquet' WHERE level = 'ERROR' GROUP BY service_name, message ORDER BY cnt DESC LIMIT 20;"
- SELECT MIN(time) as first_error, MAX(time) as last_error FROM 'abnormal_logs.parquet' WHERE level = 'ERROR';"
- SELECT service_name, attr.status_code, COUNT(*) as cnt FROM 'abnormal_traces.parquet' GROUP BY service_name, attr.status_code ORDER BY cnt DESC LIMIT 30;"
- SELECT span_name, service_name, attr.status_code, AVG(duration)/1000000.0 as avg_duration_ms, COUNT(*) as cnt FROM 'abnormal_traces.parquet' WHERE attr.status_code != 'OK' GROUP BY span_name, service_name,
  attr.status_code ORDER BY cnt DESC LIMIT 30;"
- SELECT service_name, \"attr.status_code\", COUNT(*) as cnt FROM 'abnormal_traces.parquet' GROUP BY service_name, \"attr.status_code\" ORDER BY cnt DESC LIMIT 30;"
- SELECT service_name, COUNT(*) as total, SUM(CASE WHEN \"attr.status_code\" != 'OK' THEN 1 ELSE 0 END) as errors FROM 'abnormal_traces.parquet' GROUP BY service_name ORDER BY errors DESC LIMIT 20;"
- SELECT DISTINCT \"attr.status_code\" FROM 'abnormal_traces.parquet';"
- SELECT span_name, service_name, duration/1000000.0 as duration_ms, \"attr.status_code\" FROM 'abnormal_traces.parquet' WHERE \"attr.status_code\" = 'Error' ORDER BY time LIMIT 20;"
- SELECT trace_id, service_name, span_name, parent_span_id, duration/1000000.0 as duration_ms, \"attr.status_code\" FROM 'abnormal_traces.parquet' WHERE trace_id = (SELECT trace_id FROM 'abnormal_traces.parquet'
  WHERE \"attr.status_code\" = 'Error' LIMIT 1) ORDER BY time;"
- SELECT trace_id, service_name, span_name, duration/1000000.0 as duration_ms, \"attr.status_code\" FROM 'abnormal_traces.parquet' WHERE trace_id = (SELECT trace_id FROM 'abnormal_traces.parquet' WHERE
  \"attr.status_code\" = 'Error' LIMIT 1) AND parent_span_id IS NOT NULL ORDER BY duration_ms DESC LIMIT 20;"
- SELECT service_name, span_name, AVG(duration)/1000000.0 as avg_duration_ms, MAX(duration)/1000000.0 as max_duration_ms, COUNT(*) as cnt FROM 'abnormal_traces.parquet' GROUP BY service_name, span_name
  HAVING AVG(duration)/1000000.0 > 100 ORDER BY avg_duration_ms DESC LIMIT 20;"
- SELECT metric, service_name, AVG(value) as avg_value, MAX(value) as max_value FROM 'abnormal_metrics.parquet' WHERE metric LIKE '%error%' OR metric LIKE '%latency%' GROUP BY metric, service_name HAVING
  AVG(value) > 0 ORDER BY avg_value DESC LIMIT 30;"
