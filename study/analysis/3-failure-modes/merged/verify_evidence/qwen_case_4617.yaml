  text: "Based on my comprehensive analysis of the telemetry data, I can now provide the root cause analysis.\n\n## Root Cause Analysis Summary\n\n**Root Cause Service: `ts-rabbitmq`**\n\nThe RabbitMQ message\
    \ broker is unavailable, causing cascading failures across multiple services that depend on it for messaging.\n\n**Evidence:**\n1. **ts-notification-service** and **ts-delivery-service** logs show repeated\
    \ \"Attempting to connect to: [ts-rabbitmq:5672]\" followed by \"Failed to check/redeclare auto-delete queue(s)\" errors\n2. **ts-food-service** logs show `UnknownHostException: ts-rabbitmq: Name or\
    \ service not known` - indicating DNS resolution failure for the RabbitMQ service\n3. Container restart metrics show `k8s.container.restarts` with value 3.0 starting at 14:21:06\n4. Error timeline shows\
    \ RabbitMQ connection failures starting at 14:21:02 and propagating to dependent services\n\n**Fault Propagation Path:**\n```\nts-rabbitmq (UNAVAILABLE)\n    ├── ts-notification-service (HIGH_ERROR_RATE)\n\
