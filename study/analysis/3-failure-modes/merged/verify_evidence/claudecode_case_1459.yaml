raw_sql_list_sample:
- SELECT * FROM 'abnormal_logs.parquet' LIMIT 0;"
- SELECT * FROM 'abnormal_traces.parquet' LIMIT 0;"
- SELECT * FROM 'abnormal_metrics.parquet' LIMIT 0;"
- "SELECT \n    service_name,\n    level,\n    COUNT(*) as log_count,\n    MIN(time) as earliest,\n    MAX(time) as latest\nFROM 'abnormal_logs.parquet'\nGROUP BY service_name, level\nORDER BY service_name,\
  \ level;\n\""
- "SELECT \n    service_name,\n    level,\n    COUNT(*) as log_count\nFROM 'normal_logs.parquet'\nGROUP BY service_name, level\nORDER BY service_name, level;\n\""
- 'SELECT service_name, level, message, COUNT(*) as count, MIN(time) as first_occurrence

  FROM ''abnormal_logs.parquet''

  WHERE level IN (''SEVERE'', ''ERROR'')

  GROUP BY service_name, level, message

  ORDER BY first_occurrence

  LIMIT 30;

  "'
- "SELECT \n    service_name,\n    attr.http.response.status_code as status_code,\n    COUNT(*) as count,\n    AVG(duration) as avg_duration_ms,\n    MIN(time) as earliest\nFROM 'abnormal_traces.parquet'\n\
  WHERE attr.http.response.status_code IS NOT NULL\nGROUP BY service_name, attr.http.response.status_code\nORDER BY earliest\nLIMIT 40;\n\""
- "with errors and see the call chain\nSELECT \n    trace_id,\n    service_name,\n    span_name,\n    attr.status_code,\n    duration,\n    time\nFROM 'abnormal_traces.parquet'\nWHERE attr.status_code =\
  \ 'ERROR'\nORDER BY time\nLIMIT 30;\n\""
- "SELECT \n    service_name,\n    \\\"attr.http.response.status_code\\\" as status_code,\n    COUNT(*) as count,\n    AVG(duration) as avg_duration_ms,\n    MIN(time) as earliest\nFROM 'abnormal_traces.parquet'\n\
  WHERE \\\"attr.http.response.status_code\\\" IS NOT NULL\nGROUP BY service_name, \\\"attr.http.response.status_code\\\"\nORDER BY earliest\nLIMIT 40;\n\""
- "SELECT \n    trace_id,\n    service_name,\n    span_name,\n    \\\"attr.status_code\\\" as status_code,\n    duration,\n    time\nFROM 'abnormal_traces.parquet'\nWHERE \\\"attr.status_code\\\" = 'ERROR'\n\
  ORDER BY time\nLIMIT 30;\n\""
- "SELECT \n    trace_id,\n    COUNT(*) as span_count,\n    COUNT(DISTINCT service_name) as service_count,\n    LIST(DISTINCT service_name) as services\nFROM 'abnormal_traces.parquet'\nWHERE \\\"attr.http.response.status_code\\\
  \" IN (500, 503, 504)\nGROUP BY trace_id\nORDER BY time\nLIMIT 20;\n\""
- "with ts-basic-service errors to see the call chain\nSELECT \n    trace_id,\n    service_name,\n    span_name,\n    \\\"attr.http.response.status_code\\\" as status,\n    duration / 1000000 as duration_ms,\n\
  \    time,\n    \\\"parent_span_id\\\" as parent_id\nFROM 'abnormal_traces.parquet'\nWHERE trace_id IN (\n    SELECT trace_id FROM 'abnormal_traces.parquet' \n    WHERE service_name = 'ts-basic-service'\
  \ \n    AND \\\"attr.http.response.status_code\\\" = 500\n    LIMIT 5\n)\nORDER BY trace_id, time;\n\""
- "SELECT \n    trace_id,\n    COUNT(*) as span_count,\n    COUNT(DISTINCT service_name) as service_count,\n    LIST(DISTINCT service_name) as services\nFROM 'abnormal_traces.parquet'\nWHERE \\\"attr.http.response.status_code\\\
  \" IN (500, 503, 504)\nGROUP BY trace_id\nLIMIT 20;\n\""
- "with ts-basic-service errors to see the call chain\nSELECT \n    trace_id,\n    service_name,\n    span_name,\n    \\\"attr.http.response.status_code\\\" as status,\n    duration / 1000000 as duration_ms,\n\
  \    time,\n    \\\"parent_span_id\\\" as parent_id\nFROM 'abnormal_traces.parquet'\nWHERE trace_id IN (\n    SELECT trace_id FROM 'abnormal_traces.parquet' \n    WHERE service_name = 'ts-basic-service'\
  \ \n    AND \\\"attr.http.response.status_code\\\" = 500\n    LIMIT 5\n)\nORDER BY trace_id, time;\n\""
- "SELECT \n    service_name,\n    metric,\n    AVG(value) as avg_value,\n    MIN(value) as min_value,\n    MAX(value) as max_value,\n    MIN(time) as earliest,\n    MAX(time) as latest\nFROM 'abnormal_metrics.parquet'\n\
  WHERE service_name = 'ts-basic-service'\nGROUP BY service_name, metric\nORDER BY metric;\n\""
- "SELECT \n    service_name,\n    metric,\n    AVG(value) as avg_value,\n    MIN(time) as earliest\nFROM 'abnormal_metrics.parquet'\nWHERE metric LIKE '%error%' OR metric LIKE '%Error%' OR metric LIKE\
  \ '%cpu%' OR metric LIKE '%memory%'\nGROUP BY service_name, metric\nHAVING AVG(value) > 0\nORDER BY service_name, metric;\n\""
- "SELECT \n    caller_service,\n    callee_service,\n    COUNT(*) as call_count,\n    SUM(CASE WHEN status = 'ERROR' OR status_code >= 500 THEN 1 ELSE 0 END) as error_count,\n    MIN(time) as first_call\n\
  FROM (\n    SELECT \n        t1.service_name as caller_service,\n        t2.service_name as callee_service,\n        t2.\\\"attr.status_code\\\" as status,\n        t2.\\\"attr.http.response.status_code\\\
  \" as status_code,\n        t2.time as time\n    FROM 'abnormal_traces.parquet' t1\n    JOIN 'abnormal_traces.parquet' t2 \n        ON t1.trace_id = t2.trace_id \n        AND t1.span_id = t2.\\\"parent_span_id\\\
  \"\n    WHERE t1.service_name != t2.service_name\n) sub\nGROUP BY caller_service, callee_service\nORDER BY error_count DESC, first_call\nLIMIT 30;\n\""
- "SELECT \n    caller_service,\n    callee_service,\n    COUNT(*) as call_count,\n    SUM(CASE WHEN status = 'ERROR' OR status_code >= 500 THEN 1 ELSE 0 END) as error_count\nFROM (\n    SELECT \n     \
  \   t1.service_name as caller_service,\n        t2.service_name as callee_service,\n        t2.\\\"attr.status_code\\\" as status,\n        t2.\\\"attr.http.response.status_code\\\" as status_code\n \
  \   FROM 'normal_traces.parquet' t1\n    JOIN 'normal_traces.parquet' t2 \n        ON t1.trace_id = t2.trace_id \n        AND t1.span_id = t2.\\\"parent_span_id\\\"\n    WHERE t1.service_name != t2.service_name\n\
  ) sub\nGROUP BY caller_service, callee_service\nHAVING error_count > 0\nORDER BY error_count DESC\nLIMIT 20;\n\""
- "SELECT \n    'normal' as data_type,\n    service_name,\n    metric,\n    AVG(value) as avg_value\nFROM 'normal_metrics.parquet'\nWHERE service_name IN ('ts-basic-service', 'ts-travel-service', 'ts-travel2-service',\
  \ 'ts-route-plan-service', 'ts-travel-plan-service')\nGROUP BY service_name, metric\nORDER BY service_name, metric\nLIMIT 30;\n\""
- "SELECT \n    service_name,\n    MIN(time) as first_error,\n    COUNT(*) as error_count\nFROM 'abnormal_traces.parquet'\nWHERE \\\"attr.http.response.status_code\\\" >= 500\nGROUP BY service_name\nORDER\
  \ BY first_error;\n\""
