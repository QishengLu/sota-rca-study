    \ K1345)\n- 22 ERROR logs with \"[getAllFood][Get the Get Food Request Failed!][foodStoresListResult is null]\"\n- 7 ERROR logs related to RabbitMQ connection failures: \"UnknownHostException: ts-rabbitmq\"\
    \n\n**Trace Evidence (abnormal_traces.parquet):**\n- Clear call chain: loadgenerator → ts-ui-dashboard → ts-food-service → downstream services\n- ts-food-service spans show extreme latency:\n  - `GET\
