    \ duration exceeding **2.2 seconds**\n- loadgenerator spans consistently show `attr_status_code = \"Error\"`\n- ts-ui-dashboard spans show `attr_status_code = \"Unset\"` (propagating downstream failures)\n\
    \n**Metrics Evidence (abnormal_metrics.parquet):**\n- ts-food-service shows elevated CPU utilization (max 95.9% of limit)\n- queueSize metric averaging 22.7 with max 55, indicating backlog\n\n### Fault\
    \ Propagation Path\n\nThe causal chain is clearly established:\n1. **ts-food-service** experiences errors (failed food requests, null results, RabbitMQ issues) and high latency\n2. Errors propagate\
