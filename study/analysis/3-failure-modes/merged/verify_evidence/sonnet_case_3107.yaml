raw_sql_list_sample:
- "\nSELECT service_name, span_name, attr_status_code, attr_http_response_status_code,\n       COUNT(*) as total_spans,\n       COUNT(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code\
  \ >= 400 THEN 1 END) as error_spans,\n       AVG(duration) as avg_duration_ns,\n       MAX(duration) as max_duration_ns\nFROM abnormal_traces\nGROUP BY service_name, span_name, attr_status_code, attr_http_response_status_code\n\
  ORDER BY error_spans DESC\nLIMIT 30\n"
- '

  SELECT span_name, service_name, COUNT(*) as cnt

  FROM abnormal_traces

  WHERE span_name LIKE ''%preserve%''

  GROUP BY span_name, service_name

  ORDER BY cnt DESC

  LIMIT 20

  '
- "\nSELECT t.trace_id, t.span_id, t.parent_span_id, t.span_name, t.service_name, \n       t.duration, t.attr_status_code, t.attr_http_response_status_code\nFROM abnormal_traces t\nWHERE t.trace_id IN (\n\
  \    SELECT DISTINCT trace_id FROM abnormal_traces \n    WHERE span_name LIKE '%preserve%' AND attr_status_code = 'Error'\n    LIMIT 3\n)\nORDER BY t.trace_id, t.time\nLIMIT 50\n"
- '

  SELECT time, service_name, level, message

  FROM abnormal_logs

  WHERE service_name LIKE ''%preserve%''

  ORDER BY time

  LIMIT 30

  '
- "\nSELECT t.trace_id, t.span_id, t.parent_span_id, t.span_name, t.service_name, \n       t.duration, t.attr_status_code, t.attr_http_response_status_code\nFROM normal_traces t\nWHERE t.trace_id IN (\n\
  \    SELECT DISTINCT trace_id FROM normal_traces \n    WHERE span_name LIKE '%preserve%'\n    LIMIT 2\n)\nORDER BY t.trace_id, t.time\nLIMIT 30\n"
- "\nSELECT time, service_name, level, message\nFROM abnormal_logs\nWHERE level IN ('ERROR', 'SEVERE', 'WARN', 'WARNING')\n  AND message LIKE '%Unexpected%'\nORDER BY time\nLIMIT 20\n"
- "\nSELECT time, service_name, level, message\nFROM abnormal_logs\nWHERE service_name = 'ts-preserve-service'\n  AND level IN ('ERROR', 'SEVERE', 'WARN', 'WARNING')\nORDER BY time\nLIMIT 50\n"
- "\nSELECT DISTINCT metric, service_name\nFROM abnormal_metrics\nWHERE service_name = 'ts-preserve-service'\n   OR attr_k8s_container_name LIKE '%preserve%'\nLIMIT 30\n"
- "\nSELECT time, service_name, level, message\nFROM abnormal_logs\nWHERE service_name = 'ts-preserve-service'\n  AND level IN ('ERROR', 'SEVERE', 'WARN', 'WARNING')\nORDER BY time\nLIMIT 25\n"
- "\nSELECT time, metric, value, service_name, attr_k8s_pod_name\nFROM abnormal_metrics\nWHERE service_name = 'ts-preserve-service'\n  AND metric IN ('jvm.cpu.recent_utilization', 'container.cpu.usage',\
  \ 'container.memory.usage', 'k8s.container.restarts', 'queueSize')\nORDER BY time\nLIMIT 30\n"
- "\nSELECT time, service_name, level, message\nFROM abnormal_logs\nWHERE service_name = 'ts-preserve-service'\n  AND time < '2025-08-20T15:12:00'\nORDER BY time\nLIMIT 20\n"
- '

  SELECT service_name, level, COUNT(*) as cnt

  FROM abnormal_logs

  WHERE level IN (''ERROR'', ''SEVERE'', ''WARN'', ''WARNING'')

  GROUP BY service_name, level

  ORDER BY cnt DESC

  LIMIT 30

  '
- "\nSELECT time, service_name, level, message\nFROM abnormal_logs\nWHERE service_name IN ('ts-delivery-service', 'ts-notification-service')\n  AND level IN ('ERROR', 'SEVERE', 'WARN', 'WARNING')\nORDER\
  \ BY time\nLIMIT 20\n"
- '

  SELECT DISTINCT metric, service_name

  FROM abnormal_metrics_sum

  ORDER BY service_name, metric

  LIMIT 30

  '
- '

  SELECT time, metric, value, service_name, attr_k8s_pod_name

  FROM abnormal_metrics_sum

  WHERE service_name = ''rabbitmq''

  ORDER BY time, metric

  LIMIT 30

  '
- '

  SELECT time, service_name, level, message

  FROM abnormal_logs

  WHERE message LIKE ''%rabbit%'' OR message LIKE ''%queue%'' OR message LIKE ''%amqp%'' OR message LIKE ''%connection%''

  ORDER BY time

  LIMIT 20

  '
- "\nSELECT \n    'normal' as period,\n    AVG(CASE WHEN metric='k8s.pod.network.io' THEN value END) as avg_network_io,\n    AVG(CASE WHEN metric='container.cpu.time' THEN value END) as avg_cpu_time,\n\
  \    COUNT(*) as records\nFROM normal_metrics_sum\nWHERE service_name = 'rabbitmq'\nUNION ALL\nSELECT \n    'abnormal' as period,\n    AVG(CASE WHEN metric='k8s.pod.network.io' THEN value END) as avg_network_io,\n\
  \    AVG(CASE WHEN metric='container.cpu.time' THEN value END) as avg_cpu_time,\n    COUNT(*) as records\nFROM abnormal_metrics_sum\nWHERE service_name = 'rabbitmq'\n"
- '

  SELECT time, metric, value, service_name, attr_k8s_pod_name

  FROM abnormal_metrics

  WHERE service_name = ''rabbitmq''

  ORDER BY time, metric

  LIMIT 20

  '
- "\nSELECT time, metric, value, attr_source, attr_destination\nFROM abnormal_metrics_sum\nWHERE metric IN ('hubble_drop_total', 'hubble_flows_processed_total')\n  AND (attr_destination LIKE '%rabbit%'\
  \ OR attr_source LIKE '%rabbit%')\nORDER BY time\nLIMIT 20\n"
- "\nSELECT time, service_name, level, message\nFROM abnormal_logs\nWHERE service_name = 'ts-preserve-service'\n  AND (message LIKE '%rabbit%' OR message LIKE '%queue%' OR message LIKE '%amqp%')\nORDER\
  \ BY time\nLIMIT 15\n"
