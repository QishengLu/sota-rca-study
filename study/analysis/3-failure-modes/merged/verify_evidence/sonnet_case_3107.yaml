  text: 'Based on my comprehensive analysis, I now have sufficient evidence to produce the final Root Cause Analysis. Let me compile the causal graph:


    **Summary of Findings:**

    - **RabbitMQ (ts-rabbitmq)** is experiencing a **NETWORK_PARTITION** — Hubble network metrics show network packet drops from `ts5/rabbitmq-0` starting at 15:11:53, and NEW inbound drop entries from
    other nodes (ts0 → ts5/rabbitmq-0, ts1 → ts5/rabbitmq-0) that don''t exist in the normal period

    - **ts-delivery-service** and **ts-notification-service** report "Failed to check/redeclare auto-delete queue(s)" + "Attempting to connect to: [ts-rabbitmq:5672]" starting at 15:11:52 — these services
    **cannot connect to RabbitMQ**

    - **ts-preserve-service** throws `java.lang.RuntimeException: Unexpected error` for 100% (112/112) of preserve requests starting at 15:11:54 — because it cannot publish booking notifications via RabbitMQ

    - **ts-ui-dashboard** and **loadgenerator** receive HTTP 500 errors propagating upstream


    **Timeline of Failure:**

    1. `15:11:52.695` — ts-delivery-service fails connecting to ts-rabbitmq

    2. `15:11:53.603` — Hubble drops from rabbitmq-0 confirmed

    3. `15:11:54.225` — ts-notification-service fails connect'
