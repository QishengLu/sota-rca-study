- "\nSELECT time, level, message, service_name\nFROM abnormal_logs\nWHERE service_name LIKE '%route%'\n  AND level IN ('ERROR', 'WARN')\nORDER BY time ASC\nLIMIT 20\n"
- '

  SELECT service_name, level, COUNT(*) as count

  FROM abnormal_logs

  GROUP BY service_name, level

  ORDER BY service_name, level

  '
- '

