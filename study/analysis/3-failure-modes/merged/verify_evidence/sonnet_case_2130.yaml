- "\nSELECT span_id, parent_span_id, service_name, span_name, duration, attr_status_code, attr_http_response_status_code\nFROM abnormal_traces\nWHERE trace_id = '3da8d3bbdaca71f47cf803b934119776'\n  AND\
  \ (attr_status_code = 'STATUS_CODE_ERROR' OR attr_status_code = 'Error' OR attr_http_response_status_code >= 400 OR duration > 10000000000)\nORDER BY duration DESC\n"
- "\nSELECT span_id, parent_span_id, service_name, span_name, duration, attr_http_response_status_code\nFROM abnormal_traces\nWHERE trace_id = '3da8d3bbdaca71f47cf803b934119776'\n  AND parent_span_id =\
  \ '3ac27ae6733f41c8'\n"
- "\nSELECT span_id, parent_span_id, service_name, span_name, duration, attr_http_response_status_code\nFROM abnormal_traces\nWHERE trace_id = '3da8d3bbdaca71f47cf803b934119776'\n  AND service_name = 'ts-route-service'\n"
- "\nSELECT AVG(duration) as avg_duration_ns, MAX(duration) as max_duration_ns, MIN(duration) as min_duration_ns,\n       COUNT(*) as count, span_name\nFROM normal_traces\nWHERE service_name = 'ts-route-service'\n\
  GROUP BY span_name\nORDER BY avg_duration_ns DESC\n"
- "\nSELECT AVG(duration) as avg_duration_ns, MAX(duration) as max_duration_ns, MIN(duration) as min_duration_ns,\n       COUNT(*) as count, span_name\nFROM abnormal_traces\nWHERE service_name = 'ts-route-service'\n\
  GROUP BY span_name\nORDER BY avg_duration_ns DESC\n"
- '

  SELECT metric, AVG(value) as avg_val, MAX(value) as max_val, COUNT(*) as count

  FROM abnormal_metrics

  WHERE service_name LIKE ''%route%''

  GROUP BY metric

  ORDER BY metric

