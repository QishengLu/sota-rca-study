  ORDER BY metric

  '
- "\nSELECT metric, attr_k8s_pod_name, attr_k8s_container_name, AVG(value) as avg_val, MAX(value) as max_val\nFROM abnormal_metrics\nWHERE service_name LIKE '%route%' \n  AND metric IN ('container.cpu.usage',\
  \ 'container.memory.rss', 'container.filesystem.usage', 'jvm.system.cpu.load_1m')\nGROUP BY metric, attr_k8s_pod_name, attr_k8s_container_name\nORDER BY metric, max_val DESC\n"
- "\nSELECT 'normal' as period, metric, AVG(value) as avg_val, MAX(value) as max_val\nFROM normal_metrics\nWHERE service_name LIKE '%route-service%' \n  AND metric IN ('jvm.system.cpu.load_1m', 'container.cpu.usage')\n\
  GROUP BY metric\nUNION ALL\nSELECT 'abnormal' as period, metric, AVG(value) as avg_val, MAX(value) as max_val\nFROM abnormal_metrics\nWHERE service_name LIKE '%route-service%'\n  AND metric IN ('jvm.system.cpu.load_1m',\
  \ 'container.cpu.usage')\nGROUP BY metric\nORDER BY metric, period\n"
