raw_sql_list_sample:
- "\nSELECT service_name, \n       COUNT(*) as total_spans,\n       SUM(CASE WHEN attr_status_code = 'STATUS_CODE_ERROR' OR attr_http_response_status_code >= 400 THEN 1 ELSE 0 END) as error_spans,\n   \
  \    AVG(duration) as avg_duration_ns,\n       MAX(duration) as max_duration_ns,\n       ROUND(100.0 * SUM(CASE WHEN attr_status_code = 'STATUS_CODE_ERROR' OR attr_http_response_status_code >= 400 THEN\
  \ 1 ELSE 0 END) / COUNT(*), 2) as error_pct\nFROM abnormal_traces\nGROUP BY service_name\nORDER BY error_pct DESC, error_spans DESC\n"
- '

  SELECT service_name, span_name, duration, attr_status_code, attr_http_response_status_code, time

  FROM abnormal_traces

  WHERE (attr_status_code = ''STATUS_CODE_ERROR'' OR attr_http_response_status_code >= 400)

  ORDER BY time ASC

  '
- "\nSELECT DISTINCT trace_id, service_name, span_name, duration, attr_status_code, attr_http_response_status_code\nFROM abnormal_traces\nWHERE (attr_status_code = 'STATUS_CODE_ERROR' OR attr_http_response_status_code\
  \ >= 400)\n  AND span_name NOT IN ('POST', 'GET')\nORDER BY time ASC\n"
- '

  SELECT span_id, parent_span_id, service_name, span_name, duration, attr_status_code, attr_http_response_status_code, time

  FROM abnormal_traces

  WHERE trace_id = ''3f9ed5ee4262d319c39bf88ff90acd31''

  ORDER BY time ASC

  '
- '

