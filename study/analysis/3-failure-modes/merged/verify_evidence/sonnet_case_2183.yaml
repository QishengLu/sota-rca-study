raw_sql_list_sample:
- "\nSELECT service_name, span_name, attr_status_code, attr_http_response_status_code,\n       COUNT(*) as total_count,\n       SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code\
  \ >= 400 THEN 1 ELSE 0 END) as error_count,\n       AVG(duration) as avg_duration_ns,\n       MAX(duration) as max_duration_ns,\n       PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration) as p99_duration_ns\n\
  FROM abnormal_traces\nGROUP BY service_name, span_name, attr_status_code, attr_http_response_status_code\nORDER BY error_count DESC\nLIMIT 30\n"
- '

  SELECT service_name, level, COUNT(*) as count

  FROM abnormal_logs

  GROUP BY service_name, level

  ORDER BY service_name, level

  '
- '

  SELECT time, service_name, level, message

  FROM abnormal_logs

  WHERE level IN (''ERROR'', ''SEVERE'', ''WARN'') OR service_name = ''ts-travel-plan-service''

  ORDER BY time

  LIMIT 50

  '
- "\n-- Get traces involved in the travel-plan-service failures\nSELECT t.trace_id, t.span_id, t.parent_span_id, t.span_name, t.service_name, \n       t.duration, t.attr_status_code, t.attr_http_response_status_code,\
  \ t.time\nFROM abnormal_traces t\nWHERE t.trace_id IN (\n    SELECT trace_id FROM abnormal_traces \n    WHERE service_name = 'ts-travel-plan-service' \n    AND attr_status_code = 'Error'\n)\nORDER BY\
  \ t.trace_id, t.time\nLIMIT 100\n"
- "\nSELECT service_name, span_name, attr_status_code, attr_http_response_status_code,\n       COUNT(*) as total_count,\n       SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_status_code = 'Error' THEN\
  \ 1 ELSE 0 END) as error_count,\n       AVG(duration) as avg_duration_ns,\n       MAX(duration) as max_duration_ns\nFROM abnormal_traces\nWHERE service_name = 'ts-seat-service'\nGROUP BY service_name,\
  \ span_name, attr_status_code, attr_http_response_status_code\nORDER BY error_count DESC\nLIMIT 20\n"
- "\n-- Check seat service in normal traces for comparison\nSELECT service_name, span_name, attr_status_code, attr_http_response_status_code,\n       COUNT(*) as total_count,\n       AVG(duration) as avg_duration_ns,\n\
  \       MAX(duration) as max_duration_ns\nFROM normal_traces\nWHERE service_name = 'ts-seat-service'\nGROUP BY service_name, span_name, attr_status_code, attr_http_response_status_code\nORDER BY total_count\
  \ DESC\nLIMIT 20\n"
- "\nSELECT metric, service_name, attr_k8s_pod_name, attr_k8s_container_name,\n       AVG(value) as avg_value, MAX(value) as max_value, MIN(value) as min_value, COUNT(*) as count\nFROM abnormal_metrics\n\
  WHERE service_name LIKE '%seat%' OR attr_k8s_pod_name LIKE '%seat%'\nGROUP BY metric, service_name, attr_k8s_pod_name, attr_k8s_container_name\nORDER BY metric, service_name\nLIMIT 50\n"
- '

  -- Get distinct metric names for seat service

  SELECT DISTINCT metric FROM abnormal_metrics

  WHERE service_name LIKE ''%seat%'' OR attr_k8s_pod_name LIKE ''%seat%''

  ORDER BY metric

  LIMIT 30

  '
- "\n-- Compare jvm.system.cpu.load_1m for all services in both periods\nSELECT \n    CASE WHEN filename LIKE '%abnormal%' THEN 'abnormal' ELSE 'normal' END as period,\n    service_name,\n    metric,\n\
  \    AVG(value) as avg_value,\n    MAX(value) as max_value\nFROM (\n    SELECT *, 'abnormal' as filename FROM abnormal_metrics\n    UNION ALL\n    SELECT *, 'normal' as filename FROM normal_metrics\n\
  ) t\nWHERE metric = 'jvm.system.cpu.load_1m'\nGROUP BY period, service_name, metric\nORDER BY period, max_value DESC\nLIMIT 30\n"
- '

  -- Check network-related metrics for seat service

  SELECT DISTINCT metric FROM abnormal_metrics_sum

  WHERE service_name LIKE ''%seat%'' OR attr_k8s_pod_name LIKE ''%seat%''

  ORDER BY metric

  LIMIT 30

  '
- "\nSELECT \n    CASE WHEN filename LIKE '%abnormal%' THEN 'abnormal' ELSE 'normal' END as period,\n    service_name,\n    attr_k8s_pod_name,\n    metric,\n    AVG(value) as avg_value,\n    MAX(value)\
  \ as max_value,\n    SUM(value) as total_value\nFROM (\n    SELECT *, 'abnormal' as filename FROM abnormal_metrics_sum\n    UNION ALL\n    SELECT *, 'normal' as filename FROM normal_metrics_sum\n) t\n\
  WHERE (service_name LIKE '%seat%' OR attr_k8s_pod_name LIKE '%seat%')\n  AND metric IN ('k8s.pod.network.errors', 'hubble_http_requests_total', 'k8s.pod.network.io')\nGROUP BY period, service_name, attr_k8s_pod_name,\
  \ metric\nORDER BY period, metric\nLIMIT 30\n"
- "\n-- Check hubble HTTP metrics for ts-seat-service in both periods\nSELECT \n    CASE WHEN filename LIKE '%abnormal%' THEN 'abnormal' ELSE 'normal' END as period,\n    service_name,\n    metric,\n  \
  \  AVG(value) as avg_value,\n    MAX(value) as max_value,\n    MIN(value) as min_value\nFROM (\n    SELECT *, 'abnormal' as filename FROM abnormal_metrics\n    UNION ALL\n    SELECT *, 'normal' as filename\
  \ FROM normal_metrics\n) t\nWHERE metric LIKE '%hubble%' AND (service_name LIKE '%seat%' OR attr_destination LIKE '%seat%' OR attr_source LIKE '%seat%')\nGROUP BY period, service_name, metric\nORDER BY\
  \ period, metric\nLIMIT 20\n"
- "\n-- Check GC metrics for seat service in both periods  \nSELECT \n    CASE WHEN filename LIKE '%abnormal%' THEN 'abnormal' ELSE 'normal' END as period,\n    service_name,\n    metric,\n    attr_jvm_gc_name,\n\
  \    attr_jvm_gc_action,\n    AVG(sum) as avg_gc_time,\n    MAX(max) as max_gc_time,\n    SUM(count) as total_gc_count\nFROM (\n    SELECT *, 'abnormal' as filename FROM abnormal_metrics_histogram\n \
  \   UNION ALL\n    SELECT *, 'normal' as filename FROM normal_metrics_histogram\n) t\nWHERE service_name LIKE '%seat%'\nGROUP BY period, service_name, metric, attr_jvm_gc_name, attr_jvm_gc_action\nORDER\
  \ BY period, metric\nLIMIT 30\n"
- "\n-- Check JVM memory metrics for seat-service\nSELECT \n    CASE WHEN filename LIKE '%abnormal%' THEN 'abnormal' ELSE 'normal' END as period,\n    service_name,\n    attr_k8s_pod_name,\n    metric,\n\
  \    AVG(value) as avg_value,\n    MAX(value) as max_value,\n    MIN(value) as min_value\nFROM (\n    SELECT *, 'abnormal' as filename FROM abnormal_metrics_sum\n    UNION ALL\n    SELECT *, 'normal'\
  \ as filename FROM normal_metrics_sum\n) t\nWHERE (service_name LIKE '%seat%' OR attr_k8s_pod_name LIKE '%seat%')\n  AND metric IN ('jvm.memory.used', 'jvm.memory.limit', 'jvm.thread.count', 'jvm.cpu.time',\
  \ 'jvm.cpu.count')\nGROUP BY period, service_name, attr_k8s_pod_name, metric\nORDER BY period, metric\nLIMIT 30\n"
- "\n-- Check CPU usage over time for ts-seat-service\nSELECT time, metric, value, attr_k8s_pod_name\nFROM abnormal_metrics\nWHERE (service_name LIKE '%seat%' OR attr_k8s_pod_name LIKE '%seat%')\n  AND\
  \ metric IN ('container.cpu.usage', 'k8s.pod.cpu.usage')\nORDER BY time\nLIMIT 30\n"
- "\n-- Look at the failing trace IDs to get the call chain \nSELECT t.trace_id, t.span_id, t.parent_span_id, t.span_name, t.service_name, \n       t.duration, t.attr_status_code, t.attr_http_response_status_code\n\
  FROM abnormal_traces t\nWHERE t.trace_id IN (\n    SELECT DISTINCT trace_id FROM abnormal_traces \n    WHERE service_name = 'ts-travel-plan-service' \n    AND attr_status_code = 'Error'\n    LIMIT 2\n\
  )\nORDER BY t.trace_id, t.time\nLIMIT 20\n"
- "\n-- Get the full time-series of CPU usage for ts-seat-service to find the peak\nSELECT time, metric, value\nFROM abnormal_metrics\nWHERE (service_name = 'ts-seat-service' OR attr_k8s_pod_name = 'ts-seat-service-7b7c5f5d7d-dhxw5')\n\
  \  AND metric = 'container.cpu.usage'\nORDER BY value DESC\nLIMIT 20\n"
- '

  -- Find ts-seat-service traces during the incident window

  SELECT time, trace_id, span_name, service_name, duration, attr_status_code, attr_http_response_status_code

  FROM abnormal_traces

  WHERE service_name = ''ts-seat-service''

  ORDER BY time

  LIMIT 20

  '
- "\n-- Find high latency spans for ts-seat-service during incident\nSELECT time, trace_id, span_name, service_name, duration, attr_status_code, attr_http_response_status_code\nFROM abnormal_traces\nWHERE\
  \ service_name = 'ts-seat-service'\n  AND duration > 500000000 -- > 500ms\nORDER BY duration DESC\nLIMIT 15\n"
- "\n-- Get all metrics for ts-seat-service ordered by time to see jvm load during incident\nSELECT time, metric, value\nFROM abnormal_metrics\nWHERE service_name = 'ts-seat-service' \n  AND metric IN ('jvm.system.cpu.load_1m',\
  \ 'jvm.system.cpu.utilization', 'queueSize')\nORDER BY time\nLIMIT 30\n"
