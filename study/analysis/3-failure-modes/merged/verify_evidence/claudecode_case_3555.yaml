  ORDER BY service_name, level;

  "'
- 'SELECT service_name, level, COUNT(*) as count

  FROM ''normal_logs.parquet''

  GROUP BY service_name, level

  ORDER BY service_name, level;

  "'
- 'SELECT service_name, level, message

  FROM ''abnormal_logs.parquet''

  WHERE level IN (''ERROR'', ''SEVERE'')

  ORDER BY time

  LIMIT 50;

  "'
- 'SELECT service_name, level, COUNT(*) as count

  FROM ''abnormal_logs.parquet''

  WHERE level IN (''ERROR'', ''SEVERE'')

  GROUP BY service_name, level

  ORDER BY count DESC;

  "'
- 'SELECT service_name, attr.status_code, COUNT(*) as count

  FROM ''abnormal_traces.parquet''

  GROUP BY service_name, attr.status_code

  ORDER BY service_name, attr.status_code;

  "'
- 'SELECT service_name, attr.status_code, COUNT(*) as count

  FROM ''normal_traces.parquet''

  GROUP BY service_name, attr.status_code

  ORDER BY service_name, attr.status_code;

  "'
- 'SELECT service_name, \"attr.status_code\", COUNT(*) as count

  FROM ''abnormal_traces.parquet''

  GROUP BY service_name, \"attr.status_code\"

  ORDER BY service_name, \"attr.status_code\";

  "'
- 'SELECT trace_id, service_name, span_name, \"attr.status_code\", duration

  FROM ''abnormal_traces.parquet''

  WHERE \"attr.status_code\" = ''Error''

  ORDER BY time

  LIMIT 30;

  "'
- "SELECT trace_id, service_name, span_name, \\\"parent_span_id\\\", \\\"attr.status_code\\\", duration\nFROM 'abnormal_traces.parquet'\nWHERE \\\"attr.status_code\\\" = 'Error'\n  AND trace_id = '64a297a64b794dce38c7cfba8b9143ec'\n\
  ORDER BY duration DESC;\n\""
- "SELECT time, service_name, message\nFROM 'abnormal_logs.parquet'\nWHERE service_name = 'ts-travel-service'\n  AND level IN ('ERROR', 'SEVERE')\nORDER BY time\nLIMIT 20;\n\""
- 'SELECT time, service_name, level, message

  FROM ''abnormal_logs.parquet''

  WHERE service_name = ''ts-seat-service''

  ORDER BY time

  LIMIT 30;

  "'
- 'SELECT * FROM ''abnormal_logs.parquet''

  WHERE service_name = ''ts-seat-service''

  LIMIT 30;

  "'
- 'SELECT service_name, metric, AVG(value) as avg_value, MAX(value) as max_value, MIN(value) as min_value

  FROM ''abnormal_metrics.parquet''

  WHERE service_name = ''ts-seat-service''

  GROUP BY service_name, metric

  ORDER BY metric;

  "'
- 'SELECT service_name, metric, AVG(value) as avg_value

  FROM ''abnormal_metrics.parquet''

  GROUP BY service_name, metric

  HAVING service_name LIKE ''%seat%'' OR service_name LIKE ''%travel%''

  ORDER BY service_name, metric;

  "'
- 'SELECT DISTINCT metric

  FROM ''abnormal_metrics.parquet''

  WHERE metric LIKE ''%http%'' OR metric LIKE ''%error%'' OR metric LIKE ''%network%'' OR metric LIKE ''%latency%''

  LIMIT 30;

  "'
- 'SELECT service_name, metric, value, time

  FROM ''abnormal_metrics.parquet''

  WHERE metric LIKE ''%error%'' OR metric LIKE ''%latency%''

  ORDER BY time

  LIMIT 50;

  "'
- 'SELECT DISTINCT metric FROM ''abnormal_metrics_sum.parquet'' LIMIT 50;

  "'
