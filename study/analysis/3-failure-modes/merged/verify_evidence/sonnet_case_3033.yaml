raw_sql_list_sample:
- "\nSELECT \n    service_name,\n    COUNT(*) as total_spans,\n    SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 500 THEN 1 ELSE 0 END) as error_spans,\n    ROUND(100.0 *\
  \ SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 500 THEN 1 ELSE 0 END) / COUNT(*), 2) as error_rate_pct,\n    AVG(duration) as avg_duration_ns,\n    MAX(duration) as max_duration_ns,\n\
  \    PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY duration) as p99_duration_ns\nFROM abnormal_traces\nGROUP BY service_name\nORDER BY error_rate_pct DESC\n"
- "\nSELECT \n    service_name,\n    level,\n    COUNT(*) as count\nFROM abnormal_logs\nGROUP BY service_name, level\nORDER BY service_name, level\n"
- "\nSELECT \n    service_name,\n    span_name,\n    attr_http_request_method,\n    attr_http_response_status_code,\n    COUNT(*) as count,\n    AVG(duration) as avg_duration_ns,\n    PERCENTILE_CONT(0.99)\
  \ WITHIN GROUP (ORDER BY duration) as p99_duration_ns\nFROM abnormal_traces\nWHERE service_name = 'ts-food-service'\nGROUP BY service_name, span_name, attr_http_request_method, attr_http_response_status_code\n\
  ORDER BY count DESC\n"
- "\nSELECT \n    time,\n    service_name,\n    level,\n    message\nFROM abnormal_logs\nWHERE service_name = 'ts-food-service'\nAND level IN ('ERROR', 'SEVERE', 'WARN')\nORDER BY time\nLIMIT 20\n"
- '

  SELECT trace_id, span_id, parent_span_id, span_name, service_name, duration, attr_status_code, attr_http_response_status_code

  FROM abnormal_traces

  WHERE service_name = ''ts-food-service''

  AND (attr_status_code = ''ERROR'' OR attr_http_response_status_code >= 500)

  LIMIT 5

