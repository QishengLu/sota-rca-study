- "SELECT time, metric, value, service_name FROM 'abnormal_metrics.parquet' \nWHERE metric LIKE '%error%' OR metric LIKE '%Error%'\nORDER BY time ASC LIMIT 30;\n\""
- SELECT DISTINCT metric FROM 'abnormal_metrics.parquet' ORDER BY metric;"
