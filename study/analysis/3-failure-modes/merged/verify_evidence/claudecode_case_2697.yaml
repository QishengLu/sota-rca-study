- SELECT service_name, COUNT(*) as total, COUNT(*) FILTER (WHERE attr.status_code = 'ERROR') as errors, ROUND(COUNT(*) FILTER (WHERE attr.status_code = 'ERROR') * 100.0 / COUNT(*), 2) as error_rate FROM
  'abnormal_traces.parquet' GROUP BY service_name ORDER BY error_rate DESC LIMIT 20;"
- SELECT DISTINCT metric FROM 'abnormal_metrics.parquet' ORDER BY metric;"
- SELECT service_name, COUNT(*) as total, COUNT(*) FILTER (WHERE \"attr.status_code\" = 'ERROR') as errors, ROUND(COUNT(*) FILTER (WHERE \"attr.status_code\" = 'ERROR') * 100.0 / COUNT(*), 2) as error_rate
  FROM 'abnormal_traces.parquet' GROUP BY service_name HAVING errors > 0 ORDER BY error_rate DESC LIMIT 20;"
- SELECT time, service_name, level, message FROM 'abnormal_logs.parquet' WHERE level = 'ERROR' ORDER BY time ASC LIMIT 30;"
- "SELECT \n    parent_service.service_name as caller,\n    child_service.service_name as callee,\n    COUNT(*) as call_count,\n    COUNT(*) FILTER (WHERE child_service.\\\"attr.status_code\\\" = 'ERROR')\
  \ as errors\nFROM 'abnormal_traces.parquet' parent_service\nJOIN 'abnormal_traces.parquet' child_service \n    ON parent_service.span_id = child_service.\\\"parent_span_id\\\"\n    AND parent_service.trace_id\
  \ = child_service.trace_id\nGROUP BY parent_service.service_name, child_service.service_name\nORDER BY call_count DESC\nLIMIT 40;\n\""
- "SELECT \n    trace_id,\n    span_id,\n    \\\"parent_span_id\\\",\n    service_name,\n    span_name,\n    \\\"attr.status_code\\\" as status,\n    duration\nFROM 'abnormal_traces.parquet'\nWHERE service_name\
  \ IN ('ts-food-service', 'ts-preserve-service', 'ts-order-service')\nORDER BY time ASC\nLIMIT 50;\n\""
- SELECT DISTINCT \"attr.status_code\" FROM 'abnormal_traces.parquet';"
- "SELECT \n    parent.service_name as caller,\n    child.service_name as callee,\n    COUNT(*) as call_count\nFROM 'abnormal_traces.parquet' child\nJOIN 'abnormal_traces.parquet' parent \n    ON child.\\\
  \"parent_span_id\\\" = parent.span_id\n    AND child.trace_id = parent.trace_id\nWHERE child.service_name = 'ts-food-service'\n    AND parent.service_name != 'ts-food-service'\nGROUP BY parent.service_name,\
  \ child.service_name\nORDER BY call_count DESC;\n\""
- "SELECT \n    trace_id,\n    service_name,\n    span_name,\n    \\\"attr.status_code\\\" as status,\n    duration,\n    time\nFROM 'abnormal_traces.parquet'\nWHERE \\\"attr.status_code\\\" = 'Error'\n\
  ORDER BY time ASC\nLIMIT 50;\n\""
- "SELECT \n    service_name,\n    span_name,\n    \\\"attr.status_code\\\" as status,\n    duration,\n    time,\n    \\\"parent_span_id\\\"\nFROM 'abnormal_traces.parquet'\nWHERE trace_id = '69b5c590ab6d73ef3e70969c82c0885f'\n\
  ORDER BY time ASC;\n\""
- "SELECT \n    service_name,\n    span_name,\n    \\\"attr.status_code\\\" as status,\n    duration,\n    time\nFROM 'abnormal_traces.parquet'\nWHERE trace_id = '207bab3d01cb724866cc25c69dfab96d'\nORDER\
  \ BY time ASC;\n\""
- 'SELECT service_name, COUNT(*) as total FROM ''normal_traces.parquet'' GROUP BY service_name ORDER BY total DESC LIMIT 20;

  "'
- 'SELECT service_name, COUNT(*) as total, COUNT(*) FILTER (WHERE \"attr.status_code\" = ''Error'') as errors FROM ''normal_traces.parquet'' GROUP BY service_name ORDER BY errors DESC LIMIT 20;

