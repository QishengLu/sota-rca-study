raw_sql_list_sample:
- "\nSELECT \n    service_name,\n    COUNT(*) as total_spans,\n    SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 400 THEN 1 ELSE 0 END) as error_count,\n    ROUND(100.0 *\
  \ SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 400 THEN 1 ELSE 0 END) / COUNT(*), 2) as error_rate_pct,\n    ROUND(AVG(duration)/1e6, 2) as avg_duration_ms,\n    ROUND(MAX(duration)/1e6,\
  \ 2) as max_duration_ms\nFROM abnormal_traces\nGROUP BY service_name\nORDER BY error_rate_pct DESC\n"
- "\nSELECT \n    service_name,\n    level,\n    COUNT(*) as log_count\nFROM abnormal_logs\nGROUP BY service_name, level\nORDER BY service_name, level\n"
- '

  SELECT service_name, level, message, time

  FROM abnormal_logs

  WHERE level IN (''ERROR'', ''SEVERE'')

  ORDER BY time ASC

  LIMIT 50

  '
- "\nSELECT \n    service_name,\n    span_name,\n    attr_status_code,\n    attr_http_response_status_code,\n    COUNT(*) as count,\n    ROUND(AVG(duration)/1e6, 2) as avg_ms,\n    ROUND(MAX(duration)/1e6,\
  \ 2) as max_ms\nFROM abnormal_traces\nWHERE attr_status_code = 'ERROR' OR attr_http_response_status_code >= 400\nGROUP BY service_name, span_name, attr_status_code, attr_http_response_status_code\nORDER\
  \ BY count DESC\n"
- '

  SELECT service_name, level, message, time

  FROM abnormal_logs

  WHERE level IN (''ERROR'', ''SEVERE'') AND service_name IN (''ts-seat-service'', ''ts-travel2-service'', ''ts-route-plan-service'', ''ts-travel-plan-service'', ''ts-food-service'')

  ORDER BY time ASC

  LIMIT 20

  '
- "\n-- Find parent-child relationships between key services for error traces\nSELECT \n    t1.service_name as caller_service,\n    t2.service_name as callee_service,\n    t1.span_name as caller_span,\n\
  \    t2.span_name as callee_span,\n    COUNT(*) as count\nFROM abnormal_traces t1\nJOIN abnormal_traces t2 ON t1.span_id = t2.parent_span_id\nWHERE t2.attr_status_code = 'Error'\n  AND t1.service_name\
  \ IN ('ts-travel-plan-service', 'ts-route-plan-service', 'ts-travel2-service', 'ts-seat-service')\nGROUP BY t1.service_name, t2.service_name, t1.span_name, t2.span_name\nORDER BY count DESC\n"
- '

  SELECT service_name, level, message, time

  FROM abnormal_logs

  WHERE service_name = ''ts-order-service'' AND level IN (''ERROR'', ''WARN'')

  ORDER BY time ASC

  LIMIT 15

  '
- '

  SELECT DISTINCT metric, service_name

  FROM abnormal_metrics

  WHERE service_name IN (''ts-order-service'', ''ts-seat-service'')

  ORDER BY service_name, metric

  '
- "\n-- Compare ts-order-service CPU/memory metrics between normal and abnormal\nSELECT \n    'abnormal' as period,\n    metric,\n    ROUND(AVG(value), 4) as avg_value,\n    ROUND(MAX(value), 4) as max_value\n\
  FROM abnormal_metrics\nWHERE service_name = 'ts-order-service' \n  AND metric IN ('container.cpu.usage', 'container.memory.usage', 'container.memory.working_set', 'k8s.pod.cpu.usage', 'k8s.pod.memory.usage',\
  \ 'jvm.cpu.recent_utilization')\nGROUP BY metric\nORDER BY metric\n"
- "\n-- Compare ts-seat-service metrics between normal and abnormal\nSELECT \n    'normal' as period,\n    metric,\n    ROUND(AVG(value), 4) as avg_value,\n    ROUND(MAX(value), 4) as max_value\nFROM normal_metrics\n\
  WHERE service_name = 'ts-order-service' \n  AND metric IN ('container.cpu.usage', 'container.memory.usage', 'container.memory.working_set', 'k8s.pod.cpu.usage', 'k8s.pod.memory.usage', 'jvm.cpu.recent_utilization')\n\
  GROUP BY metric\nORDER BY metric\n"
- "\nSELECT \n    service_name,\n    metric,\n    ROUND(AVG(value), 4) as avg_value,\n    ROUND(MAX(value), 4) as max_value,\n    COUNT(*) as samples\nFROM abnormal_metrics\nWHERE service_name = 'ts-seat-service'\n\
  GROUP BY service_name, metric\nORDER BY metric\n"
- '

  -- Look for network error metrics

  SELECT DISTINCT metric, service_name

  FROM abnormal_metrics_sum

  WHERE metric LIKE ''%network%'' OR metric LIKE ''%error%'' OR metric LIKE ''%drop%'' OR metric LIKE ''%reset%'' OR metric LIKE ''%connection%''

  LIMIT 20

  '
- "\n-- Compare jvm.system.cpu.load_1m between normal and abnormal for all services\nSELECT \n    service_name,\n    ROUND(AVG(value), 4) as avg_value,\n    ROUND(MAX(value), 4) as max_value,\n    COUNT(*)\
  \ as samples\nFROM normal_metrics\nWHERE metric = 'jvm.system.cpu.load_1m'\nGROUP BY service_name\nORDER BY avg_value DESC\n"
- "\n-- Compare jvm.system.cpu.load_1m between normal and abnormal for all services\nSELECT \n    service_name,\n    ROUND(AVG(value), 4) as avg_value,\n    ROUND(MAX(value), 4) as max_value,\n    COUNT(*)\
  \ as samples\nFROM abnormal_metrics\nWHERE metric = 'jvm.system.cpu.load_1m'\nGROUP BY service_name\nORDER BY avg_value DESC\n"
- '

  SELECT DISTINCT metric

  FROM abnormal_metrics_sum

  LIMIT 40

  '
- "\n-- Network errors by service\nSELECT \n    service_name,\n    metric,\n    SUM(value) as total_value,\n    AVG(value) as avg_value,\n    MAX(value) as max_value\nFROM abnormal_metrics_sum\nWHERE metric\
  \ LIKE '%network%'\nGROUP BY service_name, metric\nORDER BY service_name, metric\n"
- "\n-- Check hubble drop metrics and network errors for all services\nSELECT \n    service_name,\n    metric,\n    attr_source,\n    attr_destination,\n    SUM(value) as total_drops,\n    COUNT(*) as samples\n\
  FROM abnormal_metrics_sum\nWHERE metric = 'hubble_drop_total'\nGROUP BY service_name, metric, attr_source, attr_destination\nORDER BY total_drops DESC\n"
- "\n-- Check hubble drop metrics in normal for comparison\nSELECT \n    service_name,\n    metric,\n    attr_source,\n    attr_destination,\n    SUM(value) as total_drops,\n    COUNT(*) as samples\nFROM\
  \ normal_metrics_sum\nWHERE metric = 'hubble_drop_total'\nGROUP BY service_name, metric, attr_source, attr_destination\nORDER BY total_drops DESC\n"
- "\n-- Check GC metrics for ts-order-service and ts-seat-service\nSELECT \n    service_name,\n    metric,\n    attr_jvm_gc_action,\n    attr_jvm_gc_name,\n    AVG(count) as avg_gc_count,\n    AVG(sum)\
  \ as avg_gc_duration_ms,\n    MAX(max) as max_gc_duration_ms\nFROM abnormal_metrics_histogram\nWHERE metric LIKE '%gc%'\nGROUP BY service_name, metric, attr_jvm_gc_action, attr_jvm_gc_name\nORDER BY avg_gc_duration_ms\
  \ DESC\n"
- "\n-- Check jvm memory for ts-order-service\nSELECT \n    service_name,\n    metric,\n    AVG(value) as avg_value,\n    MAX(value) as max_value,\n    COUNT(*) as samples\nFROM abnormal_metrics_sum\nWHERE\
  \ service_name = 'ts-order-service' AND metric LIKE '%memory%'\nGROUP BY service_name, metric\nORDER BY metric\n"
