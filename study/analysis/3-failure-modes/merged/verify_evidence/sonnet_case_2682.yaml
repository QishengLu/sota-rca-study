raw_sql_list_sample:
- "\nSELECT service_name, \n       COUNT(*) as total_spans,\n       SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 500 THEN 1 ELSE 0 END) as error_spans,\n       AVG(duration)\
  \ as avg_duration_ns,\n       MAX(duration) as max_duration_ns,\n       ROUND(100.0 * SUM(CASE WHEN attr_status_code = 'ERROR' OR attr_http_response_status_code >= 500 THEN 1 ELSE 0 END) / COUNT(*), 2)\
  \ as error_rate_pct\nFROM abnormal_traces\nGROUP BY service_name\nORDER BY error_rate_pct DESC, error_spans DESC\n"
- '

  SELECT service_name, level, COUNT(*) as count

  FROM abnormal_logs

  GROUP BY service_name, level

  ORDER BY service_name, level

  '
- '

  SELECT service_name, level, message, time

  FROM abnormal_logs

  WHERE level IN (''ERROR'', ''WARN'')

  ORDER BY time

  LIMIT 50

  '
- "\nSELECT service_name, \n       AVG(duration) as avg_duration_ns,\n       MAX(duration) as max_duration_ns\nFROM normal_traces\nGROUP BY service_name\nORDER BY avg_duration_ns DESC\n"
- '

  SELECT service_name, level, message, time

  FROM abnormal_logs

  WHERE level = ''ERROR''

  ORDER BY time

  '
- '

  SELECT t.trace_id, t.span_id, t.parent_span_id, t.service_name, t.span_name, t.duration, t.attr_status_code, t.attr_http_response_status_code

  FROM abnormal_traces t

  WHERE t.service_name = ''ts-travel-plan-service''

  ORDER BY t.duration DESC

  LIMIT 20

  '
- '

  SELECT service_name, level, message, time

  FROM abnormal_logs

  WHERE level = ''ERROR''

  ORDER BY time

  LIMIT 40

  '
- '

  -- Find the full trace for a slow travel-plan-service request and see what it calls

  SELECT t.service_name, t.span_name, t.duration, t.attr_status_code, t.attr_http_response_status_code

  FROM abnormal_traces t

  WHERE t.trace_id = ''0867757bed02c105d395574abb6553e0''

  ORDER BY t.duration DESC

  LIMIT 30

  '
- '

  -- Find what services are slow in the travel-plan-service trace chain

  SELECT t.service_name, t.span_name, t.duration, t.attr_status_code

  FROM abnormal_traces t

  WHERE t.trace_id = ''0867757bed02c105d395574abb6553e0''

  ORDER BY t.duration DESC

  LIMIT 30

  '
- '

  SELECT service_name, level, message, time

  FROM abnormal_logs

  WHERE service_name IN (''ts-delivery-service'', ''ts-notification-service'')

  AND level = ''ERROR''

  LIMIT 20

  '
- '

  -- Get ALL spans for the slow trace - looking at all services involved

  SELECT service_name, span_name, duration, attr_status_code, attr_http_response_status_code, span_id, parent_span_id

  FROM abnormal_traces

  WHERE trace_id = ''0867757bed02c105d395574abb6553e0''

  ORDER BY duration DESC

  LIMIT 50

  '
- '

  -- Check route-plan-service''s dependencies in the trace

  SELECT service_name, span_name, duration, attr_status_code, attr_http_response_status_code

  FROM abnormal_traces

  WHERE service_name = ''ts-route-plan-service''

  ORDER BY duration DESC

  LIMIT 20

  '
- "\n-- Find which trace contains the slow route-plan-service quickestRoute call (3.8 seconds)\n-- and explore what it calls\nSELECT service_name, span_name, duration, attr_status_code, attr_http_response_status_code,\
  \ span_id, parent_span_id, trace_id\nFROM abnormal_traces\nWHERE trace_id IN (\n  SELECT trace_id FROM abnormal_traces \n  WHERE service_name = 'ts-route-plan-service' \n  AND span_name = 'POST /api/v1/routeplanservice/routePlan/quickestRoute'\n\
  \  AND duration > 3000000000\n  LIMIT 1\n)\nORDER BY duration DESC\nLIMIT 30\n"
- '

  -- Check what metrics are available and look for resource issues

  SELECT metric, COUNT(*) as count

  FROM abnormal_metrics

  GROUP BY metric

  ORDER BY count DESC

  LIMIT 30

  '
- '

  -- Find all spans in the trace for ts-travel2-service and its children

  SELECT service_name, span_name, duration, attr_status_code, attr_http_response_status_code, span_id, parent_span_id

  FROM abnormal_traces

  WHERE trace_id = ''0ed32fc868aa5adbfd0f59b8f87b058f''

  AND service_name NOT IN (''ts-travel-plan-service'', ''ts-ui-dashboard'', ''loadgenerator'', ''ts-route-plan-service'')

  ORDER BY duration DESC

  LIMIT 30

  '
- '

  -- Check CPU and memory for key services

  SELECT service_name, metric, AVG(value) as avg_value, MAX(value) as max_value

  FROM abnormal_metrics

  WHERE service_name IN (''ts-travel2-service'', ''ts-travel-plan-service'', ''ts-route-plan-service'')

  AND metric IN (''container.cpu.usage'', ''k8s.pod.memory.usage'', ''container.memory.usage'')

  GROUP BY service_name, metric

  ORDER BY service_name, metric

  '
- '

  -- Check metrics for ts-route-service

  SELECT metric, AVG(value) as avg_value, MAX(value) as max_value, MIN(value) as min_value

  FROM abnormal_metrics

  WHERE service_name = ''ts-route-service''

  GROUP BY metric

  ORDER BY metric

  '
- '

  -- Compare normal metrics for ts-route-service

  SELECT metric, AVG(value) as avg_value, MAX(value) as max_value, MIN(value) as min_value

  FROM normal_metrics

  WHERE service_name = ''ts-route-service''

  GROUP BY metric

  ORDER BY metric

  '
- '

  -- Get all spans in trace that contains the slow route-service call

  SELECT service_name, span_name, duration, attr_status_code, span_id, parent_span_id

  FROM abnormal_traces

  WHERE trace_id = ''0ed32fc868aa5adbfd0f59b8f87b058f''

  AND service_name = ''ts-route-service''

  ORDER BY duration DESC

  LIMIT 20

  '
- "\n-- Check sum metrics - look for network or HTTP latency metrics \nSELECT metric, COUNT(*) as count\nFROM abnormal_metrics_sum\nGROUP BY metric\nORDER BY count DESC\nLIMIT 20\n"
