# Minimal pyproject snippet for sota-rca-study entry-point registration.
# Merge this into the framework's existing pyproject.toml after forking.
#
# To merge:
#   1. Add this entry-points block to the framework's pyproject.toml
#   2. Run: uv pip install -e .
#   3. Verify: uv run rca llm-eval show-agents | grep thinkdepthai

[project.entry-points."llm_eval.agents"]
thinkdepthai = "thinkdepthai.agents.eval_agent:ThinkDepthAIEvalAgent"

